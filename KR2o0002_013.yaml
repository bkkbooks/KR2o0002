body:
  text: 史通通釋卷十三無錫浦起龍撰外篇疑古第三舊注十一條或作十二條今刋去葢古之史氏區分有二焉一曰記言二曰記事而古人所學以言為首釋以記事託記言發端起議至若虞夏之典商周之誥仲虺周任之言史佚臧文之説此皆言也凡有逰談專對獻䇿上書者莫不引為端緒歸其的準言則世多習知其於事也則不然至一作乃若少昊之以鳥名官陶唐之舊有以字御龍拜軄夏氏之中衰也其盜有后羿寒浞齊邦之始建也其君有蒲姑伯陵此皆事也斯並開國承家異聞奇事而後世學者罕傳其説唯夫博物君子或粗知其一隅事而少僻則聞者希矣此則記事之史不行而記言之書見重斷可知矣釋疑古之疑疑皆在事故以言詳事略領局也及左氏之為傳也雖義釋本經而語雜它事遂使兩漢儒者嫉之若讎故二傳大行二傳釋言為多擅名於一作後世又孔門之著録一作述也論語專述言辭家語兼陳事業而自古學徒相授唯稱論語而已由斯而談並古人輕事重言之明效也釋又以左氏論語證之然則上起唐堯下終秦穆其書所録唯有百篇而書之所載以言為主至於廢興行事萬不記一語其缺略可勝道哉釋落到尚書記言略事是篇主故令後人有言唐虞以下帝王之事未易明也釋篇局至此截其意總為諱惡伏根案論語曰君子成人之美不成人之惡又曰成事不説原注事已成不復可解說遂事不諫原注事已遂不可復諫止既往不咎原注事已往不可復追咎又曰民可使由之不可使知之原注由用也可用而不可使知者百姓日用而不能知自此引經四處注皆全寫先儒所釋也夫聖人立教其言若是釋引經為諱惡發端在於史籍其義亦然是以美者因其美而一作以美之雖有其惡不加一作之下同毁也惡者因其惡而惡之雖有其美不加譽也故孟子曰堯舜不勝其美桀紂不勝其惡魏文帝曰舜禹之事吾知之矣漢景帝曰言舊脫言字學者無一作不言湯武受命不為愚斯並曩賢精鑑已有先覺而拘於禮法限以師訓雖口不能言而心知其不可者葢亦多矣釋至此落出略事之故意在諱惡是本序立言之指又案魯史之有春秋也外為賢者内為本國事靡洪纎動皆隱諱斯乃周公之格言然何必春秋在於六經亦皆如此故觀夫子之刋書也夏桀讓湯武王斬紂其事甚著而芟夷不存原注此事出周書案周書是孔子刪尚書之餘以成其録也釋此五句見疑古大意觀夫子之定禮也定禮即修春秋也以春秋為周禮舊法故云然隱閔非命惡視不終而奮筆昌言云魯無簒弑觀夫子之刪詩也凡諸舊作語誤國風皆有怨刾在於魯國獨無其章原注魯多滛僻豈無刺詩葢夫子刪去而不録觀夫子之論語也君娶於呉是謂同姓而司敗發問對以知禮釋定禮三項用他經陪證之斯驗世郭作世别作聖人之飾智矜愚愛憎由已者多矣釋此二句總繳言諸經皆有諱詞則世史飾詐益無疑矣隱對後條近古姦雄桓𤣥司馬等意諸本作聖人者大非加以古文載事其詞簡約釋專歸到尚書推者難詳一作該缺漏無補遂令後來學者莫究其源䝉然靡察有如聾瞽今故訐一作評其疑事以著於篇凡有十條列之於後按此疑古之序也不入條數古字專指尚書其為疑字解說則託言於古文隱諱通觀十條顯斥古聖罪無辭矣然讀書尚論其意有可推者敢一雪之知㡬眼見近古自新莽始禍以及當塗典午南則劉蕭陳氏北則齊周楊堅累朝踐代類以攘竊之詐佹為推挹之文雖逮李唐奮戈除暴猶必虛擁代邸粉飾禪書一則曰宜遵故事再則曰一依前典引經作冊居然舊章諱誅伐為惡聲掩揖讓而䕶跡凡資口實率附陶姚於是古帝前王青天白日氣象塵昏霧塞五六百年於此矣作者恫焉假號汲墳之荒簡反兵孔壁之遺編所傷在二姓改玉之交所影皆九錫升壇之套其意葢曰古聖且䝉疑謗此事誰容售欺憑伊借面有辭至竟隱形無地耳其所提防葢在於此叵奈知㡬者不學無術以文害志恣行橫議妄冀昭姦何其遼哉不揣檮昩頗推其本意而釋之如左以鳥名官見書志篇又竹書紀年少昊登帝位有鳯凰之瑞或曰名清不居帝位帥鳥師居西方以鳥紀官按名清上古人名御龍拜軄史記夏紀帝孔甲立好方鬼神事天降龍二有雌雄孔甲不能食陶唐後有劉累學擾龍於豢龍氏以事孔甲孔甲賜之姓曰御龍氏受豕韋之後后羿寒浞兩見左傳又竹書紀年帝太康居斟鄩畋于洛表羿入斟鄩帝仲康七年世子相出居商㐀帝相八年寒浞殺羿九年相居于斟灌二十六年浞使其子澆滅斟灌二十七年伐斟鄩滅之二十八年弑帝后緡歸于有仍伯靡奔夏世子少康生在丙寅年乙酉少康奔虞甲辰少康使女艾殺澆乙巳伯靡殺寒浞少康歸于夏邑蒲姑伯陵左昭二十齊侯至自田晏子侍於遄臺晏子曰昔爽鳩氏始居此地季萴因之有逢伯陵因之蒲姑氏因之而後太公因之孟子魏文漢景三言孟子語見風俗通正始篇曰堯舜不勝其美桀紂不勝其惡傳言失指圗景失形魏文語見魏志文紀注前史官篇已引之漢景語見史紀儒林轅固生傳曰食肉不食馬肝不為不知味言學者無言湯武受命不為愚隱閔非命左隱十一羽父請殺桓公公曰吾將授之矣羽父懼反譖公於桓公而請弑之十一月羽父使賊弑公于寪氏立桓公閔二初公傅奪卜齮田公不禁秋八月共仲使卜齮賊公于武闈成季以僖公適邾共仲奔莒乃入立之惡視不終前見編次後見惑經葢虞書之美放勲也云克明俊或作峻下同徳而陸賈新語又曰堯舜之人本作民或作臣誤比屋可封葢因堯典成文而廣造竒說也案春秋傳云髙陽髙辛二氏各有才子八人謂之元凱此十六族也世濟其美不隕其名以至於堯堯不能舉帝鴻氏少昊氏顓頊氏各有不才子謂之渾沌窮竒檮杌此三族也世濟其凶増其惡名以至於堯堯不能去縉雲氏亦有不才子天下謂之饕餮以比或譌此三族俱稱四凶而堯亦不能去斯則當堯之世小人君子比肩齊列善惡無分賢愚共貫且一譌但論語有云舜舉咎繇不仁者遠是則當咎繇未舉不仁甚多彌驗堯時羣小在位者矣一脫矣字又安得謂之克明俊德比屋可封者乎其疑一也按十疑之中不言嬗代之事者獨此首條耳亦見凡在盛朝鋪張善治必不免於溢辭為後此諸條作引也比屋可封新語無為篇堯舜之民可比屋而封桀紂之民可比屋而誅者教化使然也元凱四凶見左氏文十八傳文已略具渾沌之沌左作敦讀如沌堯典序又云將遜于位讓于一少于字虞舜孔氏注曰堯知子丹朱不肖故有禪位之志案汲冡𤨏語云舜放堯於平陽而書云書名缺某地地名缺有城以囚堯為號識者憑斯異說頗以禪授為疑然則觀此二書已足為證者矣而猶有所未覩也何者據山海經謂放勲之子為帝丹朱疑脫堯未傳子句而列君君疑名字之譌於帝者得非舜雖廢堯仍立堯子俄又奪其帝者乎觀近古一脫古字有姦雄奮發自號勤王或廢父而立其子或黜兄而奉其弟始則示相推戴終亦成其簒奪求諸歴代徃徃而有必以古方今千載一揆斯則堯之授舜其事難明謂之讓國徒虛語耳其疑二也按本篇所疑嬗代之事自此條起即提破近古姦雄可以知其意之所寄嬗局至元明始轉然後偽讓絶直道伸汲冡𤨏語見春秋家又詳後惑經篇之末帝丹朱海内南經蒼梧之山帝舜葬於陽帝丹朱葬於隂虞書舜典又云五十載陟方乃死注云死蒼梧之野因葬焉案蒼梧者於楚則川號汨羅在漢則邑稱零桂地總百越山連五嶺人風婐劃謂文身地氣歊瘴雖使百金之子猶憚經履其途况以萬乗之君而堪廵幸其國且舜必以精華既竭形神告勞捨兹寳位如釋重負一作負重何得以垂歿之年更踐不毛之地兼復二妃不從怨曠生離萬里無依孤魂溘盡讓王髙蹈豈其若是者乎歴觀自古人君廢逐若夏桀放於南巢趙嘉當竹遷遷於房陵周王流彘楚帝徙郴語其艱棘未有如斯之甚者一無者字也斯則陟方之死其殆文命之志乎其疑三也按此條追出文命之志一句志在劉宋之於零陵也自零陵後禪位之君罕得全者注云此謂孔氏安國傳也傳言方道也升道南方廵守死於蒼梧之野而葬焉至蔡傳以陟方作升遐解而又援竹書帝王之没曰陟為據或又以漢書注掘土為坑曰方為方字之據若爾則只如竹書書陟已足即綴一方字尚可强通而復綴之以乃死何耶蔡云猶言殂落而死也殂落下添而死二字豈復成語耶詳味句法畢竟孔傳為正但以大禹謨受終之文印之是時禹攝帝位久矣舜不應更事親廵愚謂古經此等處當闕疑趙遷淮南子趙王遷流於房陵思故鄉作山水之謳趙世家秦既虜遷趙之亡大夫共立嘉為王六年秦破嘉滅趙徙郴項羽本紀諸侯罷戲下各就國項羽使使徙義帝長沙郴縣隂令衡山臨江王擊殺之江中汲冡書云舜放堯於平陽帶引此句䝉前條說下益為啟所誅又曰太甲殺伊尹文丁舊謬作王殺季歴凡此數事語異正經其書近出世人多不之信也案舜之放堯舊有文之殺季四字羡文無事别說足驗其情已於舊衍此字篇前舊衍後字言之詳矣此條前後並無文丁殺季之言故知本文句字多羡夫唯益與伊尹見一作受戮並一無並字於正書猶無其證推一作㩁而論之如啟之誅益仍可覆也何者舜廢堯而立丹朱禹黜舜而立商均益手握機權勢同舜禹而欲因循故事坐膺天禄其事不成自貽伊咎觀夫近古簒奪桓獨不全馬仍反正若啟之誅益亦由猶通晉之殺𤣥乎若舜禹相代事業皆成唯益覆車伏辜夏后亦猶桓效曹馬而獨致元興晉安帝改元之禍者乎其疑四也按此條直提破桓𤣥之於晉安意可見已葢舉稱亂殺身者以為世鑒益為啟誅黄補注案竹書紀年啟既立費侯伯益出就國無啟殺益事葢𤨏語中載之太甲文丁竹書紀年太甲元年伊尹放太甲于桐乃自立七年王潛出自桐殺伊尹又文丁十一年周公季歴伐翳徙之戎來獻㨗王殺季歴按文丁即太丁沈約注云史記作太丁非又晉書束晳傳引紀年之文亦作文丁也再按本條除領句皆言上殺下之事妄人不解文義并不考文丁為何人遂乃改丁為王耳桓獨不全晉安帝紀隆安二年廣州刺史桓𤣥舉兵反元興二年𤣥簒位帝䝉塵三年帝幸江陵五月督䕶馮遷斬𤣥於貊盤洲乗輿反正湯誓序舊本誓誤作誥又脫序字云湯伐桀戰于鳴條又云湯放桀于南巢唯有慙德而周書殷祝篇稱桀讓湯王位云云句止穩括周書之文此則有異於尚書如周書之所說豈非湯既勝桀力制夏人使桀推讓歸王於已葢欲比跡堯舜襲其髙名者乎又案墨子云湯以天下讓務光而使人說曰湯欲加惡名於汝務光遂投清冷之泉而死湯乃即位無疑然則湯之飾讓偽跡甚多考墨家所言雅與周書相㑹一作合夫當有周字書之作本出尚書孔父截翦浮詞裁成雅誥一作語去其鄙事直云慙德豈非欲滅湯之過增桀之惡者乎其疑五也按千古無假征誅但有偽揖讓如此條借影殷祝篇文必欲掩征誅而傅諸揖讓曹馬軰之態畢獻矣即劉氏假雜出之書以禠彼軰之魄亦盡態矣彼為膠柱之解者吾不敢以善讀書許之殷祝篇在逸周書第六十六其畧曰湯將放桀士民奔湯國中虚桀請湯曰君有人請致國湯曰否士民惑吾為王明之士民復致于桀曰何必君更桀南徙不齊民奔湯桀復請湯言國君之有也湯曰否我為君王明之桀徙于魯又曰國君之有也湯不能止桀而復薄三千諸侯曰有道者處之三千諸侯莫敢即位然後湯即天子之位湯讓務光按墨子之云莊子亦載之務作瞀讓王篇湯將伐桀因瞀光而謀瞀光曰非吾事也湯伐桀尅之以讓瞀光曰吾子何不立乎辭曰吾聞之無道之世不踐其土况尊我乎吾不忍久見也乃負石而自沈於廬水夫五經立言千載猶仰而求其前後理甚相乖何者稱周之盛也則云三分有二商紂為獨夫語殷之敗也又云紂有臣億萬人其亡流血漂杵斯則是非無準向背不同者焉又案武王為泰誓數紂過失亦猶近代之有吕相為晉絶秦陳琳為袁檄魏袁亦不直耳曹惡得無罪陳琳句謬引欲加之罪能無辭乎而後來諸子承其偽說競一作竟列紂罪有倍五經故子貢曰桀紂之惡不至是君子惡居下流班生亦云安有據婦人臨一作於朝劉向又曰世人有弑父害君桀紂不至是而天下當有歸字惡者必以桀紂為先此其自古言卒癸之罪將非厚誣者乎其疑六也按此條非寛失國之荒主也欲甚代興之罪而為之辭也陳琳檄文選為袁紹檄豫州善注魏志曰陳孔璋避難冀州袁本初使典文章作此檄據婦臨朝漢書成帝宴飲乗輿幄坐畫紂據妲己上指問班伯曰紂至是乎伯對曰書云用婦之言何有踞肆於朝所謂衆惡歸之不如是之甚也微子之命篇序舊脫序字云殺武庚序云殺武庚命微子代殷後案禄父即商紂之子也屬社稷傾覆家國淪亡父首梟懸母軀分裂永言怨恥生人一作死莫二向使其侯服事周而全軀保其妻子也仰天俯地何以為生含齒戴髪何以為貎既而合謀二叔徇節三監雖君親之怨不除而臣子之誠可見考諸名教生死無慙議一譌議字為於義二字者茍以其功業不成便以頑人民為目必如是則有君若夏少康有臣若伍子胥當作申包胥向若隕讎雪怨衆敗身滅亦當𨽻跡醜徒編名逆黨者邪其疑七也按此條傷魏晉而下諸末造鮮義旅也寧為髙貴鄉公死莫作常道鄉公生寧為袁粲死莫作禇淵生臣子之於君父其義一也豈祗為殷頑雪涕而已武庚禄父竹書紀年周武王十二年伐殷王親禽受于南單之臺遂分天之明立受子禄父是為武庚成王元年武庚以殷畔三年王師滅殷殺武庚申包胥左定四初伍員與申包胥友其亡也謂申包胥曰我必復楚國申包胥曰子能復之我必能興之及昭王在隨申包胥如秦乞師立依於庭墻而哭七日秦師乃出王卒復國若作伍胥於本條不切矣論語曰大矣周之德也三分天下有其二猶服事殷案尚書序舊脫序字云西伯戡黎殷始咎周二句序文夫姬氏爵乃諸侯而輙行征伐結怨王室殊一作曽無媿畏此則春秋荆蠻之滅諸姫論語季氏之伐顓臾也又案某書名闕一譌其書曰朱雀云云朱雀句當有本文云云字誤文王受命稱王云云夫天無二日地惟一人有殷猶存而王號遽立此即春秋楚及吴越僭號而陵天子也然則戡黎滅崇自同王者服事之道理不如斯亦猶近者魏司馬文王害權臣黜少帝坐加九錫行駕六馬及其歿也而荀朂猶謂之人臣以終葢姬之事殷當比馬之臣魏必稱周德之大者不亦虛為其説乎一作設也其疑八也按此條亦提破司馬舉昭為例前操後裕等皆比於一科九錫六馬魏三少帝紀甘露五年以司馬文王封晉公加九錫咸熙二年命晉王建天子旌旗乗金根車駕六馬位在燕王上荀朂猶謂人臣晉書茍朂字公曾晉武受禪拜中書監按諛昭之語本傳不載世説方正注王隱晉書曰朂性佞媚良史當著佞倖傳葢其人媚賈旤晉者也是其前諂馬傾曹可知論語曰太伯可謂至徳也己三以天下讓民無得而稱焉案吕氏春秋書名恐誤當是吴越春秋所載云云斯則太王鍾愛厥孫將立其父太伯年居長嫡地實妨賢向若强顔茍視懐疑不去大則類衛伋之誅小則同楚建之逐雖欲勿讓君親其立諸且太王之殂太伯來赴季歴承考遺命推讓厥昆太伯以形質已殘有辭獲免原夫毁兹玉體從彼被髪者本以外絶嫌疑内釋一作懐猜忌譬雄雞自斷其尾用獲免於人犧者焉又案春秋晉士蒍見一脫見字申生之將廢也曰為吴太伯猶有令名斯則太伯申生事如一體直以出處有異故成敗不同若夫子之論太伯也必美其因病成妍轉禍為福斯則當矣如云可謂至德者無乃謬為其譽乎其疑九也按此條獨不拈尚書葢因西伯條而及之也太伯之德三讓之指理學大儒訖無定解知㡬一以後世情事揣之詎足與辯夫亦心惻於隱太子之事乎吕氏春秋按此句定誤嘗取其書所謂十二紀八覽六論縱觀之曽無一語及太伯事者試抽吴越春秋覆之乃遇其文今録於左所載云云吴越春秋古公三子長曰太伯次曰仲雍雍一名虞仲少曰季歴季歴娶妻太任氏生子昌昌有聖瑞古公曰興王業者其在昌乎太伯仲雍望風知指曰歴者適也知古公欲以國及昌古公病二人託名採藥於衡山遂之荆蠻斷髪文身為夷狄之服示不可用古公卒太伯仲雍歸赴䘮畢還荆蠻國民君而事之自號為勾吴古公將卒令季歴讓國於太伯而三讓不受於是季歴蒞政衛伋衛世家初宣公愛夫人夷姜生子伋以為太子為太子娶齊女而自取之生子夀子朔伋母死夫人與朔共䜛太子伋公乃使伋於齊而令盜遮界上殺之按事見左桓十六伋左作急子楚建左昭十九楚子生太子建王為之聘於秦費無極與逆勸王取之城城父而寘太子焉二十年無極言於楚子曰建將以方城之外叛王信之使城父司馬奮揚殺太子未至太子建奔宋雞斷尾外傳周語賔孟適郊見雄雞自斷其尾問之侍者曰憚其犧也為吴太伯晉士蒍語見左傳閔元年尚書金縢篇云管蔡流言公將不利于孺子左傳云周公殺管叔而放左作蔡蔡叔夫豈舊誤其不愛王室故也昭元案尚書君奭篇序云召公為保周公為師相成王為左右召公不說皆君奭序之文斯則旦行不臣之禮挾震主之威跡居疑似坐招訕謗雖奭以亞聖之徳負明允之才目覩其事猶懐憤懣况彼二叔者才處中人地居下國側聞異議能不懐猜原其推戈反噬事由誤我一作誐而周公自以不諴當作咸假用左氏語遽加顯戮與夫漢代之一無之字赦淮南此下一増明帝二字寛阜陵一何遠哉斯則周公於友于之一作其義薄矣而書舊作詩之所述用為美談者何哉其疑十也按此亦與上條為類劉之不足與語周公猶其不足語於太伯文王也然為此說者於隱巢之間喋血之變或不能不寓於微辭焉赦淮南漢書淮南厲王長髙帝少子也孝文即位自㠯為最親驕蹇數不奉法上寛赦之入朝甚橫文帝不治歸國益恣及謀反事覺吏雜奏所犯當棄市制曰其赦長死罪廢勿王寛阜陵後漢書光武帝子阜陵質王延封淮陽性驕奢有告延作圖䜟祝詛事顯宗特加恩徙為阜陵王延懐怨望復有告延逆謀者肅宗詔曰王前犯大逆有同管蔡先帝屈法王曾莫悔今貶為侯後幸九江見延以喜以悲復為王大抵自春秋以前尚書之世其作者述事如此釋十疑皆在尚書之世也此三句㸃出今取其正經雅言理有難曉諸子異説義或可憑參而㑹之以相研覈一作覆如異於此則無論焉釋數語繳完夫逺古之書與近古之史非唯繁約不類固一作故亦向背皆殊何者近古之史也言唯詳備事罕甄擇使夫學者覩一邦之政則善惡相參觀一主之才而賢愚殆半至於遠古則不然夫其所録也略舉綱維務存襃諱尋其終始隱没者多嘗試言之向使漢魏晉宋之君生於上代一作三代非堯舜禹湯之主出於中葉俾史官易地而書各叙時事挍其得失固未可量釋加此一層明指出後來簒奪諸代互相推勘之㫖大意言遠古諱略猶且異聞錯出况若後代姦雄縱使上生彼世其諸逆節散見叢殘又當何如哉若乃輪扁稱其糟粕孔氏述其傳疑孟子曰盡信書不如無書武成之一脫之字篇吾取其二三簡一本此下有而為累文與近古同焉九字詞義未亮一本無此九字推此而言則遠古之書其妄甚矣豈比夫王沈之不實沈約之多詐若斯而已矣一作哉釋末段與内篇抑馬揚班同意誡著述家無騖荒遠也按此十疑後䟦也不入條數此等書怒其非聖無法而嚴為擯者誼人之辭也㑹其讀史寄憤而懸為解者曉人之辭也徒駭其拂經橫議而出我巾箱剰語與之講是對非則癡人之辭矣浮翳障日日豈隕明促促焉起而詈罵之傳稱魯人為敏其類是哉史通通釋卷十三
