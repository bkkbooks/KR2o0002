front:
  text: 欽定四庫全書史部十五
  hash: sha256:4a540dfc960a59c2dec4cdfbeae70a4cdb4cf072e21e65c814c7bffa22e3211a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2o0002_WYG_000-1a, image: WYG0685/WYG0685-0157a.png}
body:
  text: 史通通釋目録史評類內篇卷一六家第一卷二二體第二載言第三本紀第四世家第五列傳第六卷三表歷第七書志第八卷四論贊第九序例第十題目第十一斷限第十二編次第十三稱謂第十四卷五採撰第十五載文第十六補注第十七因習第十八邑里第十九卷六言語第二十浮詞第二十一叙事第二十二卷七品藻第二十三直書第二十四曲筆第二十五鑒識第二十六探賾第二十七卷八摸擬第二十八書事第二十九人物第三十卷九核才第三十一序傳第三十二煩省第三十三卷十雜述第三十四辨職第三十五自叙第三十六體統亡紕繆亡弛張亡外篇卷十一史官建置第一卷十二古今正史第二卷十三疑古第三卷十四申左第四卷十五㸃煩第五卷十六雜說上第六卷十七雜說中第七卷十八雜說下第八卷十九五行志錯誤第九五行志雜駁第十卷二十暗惑第十一忤時第十二臣等謹案史通通釋二十卷國朝浦起龍撰起龍字二田無錫人史通注本舊有郭延年王維儉黃叔琳三家遞相增損互有短長起龍是注較三家為晚出雖亦仍有疏漏如秦人不死事不知出洛陽伽藍記蜀老猶存事不知出魏書毛修之傳闌單失力字不知出清異録之類然大致引據詳明足稱該洽惟輕於改竄古書往往失其本㫖如六家篇內尚書條中語無可述四字之下若此二字之上乃有脫句而改此字為止又為增一有字又如列傳篇內項王立傳而以本紀為名句立字不誤而乃臆改為宜此類至多皆失詳慎又句解章評參差夾注如選刻制藝之例于注書之體亦乖惜其不一評一注釐為二書使離之雙美也顧其大致精核於知幾本意多能闡發不可謂之無功焉乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀史通通釋原序長安二年武后臨朝第十九年至此十六改元余以著作佐郎兼修國史尋遷左史於門下撰起居注㑹轉中書舍人暫停史任俄兼領其職今上即位除著作郎太子中允率更令其兼舊脫兼字修史皆如故兼修史以領職言脫兼字則非又屬大駕還京以留後在東舊脫東字都無幾驛徴入京專知史事仍遷祕書少監釋首叙歷官即自叙篇所謂三為史臣再入東觀也其注云今之史館即古之東觀自惟歷事二主從宦一作官兩京遍居司籍之曹久處載言之職昔馬融三入東觀漢代稱榮張華再典史官晉朝稱美嗟豫小子兼而有之是用職思舊誤作司其憂不遑啓處釋此總上歷官拈合當職撰史事即以引起史通之作嘗以載削餘暇商𣙜一作確史篇下筆不休遂盈筐篋於是區分類聚編而次之釋此六句暗籠史通昔漢世諸儒集論經傳定之於白虎閣因名曰白虎通豫既在史館而成此書故便以史通為目且漢求司馬遷後封為史通子是知史之稱通其來自久博采衆議爰定兹名釋此層明㸃史通兩引古史古事以見命名所本凡為草卷列之如左合若干言舊注除所闕篇凡八萬三千三百五十二字注五千四百九十八字按字數今不可定姑仍舊本存之于時嵗次庚戌景龍四年中宗元是時復辟六年矣仲春之月也按此劉氏自序當冠正目之首諸本錯置後人序例之間非體觀此一序簡明典切即可徴其史筆之潔古者經疏文選凡有自序者皆與正書同注王本此篇亦有注愚亦遵用之大駕還京注詳集終忤時篇馬融三入東觀後漢書本傳永初四年應召拜為校書郎中詣東觀典校祕書忤太后㫖禁錮安帝親政召還郎署復在講部拜議郎桓帝時述忤大將軍梁冀免官得赦還復拜議郎重在東觀著張華再典史官晉書本傳華學業優博朗贍多通盧欽言之於文帝除著作佐郎惠帝即位以華為太子少傅數年代下邳王晃為司空領著作白虎通後漢章帝紀建初四年大夫博士議郎郎官及諸生諸儒㑹白虎觀講議五經異同作白虎議奏班固傳天子㑹諸儒講論五經作白虎通德論令固撰集其事隋經籍志白虎通六卷唐藝文志通字下有義字史通子漢書司馬遷傳太史公仍父子相繼纂其職作本紀表書世家列傳凡百三十篇五十二萬六千五百字宣帝時遷外孫楊惲祖述其書遂宣布焉至王莽時求封遷後為史通子欽定四庫全書史通通釋舉例二科十别書不必醇乎醇書惟其至於至居巢劉氏之史通是也注書戒自我作故注書欲推心置腹山傖先生之通釋是也凡注之用二辨之通與不通而已是書行本相髙厭心蓋寡每於通處薦以荆榛而趣乖於不可通處過如炙轂而疵積敝也久矣先生曰趣乖者法宜訓正疵積者道在刋訛例總二科科各有别列如左方訓正者兼舉其義與辭而是正之也義從文生辭由古出俗學之弊大抵二端憑臆自用者揣義而不徴辭弊且流為束書不觀是謂蔑古炫博貪竒者役辭而不問義弊又滋乎靈臺日汨是謂䙝天兹用疏義以㑹辭考辭以赴義則訓之為也訓正之科其别六一曰釋篇者節之積也節清而篇乃定焉歷翻評本觀乎外篇條别胸缺主張驗其通體支離篇乖步伐者矣故為之釋以清之釋之為用析節而疏其義是賔是主是影是神前後相銜中邉交灌兹為從事之所先即其命名之所自間有省去不用唯於短說為然自昔漢唐經疏通例墨闌標眼於釋字仿用之二曰按按亦釋也標仍墨闌體同跋尾既釋以辨之復按以㑹之指趣所鍾歸宿有地矣况史通之為書也羣史牢籠全書吐納畛塗遼濶節目棼繁則必以見逺之明者察焉則將有無礙之辨者通焉此段識解於何置頓亦惟篇按職此淹該是知按之所届尤為駟牡之廣衢非等隻雞之近局也又其例比釋加遍釋有從省按無缺施惟下帙四五處有以一按攝三條二條者三曰證釋謂取證古書用釋今義也語云求之物本必於其始取其所通必於所宅故凡有徴引事必事祖辭必辭根而其所標識則又書皆舉名篇皆舉目如左傳則某公某年漢書則某紀某傳之類蓋採録多從節縮而原文可任搜核也他若舊注已得者明書何本或無書可質者直注未詳不攘不欺與世共見四曰證按凡前件證釋多有就證加按者痛刮不根之病及漫與之習也如尚書注有王肅其人也本係三國王朗之子舊援後魏同名之人如左傳家缺徐賈一注也位在干蕭二史之間撿出徐廣字形之誤更有全證皆屬設辨者如書志篇之東觀曰記採撰篇之沈炯罵書一失之俗傳一失之原本則一當革其繆一當繩其愆凡此諸流皆須顯說也證釋之條干有二百加按之處五百有竒任舉陳言都成說部五曰夾釋釋非節界夾入行間是夾釋也凡涉晦澀之義用一兩言達之或遇疑似之辭用直截語指之皆是也有此可以便觀書者之索解可以杜好辨者之岐猜六曰雜按雜按之施施於原注原注者劉自注也或刋失其初須為揣定或置非其所合與推移且有注混文文混注者於史官篇詔曰修撰暗惑篇曹公多詐見之并有注非注文非文者於史官篇自歷行事雜說篇蘇代所言見之相厥攸居還渠定判此雜按之所由設也不繫諸正書故稱雜焉刋訛者訛非一端而已或流傳或竄易或原本差池所致之塗既雜於是有繆出有倒施有脫遺羡衍所叢之纇繁興刺眼而葉落連翩膠牙而泉流澀咽文傳侮食怪曲水序之猶踈日思誤書歎小屋人之不作夷考諸家刋得者十一待刋者十九焉刋訛之科其别四一曰字之失是書之失在字者蓋亦多矣烏孤而轉烏孫文丁而轉文王處道而轉承祚涉漢而轉沙漠失則繆文省而曰省文朔方而曰方朔武宣而曰宣武昌平而曰平昌失則倒昭後略漏昭字言學者漏言字楚漢列國漏國字微子篇序漏序字失則脫名班祚土班下衍爵字以其類逆逆下衍者字虛美相酬馬遷乘傳美下傳下並衍以字失則羡繆倒脫羡凡有四端故概曰失也總二百二十有竒者刋之數也其刋去者仍注見之不沒舊本冀覽之者辨之也且作聰明改頭靣得罪古人莫此為甚本所深惡而豈蹈之下三條皆倣此二曰句之違違亦概詞也句之違亦四端凡二十處而㸃煩之誤在除加丹粉間者不與焉稍舉似之以句繆言則有若去萬留千録逺略近懵事類而反篇情者以句倒言則有若藉權濟物居京兆府乖文義而沒語趣者以句脫言則有若述南齊之史結申左之科缺至一全片而遺忘半靣者以句羡言則有若犀革裹之條嗤沈約之段衍至不可讀而反棄佳本者凡此又非一兩字之間審聲形之比靜繹全文廣參羣籍甚至浹時稽序而後其真始出持此耗磨晚節俟之甘苦中人三曰節之淆節之淆者內篇少外篇多通幅分條之殊其體故也其在內篇六家之總首既截則總尾亦宜截書志後論不應以或問截編次終篇不應以尋夫截其在外篇離合斷連岐忤交失者史官篇三正史篇三惑經篇一雜說上中下篇十有五技經肯綮每至族而難為官止神行唯彼節之有間今皆騞然矣至若㸃煩摘史隔鈔而合片當以方空格界之又若卷末忤時一牘而兩端可以序跋例離之斯皆隨方制宜非欲矜已立異四曰簡之錯篇節字句並有錯簡篇之錯卷九內之叙傳者是節之錯曲筆中之夫史十行者是字句之錯雜說下之李陵書者是篇不得而移節句可得而準也或遂刋定或為證眀具著卷中凡所盡心略如前欵間嘗總諸科别而𣙜之理不言而同然唯去非以趨於是言愜心者貴當必無憾然後即安是書也謂劉氏史通可謂浦氏家言亦可己巳孟陬親賢堂
