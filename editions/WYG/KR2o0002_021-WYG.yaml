body:
  text: 附録新唐書劉知㡬本傳増注劉子元名知㡬以𤣥宗諱嫌故以字行年十二父藏器按文藝傳劉延祐徐州彭城人永徽初以著作郎𢎞文館學士與令狐徳棻等撰次國史并實錄封陽城縣男從弟藏器為侍御史劾還脅人為妾者其人私請帝止其還藏器曰法萬民所共陛下用舍繇情法何所施今日從明日改下何所遵乃詔可稍遷比部員外郎監察御史子知柔累官工部尚書太子賔客封彭城縣侯知㡬别有傳為授古文尚書業不進父怒楚督之及聞為諸兄講春秋左氏冐往聽退輙辨析所疑歎曰書如是兒何怠父竒其意許授左氏踰年遂通覽羣史與兄知柔俱以善文詞知名擢進士第調獲嘉主簿武后證聖初詔九品以上陳得失子元上書譏每歳一赦或一歳再赦小人之幸君子之不幸又言君不虚授臣不虚受妄受不為忠妄施不為惠今羣臣無功遭遇輙遷至都下有車載斗量杷推椀脫之諺又謂㓨史非三載以上不可徙宜課功殿明賞罰后嘉其直不能用也時吏横酷淫及善人公卿被誅死者踵相及子元悼士無良而甘於禍作思慎賦以刺時蘇味道李嶠見而歎曰陸機豪士之流乎周身之道盡矣子元與徐堅元行冲呉兢等善嘗曰海内知我者數子耳累遷鳯閣舍人兼修國史中宗時擢太子率更令介直自守累嵗不遷㑹天子西還子元自乞留東都三年或言子元身史臣而私著述驛召至京領史事遷秘書監時宰相韋巨源紀處訥楊再思宗楚客蕭至忠皆領監修子元病長官多意尚不一而至忠數責論次無功又仕偃蹇乃奏記求罷去因為至忠言五不可此書全具忤時篇内傳節採今不録至忠得書悵惜不許楚客等惡其言詆切謂諸史官曰是子作書欲置吾何地始子元修武后實録有所改正而武三思等不聼自以為見用於時而志不遂乃著史通内外四十九篇原書五十二篇内篇卷尾有注譏評今古徐堅讀之歎曰為史氏者宜置此坐右也此下傳又節採自叙之文全文亦見本集今亦不録子元内負有所未盡乃委國史於吳兢按正史篇云長安中余與正諫大夫朱敬則司封郎中徐堅左拾遺吳兢奉詔撰唐書八十卷神龍元年又與堅兢等同修則天實録三十卷據此國史本皆同撰傳言無據别撰劉氏家史及譜考上推漢為陸終苗裔非堯後彭城叢亭里諸劉出楚孝王囂曾孫居巢侯般不承元王按據明審議者髙其博嘗曰吾若得封必以居巢紹司徒舊邑後果封居巢縣子鄉人以其兄弟六人當作子謂兄弟及六子也俱有名號其鄉曰髙陽里曰居巢累遷太子左庶子兼崇文館學士皇太子將釋奠國學有司具儀從臣著衣冠乗馬子元議古大夫以上皆乗車以馬為騑服魏晉後以牛駕車江左尚書郎輙輕乗馬則御史劾治顔延年罷官乗馬出入閭里世稱放誕此則乗馬宜從䙝服之明驗今陵廟巡謁王公冊命士庶親迎則盛服冠履乗輅車他事無車故貴賤通乗馬比法駕所幸侍臣皆馬上朝服且冠履惟可配車故博帶褒衣革履髙冠是車中服韈而鐙跣而鞍句意承髙冠説下當云冕而鞍不當云跣跣者祼足義不可通葢仍舊書之誤也非唯不師於古亦自取驚流俗馬逸人顛受嗤行路按此議全文具於舊書今録之云子元進議曰古者自大夫已上皆乗車而以馬為騑服魏晉已降迄乎隋代朝士又駕牛車經史具有其事不可一二言也至如李廣北征解鞍憩息馬援南伐據鞍顧盼斯則鞍馬之設行於軍旅戎服所乗貴於便習者也案江左官至尚書郎而輙輕乗馬則為御史所彈又顔延之罷官後好騎馬出入閭里當代稱其放誕此則專車憑軾可擐朝衣單馬御鞍宜從䙝服求之近古灼然之明驗也自皇家撫運沿革隨時至於陵廟巡謁王公冊命則盛服冠履乗彼輅車其士庶有衣冠親迎者亦時以服箱充馭在於他事無復乗車貴賤所行通用鞍馬而已臣伏見比者鑾輿出幸法駕首途左右侍臣皆以朝服乗馬夫冠履而出只可配車而行今乗車既定恐當作停而冠履不易可謂唯知其一而未知其二也何者襃衣博帶革履髙冠本非馬上所施自是車中亦之服必也韈而升鐙跣當作冕以乗鞍非唯不師古道自取驚今俗求諸折中進退無可且長裾廣袖襜如翼如鳴珮紆組鏘鏘奕奕馳驟於風塵之内出入於旌􅙶之間儻馬有驚逸人從顛墜遂使屬車之右遺履不收清道之旁絓驂相續固以受嗤行路有損威儀今議者皆云秘閣有梁武帝南郊圖多有危冠乗馬者近代故事不可謂無臣案此圖是後人所為非當時所撰且觀代間有古今圖畫者多矣如張僧繇畫羣公祖二疏而兵士有著芒屩者閻立本畫明君入匈奴而婦人有著帷帽者夫芒屩出於水鄉非京華所有帷帽創於隋代非漢宫所作豈可假此二畫以為故實者乎由斯而言則梁氏南郊之圖義同於此又傳稱因俗禮貴縁情殷輅周冕規模不一秦冠漢佩用舍無常况我國家道軼百王功髙萬古事有不便理資變通乗馬衣冠竊謂宜從省廢臣懐此異議其來日久日不暇給未及㩁揚今屬殿下親従齒胄將臨國學凡有衣冠乗馬皆憚此行輙進狂言用申鄙見太子從之因著為定令開元初遷左散騎常侍嘗議孝經鄭氏學非康成注舉十二條左證其謬當以古文為正易無子夏傳老子書無河上公注請存王弼學宰相宋璟等不然其論奏與諸儒質辯博士司馬貞等阿意共黜其言請諸家兼行惟子夏易傳請罷詔可㑹子貺為太樂令抵罪子元請於執政𤣥宗怒貶安州别駕卒年六十一子元領國史且三十年官雖徙軄常如舊禮部尚書鄭惟忠嘗問自古文士多史才少何耶對曰史有三長才學識世罕兼之故史才少夫有學無才猶愚賈操金不能殖貨有才無學猶巧匠無楩柟斧斤弗能成室舊書有猶須好是正直句宜留猶須二字善惡必書使驕君賊臣知懼此為無可加者時以為篤論子元善持論辯據明銳視諸儒皆出其下朝有論著輙豫歿後帝詔河南脱府字就家寫史通讀之稱善追贈工部尚書謚曰文六子貺餗彚秩迅迥按六子之序與舊書同後迥附傳越次貺字惠卿好學多通子元卒後擢起居郎厯右拾遺内供奉獻續説苑十篇以廣漢劉向所遺而刋落怪妄貺嘗以竹書紀年序諸侯列㑹皆舉謚後人追修非當時正史如齊人殱于遂鄭棄其師皆孔子新意師春一篇録卜筮事與左氏合知案春秋經傳而為也因著外傳云舊書云六經外傳三十七卷子滋浹滋字公茂通經術喜持論以䕃厯漣水令楊綰薦材堪諫官累授左補闕久之去養親東都河南尹李廙奏補功曹母服除以司勲員外郎知南選時大盗後旱蝗相仍吏不能詣京師故命滋至洪州調補以振職聞貞元二年擢左散騎常侍同中書門下平章事為相無所設施㢘抑畏慎而已卒謚曰貞浹亦有學稱生子敦儒家東都母病狂易非笞掠人不能安左右皆亡去敦儒自侍疾體常流血乃能下食敦儒怡然不為痛隠留守韋夏卿表其行詔標闕于閭元和中權徳輿復薦之乃授左龍武軍兵曹參軍分司東都在母䘮毁瘠㡬死時謂劉孝子後為起居郎逹禮好古有祖風云稍節著舊書貺明天文律厯音樂醫算之術所又有太樂令壁記三卷真人肘後方三卷天官舊事一卷滋舊書自有傳敦儒在忠義傳奬語有曰生於儒門禀此至性王祥篤行起孝敬而不移曽參養志積嵗年而罔怠餗字鼎卿天寳初厯集賢院舊書作殿學士兼知史館終右補闕父子三人更涖史官著史例頗有法舊書史例三卷又傳記三卷樂府古題解一卷李肈國史補序餗集小説渉南北朝至開元為傳記又國朝舊事四十卷書録解題隋唐嘉話一卷彚新舊書傳不著字左散騎常侍終荆南節度使子贊以䕃仕為鄠丞杜鴻漸自劍南還過鄠厨驛豐給楊炎薦彚當作贊名儒子當有孫字擢浙西觀察判官炎入相進歙州刺史政幹彊濟野媪將為虎噬幼女呼號搏虎俱兔觀察使韓滉表贊治有異行加金紫徙常州滉輔政分所統為三道以贊為宣州刺史都團練觀察使治宣十年贊以剛猛立威官吏重足一迹宣富饒斂奉結恩不能訓子素業衰矣卒贈吏部尚書謚曰敏稍節卷舊書彚有集三贊自有傳迥傳亦不著字以剛直稱第進士歴殿中侍御史佐江淮轉運使時新更安史亂迥饋運財賦力于職大厯初為吉州刺史治行尤異累遷給事中舊書有集五卷按迥附傳當居末此似越次秩字祚卿開元末厯左監門衛録事參軍事稍遷憲部員外郎坐小累下除隴西司馬安禄山反哥舒翰守潼闗楊國忠欲奪其兵秩上言翰兵天下成敗所繫不可忽房琯見其書以比劉更生至徳初遷給事中久之出為閬州刺史貶撫州長史卒所著政典舊書云三十五卷止戈記舊書云七卷至徳新議舊書云十二卷等凡數十篇舊書又有指要三卷又舊書志有論䘮紀制度論私鑄錢改制國學等事東坡志林世之言兵者咸取通典通典雖杜祐所集然其源出於劉秩迅字㨗卿厯京兆功曹參軍事嘗寢疾房琯聞憂不寐曰㨗卿有不諱天理欺矣新書多自撰句法似此句殊不成語陳郡殷寅名知人見迅歎曰今黃叔度也劉晏每聞其論曰皇王之道盡矣上元中避地安康當作慶卒迅續詩書春秋禮樂五説書成語人曰天下滔滔知我者希終不以示人云新書志六説五卷在經解類李邯鄲書目劉迅作六説以標六經作書之誼而著其目惟易闕而不叙李義山集始僕得劉氏六説讀之其語曰是非繋於褒貶不繋於賞罰禮樂繋於有道不繫於有司常宻記之李華三賢論論劉眘虚略曰名儒史官之家兄弟以學著五説條貫源流備古今之變在京嘗疾太尉房公時臨扶風聞之曰挺卿日若不起無復有神道殷直清有識尚恨言理少對常想見其面後避地逝於安慶而王氏香祖筆記謂眘虚惜不概見於後世止傳五言詩十四篇新舊唐書皆不為立傳其字挺卿今亦無知者又言予觀獨孤及三賢論歎眘虚之長不止於詩按李華論見文苑英華所指即迅耳眘虚必其别字挺卿則文苑有注唐書作㨗卿直清乃寅字無疑也何云無傳三賢論自稱遐叔遐叔華字也又何云獨孤耶又按徐倬全唐詩録載劉眘虚江東人為夏縣令與賀知章包融張旭號吳中四士此又不知何本豈别一人耶然所録詩五言十四篇即王所云也豈唐書迅傳闕書為夏縣令及嘗逰吳中語耶抑詩録所稱江東人或因賀包張三士而臆揣其地也是并三賢論亦未見無論印及本傳矣名軰如王徐著書若此信乎讀書證古能得其通者世難其學也
