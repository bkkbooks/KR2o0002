body:
  text: 史通通釋卷六無錫浦起龍撰内篇言語第二十謂口説之語若方言之類載在史中者葢樞機之發榮辱之主言之不文行之不逺則知飾詞專對古之所重也釋起以言貴修飾反振篇意夫上古之世人惟朴略言語難曉訓釋方通是以尋理則事簡而意深考文則詞艱而義釋若尚書載伊尹之一作立訓臯陶之一作矢謨洛誥康誥牧誓泰誓是也釋三古時口語一層周監一多於字二代郁郁乎文大夫行人尤重詞命語微婉而多􅋀言流靡而不淫若春秋載吕相絶秦成十三子産獻㨗襄二十五臧孫諫君納鼎桓二魏絳對戮楊干襄三是也釋春秋時口語一層戰國虎爭馳說雲湧人持弄丸之辯家挾飛鉗之術劇談者以譎誑為宗利口者以寓言為主若史記載蘇秦合從張儀連横范雎反間以相秦間太后穰侯魯連解紛而全趙是也連言天下士為人排患難解紛亂釋戰國時口語一層此三層為言語舉似其類由渾樸而流婉而譎辯皆是應聲而出非若後世假章札以為工者逮漢魏已降周隋而往世皆尚文時無專對運籌畫策自具於章表獻可替否總歸於筆札宰我子貢之道不行蘇秦張儀之業遂廢矣釋數語總挈自漢及隋變口陳為筆達矣假有忠言切諫答戲解嘲其可稱者若朱雲折檻以抗憤張綱埋輪而獻直此下必有闕文盖此二句所謂忠言可稱者宜有繳句而其下又宜有他如等字轉接也秦宓之酬吳客王融之答魏使此一作比之小辯曾何足云二句單繳酬吴答敵也是以歴選載言一多而字布諸方冊自漢已下謂兩漢之後無足觀焉釋束上言雖或間載口語而荘諧逓降亦且無多尋夫戰國已前其一脱其字言皆可諷詠非但筆削所致良由舊譌用體質素美何以覈諸至如鶉賁鸜鵒童豎之謠也山木輔車時俗之諺也皤腹棄甲城者之謳也原田是謀輿人之誦也斯皆芻詞鄙句猶能温潤若此况乎束帶立朝之士加以多聞博古之識舊作説者㢤則知時人出言史官入記雖有討論潤色終不失其一無其字梗槩者也釋此節雖專舉左文郤是統證首幅用以形起後史所載口語皆由倩飾也夫三傳之説既不習作襲於尚書兩漢之詞又多違於戰䇿足以驗甿俗之逓改知歳時之不同而後來作者通無逺識記其當世口語罕能従實而書方復追效昔人示其稽古是以好丘明者則偏摸與摹同一作模左傳愛子長者則全學史公用使周秦言辭見於魏晉之代楚漢應對行乎宋齊之日而僞修混沌失彼天然今古以之不純真僞由其相亂故裴少期松之字世期唐諱世作少譏孫盛録曹公平素之語而全作夫差亡滅之詞雖言似春秋而事殊乖越者矣釋此節正逓到後史載言皆藉古詞飾成然自舊多晉字咸洛不守龜鼎南遷江左為禮樂之鄉金陵實圖書之府故其俗猶能語存規檢言喜風流顛沛造次不忘經籍原注若梁史載髙祖在圍中見蕭正德而謂之曰啜其泣矣何嗟及矣湘東王聞世子方等見殺謂其次子方諸曰不有其廢君何以興皆其類也而史臣修飾無所費功釋此處南北轉側其於中國中原也謂北朝則不然何者於斯時也先王桑梓淪於外敵更張聲教横據神州其中辯若駒支哀十四注見探賾篇學如郯子昭十七注見書志篇有時而遇不可多得而彦鸞崔鴻修僞國諸史收魏收𢎞牛𢎞撰魏周二舊脱二字書必諱舊作謂彼本音變成華語而於其間則又妄益文彩虚加風物援引詩書憲章史漢遂使沮渠北涼乞伏西秦儒雅比於元封漢武元拓跋元魏宇文北周德音同於正始魏文元華而失實過莫大焉釋自此節起側注北朝諸史揜其國語文以古辭失實較多乃是篇情所主唯王宋著書叙元髙時事一作也王劭齊志宋孝王闗東風俗傳抗詞正筆務存直道方言世語由此畢彰而今之學者皆尤二子以言多滓穢語傷淺俗夫本質如此而推過史臣猶鑑當有形字者見嫫姆多媸而歸罪於明鏡也釋此與下節箴貶時論皆貼北史説又世之議者咸以北朝衆作周史為工葢賞其記言之體多同於古故也夫以枉飾虚言都捐實事便號以良直師其模楷原注如周太祖實名黒獺魏本索頭故當時有童謠曰狐非狐貉非貉燋梨狗子嚙斷索又曰獾獾頭團欒河中狗子破爾菀又西帝下詔罵齊神武數其罪二十諸如此事難可遺棄而周史以為其事非雅略而不載賴君懋編録故得權聞於後其事不傳於北齊因而埋没者葢亦多矣是則舊誤以董狐南史舉目可求班固華嶠比肩皆是者矣釋上節謂王宋記言得實則罪之本節謂周史記言失真則賞之時情惡質好華類如此也近有燉煌張太素中山郎餘令並稱述者自負史才郎著孝德傳張著隋後略凡所撰今訛作人語皆依倣舊辭若選言可以效古而書其難此二字一本作雜字類者則忽而不取料其所棄可勝紀㢤釋此舉近時著述棄今語倣舊詞者以例之見時尚之難反葢江芉罵商臣曰呼役夫宜君王廢汝而立軄左傳文元漢王怒酈生曰豎儒㡬敗乃公事史記留侯世家單固謂楊康曰老奴汝死自其分樂廣歎衛玠曰誰家生得寧馨兒斯並當時侮嫚之詞流俗鄙俚之説必播以脣吻傳諸諷誦而世人皆以為上之二言役夫豎儒不失清雅而下之兩句老奴寧馨殊為魯朴者何哉葢楚漢世隔事已成古魏晉年近言猶類今已古者即謂其文猶今者乃驚其質夫天地長久二字一本倒風俗無恒後之視今亦猶今之視昔而作者皆怯書今語勇效昔言不其惑乎茍記言一作事則約附五經載語則依憑三史是春秋之俗戰國之風亘一作與兩儀而並存經千載其一作而如一奚以今來古往質文之屢變者㢤釋此節推出時情坐病由於矜逺􅓽近遂至取贗遺真是欲使天地無古今矣豈不謬哉葢善為政者不擇人而理故俗無精麄咸被其化工為史者不選事而書故言無美惡盡傳於後若事皆不謬言必近真庶㡬可與古人同居何止得其糟粕而已釋末節正告之按元人採遺山史藁撰金源史特載國語解一冊謂其有古人尚質之風不可文也其得子元氏之意者歟子元於拓䟦六渾黒􅆩諸史屢惜其遺落國語掩覆本色自此篇始裴松之有言凡記言之體當使若出其口辭勝而無實君子所不取也此語可概此下諸篇夢溪筆談載慶歴中河北大水有公事使臣到闕仁宗召問水災何如對曰懐山襄陵又問百姓何如對曰如䘮考妣上嘿然既退詔閤門今後武臣奏事並須直説讀此因觸及之不覺失笑北平云信史務在紀實語從其實史法也弄丸飛鉗文心論説篇轉丸騁其巧辭飛鉗伏其精術尹知章鬼谷序蘇秦張儀受捭闔之術又受轉丸胠篋三章按弄丸兼用荘子市南宜僚事鬼谷子有飛箝篇箝鉗通折檻漢書本傳朱雲字游成帝時雲上書求見公卿在前雲曰臣願賜上方斬馬劒斷佞臣一人㠯厲其餘上問誰也對曰安昌侯張禹上大怒御史將雲下雲攀殿檻檻折左將軍辛慶忌免冠叩頭爭上意解後當治檻上曰勿易因而輯之㠯旌直臣埋輪後漢張皓傳子綱字文紀為御史漢安元年選遣八使徇行風俗餘人受命之部綱獨埋其車輪於洛陽都亭曰豺狼當路安問狐狸遂奏大將軍梁冀河南尹不疑書御京師震悚秦宓酬吴客蜀志本傳秦宓字子勅拜左中郎將長水校尉吴遣使張温來聘往餞焉温問曰君學乎宓曰五尺童子皆學何必小人温復問曰天有頭乎宓曰有之在西詩曰乃眷西顧温曰天有耳乎宓曰天處髙而聴卑詩曰鶴鳴于九臯聲聞于天温曰天有足乎宓曰有詩曰天步艱難之子不猶温曰天有姓乎宓曰有姓劉温曰何以知之答曰天子姓劉温曰日出於東乎宓曰雖生於東而沒於西答問如響應聲而出於是温大敬服王融答魏使南齊本傳王融字元長上使兼主客接魏使房景髙宋弁弁見融年少問王主客年㡬融曰五十之年久踰其半後日上以魏獻馬不稱使融問曰泰西冀北實多駿驥所獻良馬乃駑駘不若將旦旦信誓有時而爽駉駉之牧遂不能嗣宋弁曰當是不習土地融曰周穆馬迹徧於天下若騏騮之性因地而遷則造父之䇿有時而躓弁不能答鶉賁左傳僖五童謡曰丙之晨龍尾伏辰均服振振取虢之旂鶉之賁賁天䇿燉燉火中成軍虢公其奔鸜鵒左昭二十五文武之世童謠有之曰鸜之鵒之公出辱之鸜鵒之羽公在外野往饋之馬鸜鵒跦跦公在乾侯徵褰與襦鸜鵒之巢往哉遙遙稠父喪勞宋父以驕鸜鵒鸜鵒往歌来哭山木左隠十一周諺有之曰山有木工則度之賓有禮主則擇之輔車左僖五諺所謂輔車相依脣亡齒寒者其虞虢之謂也皤腹左文四睅其目皤其腹棄甲而復于思于思棄甲復来原田左僖二十八聴輿人之誦曰原田每每舍其舊而新是謀混沌莊子天地篇子貢南游於楚過漢陰見一文人方將為圃畦鑿隧而入井抱甕而出灌搰搰然用力甚多而見功寡子貢曰有械於此鑿木為機後重前輕挈水若抽其名為橰為圃者作色而笑曰吾聞之有機械者必有機事有機事者必有機心吾羞而不為也子貢反於魯以告孔子孔子曰彼假修渾沌氏之術者也識其一不知其二治其内不治其外按渾混通裴譏孫盛魏武紀注孫盛魏氏春秋云答諸將曰劉備人傑也將生憂寡人臣松之以為孫盛製書多用左氏以易舊文後之學者將何取信哉且魏武方以天下勵志而用夫差分死之言尤非其類中國談苑雍熙中校九經杜鎬述貞觀勅云經籍訛舛由五胡之亂學士多南遷中國經術浸微按唐初語稱中原為中國此一證也然其稱起漢魏間世説識鑒裴晉謂劉備使居中國能亂人又容止注明帝得吳降人問江東聞中國名士為誰皆是也張太素唐書張公瑾傳子太素龍朔中東臺舍人兼修國史著書百餘篇通志略太素著北齊書二十卷隋書三十二卷隋後略十卷燉煌張氏家傳二十卷又見史官建置篇郎餘令唐儒學傳郎餘令授霍王元軌府參軍事從父知年亦為王友元軌毎曰郎家二賢皆入府不意培塿而松柏為林餘令以梁元帝有孝德傳更撰後傳數十篇改著作佐郎單固楊康魏志王陵傳注魏略曰山陽單固字恭夏有器實兖州刺史令狐愚辟為别駕與從事楊康並為腹心後愚與王陵通謀康固皆知其計康至洛陽露其事太傅東取固問曰卿知其事邪令狐反乎固故云無有康與固對相詰乃罵康曰老庸既負使君又滅我族顧汝當活耶初楊康自以白其事冀得封拜後亦并斬臨刑固又罵康曰老奴汝死自分耳何面目行地下也樂廣衛玠晉書樂廣傳廣字彦輔與王衍俱宅心事外天下言風流者王樂稱首焉衛玠傳玠字叔實風神秀異妻父即樂廣也時謂婦公氷清女壻玉潤按二傳俱無寧馨兒語其語今見王衍傳衍總角造山濤濤嗟嘆目而送之曰何物老嫗生寧馨兒史通似誤通雅寧馨呼語詞今讀能亨亦云那向浮詞第二十一夫人樞機之發亹亹不窮必有徐音音在語前故當言徐舊作餘音誤足句為其始末是以伊惟夫葢發語之端也徐音也焉哉矣􅀆斷句之助也足句也去之則言語不足加之則章句獲全而史之叙事亦有時類此釋首借文句起止助字引出史之浮詞葢用詩家比興體也故將述晉靈公厚斂雕墻則且以不君爲稱宣二欲云司馬安四至九卿而先以巧宦標目所謂説事之端也此猶語端又書重耳伐原示信而續以一戰而霸文之教也僖二十七載匈奴為偶人象郅都令馳射莫能中則云其見憚如此史記酷吏傳所謂論事之助也此猶句助釋二層所引似於語前語後各有浮出之文而實非有泛溢也昔尼父裁經義在襃貶明如日月持舊作特用不刋而史傳所書貴乎博録而已至於本事之外時寄抑揚此乃得失禀於片言是非由於一句談何容易可不慎歟釋此段領下但近代作者溺於煩富則有發言失中去聲謂語前加字不愜一作快非謂語後遂令後之覽者難以取信釋以發言加字二句分挈下文葢史記世家有云趙鞅諸子無恤㝡賢夫賢者當以仁恕爲先禮讓居本至如僞㑹鄰國進計行戕俾同氣女兄摩笄引决此則詐而安忍貪而無親鯨鯢是儔犬豕不若史通每多礙眼醜句焉得謂之賢㢤又漢書云蕭何知韓信賢案賢者處世夷險若一不隕穫於貧賤不充詘於富貴易誤作又傳曰知進退存亡者其唯聖人乎如淮隂初在仄微􅑁業無行後居榮貴滿盈速禍躬為逆上一作臣名𨽻惡徒周身之防靡聞知足之情安在美其善將呼為才略則可矣必以賢為目不其謬乎釋以此二事為語前失中之證然執論賢字滯甚且與浮詞不倫又云漢書酷吏傳嚴延年精悍敏捷雖子貢冉有通於政事不能絶也夫以編名酷吏列號屠伯而輙比孔門達者豈其倫哉且以春秋至漢多歴年所必言貌取人耳目不接又焉知其才術相類錙銖無爽而云不能絶乎釋以此一事為語後不惬之證而所言亦帯穉氣擬古豈在笑貎間㢤二節雖以證前其實可削葢古之記事也或先經張本或後傳終言分布雖踈錯綜逾宻釋此五句束上起下今之記事也則不然或隔卷異篇遽相矛盾或連行接句頓成乖角是以齊史之論魏收良直邪曲三説各異原注李百藥齊書序論魏收云若使子孫有靈竊恐未挹髙論至收傳論又云足以入相如之室游尼父之門但志存實録好抵隂私於爾朱暢傳又云收受暢財賄故為榮傳多減其惡是謂三説各異按北齊書暢雙名文暢受金語在其弟文略傳文亦不同周書之評太祖寛仁好殺二理不同原注令狐德棻周書元偉傳稱文帝不害諸元則云太祖天縦寛仁性罕猜忌於本紀論又云渚宫制勝闔城孥戮茹茹歸命盡種誅夷雖事出權道而用乖於德教是謂二理不同按本注句複字脱多不成語今據周書改正因此益悟集内篇文注語時苦不通皆竄亂所致非其質也非惟言無凖的固亦事成首鼠者矣夫人有一言一無言字按此句當作人惟一格而史辭再三良以好發蕪音不求讜理而言之反覆觀者惑焉釋此節舉百藥德棻之浮飾亦有開國承家美惡昭露皎如星漢非靡沮所移靡沮或作磨湼俱未穩此二句竟可省去而輕事塵㸃曲加粉飾求諸近史此纇即累字或作類後多有之倣此尤多如魏書稱登國以鳥名官則云好尚淳朴逺師少皥述道武結婚蕃落則曰招携荒服追慕漢髙自餘所説多類於此案魏氏始興邉朔少識興墳作儷蠻夷抑惟秦晉而鳥官創置豈闗郯子之言髦頭而偶奚假奉春之䇿奢言無限何其舊作甚厚顔又周史稱元行恭因齊滅得回庾信贈其詩曰虢亡垂棘反一作滅誤齊平寳鼎歸陳周𢎞正来聘在館贈韋夐詩曰德星猶未動真一作直誤車詎肯來其為信𢎞正所重如此夫文以害意自古而然儗非其倫由來尚矣必以庾周所作皆為實録則其所襃貶非止一人咸宜取其指歸何止採其四句而已釋此節舉魏收牛𢎞之浮飾若乃題目不定首尾相違則百藥德棻是也原注齊史李百藥所撰周史令狐德棻所撰也心挾愛憎詞多出沒則魏收牛𢎞是也原注魏書魏收所撰周史載元行恭等此本牛𢎞所撰也斯皆鑒裁非逺智識不周而輕弄筆端肆情髙下故彌縫雖洽而厥迹更彰取惑無知見嗤有識釋此總繳二節之文乃斥浮正文也夫詞寡者出一言而已周才蕪者資數句而方浃案左傳稱絳父論甲子隱言於趙孟班書述楚老哭龔生莫識其名氏茍舉斯一事則觸類可知至嵇康皇甫謐撰髙士記各一作名為二叟立傳全採左班之録而其傳論一誤作詞云二叟隱德容身不求名利避逺亂害安於賤役夫探揣古意而廣足原音子愈反新言此猶子建之詠三良延年之歌秋婦至於臨穴淚下閨中長歎雖語多贏也本傳而事無異説盖鳬脛雖短續之則悲史文雖約增之反累加減前哲豈容易哉釋此以髙士傳論為浮詞是篇尾餘波無闗正史亦似贅及昔夫子斷唐虞以下迄於周翦截浮詞撮其機要故帝王之道坦然明白嗟乎自去聖日逺史籍逾多得失是非孰能刋定假有才堪釐革而以人廢言此繞朝所謂勿謂秦無人吾謀適不用者也語見左傳文十三釋結處自寓按浮之云者溢辭也岐辭也而先之以徐音足句最為理致周圎但篇中所擿離合叅半如云隔卷連行不容殊趣而有若三論二評失則岐矣浮矣又云輕塵曲粉無取雜施而假以邃皇詞客失則溢矣浮矣皆法言也獨其前此之論稱賢論况古後此之論髙士傳贊其失則滯而閒刋而去之乃純錦也史通此等故應分别觀之批摘所主仍在北書通前後篇一氣伊惟焉㢤按此四句化用雕龍章句篇文其原文云夫惟葢故發端之首唱乎哉矣也送末之常科巧宦史記汲黯傳黯姑姊子司馬安少與黯為太子洗馬安文深巧善宦官四至九卿按傳文深巧截句善宦二字另讀而潘岳閒居賦序破句作巧宦之目後遂習用之摩笄史記趙簡子盡召諸子與語無恤冣賢乃以為太子是為襄子襄子姊前為代王夫人簡子葬未除服北登夏屋請代王使厨人操銅枓以食代王行斟隂令宰人雒以枓擊殺代王遂興兵平代地其姊聞之泣而呼天摩笄自殺代人憐之名死地為摩筓之山知韓信賢項羽封沛公蜀漢魏叔子集熊養及字説曰漢髙不肯之國蕭何曰臣願大王王漢中養其民以致賢人張良自韓來韓信陳平自楚往故曰飬民以致賢按語見漢書蕭何傳而良遇在先平至在後魏氷叔渾統言之漢中所致固止一信但蕭何致賢之語却是泛詞史通指實韓信殊屬牽合非止拈義之滯也隕穫充詘此禮記儒行之文鄭注隕穫困迫失志之貎充詘歡喜失節之貌屠伯嚴延年本傳巧為獄文奏可論死奄忽如神流血數里河南號為屠伯首䑕史記灌夫傳武安侯召御史大夫載怒曰與長孺共一老秃翁何為首䑕兩端登國名官師少皥魏書官氏志天賜元年欲法古純質每於制定官號皆擬逺古雲鳥之義諸曹走使謂之鳬鴨取飛之迅疾以伺察為候官謂之白鷺取其延頸逺望自餘諸官義皆類此按登國道武初元舉以概後也少皥事見書志篇道武結婚慕漢髙魏書崔𤣥伯傳太祖曾引𤣥伯講漢書至婁敬説漢祖以魯元公主妻匈奴善之嗟歎者良久是以諸公主皆釐降於賔附之國髦頭晉天文志昴七星天之耳也又為髦頭胡星也魏天象志皇始元年六月有星彗於髦頭是秋太祖啟冀方之地奉春之策漢書劉敬傳上曰本言都秦地者婁敬婁者乃劉也賜姓劉氏拜為郎中號奉春君冒頓數苦北邉劉敬曰陛下誠能以適長公主妻之厚奉賂之彼知漢女送厚蠻夷必慕以為閼氏生子必為太子代單于豈嘗聞外孫敢與大父􅎨禮者哉元行恭得回周書元偉字猷道為使主報聘於齊是秋髙祖親戎東討偉為齊所執齊平偉方見釋偉性好虚靜政事之暇未嘗棄書初自鄴還也庾信贈其詩云云按猷道史通作行恭豈牛𢎞本然耶周𢎞正來聘周書韋􅗥字敬逺志尚夷簡所居之宅枕帯林泉明帝號之曰逍遥公陳遣其尚書周𢎞正來聘造夐後請夐至賔館𢎞正贈詩云云按世説陳太丘詣荀朗陵元方將車于時太史奏真人東行𢎞正詩真車語用此也絳楚二老絳父即絳縣老見二體篇漢書兩龔傳兩龔皆楚人也勝字君賔舎字君倩世謂之楚兩龔王莽既簒國遣使者奉璽書即拜勝不復開口飲食死有老父来弔哭甚哀既而曰嗟虖薰㠯香自燒膏㠯明自銷遂趨而出莫知其誰按嵇康皇甫謐作二叟傳皆採左班語也詠三良文選曹子建三良詩云攬涕登君墓臨穴仰天歎歌秋婦宋書顔延之字延年獨酌郊野當其得意旁若無人按秋胡詩有嵗暮臨空房句所謂閨嘆也秋胡事詳後品藻篇鳬脛荘子駢拇篇鳬脛雖短續之則憂鶴脛雖長斷之則悲叙事第二十二序一章尚簡用晦妄飾三章題下注與行本小異夫史之稱美者以叙事為先至若書功過記善惡文而不麗質而非野使人味其滋㫖懐其德音三復忘疲百遍無斁自非作者曰聖其孰能與於此乎釋從叙事大意寛起提出作者曰聖起下尚書春秋昔聖人之述作也上自堯典下終獲麟是為屬詞比事之言春秋䟽通知逺之㫖尚書子夏曰書之論事也昭昭然若日月之代明揚雄有云説事者莫辨乎書説理者莫辨乎春秋然則意指舊作複誤深奥誥一譌詁訓成義尚書微顯闡幽婉而成章春秋雖殊途異轍亦各有差舊譌作美焉諒以師範億載規模萬古為述者之冠冕實後來之龜鏡一作鑑既而馬遷史記班固漢書繼聖而作抑其次也故世之學者皆先曰五經次云三史一有故字經史之目於此分焉釋此節推尚書春秋為叙事祖法舉馬班二家為史體宗法嘗試言之曰經猶日也史猶星也夫杲日流景則列星寢耀桑榆既夕而辰象粲然故史漢之文當乎尚書春秋之世也則其言淺俗涉乎委巷其言八字亦可芟垂翅不舉懘籥無聞如杲日星寢也逮於戰國已降去聖彌逺然後能露其鋒頴倜儻不羈如既夕星粲也故知人才有殊相去若是挍其優劣距可同年自漢已降㡬將干載作者相繼非復一家求其善者葢亦一有無字㡬矣夫班馬執簡既五經之罪人二字過當而晉宋殺青又一脱又字三史之不若譬夫王霸有别粹駮相懸才難不其甚乎釋䝉上意從二經跌落二史以迨於後史之逓降然則作然而用人之著述雖同自一手其間則有善惡不均精麄非類若史記之舊無之字據下漢書偶句當有之蘇張蔡澤等傳是其美者至於三五本紀日者太倉公龜筴傳固無所取焉又漢書之帝紀陳項諸篇是其㝡也至於淮南王司馬相如東方朔傳又安足道哉其中多靡文故然見亦過僻豈繪事以丹素成妍帝京以山水為助故言媸者其史亦拙事美者其書亦工必時乏異聞世無奇事英雄不作賢儁不生區區碌碌抑惟恒理而責史臣顯其良直之體申其微婉之才葢亦難矣釋此節轉局起議就史漢拈示大抵文貎有殊都因事狀非一强欲同之不能也故揚子有云虞夏之書渾渾爾商書灝灝爾周書噩噩爾下周者其書憔悴乎觀􅉌明之記事也當桓文作霸晉楚更盟則能飾彼詞句成其文雅及王室大壞事益縱横則春秋美辭㡬乎翳矣觀子長之叙事也自周已往言所不該其文濶略無復體統洎一作自秦漢已下條貫有倫則煥炳可觀有足稱者至若荀悦漢紀其才盡於十帝陳夀魏書其美窮於三祖觸類而長他皆若斯釋此再申透上意以見時當駮雜只好就事叙事夫識寳者稀知音葢寡近有裴子野宋略王劭齊志此二家者並長於叙事無愧古人而世人一作之議者皆雷同譽裴而共詆王氏夫江左事雅裴筆所以專工中原跡穢王文由其屢鄙且㡬原子野務飾虚辭君懋王劭志存實録此美惡所以爲異也設使􅉌明重出子長再生記言於賀六渾之朝書事於士尼干當作侯尼于之代將恐輟毫栖牘無所施其德音而作者安可以今方古一概而論得失釋此節䝉上説下才透指意丗人以飾為工以質為陋不知史固貴實録不尚虚詞也側注北朝挈起三論夫叙事之體其流甚多非復片言所能覼縷今輙區分類聚定為三篇列之於下舊本次行有右叙事篇序五字非劉氏自署也今削之後三條倣此按此一章叙事之叙也逺逺説來純取寛境大指言時風逓降則文亦隨之馬班不襲二經正是各成信史後有作者就事叙事寧實無虚寧今而真無古而贗彼浮議之為譽為詆不足徇矣苞籠後三注射北四微顯闡幽左傳杜序其微顯闡幽裁成義類者皆據舊例而發義指行事以正襃貶按史通本此非用易文也渾渾灝灝噩噩揚子問神篇之文賀六渾北齊神武紀姓髙名歡字賀六渾渤海蓨人也丗仕慕容氏慕容敗歸魏神武既累丗北邊故習其俗遂同鮮卑士尼干黄本作士于尼其補注云北史齊顯祖諱洋字子進武明太后孕帝時有赤光照室及産命之曰侯尼于鮮卑言有相子也士于尼宜作侯尼于覼縷覼本作覼通作羅左思吴都賦嗟難得而覶縷晉書傅咸疏臣前所以不羅縷者莫因結奏得從私願也金壺字考次序也夫國史之美者以叙事為工而叙事之工者以簡要一無要字為主簡之時義大矣哉釋本章言叙事尚簡也起便提明歴觀自古作者權輿尚書發蹤所載務於寡事春秋變體其言貴於省文斯盖澆淳殊致前後異跡然則作然而用文約而事豐此述作之尤美者也釋以二經標簡體之大源始自兩漢迄乎三國國史之文日傷煩富逮晉已降流宕逾逺舊多必字尋其冗句摘其煩詞一行之間必謬増數字尺紙之内恒一作必虚費數行夫聚蚊成雷羣輕折軸况於章句不節言詞一多言既二字莫限載之兼兩曷足道哉釋以近史當不簡之流宕以上通章總冒葢叙事之體其别有四有直紀其才行者有唯書其事跡者有因言語而可知者有假讃論而自見者釋叙事之體四别盡之四句提綱至如古文尚書稱帝堯之德標以允恭克讓春秋左傳言子太叔之狀目以美秀而文襄三十一所稱如此更無他説所謂直紀其才行者釋第一繳句又如左氏載申生為驪姬所譛自縊而亡僖四班史稱紀信為項籍所圍代君而死漢髙紀此則不言其節操而忠孝自彰所謂唯書其事跡者釋第二繳句又如尚書稱武王之罪紂也其誓曰焚炙忠良刳剔孕婦左傳紀隨㑹之論楚也其詞曰蓽輅傳作路藍縷以啓山林其誓曰其詞曰是言語二字㸃眼處此則才行事跡莫不闕如而言有闗涉事便顯露所謂因言語而可知者釋第三繳句又如史記衛青傳後太史公曰蘇建嘗責大將軍不薦賢待士漢書孝文紀末其讃曰吳王詐病不朝賜以几杖太史公曰讃曰是讃論二字㸃眼處此則傳之與紀傳紀二字舊倒並所不書而史臣發言别出其事所謂假讃論而自見者釋第四繳句然則才行事跡言語讃論凡此四者皆不相須用一省三若兼而畢書則其費尤廣原注近史紀傳欲言人居哀毁損則先云至性純孝欲言人盡夜觀書則先云篤志好學欲言人赴敵不顧則先云武藝絶倫欲言人下筆成篇則先云文章敏速此則既述才行又彰事跡也如穀梁傳云驪姬以酖為酒藥脯以毒獻公田来驪姬曰世子已祀故致福於君君将食驪姬跪曰食自外来者不可不試也覆酒於地而地墳以脯與犬犬斃驪姬下堂而啼呼曰天乎天乎國子之國也子何遲乎為君又禮記云陽門之介夫死司城子罕入而哭之哀晉人之覘宋者反報於晉侯曰陽門之介夫死而子罕哭之哀而民説殆不可伐也此則既書事跡又載言語也又近代諸史人有行事美惡皆已具其紀傳中續以讃論重述前事此則才行事跡紀傳已書讃論又載也按此注舊本多譌今照傳記改正但自古經史通多此纇此九字一本混入注中原注公梁禮新序説苑戰國䇿楚漢春秋史記迄於皇家所撰五代史皆有之能獲免者葢十無一二原注唯左丘明裴子野王劭無此也釋四别所舉簡煩利病䟽論止此又叙事之省其流有二焉一曰省句二曰省字釋續従四别列出二流如一無如字左傳宋華耦来盟稱其先人得罪於宋魯人以為敏夫以鈍者稱敏原注魯人謂鈍人也禮記中已有注解則明賢逹所嗤此為省句也春秋經曰隕石於宋五僖十六夫聞之隕視之石數之五加以一字太詳減其一字太略求諸折中簡要合理此為省字也釋已上正徵省其有一無有字反於是者若公羊當作穀梁稱郄傳作郤克眇季孫行父秃孫良夫跛齊使跛者逆穀梁作御下同跛者秃者逆秃者眇者逆眇者葢宜除跛者已下句舊作字誤但云各以其類逆舊多者字必事加再述則於文殊費此為煩句也漢書張蒼傳云年老口中無齒葢於此一句之内去年及口中可矣夫此六文成句而三字妄加此爲煩字也釋已上反徴煩然則省句為易省字為難洞識此心始可言一有於字史矣茍句盡餘賸字皆重複史之煩蕪職由於此釋二流所舉省煩利病䟽論止此正文已竟葢餌巨魚者垂其千鈞而得之在於一筌捕髙鳥者張其萬罝而獲之由於一目夫叙事者或虛益散辭廣加閒説必取其所要不過一言一句耳茍能同夫獵者漁者既執而此三字恐有譌脱文當是廣置之義罝釣必收其所留者唯一筌一目而已則庶㡬駢枝王注云諸本作胼胝誤盡去而塵垢都捐一作隕華逝而實存滓去而瀋在矣嗟乎能損之又損而𤣥之又𤣥輪扁所不能語斤伊摯所不能言鼎也釋設喻結所言太窄北平云如行地者蹍足之外不留寸土尚可以行乎此章當云尚簡下章當云用晦也舊本標簡要隱晦非是按右一章言叙事尚簡也四别二流指證簡法得間入微是史通全提之正令是叙事不二之法門行之維艱識法者懼髙赤檀弓複調取致原非史部家言劉公特拈句示的耳勿以不知文詬之論古考言貴設身處地劉公時所睹諸近史如何臧之兩晉南北之八朝其所載記太半皆駢章儷句嘲已譁世之篇展卷爛然浮文妨要公有激於此束之窄僿之途所謂矯枉者直必過讀者諒之而已權輿廣韻造衡自權始造車自輿始成雷折軸漢中山靖王傳衆喣漂山聚蟁成靁注蟁古蚊字國䇿張儀說魏積羽沈舟羣輕折軸衆口鑠金篳輅藍縷左宣十二欒武子曰楚自克庸以來在軍無日不討軍實而申儆之訓之以篳輅藍縷以啟山林按是欒書語非士㑹語也二人皆稱武子所以誤也又昭十二年右尹子革語亦有篳輅句皆是言語非書事跡衛青傳史記賛大將軍不敢親附士大夫招賢者侵人主之柄奉法遵職而已按其文全出蘓建口語史公運之為賛事舉而傳文省矣故劉氏引之孝文紀漢書賛孝文皇帝約身弛民懐南越和匈奴又吴王詐病而睗几杖專務德化按凡此數事本皆史記紀中正文班氏取以為賛又一運化省筆之法故劉氏類引之魯人以為敏左文十五宋華耦来盟公與之宴辭曰君之先臣督得罪於宋殤公名在諸侯之䇿臣承其祀其敢辱君魯人以為敏杜注無故揚其祖惡是不敏魯人以為敏君子不與也按魯字之訓劉云禮記中亦有是註但大小戴記皆無是語唯孔䟽有其文曰魯人魯鈍之人眇秃跛榖梁成元季孫行父秃晉郤克眇衛孫良夫跛同時而聘于齊云云公羊成二客或跛或眇於是使跛者迓跛者眇者迓眇者按史通所引是榖非公傳寫誤口中無齒漢書張蒼傳免相後口中無齒食乳按句上無年老字又按本傳全録史記史記有老字無年字豈唐初寫本漢書有此二字耶一筌一目魚豢典略云得烏者羅之一目也然張一目之羅終不得鳥矣史通翻用其文然失之迫隘不若原文之善喻也按魚豢之言本淮南說山訓輪扁荘子天道斵輪徐則甘而不固疾則苦而不入不疾不徐得之於手而應於心口不能言按文兼使郢人運斤事故曰不能語斤伊摯史記殷本傳伊尹名阿衡索隱孫子兵書伊尹名摯孔安國亦曰伊摯吕覽本味伊尹説湯以至味曰鼎中之變精妙微纎口弗能言志弗能喻按輪扁二句本文心神思篇成語夫飾言者為文編文者為句句積而章立章積而篇一多目字成篇目既分而一家之言備矣釋本章言叙事用晦也先泛然説起古者行人出境以詞令為宗大夫應對以言文為主况乎列以章句刋之竹帛安可不勵精雕餙傳諸諷誦者哉釋已上是開勢自聖賢述作是曰經典句皆韶夏言盡琳瑯秩秩德音洋洋盈耳譬夫游滄海者徒驚其浩曠登太山者但嗟其峻極釋此層亦是挑剔之文必摘以尤最不知何者為先然章句之言有顯有晦釋此方㸃出章㫖又將顯字剔晦字晦之云者意到而筆不到也顯也者繁詞縟説理盡於篇中晦也者省字約文事溢於句外然則晦之將顯優劣不同較可知矣釋測注在晦一邉夫能略小存大舉重明輕一言而巨細咸該片一作三非語而洪纎靡漏此皆用晦之道也釋正提用晦作起筆昔古猶云古昔文義務却浮詞虞書云帝乃殂落百姓如喪考妣徳盛民戴皆見夏書云啟􅈱􅈱而泣予不子憂國忘家皆見周書稱前徒倒戈血流漂杵紂虐民憤皆見虞書云四罪而天下咸服凶德公心皆見此皆文如濶略而語實周贍故覽之者初疑其易而為之者一無者字方覺其難固非雕蟲小技所能斥苦舊作斥非于文不順當是斥苦之譌其説也釋此節從尚書指出晦法既而􅉌明受舊作授經師範尼父夫經以數字包義而傳以一句成言雖繁約有殊而隱晦無異故其綱紀而言邦俗也則有士㑹為政晉國之盜奔秦政善可知邢遷如歸衛國忘亡安集可知其欵曲而言人事也則有此下諸本多譌詳注在後犀革裹之比及宋手足皆見勇悶可知三軍之士皆如挾纊感悦可知斯皆言近而㫖逺辭淺而義深雖發語已殫而含意未盡使夫讀者望表而知裏捫毛而辯骨覩一事於句中反三隅於字外晦之時義不亦大哉釋此節從左傳指出晦法洎班馬二史雖多謝五經必求其所長亦時值斯語至若髙祖亡蕭何如失左右手史記淮隂侯傳倚任可知漢兵敗績睢水為之不流史記項羽本紀敗形可知董生乗馬三年不知牝牡專業可知翟公之門可張雀羅凉態可知則其例也釋此節從史漢指出晦法正文扣住自兹已降史道陵夷作者蕪音累句雲蒸泉湧其為文一作史也大抵編字不隻捶句皆雙修短取均竒偶相配故應以一言蔽之舊脱之字者輒足為二言應以三句成文者必分為四句彌漫重㳫不知所裁是以處道舊本作承祚誤受責於少期原注魏書鄧哀王傳曰容貎姿美有殊於衆故特見寵異裴松之曰一類之言而分以為三亦叙屬之一病也子昇取譏於君懋原注王劭齊志曰時議恨邢子才不得掌興魏之書悵怏温子昇亦若此而撰永安記率是支言支言舊譌六言非不幸也釋此節撇盡後史簡且不能更何處説起用晦耶今試取諸史讀之信有八代之衰之歎也葢作者言雖簡略理皆要害故能踈而不遺儉而無闕譬如用竒兵者持一當百能全克敵之功也若才乏儁頴思多昏滯費詞既甚叙事纔周亦猶售鐵錢者以兩當一方成貿遷之價也釋此節雙綰雙收然則史漢已前省要如彼國晉已降原注國謂三國志晉謂晉書也煩碎如此必定其妍媸甄其善惡此下似有脱句夫讀古史者明一作閲其章句皆可詠歌對晦而言故須求明也明字勝觀近史者恱一作得其緒言直求事意而已意無餘蓄惟言句可悦耳悦字勝是則一貴一賤不言可知無假搉揚而其理自見矣釋結是長言咏嘆之法舊本二章装柄簡要義猶可通隱晦直無理矣叙事正貴明顯而顧反之果何説乎且隱晦豈文家美詞而與簡要對舉乎决是妄填故削之按右一章言叙事用晦也用晦之道尤難言之簡者詞約事豐晦者神餘象表詞約者猶有詞在神餘者唯以神行㡬㡬無言可説矣叙事至此豈復望之五經三史後哉故止得前幅舉似如尚書左傳史漢數條愜合章㫖向後著語便􅀈一鍼何也如所云不隻皆雙及處道子昇受責取譏諸注祗從煩省比量移置前章背靣亦得此則反拈互勘取道稍鬆亦彌見晦法入微無文對舉也故曰尤難言之言文左襄二十五仲尼曰志有之言以足志文以足言不言誰知其志言之無文行之不逺慎辭㢤斥苦荘子逸篇紼謳所生必於斥苦司馬彪注引紼謳歌為力不齊而迫促之按本文葢竭力求及之意晉盜奔秦左宣十六晉侯請於王以黻冕命士㑹將中軍且為太傅於是晉國之盜逃奔於秦如歸忘亡左閔二僖之元年齊桓公遷邢於夷儀二年封衛於楚丘邢遷如歸衛國忘亡犀革至挾纊左莊十二宋萬弑閔公於䝉澤奔陳宋人請萬於陳以賂陳人使婦人飲之酒而以犀革裹之比及宋手足皆見宋人醢之又宣十二楚子伐蕭申公巫臣曰師人多寒王巡三軍拊而勉之三軍之士皆如挾纊按本文於則有之下一本云使婦人飲之酒以犀革裹之比及宋手足皆見援廟桷動於甍師人多寒王拊而巡之三軍之士皆如挟纊一本削去援廟桷六字以宋人醢之蕭潰六字填之反覆叅觀二本皆謬何也章言用晦所引皆含蓄句法此條神趣只在手足見如挾纊兩言而多贅冗文全乖晦體謬一也史通一書純用偶體此條與盜奔邢遷作配而溢添援桷則體不均改綴蕭潰又義不屬謬二也再按援桷事見襄二十八此六字似是犀革改本失刪彼文自餘羨句則縁後人夾注傳寫混入致兹乖謬耳既僭刋之仍列異本原文於右難者曰三軍挟纊八字不太割截乎應之曰如歸忘亡八字連綴上文否不知牝牡王訓故鄒子董仲舒勤學三年不窺園乗馬不知牝牡按史記漢書止有不窺園一句可張雀羅漢書汲鄭傳兩人中廢賔客益落先是下邽翟公為廷尉賔客亦填門及廢門外可張雀羅後復為廷尉客欲往翟公大署其門曰一死一生廼知交情一貧一富廼知交態一貴一賤交情廼見處道晉書王沈字處道典著作與荀顗阮籍共撰魏書多為時諱未若陳夀之實録也按本文句下原注本引裴評王沈書語或妄意裴是注三國者遂殊改處道為承祚并改注内魏書為魏志而又脱去有於衆兩言使一類分三句無著傍頭面全失矣亟是正之不憚多事云子昇魏書文苑傳温子昇字鵬舉永熙中散騎常侍濟隂王暉業嘗云江左文人有顔延之謝靈運沈約任昉我子昇足以陵顔轢謝吐沈含任宋游道集其文茟為三十五卷昔文章既作比興由生鳥獸以嫓賢愚草木以方男女詩人騷客言之備矣釋本章論叙事妄飾謂假古名以飾今稱也首原比體所由興作開局洎乎中代其體稍殊或擬記作儗人必以其倫或述事多比於古當漢氏之臨天下也君實稱帝理異殷周子乃封王名非魯衛而作者猶謂帝家為王室公輔為王臣盤亦作磐石加建侯之言帯河申俾侯之誓舊作稱而史臣撰録亦同彼文章假託古詞翻易今語潤色之濫萌於此矣釋此節説到假古為飾自漢初始而史亦因之降及近古彌見其甚至如諸子短書雜家小說論逆臣則呼為問鼎稱巨冦則目以長鯨邦國初基皆云草昧帝王兆跡必號龍飛斯並理兼諷諭言非指斥異乎㳺夏措詞南董顯書之義也釋此承前言諸名雖飾猶皆切當况是雜書無闗國典也如魏收代元魏初國號代史吴均齊北齊録或牢籠一世或苞舉一家自可申不刋之格言𢎞至公之正說而收稱劉氏納貢則曰來獻百牢均叙元日臨軒必云朝㑹萬國夫以吴徴魯賦禹計塗山持彼往事用為今説置於文章不闗史冊之文則可施於簡冊謂史則否矣一脱矣字釋此折轉言若收均任修國史恣行誇飾則妄矣亦有方以類聚譬諸昔人如王隱稱諸葛亮挑戰冀一作眞獲曹咎之利崔鴻稱慕容冲見幸為有龍陽之姿拈事猥䙝其事相符言之讜矣而盧思道稱邢卲䘮子不慟自東門吴已來未之有也李百藥稱王琳雅得人心雖李將軍恂恂善誘無以加也斯則虚引古事妄足庸音茍矜其學必辨而非當者矣此亦未允釋此與下節皆兩層轉折此言諸所比擬王崔為得若盧李則過飾矣昔禮記檀弓工言物始夫自我作故首剏新儀前史所刋後來取證是以漢初立轊當作槥子長當作孟堅所書魯始為髽丘明是記河橋可作元凱取騐於毛詩男子有笄伯支逺徴於内則即其事也案裴景仁秦記稱苻世説注引裴記本作符堅方食撫盤而詬王劭齊志述一有受紇二字一有受字洛干感恩脱㡌而謝及彦鸞崔鴻撰以新史重規李百藥刪其舊録乃易撫盤以推案變脱㡌為免冠夫近世通無案食殊俗不施冠冕直以事不類古改從雅言欲令一脱令字學者何以考時俗之不同察古今之有異釋此以制物言亦兩層轉折若槥髽等皆有徴若盤㡌等則不必假古為飾矣又自羣雄竊據充牣神州聲教稱名皆與諸華殊異至如翼犍舊有魏字道武原舊作所非諱黑獺周文本名而伯起革一譌草以他語德棻闕而不載考二史皆不諱葢厖降蒯聵字之媸也重耳黒臀名之鄙也舊皆列一譌例以三史傳諸五經未聞後進談講别加刋定况齊丘注語甚明舊譌愁山之或譌定犢彰於載䜟原注杜臺卿齊記載讖云首牛入西谷逆犢上齊丘也河邉之狗著於謡詠原注王劭齊志載謡云貛貛頭團圞河中狗子破爾菀也明如日月難為葢藏此而不書何以示後釋此節乃推到無可飾者如犍獺謠讖等諸名色不能飾而諱之亦飾也亦有氏姓本複減省從單或去万紐而留于舊譌去万紉而留干又譌去萬而留千或止存狄而除厙如作存扶而除乞亦可舊作存扶而除厚非求諸自古罕聞兹例釋此因諱而類及之此雖非文士為政然當時操史筆者固有憚煩從改之習也昔夫子有云文勝質則史故知史之為務必藉於文自五經已降三史而往以文叙事可得言焉而今之所作一多者字有異於是其立言也或虚加練飾輕事雕彩或體兼賦頌詞類俳優文非文史非史譬夫烏孫造室雜以漢儀而刻鵠不成反類於鶩者也釋結言史亦尚文但虚設不可耳按右一章論叙事妄飾也通㫖歸結在此為元髙宇文而作歴詳厥指一言詞令之出幅貟不可欺一言服物之制通稱不必變一言名號之傳謡讖不容揜所爭在僣與直非貪俗惡典也與言語篇同意論者不審㡬疑提塘邸抄彈詞賔白亦可班之國史矣豈謂是哉劉氏獻百牢魏書太武帝太平真君十一年輿駕南伐劉義隆使獻百牢貢其方物按用左傳哀七年㑹鄫語又見雜説中篇佛貍入冦注元日㑹萬國按魏書太宗神瑞二年春正月賜附國大渠帥朝嵗首者繒帛金罽有差而文乃言髙齊事考齊書無元日㑹萬國明文當是臣僚賀表中語惜吴均齊録不可得見也諸葛挑戰魏志注晉陽秋曰諸葛亮冦於郿據渭水南亮挑戰遺髙祖巾幗欲以激怒冀獲曹咎之利史記項羽紀項王謂大司馬曹咎曰謹守成臯漢欲挑戰慎勿與戰漢果數挑椘軍戰楚軍不出使人辱之大司馬怒渡兵汜水半渡漢擊之大破楚軍咎自剄慕容冲晉書載記苻堅滅燕慕容冲姊為清和公主年十四有殊色堅納之寵冠後庭冲年十二亦有龍陽之姿堅又幸之姊弟專寵長安歌之曰一雌復一雄雙飛入紫宮戰國魏䇿魏王與龍陽君共船而釣得為王拂枕席邢邵喪子北齊書邢卲字子才飬孤子恕慈愛持深在兖州有都信云恕疾便憂之顔色貶損及卒痛悼雖甚不再哭其髙情達識開遣滯累東門吴以還所未有也戰國秦策梁人有東門吴者其子死而不憂其相室曰公子愛子也死而不憂何也東門吴曰吾嘗無子無子之時不憂今與無子時同也奚憂焉王琳得人心北齊書王琳字子珩鎮夀陽輕財愛士得將卒之心既及於難當時田夫野老知與不知莫不為之欷歔流涕觀其誠信感物雖李將軍之恂恂善誘殆無以加焉李將軍廣事具史記郭評子才䘮孤不慟何異於吴王琳㑹葬于人李廣不啻豈為虚引故事漢初立轊漢書髙紀八年十一月令士卒從軍死者為槥歸其縣縣給衣衾棺𦵏具注應劭曰槥小棺也郭評史通作轊轊車軸也又考史記無此事當改云漢初立槥孟堅所書魯始為髽左襄四邾莒伐鄫臧紇救鄫敗於狐鮐國人從䘮者皆髽魯於是乎始髽杜注髽麻髪合結也䘮多不能備凶服檀弓鄭注去纚而紤曰髽纚黒韜紤音計按左傳合男女言檀弓以為婦人弔也作河橋晉杜預傳預字元凱杜陵人預以孟津渡險請建河橋於富平津議者以為殷周所都歴聖賢而不作者必不可立故也預曰造舟為梁則河橋之謂也及橋成帝從百寮臨㑹舉觴屬預男子笄魏書劉芳字伯文彭城人北徙通直常侍王肅之來奔也宴於華林肅語次曰古者婦人有笄男子則無䘮服男子冠而婦人笄芳曰冠尊故奪其笄稱也非男子無笄禮内則稱子事父母雞初鳴櫛纚笄總男子有笄明矣肅以為然時人號為劉石經按伯文北史作伯支易盤以案按裴之秦記崔之十六國書皆無攷晉載記苻堅討姚萇萇軍渇有死者俄而降雨萇營三尺營外寸餘而已萇軍大振堅方食去案怒曰天何故降澤賊營變㡌為冠北齊万俟普傳子洛字受洛干戰有功髙祖親扶上馬洛干免冠稽首曰願出死力按北史亦同而卲志亦無考矣翼犍黒獺魏書帝紀昭成帝諱什翼犍周書帝紀文帝宇文氏諱㤗字黒獺字媸名鄙舊注厖降八凱中一人蒯聵衛莊公名刺客傳亦有趙人蒯聵重耳晉文公名黒臀晉成公名成公之生也其母夢神規其臀以黒曰使有晉國三而畀驩之孫故名曰黒臀姓複從單通鑑釋例魏之羣臣出代北者皆複姓孝文遷洛改為單姓史患其煩皆從後姓今按北朝諸史亦非盡改其省改之文於魏書官氏志具列之去万紐留于周書唐瑾仕魏為驃騎開府周文歎異之賜姓萬紐于氏華岳頌碑結銜作万紐于墐魏書官氏志勿忸于氏後改為于氏通志氏族略勿忸于疑與万紐于同愚按勿忸無他据而万紐有據疑魏志譌也又易万作萬北史儒林樊深賜姓亦然則又傳寫者誤也存狄除厙舊作存扶除厚按官氏志無厚字連扶之氏但有乞扶氏改為扶氏則似除厚應為除乞矣然乞之與厚聲形俱别不應譌轉乃爾再考本志有庫狄氏後改為狄氏庫與厚狄與扶形俱相近或當是也又北齊臣如厙狄廽洛厙狄盛之屬多广頭去㸃尤與厚字頭同廣韻厙始夜切姓苑有之史通通釋卷六
