body:
  text: 史通通釋卷十無錫浦起龍撰内篇雜述第三十四雜述謂史流之雜著在昔舊作昔在三墳五典春秋檮杌即當作皆上代帝王之書中古諸侯之記行諸歴代以為格言釋篇首所列皆謂紀載正書用以托起􅄂述其餘外傳則神農嘗藥厥有本草夏禹敷土實著山經世本辨姓著自周室家語載言傳諸孔氏是知偏記小説自成一家而能與正史參行其所由來尚矣釋標出雜述家數開自此類爰及近古斯道漸煩史氏流别殊途並騖釋落到後所論列者榷而為論其流有十焉一曰偏紀一作記後同二曰小録三曰逸事四曰𤨏言五曰郡書六曰家史七曰别傳八曰雜記九曰地里書十曰都邑簿釋先釐别其門類夫皇王受命有始有卒作者著述詳略難均有權記當時不終一代若陸賈楚漢春秋樂資山陽一有公字一以偶句從刪載記王韶本名韶之晉安陸當作帝紀姚最舊脱最字梁昭舊脫昭字後略此之謂偏紀者也釋此謂短述之書但記近事而非全史普天率土人物𢎞多求其行事罕能周悉則有獨舉所知編為短部若戴逵竹林名士王粲漢末英雄蕭世誠懷舊志盧子行知已傳此之謂小録者也釋此謂私志之書各録知交而非正史國史之任記事記言視聽不該必有遺逸於是好奇之士補其所亡若和嶠汲冡紀年葛洪西京雜記顧協璅語謝綽拾遺此之謂逸事者也釋此謂掇拾之書可補史遺用資參考街談巷議時有可觀小説巵言猶賢於己故好事君子無所棄諸若劉義慶世説裴榮期語林孔思尚語録陽玠松或作松玠談藪此之謂𤨏言者也釋此謂諧噱之書畧供史料止助談資汝潁奇士江漢英靈人物所生載光郡國故鄉人學者編而記之若圏稱陳留耆舊周斐一作裴汝南先賢陳夀益都耆舊虞預㑹稽典録此之謂郡書者也釋此謂鄉邦舊德之書視史家為繁髙門華胄奕世載德才子承家思顯父母由是紀其先烈貽厥後來若揚雄家諜殷敬世傳孫氏譜記陸宗系歴此之謂家史者也釋此謂門胄先烈之書比史體為炫賢士貞女類聚區分雖百行殊途而同歸於善則有取其所好各為之録若劉向列女梁鴻逸民二字恐誤當云高士趙采忠臣徐廣孝子此之謂别傳者也釋此謂甄録貞範之書能補前史缺遺乃貴隂陽為炭造化為工流形賦象於何不育求其怪物有廣異聞若祖台本名台之志怪干寶搜神劉義慶幽明劉敬叔異苑此之謂雜記者也釋此謂搜採怪異之書足當外史勸誡乃佳九州土宇萬國山川物産殊宜風化異俗如各志其本國足以明此一方若盛𢎞之荆州記常璩華陽國志辛氏三秦羅含湘中此之謂地里書者也釋此兼風土人物言其書亦史志地俗一類帝王桑梓列聖遺塵經始之制不恒厥所茍能書其軌則可以龜鏡將來若潘岳闗中陸機洛陽三輔黄圖建康宫殿此之謂都邑簿者也釋此指帝京規制言其書亦史志都城一流已上十條書四十種各依其類而舉其概大抵偏紀小録之書皆記即日當時之事求諸國史最為實録然皆言多鄙朴事罕圓備終不能成其不刋永播來葉徒為後生作者削藁之資焉釋自此以下論其得失首二條合論詞似棄而實取切見親知之作足供史底也逸事者皆前史所遺後人所記求諸異説為益實多及妄者為之則茍載傳聞而無銓擇由是真偽不别是非相亂如郭子横之洞冥王子年之拾遺全搆虚辭用驚愚俗此其為弊之甚者也釋第三條之得失奇者易誕故著此戒𤨏言者多載當時辨對流俗嘲謔俾夫樞機者藉為舌端談話者將為口實及蔽者為之則有詆訐相戲施諸祖宗䙝狎鄙言出自牀第莫不昇之紀録用為雅言固以無益風規有傷名教者矣釋第四條之得失此條所戒宜用書紳郡書者矜其鄉賢美其邦族施於本國頗得流行置於他方罕聞愛異其有如常璩之詳審劉昞或作炳非之該博而能傳諸不朽見美來裔者盖無㡬焉釋第五條之得失鄉賢升送年増嵗益閱此為之起疑家史者事惟三族言止一門正可行於室家難以播於邦國且箕裘不墮則其録猶一作雖非存茍薪構已亡則斯文亦喪者矣釋第六條之得失世家子當味其言别傳者不出胸臆非由機杼徒以博採前史聚而成書其有足以新言加之别説者盖不過十一而已如寡聞末學之流則深所嘉尚至於探幽索隱之士則無所取材釋第七條之得失前注言能補闕遺乃貴者以此雜記者若論神仙之道則服食鍊或作練氣可以益夀延年語魑魅之途則福善禍淫可以懲惡勸善斯則可矣及謬者為之則茍談怪異務述妖邪求諸𢎞益其義無取釋第八條之得失前注言足當勸戒乃佳者以此地里書者若朱贛所採浹於九州闞駰所書殫於四國斯則言皆雅正事無偏黨者矣其有異於此者則人自以為樂土家自以為名都競美所居談過其實又城池舊跡山水得名皆傳諸委巷用為故實鄙哉釋第九條之得失土名俚鄙之戒居志館者擇之都邑簿者如宫闕一作闈陵廟街㕓郭邑辨其規模明其制度斯則可矣及愚者為之則煩而且濫博而無限一有故字或作於字疑皆衍論榱棟則尺寸皆書記草木則根株必數務求詳審持此為能一譌論遂使學者觀之瞀亂而難紀也釋第十條之得失宫闕尺寸物産根株似非無益於是考兹十品徴彼百家則史之雜名其流盡於此矣至於其間得失紛糅善惡相兼既難為覼縷故粗陳梗槩且同自鄶無足譏焉釋此節總結十品拈出史字作眼雖諸書不以史名亦皆史之雜流也又以不悉數者括其餘又案子之將史本為二説然一脱然字如吕氏淮南𤣥晏抱朴凡此諸子多以叙事為宗舉而論之抑亦史之雜也但以名目有異不復編於此科釋此又就子家者流剔出近史者以該之盖語曰衆一作聚星之明不如一月之光歴觀自古作者著述多矣雖復門千户萬波委雲集而言皆𤨏碎事必藂殘固難以接光塵於五傳並輝烈於三史古人以比玉屑滿篋良有㫖哉釋至此統攝全篇先将雜家一抑然則作然而用芻蕘之言明王一作主必擇葑菲之體詩人不棄故學者有當作欲博聞舊事多識其恐當作奇物若不窺别録不討異書專治周孔之章句直守遷固之紀傳亦何能自致於此乎且夫子有云多聞擇其善者而從之知之次也茍如是則書有非聖言多不經學者博聞蓋在擇之而已釋以揚筆收而歸結到擇字本諸太史擇言尤雅之擇最是讀古隄防按從上三十三篇論正史者備矣至是乃旁羅雜乗洪纎靡遺莊諧殫録可謂具體鼓吹者乎於正史則嚴核之不嫌於孤於雜乗則廣收之必贏其類可知子元是書盡意洗伐特欲令著作之庭浄無塵㸃耳非教天下謾棄羣言也核羣史道用猛矣而如彼上篇卒以持平者愜物情收雜述道用寛矣而就中分論仍以袪猥者閑文紀猛以濟寛寛以濟猛其諸公孫僑之為政北宫文子所謂有禮者乎其流十其舉似者四十流别雖多不離史屬賾而不亂也舉似似煩而約約且取小小冊見收大者可知也約而盡也神農本草宋艾晟本草序神農舊經止於三卷藥數百種梁陶隱居因而倍之唐于志寧傳帝問本草别録對曰班固惟記黄帝内外經不載本草至齊七録乃稱之世謂神農氏嘗藥以拯含氣而黄帝以前文字不傳至桐雷乃載篇冊然所載郡縣多在漢時疑張仲景華陀竄記其別録者魏晉以來吴普李當之所記其言華葉形色附經為説故𢎞景合而録之夏禹山經胡渭禹貢錐指山海經十三篇劉歆以為出於唐虞之際列子曰大禹行而見之伯益知而名之夷堅聞而志之然其間可疑甚多顔之推曰禹益所記而有長沙零陵諸暨後人所羼也尤袤曰此先秦之書非禹伯翳作二説允當世本辨姓漢蓺文志世本十五篇古史官記黄帝以來訖春秋時諸侯大夫系謚名號偏紀四種陸賈楚漢春秋九卷見春秋家陽山陽載記隋經籍志樂資撰十卷按山公謂漢獻帝禪魏降封除晉安帝紀宋書王韶之字休泰私撰晉安帝陽秋著作佐郎使續後事訖義熙九年善叙事按晉安帝紀即此陽秋也舊作安陸誤又按北史有王韶乃隋之武臣此以屬對省之字耳梁昭後畧隋志姚最撰十卷按隋志無昭字新舊唐志並有昭字小録四種竹林名士隋志竹林七賢論二卷晉太子中庶子戴逵撰唐志亦作七賢論漢末英雄記隋志王粲撰殘缺帝蕭世誠懷舊志隋唐志梁元帝撰九卷按世誠元字也諱繹見覈才篇盧子行知已傳隋唐志盧思道撰一卷按子行思道字也逸事四種和嶠汲冡紀年按紀年見春秋家皆簡編科斗文字讀書志所得凡八千五百一十四字詔和嶠等以𨽻字冩之是西京雜記新舊唐志葛洪撰二卷按伯厚紀聞謂吴均及蕭賁依託顧協璅語隋志一卷梁金紫光禄大夫顧協撰即謝綽拾遺見書志五行章又書事篇言謝拾沈遺此𤨏言四種劉義慶世説見尚書家榮裴榮期語林見書事篇隋志裴啓撰按期盖其字也孔思尚語録新舊唐志作齊語録丅卷亦見書志五行章陽玠松談藪書録解題北齊祕書省正字北平陽玠松撰事綜南北八朝隋開皇中所述郡書四種陳留耆舊傳隋志漢議郎圈稱撰二卷卷汝南先賢隋志魏周斐汝南先賢傳五舊唐志斐作裴典益都耆舊傳隋志陳夀撰十四卷㑹稽録隋志虞預撰二十四卷家史四種揚雄家譜漢書揚雄傳即採此為之其説詳序傳篇殷敬世傳唐志作殷氏家傳三卷殷敬撰唐孫氏譜記唐志十五卷無撰人名陸宗系歴志作吴郡陸氏宗系譜陸景獻撰别傳四種劉向列女傳曾鞏序劉向所序凡八篇隋志及崇文總目皆稱十五篇嘉祐中蘇頌定其書復為八篇下梁鴻逸民後漢書本傳鴻仰慕前世髙士為四皓以二十四人作頌按鴻所撰即此不當云逸民或因鴻在逸民傳中有注字句旁者傳冩誤耶趙采忠臣傳按隋唐志忠臣傳但有梁元帝撰趙采無考廣徐廣孝子傳新舊唐志徐撰三卷雜記四種祖台之志怪隋志二卷新舊唐志作四卷晉書台之字元辰官侍中光祿大夫干寶搜神記隋志十卷劉劉義慶幽明録隋唐志並云幽明撰録二十卷敬叔異苑隋志宋給事劉敬叔撰十卷地理書四種盛𢎞之荆州記隋志宋臨川王侍郎盛𢎞之撰常璩華陽國志見補注篇辛氏三秦按後漢李膺傳章懷注引之以證登龍門語其書宜未亡而史志皆闕卷帙無考羅含湘中文獻經籍考湘中山水記三卷晉耒陽羅含君章撰范陽盧拯注其書頗及隋唐以後事則後人附益也物又按地理與郡書畧有辨郡書主人地理主風土但其中華陽志似闌入都邑簿四種潘岳闗中記隋唐志一卷潘岳撰宋中興書目以撰人為葛洪或是别本陸機洛陽記隋唐志一卷考三輔黄圖見書志篇漢三輔典注建康宫殿無又按都邑簿志規制也更與郡書地理有辨洞㝠拾遺東漢郭憲洞㝠序武帝明俊特達之主東方朔滑稽浮誕以匡諫洞心於道教使冥迹之奥昭然顯著今籍舊史不載者撰洞冥記四卷王子横憲字也梁蕭綺拾遺記序拾遺記者晉隴西嘉字子年撰皆殘缺文起羲炎事記西晉辭趣過誕推理陳迹盖絶世而宏博矣劉昞撰有燉煌實録十卷涼書十卷其人詳論贊正史㸃煩三篇朱贛闞駰朱贛按隋志地里書陸澄合山海經已來一百六十家並多零失見存四十二家又任昉地記増多陸本八十四家亦多零失見存唯十二家今考其所列見存書皆無朱贛撰九州書名豈在零失中耶前辛氏三秦當亦然郎北史闞駰燉煌人字𤣥陰樂安王丕引為從事中撰十州志唐志十州志十卷辨職第三十五軄一作識誤夫設官分職佇績課能欲使上無虚授一作稱下無虚受其難矣哉昔漢文帝幸諸將營而目周亞夫為真将軍嗟乎必於史職求真求真二字或作求其若之一作求其若此斯乃特一無特字為難遇者矣釋泛從課職意刷出史職之難史之為務厥途有三焉何則彰善貶惡不避强禦若晉之董狐齊之南史此其上也秉直者編次勒成鬱為不朽若魯之丘明漢之子長此其次也勒巨冊者高才博學名重一時若周之史佚楚之倚相此其下也徒多聞者茍三者並闕復何為者哉釋以三層實其難若是則道在得人專任不在設局監領矣全籠起議已下將領局居局二弊流水抉發昔魯叟之脩春秋也不藉三桓之勢漢臣之著史記也無假七貴之權而近古毎有撰述必以大臣居首釋此下論領局之弊落出近世故事案晉起居注載康帝詔盛稱著述任重理藉親賢或誤覽遂以武陵王領祕書監尋武陵才非河獻河間獻王識異淮南而輒以彼藩翰董斯邦籍求諸稱職無聞焉爾釋此推設領之始即就初設抉出不稱來既而齊撰禮書舊作國史和士開總知唐脩本草徐世勣監統夫使辟陽長信影和士開指撝馬鄭舊作南董亦因國史相承而誤之前周勃張飛影徐世勣彈壓桐雷之右斯亦怪矣釋逓到因循故事徒以貴幸武夫監領可笑不切定國史為言但指出所領非人以見例觀其夾説本草可知所舉士開總領原用監禮本文正以蹴起下句監史尤難耳何人改易强作解事大抵監史為難斯乃尤之尤一少之尤二字者若使直若南史才若馬遷精懃一作勤不懈若揚子雲諳識故事若應仲逺兼斯具美督彼羣才使夫一無夫字載言記事藉為模楷搦管操觚歸其儀一作凖的斯則可矣釋作一抝折筆情轉動但今之從政則不然凡居斯職者必恩幸貴臣凡庸賤品飽食安步坐嘯畫諾若斯而已矣釋正冩官貴無文虚糜髙踞之状夫人既不知善之為善則亦不知惡之為惡故凡所引進皆非其才或以勢利見升或以干祈取一作致擢遂使當官効用江左以不樂為謠拜職辨名洛中以不閑為説言之可為大噱一作笑可為長歎也釋至此透後一層言惟領局寡識遂致所引非人轉令敦古之士不樂就職矣領局之弊至此勒住曽試論之世之從仕者若使之為將也而才無韜畧使之為吏也而術靡循良使之屬文也而匪閑於辭賦使之講學也而不習於經典斯則負乗致冦悔􅈔旋及雖五尺童兒猶知調笑者矣釋入此一喻作上下轉樞領局居局俱含唯夫修史者則不然或當官卒嵗竟無刋述而人莫之省一作知也或輒不自揆輕弄筆端而人莫之見也兩人字仍帶領局者由斯而言彼史曹者崇扄峻宇深附九重雖地處禁中而人同方外可以養拙可以藏愚繡衣直指所不能繩强項申威所不能及斯固素餐一作食之窟宅尸禄之淵藪也凡有國有家者何事於斯職哉釋此層䝉領局者卸入居局纂修者言領局之設杜散佚也遂縁清禁開置史曹馴致曠勤同匿流為偷閑奥窟矣昔子貢欲去告朔之餼羊子曰爾愛其羊我愛其禮又語云雖無老成人尚有典刑觀歴代之置史臣有同嬉戱而竟不廢其職者盖存夫愛禮恡彼典刑者乎釋就虚循故事頓宕一筆昔丘明之修傳也以避時難子長之立記也藏於名山班固之成書也出自家庭陳夀之草一作為志也創於私室然則古來賢儁立言垂後何必身居廨宇跡參僚屬而後成其事乎釋此正證設局纂修之非古而參僚屬句即繳歸領局者運筆又捷是以深識之士知其若斯退居清静杜門不出成其一家獨斷而已豈與夫冠猴獻狀評議其得失者哉釋結言惟其如是志士所以恥居之也仍對領局作收皆自寓之辭按内篇研辨史事無賸義矣至是竟作史局議一篇終之尋夫左氏以來三國而往編年紀傳都非局課自東觀開而局興焉馴而修必於局矣馴而局且置監矣江左河朔踵成故事爰暨有唐定制加嚴史館則移入省中監修則通勅朝宰凡所為禁防程督之具靡弗備至而古風由是盡變而樷弊相仍益滋劉氏原始要終至説病處領者修者分層遞勘如扁倉之胗疾抉根因尅傳染探癥結真可謂洞垣一方吁室創山藏之轍不可復循而儒生迂議卒自孤行不廢如此篇是此議對蕭至忠輩發與忤時篇相照真將軍絳侯世家亞夫軍細柳上自勞軍先驅至不得入都尉曰軍中聞將軍令不聞天子詔居無何上至壁門士吏曰將軍約軍中不得馳驅天子乃按轡徐行成禮而去文帝曰嗟乎此真將軍也史佚佚書作逸洛誥王命周公後作冊逸告孔傳王為冊書使史逸告伯禽封命之書左成四季文子曰史佚之志有之杜注史佚周文王太史倚相左昭十二左史倚相趨過王曰是良史也子善視之是能讀三墳五典八索九􅉌外傳楚語王孫圉曰有左史倚相能道訓典以叙百物以朝夕獻善敗於寡君使寡君無忘先王之業晉起居注隋經藉志自晉泰始起至晉元熙凡二十部又晉起居注三百一十七卷宋北徐州主簿劉道㑹撰武陵王晉書武陵王晞字道叔康帝建元初領秘書監晞無學術而有武幹為桓温所忌河獻淮南漢書河間獻王德孝景皇帝子被服造次必於儒者山東之儒多從之遊又淮南王安好書致賓客詳自叙篇禮書士開總知北齊恩倖傳和士開解悟捷疾世祖性好握槊士開善此戲因此親狎世祖踐阼加開府後主深委仗之又先得幸於胡太后封淮陽王又魏收傳後主即位收掌詔誥除尚書右僕射總議監修五禮事奏請監趙彦深和士開徐之才共本草世勣監統舊唐書李勣傳勣曹州人本姓徐名世勣以犯太宗諱單名勣焉賜姓李氏封英國公又呂才傳右監門長史蘇敬言陶𢎞景本草多舛謬詔中書令許敬宗與才及李淳風并諸名醫増損舊本仍令司空李勣總監定之並圖合成五十四卷辟陽長信荀悦高后紀徙辟陽侯審食其為右丞相初吕后獲於楚食其以舎人侍得幸及為丞相不典治監宫中事太通鑑秦紀文信侯以舎人嫪毒為宦者進太后后幸之封毒長信侯馬鄭見補注篇周勃張飛史記世家絳侯周勃者沛人也為材官引彊髙祖初起勃以中涓從攻戰木彊不好文學惠帝時以列侯為太尉據蜀志張飛字益德涿人也先主長阪之走飛拒後水斷橋瞋目横矛曰身是張益德也敵無敢近者所過戰克封西鄉侯謚桓侯按益徳華陽國志作翼德桐雷舊注荒史黄帝主醫藥之臣有岐伯雷公俞跗巫彭桐君凡五人岐伯雷公作内經桐君能處方盄按二字連稱于志寕傳亦有之見雜述篇注應仲逺後漢應劭字仲逺詳自叙篇坐嘯畫諾後漢黨錮傳序汝南太守宗資任功曹范滂南陽太守成瑨亦委功曹岑晊二郡為謠曰汝南太守范孟博南陽宗資主畫諾南陽太守岑公孝𢎞農成瑨但坐嘯不樂不閑二句未詳史曹地處禁中舊書職官志歴代史官𨽻秘書省著作局貞觀三年始移史局於禁中在門下省北宰相監修國史遂成故事及大明宫成置於門下省南館門東西有棗樹七十四根至開元二十五年又栘中書省北以舊尚藥局充館地按史館第三移已在作史通事後總之皆在禁近也語云雖無老成後漢孔融傳融性好士與蔡邕素善邕卒後冇虎賁士貌類於邕融毎酒酣引與同坐曰雖無老成人尚有典刑按史通盖用此語謂貌似而實不稱也故不曰詩云而曰語云丘明避時見申左序述漢書蓺文志語成書家庭班固傳固以父彪所續前史未詳乃潜精研思欲就其業有人上告固私改國史者郡上其書顯宗甚奇之草志私室陳夀傳夀領本郡中正撰魏吴蜀三國志既卒范頵上表曰陳夀作志明乎得失願垂採録於是詔下河南尹洛陽令就家冩其書按此二條正史篇亦見之冠猴獻狀漢葢寛饒傳平恩侯許伯入第丞相御史皆賀寛饒不往請之乃往酒酣樂作長信少府檀長卿起舞為沐猴與狗鬬坐皆大笑寛饒卬視屋而嘆按獻狀媚態也許伯外戚恩澤侯自叙第三十六予幼奉庭訓早遊文學釋直叙起不衍世系是自叙著書體非史家叙傳體也年在紈綺便受古文尚書毎苦其辭艱𤨏難為諷讀雖屢逢捶撻而其業不成嘗聞家君為諸兄講春秋左氏傳毎廢書而聽逮講畢即為諸兄説之因竊嘆曰若使書皆如此吾不復怠矣釋首表平生與史為縁殆由宿植先君奇其意於是始授以左氏朞年而講誦都畢于時年甫十有二矣所講雖未能深解而大義畧舉父兄欲令博觀義舊作議疏精此一經辭以獲麟已後未見其事乞且觀餘部以廣異聞次又讀史漢三國志既欲知古今沿革厯數相承於是觸類而觀不假師訓自漢中興已降迄乎皇家實録年十有七而窺覽略周其所讀書多因假賃雖部帙殘缺篇第有遺至於叙事之紀綱立言之梗槩亦粗知之矣釋由其宿植之優遂得年未弱冠創通全史胸貯皂白但于時將求仕進兼習揣摩至於専心諸史我則未暇釋四語略頓洎年登弱冠射䇿登朝於是思有餘閒獲遂一作遂其本願旅一作旋非游京洛頗積嵗年公私借書恣情披閱至如一代之史分為數家其間雜記小書又競為異説莫不鑽研穿鑿盡其利害釋至是并史流旁雜靡不兼綜矣加以自小觀書喜談名理其所悟者皆得之襟亦作衿腑非由染習故始在總角讀班謝兩漢便怪前書不應有一脫有字古今人表後書宜為更始立紀當時聞者共責以為舊脫為字童子何知而敢輕議前哲於是赧然自失無辭以對其後見張衡范曄集果以二史疑當作事為非其有暗合於古人者盖不可勝紀始知流俗之士難與之言凡有異同蓄諸方寸釋至是則進退羣言中有定主矣及年以已通過一多而字立言悟日多常恨時無同好可與言者維東海徐堅晚與之遇相得甚歡雖古者伯牙之識鍾期管仲之知鮑叔牙期管鮑倒用有味不是過也復有永城朱敬則沛國劉允濟義舊誤作呉興薛謙光河南元行沖陳留吳兢夀春裴懷古亦以言議見許道術相知所有搉揚得盡懷抱毎云德不孤必有鄰四海之内知我者不過數子而已矣釋此䝉上節俗難與言深致知音不孤之喜昔仲尼以睿聖明哲天縱多能覩史籍之繁文懼覽者之不一刪詩為三百篇約史記以修春秋贊易道以黜八索述職方以除九丘討論墳典斷自唐虞以迄於周其文不刋為後王法自兹厥後史籍逾多茍非命世大才孰能刋正其失嗟予小子敢當此任其於史傳也嘗欲自班馬已降訖於姚一脫姚字李令狐顔孔諸書莫不因其舊義普加釐革但以無夫子之名而輒行夫子之事將恐致一脫致字驚末一作愚俗取咎時人徒有其勞而莫之見賞所以毎握管歎息遲回者久之非欲之而不能實能之而不敢舊作欲誤也釋此節叙到欲出手眼釐定羣史志擬春秋姑為前却之辭既朝廷有知意恐音字之譌者遂以載筆見推由是三為史臣再入東觀原注則天朝為著作佐郎轉左史今上初即位又除著作長安中以本官兼修國史㑹遷中書舎人暫罷其任神龍元年又以本官兼修國史迄今不之改今之史館即古之東觀也毎惟皇家受命多歴年所史官所編粗惟紀録起居實録之類則有之至於紀傳及志則皆未有其書長安中一作年一作中年㑹奉詔預脩唐疑當作國史及今上中宗即位又勅撰則天大聖皇后實録凡所著述嘗欲行其舊議而當時同作諸士及監修貴臣毎與其當有言字鑿枘相違齟齬難入故其恐當作有所載削皆與俗浮沈雖自謂依違茍從然猶大為史官所嫉嗟乎雖任當其職而吾道不行見用於時而美恐當作善志不遂善志用左氏邾黑肱傳語鬱怏孤憤無以寄懷必寢而不言嘿而無述又恐沒世之後誰知予者故退而私撰史通以見其志釋此方叙到正面由職居史局直道難行姑作史通以露本志昔漢世劉安著書號曰淮南子其書牢籠天地博極古今上自太公下至商鞅其錯綜經緯自謂兼於數家無遺力矣釋自此以下歴舉往昔傳書以啓自托之端將淮南作引淮南之書不專一路故用另述然自淮南已後作者無絶一作絶無必商𣙜而言則其流又衆釋四句上下作紐盖仲尼既歿微言不行史公著書是非多謬由是百家諸子詭說異辭務為小辨破彼大道故揚雄法言生焉釋法言主談理儒者之書博而寡要得其糟粕失其菁華而流俗鄙夫貴逺賤近傳兹恐當作轉滋牴牾自相欺惑故王充論衡生焉釋論衡主徴据民者冥也冥然罔知率彼愚䝉牆面而視或訛音鄙句莫究本源或守株膠柱動多拘忌故應劭風俗通生焉釋風俗通主博洽五常異稟百行殊執一作軌能有兼偏知有長短茍隨才而任使則片善不遺必求備而後用則舉世莫可故劉劭人物志生焉釋人物志主辨材夫開國承家立身行事一文一武或出或處雖賢愚壤隔善惡區分茍時無品藻則理難銓一作錯非綜故陸景典語生焉釋典語主評品詞人屬文其體非一譬甘辛殊味丹素異彩後來祖述識昧一譌殊圓通家有詆訶人相掎摭故劉勰文心生焉釋文心雕龍主文章體裁簡毎書各有標㫖看其舉義當若史通之為書也盖傷當時載筆之士其義不純思欲辨其指歸殫其體統夫其書雖以史為主而餘波所及上窮王道下掞人倫總括萬殊包吞千有自法言已降迄於文心而往固一脫固字以納諸胷中曽不慸音蠆或誤作蠆芥者矣釋此節穩括諸書與史通相領為吐納託出著書本夫其為義也有與奪焉有褒貶焉有鑒誡焉一脱此四字有諷刺焉其為貫穿者深矣其為網羅者宻矣其所商略者逺矣其所發明者多矣盖談經者惡聞服杜之嗤論史者憎言班馬之失而此書多譏往哲喜述前非獲罪於時固其宜矣猶冀知音君子時有觀焉尼父有云罪我者春秋知我者春秋抑一脫此六字斯之謂也釋至此收到史通作而竊取之義見遂欲上擬春秋與前迴應昔梁徵士劉孝標作叙傳其自比於馮敬通者有三而予輙不自揆亦竊比於揚子雲者有四焉釋此下又專以子雲為比者盖自摹作此書之身分以俟後世相知定文寄意緜逺也何者揚雄嘗好雕蟲小伎老而悔其少作余幼喜詩賦而壯都不為恥以文士得名期以述者自命其似一也釋第一層在未作史通前見志氣揚雄草𤣥累年不就當時聞者莫不哂其徒勞余撰史通亦屢移寒暑悠悠塵俗共以為愚其似二也釋第二層在方作史通時見功力揚雄撰法言時人競尤其妄故作解嘲漢書作謿以詶一譌訓之余著史通見者亦互言其短故作釋䝉唐書本傳不著以拒之其似三也釋第三層在既作史通後見主張揚雄少為范踆漢書作逡劉歆所重及聞其撰太𤣥經則嘲以恐盖醬瓿然劉范之重雄者盖貴其文彩若長揚羽獵之流耳如太𤣥深奥理難理難一作難以探賾既絶窺踰故加譏誚余初好文筆頗獲譽於當時晚談史傳遂減價於知已其似四也釋第四層通前後時情而言見知希自貴夫才唯下劣而蹟類先賢是用銘之於心持一譌特以自慰釋鈎勒四似抑猶有遺恨懼不似揚雄者有一焉何者雄之𤣥經始成雖為當時所賤而桓譚以為數百年外其書必傳其後張衡陸績果以為絶倫參聖夫以史通方諸太𤣥今之君山即徐堅朱敬則等數君是也後來張陸則未之知耳嗟乎倘使平子不出公紀陸績不生將恐此書與糞土同捐煙燼俱滅後之識者無得而觀此予所以撫卷漣洏淚盡而繼之以血也釋末一層似却如旋以疑為信今時後日問世只在徴心從對面顯意自昔梁徵士至此一重一掩煙景無邊按史通非史也而史肆也故於正集之終擬史作叙亦不全乎叙傳也而専乎叙書也體例然也其始循年銓綜其中况古著述其末待後論定其骨岸然其味油然篇中云貫穿者深矣網羅者宻矣商畧者逺矣發明者多矣又云談經惡聞服杜之嗤論史憎言馬班之失而多譏往哲獲罪固宜由今觀之所言皆驗盖攻劉見智者鮮有不索其瘢而繼唐編史者罔敢不持其律乃好勝之私與同然之是交據而不能自㫁卒出於騁辯之一途陰用其言而顯訾其書吾不知其何說也曷言乎陰用其言也曰第取唐後成書印證之斷可見矣自其以編年紀傳辨塗轍也而二體之式定自其以史記漢書昭去取也而斷代之例行自其斥秦紀於未帝之先也而開創無冒越之篇自其擬世家以隨時所適也而載紀有變通之義自其論后妃稱紀或寄外戚皆非也而傳首始正自其論篇贊複衍更増銘體尤贅也而駢韻都捐自其力排班志之五行也而災祥屏䜟緯之蕪自其痛詆魏收之標題也而稱謂絶誕妄之目自其以書地因習為失實也而邑里一遵時制自其以叙事煩飾為深誡也而𤨏噱半落刋章約舉數端後史可覆謂之隂用其言不可概見哉夫古今人不相及望兩漢之雄俊則道逺效六朝之藻飾則真喪惟夫約法嚴修辭潔可以學企可使質全為之嚮道者史通也綜往飭歸功亦博矣故同一書也耳食者曰工訶古人心喻者曰導吾先路願以告具眼讀書者毎讀新舊書徐堅等七人傳益使人想重劉公不敢哆口謾也七人者皆皎皎亮節士也語有之臣非能相人能觀人之友也其弗爽矣夫東海徐堅舊書本傳徐堅少好學遍覽經史王方慶善三禮之學常就質疑又賞其文章典實楊再思曰此鳯閣舎人様開元十三年改麗正書院為集賢院以堅為學士副張説知院事堅多識典故前後修撰格式氏族及國史凡七入書府新書儒學傳堅寛厚長者太平公主用事武攸暨屢邀請堅堅不許帝大酺集賢幔舎在百司上張説令掲大牓以侈其寵堅望見遽命撤之曰君子烏取多尚人卒年七十餘謚曰文按徐朱諸人皆劉氏石友義取品槩互證故採掇加詳牙期管鮑列子湯問篇伯牙善鼓琴鍾子期善聽曲毎奏子期輒窮其趣伯牙欵曰善哉善哉吾於何逃聲哉又力命篇管夷吾鮑叔牙二人子也相友甚戚管仲嘗歎曰生我者父母知我者鮑永城朱敬則舊書本傳敬則字少連長安三年同鳯閣鸞臺平章事兼修國史張易之昌宗嘗命畫工圖冩武三思等十八人形像號為髙士圖毎引敬則固辭不就其髙潔守正如此與三從兄同居四十餘年財産無異新書敬則請髙史官選以求名才韋安石嘗閱其藁史歎曰董狐何以加史官權重宰相古聖君賢臣所以畏懼也沛國劉允濟舊書本傳允濟少孤事母甚謹弱冠除著作佐郎嘗采魯哀公後十二世接戰國為魯後春秋長安中兼修國史新書允濟嘗曰史官善惡必書此權顧輕哉而班生受金陳夀求米僕乃視如浮雲耳義興薛謙光舊書薛登傳登本名謙光博涉文史毎談論前代故事必廣引證驗有如目擊與徐堅劉子𤣥齊名友善景雲中拜御史大夫僧惠範恃太平公主權勢逼奪百姓將加彈奏或請寢之謙光曰憲臺理寃滯何所迴避朝彈暮黜亦可矣遂奏之反為所搆出開元中轉太子賓客以與太子同名勅賜名登卒年七十三河南元行沖舊書本傳行沖博學多通狄仁傑甚重之性不阿順嘗謂仁傑曰下之事上猶蓄聚以自資也脯腊膎胰以供滋膳參术芝桂以防痾疾門下賓客堪充㫖味者多願以小人備一藥物拜太常少卿行沖以本族出於後魏而未有編年之史乃撰魏典三十卷事詳文簡為學者所稱秘書監馬懷素卒詔行冲代其職表請通撰古今書目為羣書四録卒年七十七按行沖又嘗著論辯晉元帝出小吏牛金之誣今見雜説中篇牛繼馬後注陳留呉兢新書本傳兢貫知經史方直寡諧比魏元忠朱敬則薦兢才堪論撰詔修國史天寶初卒年八十兢叙事簡核號良史初與劉子𤣥撰定武后實錄叙張昌宗誘張說誣證魏元忠事頗言說已然可賴宋璟等激勵苦切故轉禍為忠不然皇嗣且殆後説為相讀之心不善知兢所為即從容謬謂曰劉生書魏齊公事不少假借奈何兢曰子𤣥已亡不可受誣地下兢實書之其草故在説屢蘄改辭曰徇公之情何名實錄卒不改世謂今董狐云夀春裴懷古舊書良吏傳懷古為監察御史聖厯中閻知微充使往突厥懷古監其軍至虜廷黙啜立知微南面可汗將授懷古偽職懷古不從將殺之抗辭曰寧守忠以就死不毁節以求生請就斬所乃禁錮隨軍後竄歸終幽州都督新書懷古清介審慎在幽州時韓琬以監察御史監軍稱其馭士信臨財亷為國名將云按所舉知友七人唯懷古不參史局故末及之覩史籍至訖于周凡八句皆孔安國尚書序原文淮南子漢淮南王傳安為人好書招致賓客方術之士數千人作為内書二十一篇外書甚衆又有中篇八卷言神仙黄白之術亦二十餘萬言别見採撰篇按本處盖指内書言即今所傳鴻烈解法言論衡揚雄法言見論贊篇王充論衡見採撰篇風俗通後漢應奉傳子劭字仲逺撰風俗通以辨物類名號識時俗嫌疑劭自叙俗間行語衆所共傳積非習貫莫能原察聊以不才舉爾所知傳曰百里不同風千里不同俗為政之要辯風正俗最其上也昔畫者曰犬馬最難鬼魅最易犬馬旦暮在人之前不類不可故難鬼魅無形無形者不見故易今俗語雖云浮淺然其難矣補按節首民者冥也語本晉書刑法志王導等議人物志三國魏志劉劭字孔才黄初中尚書郎作皇覽作新律篇著律畧論作都官考課條作説略著樂論凡所撰述法論人物志之類百餘篇阮逸序予好閱古書於史部中得劉劭人物志十二篇其述性品之上下才質之兼偏研幽摘微一貫於道誠一家之善志也典語隋志儒家注典語十卷典語别二卷並呉中夏督陸景撰亡新舊唐志陸景典訓十卷按是書隋志云亡唐志乃有十卷者存而知幾又見之則亡者當但指别二卷也或作語或作訓未知孰是文心南史文學傳劉勰字彦和梁天監中東宫通事舎人撰文心雕龍五十篇論古今文體其序略云予齒在逾立嘗夜夢執丹漆之禮器隨仲尼而南行寤而喜曰唯文章之用實經典枝條五禮資之以成六典因之致用於是論之既成沈約取讀謂深得文理常陳之几案孝標比敬通梁文學劉峻傳峻字孝標其自序略曰余自比馮敬通而有同之者三異之者四敬通雄才冠世志剛金石余雖不及之而節亮慷慨一同也敬通值中興明君而終不試用余逢命世英主亦擯斥當年二同也敬通有忌妻至身操井臼余有悍室亦家道轗軻三同也其異之四曰敬通雖芝殘蕙焚而為名賢所慕風流郁烈久而彌盛余聲塵寂漠世不吾知將同秋草此四異也按敬通後漢馮衍字慸芥相如上林賦吞若雲夢者八九於其胷中曽不慸芥李善注刺鯁也字典亦作􅀢又作蔕蔕芥之蔕顔師古音蠆果蔕之蔕唐韻音帝揚雄草撰漢書本傳哀帝時雄方草太𤣥有以自守泊如也或謿雄以𤣥尚白而雄解之號曰解謿雄好古而樂道用心於内不求於外時唯劉歆及范逡敬焉而鉅鹿侯芭嘗從雄居受其太𤣥法言劉歆亦觀之謂雄曰空自苦吾恐後人用覆醬瓿也披桓譚曰必傳顧譚不及見也張衡與崔子玉書乃者讀太𤣥經知子雲極隂陽之數心實與五經擬𤣥四百嵗其興乎陸績述𤣥雄受氣純和韜真含道建立𤣥經與聖人同趣桓譚謂之絶倫又法言宋宋咸序法言者盖時有請問子雲用聖人之法以應答之也東晉李軌為之注淚盡繼血說苑權謀篇下蔡威公事體統亡紕繆亡弛張亡按三亡篇舊本僅見内篇目録之末今依目補列於此但自叙後不應更有餘篇嘗閱章宫講山堂考索紕繆篇綴在煩省之下其二篇者不復及而先舉其總曰五十餘篇則固有其文而莫定其原次耳再考唐書本傳云著史通内外四十九篇與今行本數合母亦史氏疎於原始乎史通通釋卷十
