body:
  text: 新唐書知㡬與徐堅等六人同傳史臣總論曰唐興史官秉筆衆矣知㡬以來工訶古人詳此是訶古一語非專謂劉自執者偏據胸中有物先入詆諆四起焉愚則謂必知知㡬之人者乃可與知史通之書愚始時閲其書怪其言自遷固而下無完史其謫之太過至或失之􅄶以削或失之泥以膠意其人果談史之申韓者邪其春夏之氣少秋冬之氣多者邪及讀其本傳詳其世履不但身席清通而六子齊著聲實大官榮名逹於孫曾猶未衰止又疑天之施澤於劉氏何其深厚而加長如此也自邇釋其書且數過乃始寤其為人也雖口不談道而實種道學之胚胎觀採撰載文等篇力屛誕幻誇誣可見故其為言也雖貌似拂經而實操經物之繩纆觀疑古惑經等篇寄憤簒奪叛逆可見葢其根性壹至畫而不過其坊畫於坊者取於物也必約約必受之以豐秋冬之為嚴斂也春夏之以長茂也劉氏之澤深厚而加長固其符也訶人以為悦而能享是哉愚故曰知知㡬之人者可與知史通之書也三山傖父起龍書後
