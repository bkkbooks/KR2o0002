body:
  text: 史通通釋卷一無錫浦起龍撰内篇六家第一合起結共八章自古帝王編述文籍外篇謂古今正史篇此二字一作史言之備矣古往今來質文遞變諸史之作不恒厥體釋二句首提史字掲出全書眼目𣙜而爲論其流有六一曰尚書家二曰春秋家三曰左傳家四曰國語家五曰史記家六曰漢書家今略陳其義列之於後按此篇序也史體盡此六家六家各有原委其舉數也欲溢為七而無欠欲減為五則不全是史通總挈之綱領也其辨體也援駮儷純而派同移甲置乙則族亂是六家類從之畛涂也注家認家字不清要領全沒今為顯説之一尚書記言家也二春秋記事家也三左傳編年家也四國語國别家也五史記通古紀傳家也六漢書斷代紀傳家也㑹此分配以觀六章觀全書如視掌文矣尚書家者釋是為記言家其先出於太古易曰河出圖洛出書聖人則之故知書之所起逺矣釋上原書之所起下表孔子所定至孔子觀書於周室得虞夏商周四代之典乃刪其善者定為尚書百篇孔安國曰以其上古之書謂之尚書尚書璇璣鈐曰尚者上也上天垂文􅱺古象字一作以布節度如天行也王肅曰上所言下為史所書故曰尚書也釋三引古語皆釋尚字名義惟此王肅所云乃與記言意合是為本處家字所宗推一作唯此三説其義不同蓋書之所主本於號令所以宣王道之正義發話言於臣下故其所載皆典謨訓誥誓命之文釋數語勒清記言至如堯舜二典直序人事禹貢一篇唯言地理或作里洪範總述災祥董劉五行之説顧命都陳䘮禮兹亦為例不純者也釋數語以書有兼及記事之文摘出言之要之自孔子觀書至此總以記言為立説之主也又有周書者謂世所傳汲冡周書與尚書相類釋亦是記言類也即孔氏刋約百篇之外凡為七十一或作二非章上自文武下終靈景甚一誤作其有明允篤誠典雅髙義時亦有淺末恒説滓穢相叅殆似後之好事者所增益也至若職方之言與周官周禮無異時訓之説比月令多同斯百王之正書五經之别録者也釋自又有周書至末所綴三書皆屬記言之體正為家字博其類也此節述刪餘之周書雖其中不無真偽相亂要是本家緒餘故引而附之自宗周既殞書體遂廢迄一作迨乎漢魏無能繼者釋數語轉遞至晉廣陵相魯國孔衍以為國史所以表言行昭法式至於人理常事不足備列乃刪漢魏諸史取其美詞典言足為龜鏡者定以篇第纂成一家由是有漢尚書後漢尚書漢衍魏尚書凡為二十六卷卷與隋志不合釋書體久廢之後至晉而有孔衍諸書是後來記言者一家至隋秘書監太原王劭又録開皇仁夀時事編而次之以類相從各為其目勒成隋書八十卷尋其義例皆準尚書釋至隋而又有王劭隋書亦是後來記言者一家上二家亦以類附此下則就二家衡論原夫尚書之所記也若君臣相對詞旨可稱則一時之言累篇咸載如言無足紀語無可述若此疑當作止故事雖有舊無有字脫略四句言有事無言者不收而觀者不以為非爰逮中葉文籍大備必翦截今文摸擬古法事非改轍理涉守株故舒元孔衍字所撰漢魏等書不行於代也釋此節論孔衍書也上世事簡故言亦簡後世文煩徒以翦棄事實上擬記言豈足成書若乃帝王無紀公卿缺傳則年月失序爵里難詳斯並昔之所忽而今之所要如君懋王劭字隋書雖欲祖述商周憲章虞夏觀其所述乃似孔子家語臨川世説謂體不類史可謂畫虎不成反類犬也故其書受嗤當代良有以焉釋此節論王劭書也既無紀傳又不編年徒然掇拾𤨏言豈得成史二節之意總謂記言一家止可行於三古後丗不必倣為也按朱子嘗言古史之體可見者書春秋而已史通首此二家皆談史不談經注家執經言經繁引義䟽都無交涉其首尚書家者劉氏特以記言之體當之云爾家不類族不備人非其倫書是其體則以其族歸之不特七十一篇之周書為其緒餘若衍若劭等書皆是記言之族故亦以類相從郭本紛紛譏劉氏以狗尾續貂正縁不識家字所由胥動浮言也上古文字何例可説專以尚書屬言其説始自鄭荀詎云篤論劉氏不此之辨而疑書例之不純固哉言也劉說蓋本堯典孔䟽尚書固是史家開體然不編年不紀傳原非史體正宗故後世難為其繼亦不必有繼劉氏譏衍劭為守株畫虎洵通識也尚書百篇漢蓺文志易曰河出圖洛出書聖人則之故書之所起逺矣至孔子纂焉上斷於堯下訖於秦凡百篇按志語本孔安國尚書序百篇葢古尚書原數也孔安國史記孔子世家孔子而下歴伯魚子思子上子家子京子髙子慎及鮒凡八丗鮒弟子襄生忠忠生延年及安國安國為今皇帝博士漢蓺文志武帝末魯共王壤孔子宅得古文尚書孔安國悉得其書獻之尚書孔序以其上古之書謂之尚書百篇之義世莫得聞璇璣鈐後漢方術傳樊英善河洛七緯章懷注七緯者易緯稽覽圖乾鑿度坤靈圖通卦驗是類謀辨終備也書緯璇璣鈐考靈耀刑德放帝命驗運期授也詩緯推度灾汜厯樞含神務也禮緯含文嘉稽命徵斗威儀也樂緯動聲儀稽耀嘉叶圖徵也孝經緯援神􅆻鉤命决也春秋緯演孔圖元命苞文耀鉤運斗樞感精符合誠圖考異郵保乾圖漢含孳佑助期握誠圖潜潭巴說題辭也王肅魏志王朗傳朗子肅字子雍中領軍散騎常侍善賈馬之學而不好鄭氏采㑹同異為尚書詩論語三禮左氏解及撰定父朗所作易傳皆列於學官按郭本引南齊奔魏之王肅誤又按王應鱗困學紀聞云樂書引樂記通典引大傳並存王肅注而集說以為元魏人誤也在元魏者字恭懿不以經學名然則誤已在宋時矣而王謂不以經學名亦非恭懿長於三禮北史與劉石經同傳常相辨論往來也爲例不純漢蓺文志左史記言言為尚書右史記事事為春秋荀悦申鑒其說同鄭氏六蓺論左史所記為春秋右史所記為尚書是以玊藻云動則左史書之言則右史書之按王者因事而有言有言必有事理勢本自相連珥筆如何分記况左右配屬班荀之與鄭戴又各牴悟此等皆出自漢儒難可偏據魏晉以來黏配相沿杜預以漢志為誤史通則又以漢志為例遂有為例不純之議並非又有周書漢蓺文志周書七十一篇劉向云周時誥誓號令葢孔子所論百篇之餘也困學紀聞隋唐志繫之汲冡然汲冡得竹書在晉咸寧五年而太史公鄭康成許叔重馬融皆引其文皆在漢世杜元凱觧左傳時書亦未出也亦以周書為據束晳傳及左傳正義引王隠晉書所載竹書之目亦無周書然則繫於汲冡誤矣今按史通亦多引其書皆不冠以汲冢隋唐志之誤信矣職方時訓逸周書序王紀雖弛天命方永四夷八蠻攸遵王政作職方辯十二氣之應以明天時作時訓按浚儀王氏紀聞引此序十二氣作二十四氣孔衍漢魏尚書晉儒林傳孔衍字舒元孔子二十二世孫中興初補中書郎出為廣陵郡凡所撰述百餘萬言唐蓺文志孔衍漢尚書十卷後漢尚書六卷後魏尚書十四卷按後魏後字衍文王劭隋書隋書王劭字君懋授著作郎遷秘書少監專典國史撰隋書八十卷多録口勅又採迂怪委巷之言以類相從為其題目守株韓非五蠧宋人耕田田中有株兔走觸株而死因釋耒而守株冀復得兔兔不可得為宋國笑摸擬篇用其語稍詳家語王肅注後序孔子家語者與論語孝經並時弟子取其正實而切事者别出為論語其餘則都集録之鼂氏讀書志凡四十四篇劉向校録止二十七篇王肅得此於孔猛家朱子與呂伯恭書程氏遺書若只暗地刪却久後易惑人記論語者只為如此留下家語至今作病痛也臨川世説宋書宗室傳臨川王道規無子以長沙景王子義慶為嗣髙氏緯畧義慶采擷漢晉以來佳事佳話為世説新語讀書志劉知㡬頗言此書非實録予亦云春秋家者釋此一家是言記事家也止以經文為界勿重拈編年意致與左傳家混其先出於三代釋原記事家古名所自案汲冢璅語記太丁時事目為夏殷春秋釋此下歴引春秋古名見於諸書者以實之孔子曰䟽通知逺書教也屬辭比事春秋之教也知春秋始作與尚書同時璅語又有晉春秋記獻公十七年事國語云晉羊舌肸習於春秋悼公使傅其太子左傳昭二年晉韓獻子來聘見魯春秋曰周禮盡在魯矣斯則春秋之目事匪一家至於隱沒無聞者不可勝載又案竹書紀年其所紀事皆與魯春秋同孟子曰晉謂之乗楚謂之檮杌而魯謂之春秋其實一也然則乗與紀年檮杌其皆春秋之别名者乎故墨子曰吾見百國春秋盖皆指此也釋此上叠引衆説總以證明古者歴國史記皆號春秋為推本命名之由而其用則皆以記事為義也逮仲尼之修春秋也乃觀周禮之舊法遵魯史之遺文據行事仍人道就敗以明罰因興以立功假日月而定歴數籍藉通朝聘而正禮樂微婉其説志一作隱晦其文為不刋之言著將來之法故能彌歴千載而其書獨行釋此節正表孔子所修之春秋寓書法於記事中孤行千載而他所謂春秋者皆廢又案儒者之説春秋也以事繫日以日繫月言春以包夏舉秋以兼冬年有四時故錯舉以為所記之名也茍如是則晏子虞卿吕氏陸賈其書篇第本無年月而亦謂之春秋蓋有異於此者也釋此節帶及編年言記事必繫之年月若晏虞吕陸軰所著事無編繫何得假名然編年意本章不重特縁此以斥諸家耳至太史公著史記始以天子為本紀考其宗旨如法一作昔春秋自是為國史者皆用斯法然時移世異體式不同其所書之事也皆言罕襃諱事無黜陟故馬遷所謂整齊故事耳安得比於春秋哉釋末節指出後史之帝紀為近春秋經體是則本家正派特書法未盡善耳按此春秋舉經不舉傳章意以記事為主與尚書對舉而此為確配非尚書强配記言比也於編年意則帶及之至下章左傳家盡之其標義也以孔子為宗法其徴名也以前所稽者為原始以後所附者為虚稱其苗裔也以遷史所開諸帝紀為具體合而觀之家字之原委離合備焉本紀取法春秋一語破的紀所加詳者惟在開剏之世及凡詔令之文耳後來朱子作綱目之綱固是仰學春秋亦大率取裁本紀春秋家者至盡在魯矣此段證據與杜氏左傳序首孔䟽叅錯相同汲冢璅語隋書經籍志古文璅語四卷汲冡書羊舌肸外傳晉語悼公問徳義司馬侯曰諸侯之為日在君側以其善行以其惡戒可謂德義矣公曰孰能曰羊舌肸習於春秋乃召叔嚮使傅太子彪竹書紀年杜氏左傳後序余成春秋釋例及經傳集觧始訖會汲郡汲縣有發其界内舊冡者大得古書皆簡編科斗文字多雜碎怪妄不可訓知紀年冣為分了起自夏殷周皆三代王事無諸國别也唯特記晉事起自殤叔次文侯昭侯以至曲沃莊伯莊伯之十一年十一月魯隱公之元年正月也皆用夏正建寅之月為歳首編年相次晉國滅獨記魏事下至魏哀王之二十年蓋魏國之史記也推校哀王二十年太歳在壬戌是周赧王之十六年秦昭王之八年韓襄王之十三年趙武靈王之二十七年楚懷王之三十年燕昭王之十三年齊湣王之二十五年也哀王二十三年乃卒故特不稱諡謂之今王其著書文意大似春秋經推此足見古者國史䇿書之常也按汲冡書有目詳後申左篇百國春秋北平黄氏補注公羊傳䟽云昔孔子受端門之命制春秋之義使子夏等求周史記得百二十國寳書則墨子言百國春秋當即是書也周禮舊法杜序周德既衰官失其守上之人不能使春秋昭明仲尼因魯史䇿書成文考其真偽而志其典禮上以遵周公之制下以明將來之法微婉志晦杜序為例之情有五一曰微而顯二曰志而晦三曰婉而成章四曰盡而不汙五曰懲惡而勸善繫日繫月語見杜氏序包夏兼冬杜序史之所記必表年以始事年有四時故錯舉以為所記之名也䟽言春足以兼夏言秋足以見冬魯頌箋云春秋猶言四時是也晏虞呂陸亦謂春秋史記管晏列傳贊吾讀晏子春秋欲觀其行事故次其傳孔叢執節篇春秋經名晏子書亦曰春秋貴賤不嫌同名也史記虞卿説趙孝成王為趙上卿卒去趙不得意乃著書曰節義稱號揣摩政謀凡八篇曰虞氏春秋漢蓺文志虞氏春秋十五篇髙誘呂覽序呂不韋者陽翟富賈為秦相國集儒書著其所聞為十二紀八覽六論名吕氏春秋暴之咸陽市門懸千金其上能増損一字者予千金後漢班彪傳漢興定天下大中大夫陸賈紀録時功作楚漢春秋九篇史記本傳索隱賈撰記項氏與漢髙初起及惠文間事左傳家者釋是為編年正家其先出於左丘明釋傳為左撰亦曰其先志家之所始也孔子既著春秋而丘明受舊作授非經作傳蓋傳者轉也轉受舊亦作授經旨以授後人或曰傳者傳原音平也所以傳示來世案孔安國注尚書亦謂之傳斯則傳者亦訓釋之義乎釋首節空䟽傳字只作注傳意觧觀左傳之釋經也言見經文而事詳傳内或傳無而經有或經闕而傳存其言簡而要其事詳而博信聖人之羽翮而述者之冠冕也釋此節貼合左氏遞到傳述古事之傳尚未説到編年逮孔子云沒經傳不作史而以經名者至左傳後遂絶於時文籍唯有戰國䇿及太史公書而已釋二書皆非編年何忽引入以其所載接左連秦為下文樂傳張本耳至晉著作郎魯國樂資乃追采二史撰為春秋後傳其書一脱書字始以周貞王續前傳魯哀公後至王􅎼同赧入秦又以秦文王之繼周終於二世之滅合成三十卷釋樂資采國策遷史為書上接春秋下迨漢初亦名為傳已上不言編年而編年自見也當漢代史書以遷固為主而紀傳古互字出表志相重於文為煩頗難周覽釋接入漢史其初有紀傳無編年此數語桃下至孝獻帝始命荀恱撮其書為編年體依一有附字左傳著漢紀三十篇釋此就荀紀之依左體指出編年二字為全章㸃眼自是每代國史皆有斯作起自後漢至於髙齊如張璠孫盛干寳徐賈當是廣字裴子野吴均何之元王劭等其所著書或謂之春秋或謂之紀或謂之略或謂之典或謂之志雖當有其字名各異大抵皆依左傳以為的準焉釋的準者編年也凡異名而同體者悉羅列之於家字乃無欠闕按春秋經以提綱傳以述事事必繫年編年之法由是興焉然編年之義史通不以繫經而繫傳者事待傳而顯也傳有三家史通唯取左氏不及公穀者公穀主釋義左主載事公穀非史法左具史法也故左傳一家為編年家法之祖也自左而後樂資荀恱以及張孫干徐裴吴何王諸所述撰皆其流也章内錯舉國䇿遷固殆為樂傳荀紀起本猶宋涑水氏採十七史以為通鑑所本者紀傳家而所成者乃編年體也此䖏觀書略綽定知辨類糊塗又唐之先有王氏元經薛收傳正擬是家史通曾不及之因思隋唐二史皆不立王通傳至司馬君實為之補傳謂其事其書出其家人參差不實然則書雖存究在依託然否間况其家所以推之者越分無禮有白牛谿序曰山似尼丘泉似泗涘更為之作文中子世家以配遷史是其滛名僣號罪甚揚雄法亦在所必斥也受經作傳杜氏集解序左丘明受􅀴於仲尼以為􅀴者不刋之書也故傳或先􅀴以始事或後􅀴以終義或依􅀴以辯理或錯􅀴以合異隨義而發其例之所重樂資晉書無傳隋經籍志春秋後傳三十一卷晉著作郎樂資撰按資晉時人在荀恱後而章内先舉樂資者資書接左迄秦事在漢紀前不以人次也又接左之年之周貞王史記作定王左䟽雜引存疑荀恱後漢荀淑傳淑孫恱字仲豫獻帝時官秘書監帝以班固漢書文緐難省乃令恱依左氏傳體為漢紀三十卷辭約事詳其序曰中興以前明主賢臣得失之軌亦足以觀矣正史篇又有注張璠國史無傳隋經籍志後漢紀三十卷張璠撰袁宏後漢紀自序暇日掇㑹漢紀謝承書司馬彪書華嶠書謝忱書漢山陽公記漢靈獻起居注漢名臣奏旁及諸郡耆舊先賢傳凡數百卷多不次叙始見張璠所撰書其言漢末之事差詳故復探而益之孫盛隋經籍志魏氏春秋三十卷晉陽秋三十卷並孫盛撰盛字安國又見論賛直書二篇干寳晉書寳字令升祖統吴奮武將軍寳以才器召為著作郎領國史著晉紀自宣迄愍凡二十卷直而能婉郭評楊誠齋嘗與同舍談于寳一吏曰干字非于驗書果然按語見鶴林玉露謂韻書干字下注云晉有干寳也誠齋喜曰此吾一字之師徐賈其人其書俱無考按隋唐二志於干寳晉紀之後裴子野宋略之前有徐廣晉紀四十五卷與此處列名之次正同而所列編年門類亦合然則賈字即廣字之譌也宋書本傳徐廣字野民貟外散騎領著作裴子野梁書子野字㡬原曾祖松之續修何承天宋史未成子野更撰為宋略二十卷叙事評論多善吴均梁書吴均字叔祥文體清㧞好事者或斆之謂為吴均體除奉朝請著齊春秋三十卷外篇正史篇謂其書稱梁帝為齊眀佐命帝惡其實詔燔之然其私本竟行何之元陳書之元銳精著述以為梁氏肈自武皇終於敬帝其興亡盛衰之跡足以垂鑒戒定襃貶究七十五年行事草創為三十卷號曰梁典王劭見尚書家但彼所引為隋書是記言體此所引則北齊志乃編年體章末所云或謂之志正指此也舊注悉取其所著書溷列一處便使家數不清唐藝文編年類王劭北齊志十七卷外編正史篇王劭憑起居注廣以異聞造編年書號曰齊志云云分體甚明國語家者釋此是國别家惟分封分割之代有之其先亦出於左丘明既為春秋内傳又稽其逸文纂其别說分周魯齊晉鄭楚吴越八國事起自周穆王終於魯悼公别為此二字或作列於或作列為皆非春秋外傳國語合為二十一篇其文以方内傳或重出而小異然自古名儒賈逵王肅虞翻韋曜之徒並申以注釋治其章句此亦六經之流三傳之亞也釋首節䟽明國别之體因推稽纂所由兼及注家章句如此暨縱横互起力戰爭雄秦兼天下而著戰國䇿其篇有東西二周秦齊燕楚三晉宋衛中山合十二國分為三十三卷夫謂之䇿者盖録而不序謂時序故即簡簡策以為名或云漢代劉向以戰國游士為之一脫之字策謀因謂之戰國䇿釋繼國語而起者國䇿正其流派故連及之而以兩義䟽明䇿字也至孔衍又以戰國䇿所書未為盡善乃引太史公所記參其異同刪彼二家謂國䇿遷史聚為一録號為春秋後語除二周及宋衛中山其所留者七國而已始自秦孝公終於楚漢之際比於春秋亦盡二百三十餘年行事始衍撰春秋時國語因述其後語并標其前作復撰春秋後語勒成二書各為十卷今行於世者唯後語存焉案其書序云雖左氏莫能加世人皆尤其不量力不度德尋衍之此義自比於丘明者當謂國語非春秋傳也必方以類聚豈多嗤乎釋此節因國䇿敷衍而出在舒元作之殊覺多事在史通引之郤是類推盖此家述者絶少故及之也當漢氏失馭英雄角力司馬彪又録其行事因為九州春秋州為一篇合為九卷尋其體統亦近代之國語也釋此書乃是本家的派國語一家從此止矣自魏都許洛三方鼎峙晉宅江淮四海幅裂其君雖號同王者而地實諸侯所在史官記其國事為紀傳者則規模班馬創編年者則議擬荀袁於一作為是史漢之體大行而國語之風替矣釋末節正見國語家久廢雖自魏晉以來多有分國之史大都祖述班荀均之國别而體則非矣按二國均為國别家史通雖專以外傳標目其實走馬遞舉自封建廢而史統於一靡事殊塗矣其或光岳氣分各職記注而編年紀傳小大相師亦並不用條綴體式若是乎國語一家㡬將説部置之史通不列為家而不可列之為家而體非正用章末筆叅進退不類他家有以也内傳外傳韋昭國語序昔孔子修舊史以垂法左丘明因聖言以攄意可謂博物善作者也其雅思未盡復采録前世穆王以來下迄魯悼智伯之誅以為國語其文不止於經故號曰外傳又云切不自料復為之解叅之以五經撿之以内傳賈逵注後漢書賈逵字景伯九世祖誼逵身長八尺二寸諸儒為之語曰問事不休賈長頭尤明左氏傳國語為之解詁五十一篇注左氏傳三十篇國語二十一篇也王肅注三國時人見尚書家按魏志本傳於諸􅀴解後又有三傳國語爾雅諸注隋經籍志春秋外傳章句一卷王肅撰虞翻注三國吴志虞翻字仲翔孫權以為騎都尉徙交州雖處罪放而講學不倦為老子論語國語訓注皆傳於丗韋曜注吴志韋曜字𢎞嗣為尚書郎遷太子中庶子孫皓即位封髙陵亭侯注曜本名昭史為晉諱改之宋崇文總目昭叅引鄭衆賈逵虞翻唐固合五家為注自發正者三百七事按唐固注國語見吴志闞澤傳或作唐因非戰國䇿劉向原叙所校中戰國䇿書臣向因國别者畧以時次之得三十三篇中書本號或曰國䇿或曰國事或曰短長或曰事語或曰修書或曰長書臣向以為戰國時㳺士䇿謀宜為戰國䇿繼春秋以後訖楚漢之起二百四十五年間之事皆定以殺青書隋經籍志劉向録者三十二卷髙誘撰注者二十二卷孔衍後語唐藝文志孔衍春秋時國語十卷又春秋後國語十卷按史通云今行世者唯後語存是知新唐志特因舊史原文非皆有其書也九州春秋隋經籍志九州春秋十卷司馬彪撰陳氏書録解題彪記漢末州部之亂司冀徐兖青荆揚凉益幽凡盜賊僣叛皆記之晉書彪字紹統髙陽王睦之子官秘書郎魏都許洛三國魏志建安元年洛陽殘破董昭等勸太祖都許三十五年至洛陽文帝黄初元年營洛陽宮按時言曹魏者通謂之許洛如吴志朱桓言進取夀春以規許洛是也晉宅江淮晉元帝紀帝瑯琊恭王覲之子嗣位瑯琊永嘉初鎮建鄴愍帝即位西都不守建武元年依魏晉故事為晉王立宗廟社稷於建康按是為東晉之始建康即建鄴吴大帝始都此江淮其界也亦吴之通稱如吴志周魴本陽羡人而言生長江淮是也史記家者釋此是紀傳家之祖而劉氏以史記通古為體故别為一家其先出於司馬遷自五經間行百家競列事跡錯糅通作揉前後乖舛釋此四句伏下遼逺難稽病源至遷乃鳩集國史採訪家人或作家乗恐非上起黄帝下窮漢武紀傳以統君臣書表以譜年爵合百三十卷因魯史舊名目一本目字在上之曰一無曰字史記自是漢世史官所續皆以史記為名迄乎東京著書猶稱漢記一作紀釋數語逓下至梁武帝又勅其羣臣上自太初下終齊室撰成通史六百二十卷其書自秦以上皆以史記為本而别採他説以廣異聞至兩漢已還則全録當時紀傳而上下通逹臭味相依又吳蜀二主皆入世家五胡及拓㧞氏列於夷狄傳大抵其體皆如史記其所為異者唯無表而已釋自此節起連述後代之擬史記者本節述通史也梁武貪慕史記之為勑撰遼濶之編也其後元魏濟隂王暉業譔人誤辯詳後注又著科録二百七十卷其斷限亦起自上古而終於宋年其編次多依放通史而取其行事尤相似者共為一科故以科録為號釋此節述科録也元暉貪慕史記之為亦著此遼濶之編也皇家顯慶中符璽郎隴西李延夀抄撮近代諸史南起自宋終於陳北始自魏卒於隋合一百八十篇號曰南北史其君臣流例恐當作别紀傳羣分皆以類相一無相字從各附於本國釋此節述南北史亦綜數代為一書者凡此諸作皆史記之流也釋已上三節是述案已下出議尋史記疆宇遼濶年月遐長而分以紀傳散以書表每論家國一政而胡越相懸叙君臣一時而參商是隔此其為體之失者也兼其所載多聚舊記一作紀原注謂採國語丗本國䇿等非按此注舊在雜言下時採一作挿雜言故故字俗本誤作細書綴於小注末使覽之者事罕異聞而語饒重出此撰録之煩者也釋凡此諸病皆由丗代懸隔載記龎雜所致葢是誡辭非貶辭也况通史以降蕪累尤深遂使學者寧習本書而怠窺新録且撰次無㡬而殘缺遽或作遂多可謂勞而無功述者所宜深誡也釋結言規橅史記者無其筆力貪其博逺非蕪即缺病所必致此通史一家所以當誡欲令作史者於記傳家以斷代為正下章漢書家是已按此章乃是著述家深識利病之言聞人通患率在誇多代逺文龎荒誕滋熾無田甫田詩人所以誡也史通葢為通史科録蕪編紛出濫觴寔由司馬故重誡之其别家於班正復為此評者不察認是詆諆遷史誤矣南北史之為體也析置紀傳越代黏連而一姓數傳多繫家不繫國於畫代為紊例設若八朝各立限斷如承祚國志之式則子元不以入史記家延夀亦不受此訶矣至歐陽五代史年祚太促不得以此例繩之嘗謂昔人所以甄綜古近通為一書者為其時有彚刋羣史定本故耳識者鑒此乃有十七史之刻嗣是而為廿一為廿二循代接編各還原袠既無纂合之勞亦免離散之患實自斯言發之劉氏豈非史部功臣採訪家人此句又見採撰及正史篇言巴西譙周以太史遷書周秦以上或采家人諸子不專據正􅀴於是作古史考云云是知改人為乗者非魯史舊名史記記見春秋家通史梁吴均傳均免職尋召撰通史起三皇迄齊代均草本紀世家功畢列傳未就卒又武帝紀太清二年通史成躬製賛序凡六百卷天情睿敏下筆成章科録北史魏宗室傳常山王遵曾孫暉雅好文學招集儒士崔鴻等撰録百家要事以類相從名為科録凡二百七十卷上起伏羲下迄於晉凡十四代表上之按本文誤以撰人為濟隂王元暉業郭延年辯之謂暉業所撰乃辨宗録非科録也史通既誤王伯厚玊海再誤云斷限亦曰限斷二字所始見斷限篇注南北史舊唐書李延夀傳延夀貞觀中補崇賢館學士嘗刪𥙷宋齊梁陳及魏齊周隋八代史謂之南北史凡一百八十卷讀書志延夀父大師嘗謂宋齊逮周隋分隔南北南謂北為索虜北謂南為島夷欲改正為編年未就而卒延夀究悉舊事更依馬遷體總序八代北二百四十年南百七十年為二史通志藝文略别立通史一門以延夀書與梁通史同列良是胡越漢書鄒陽獄中上梁孝王書云意合則胡越為兄弟不合則骨肉為讐敵參商左傳昭元年子産曰昔髙辛氏有二子伯曰閼伯季曰實沈居於廣林不相能也后帝遷閼伯於商丘主唐商人是因故辰為商星遷實沈于大夏主參唐人是因以服事虞夏故參為晉星漢書家者釋此為紀傳正家斷代為書始於此其先出於班固馬遷撰史記終於今上謂孝武帝依太史公語也自太初已下闕而不録班彪因之演成後記以續前篇釋彪書初槀猶非全代至子固乃斷自髙祖盡於王莽釋漢書全舉西京此二句為本章主句是斷限正式為十二紀十志八表七十列傳勒成一史目為漢書釋㸃題畢昔虞夏之典商周之誥孔氏所撰皆謂之書夫以書為名亦稽古之偉稱尋其創造皆準子長但不為世家改書曰志而已釋此釋書字名目及體製所由自東漢以後作者相仍皆襲其名號無所變革唯東觀曰記三國曰志然稱謂雖别而體制皆同釋自首至此總言紀傳為體皆準子長但起髙盡莽後史皆仍其斷代之式耳可悟前章致誡非貶辭也歴觀自古史之所載也尚書記周事終秦穆春秋述魯文一作史止哀公舊誤作定公紀年即竹書紀年不一作下非逮於魏亡史記唯論於漢始釋歴觀以下皆論斷之辭此先推言前史或累代連舉或一代不完從無斷限全代者如漢書者究西都之首末窮劉氏之廢興包舉一代撰成一書一作家釋唯漢書為斷代正體言皆精練事甚該宻故學者尋討易為其功釋此之易對史記之難自爾一作邇一作古迄今無改斯道釋章末總從斷代處下贊舊連下結尾今分出按紀傳家自隋唐以來經籍藝文諸志皆列史部首科謂之正史先馬次班此定例也劉氏以時近者易為功代逺者難為力有鑒於通史科録之蕪累故特標舉斷限借史漢二家以示適從云爾夾漈持論有意矯枉其言既悖至評者認此為乙馬甲班直不曉文義矣自孟堅有斷代之書自知㡬有無改班書之論向後諸史靡弗由之言出而為定式夫豈孟浪之言彪固漢書叙傳班彪字叔皮年二十遭王莽敗世祖即位於冀州天下雲擾著王命論有子曰固固以為漢紹堯運㠯建帝業至于六世史官乃追述功德私作本紀編於百王之末厠於秦項之列太初已後闕而不録故探篹前記綴緝所聞㠯述漢書起元髙祖終於孝平王莽之誅十有二世二百三十年綜其行事旁貫五經上下洽通為紀表志傳凡百篇按叙傳竟不及父彪續史事欺所生欺萬世糾班史者當以是為首欵後漢書本傳彪斷採前史遺事􅅖貫異聞作後傳數十篇東觀曰記書録觧題東觀漢記漢謁者僕射劉珍校書郎劉騊駼等撰初班固在顯宗朝嘗撰世祖本紀功臣列傳載記二十八篇至永初中珍騊駼等著作東觀撰集漢記其後盧植蔡邕馬日磾等皆嘗補續按外篇正史篇詳述其書宜叅看三國曰志晉書陳夀傳夀字承祚仕蜀為館閣令史及蜀平司空張華愛其才舉為孝亷除著作撰魏吴蜀三國志凡六十五篇紀年不逮魏亡謂竹書紀年年未盡魏哀而止正與漢書全代對照或譌不為下失之於是考兹六家商㩁千載盖史之流品亦窮之於此矣而朴散淳銷時移世異尚書等四家尚書春秋國語史記其體久廢所可祖述者唯左氏及漢書二家而已釋此六家總結也以配篇序故應另條單立舊連漢書家章末者非是按是篇如奕者開枰布子通領全局以該史家之體即以辨史體之家該體故備陳辨家在協用就於萹尾預作轉樞記言尚書而不著嵗序也記事春秋經而不詳顛末也國别國語而不歸典式也非編年非紀傳代逺史記而不立限斷也此所謂四家體廢者也若乃經年緯月叙時事則銓次分眀左傳紀志表傳舉一朝則起訖完具漢書此則所謂祖述惟有二家者矣即結夲篇六字即提下篇二字脈理連絡史通通部為全局即此可見史通通釋卷一
