body:
  text: 史通通釋卷十一無錫浦起龍撰外篇史官建置第一舊有注曰總十四條非也其文本通首一片循代分節可耳夫人寓形天地其生也若蜉蝣之在世如白駒之過隙發端庸淺猶且恥當年而功不立疾没世而名不聞上起帝王下窮匹庶近則朝廷之士逺則山林之客諒其於功也名也莫不汲汲焉孜孜焉夫如是者何哉皆以圖不朽之事也何者而稱不朽乎盖書名竹帛而已釋原史之所為作也史者千秋金鐃只從名心落想故曰庸淺向使世無竹帛時闕史官雖堯舜之與桀紂伊周之與莽卓夷惠之與跖蹻商冒俱弑父者之與曽閔但一作俱一從物化墳土未乾則善惡不分妍媸永滅者矣茍史官不絶竹帛長存則其人已亡杳成空寂而其事如在皎同星漢釋折出有史之功用用使後之學者坐披囊篋而神交萬古不出户庭而窮覽千載見賢而思齊見不賢而内自省若乃春秋成而逆子懼南史至而賊臣書其記事載言也則如彼其勸善懲惡也又如此由斯而言則史之為用其利甚博乃生人之急務為國家之要道有國有家者其可缺之哉故備陳其事編之於後釋末總括其功用按此一段似是儱侗總冒第言史之用重而無専注之語似於史官正史二篇皆可通用又其舉意出辭頗淺庸近俗宜可芟薙盖史之建官其來尚矣昔軒轅氏受命倉頡沮誦實居其職至於三代其數漸繁案周官禮記有大史小史内史外史左史右史之名大史掌國之六典小史掌邦國之志内史掌書王命外史掌書使乎四方左史記言右史記事曲禮曰史載筆大事書之於䇿小事簡牘而已大戴禮曰太子既冠成人免於保傅則有司過之史韓詩外傳云據法守職而不敢為非者太史令也斯則史官之作肈自黄帝備於周室名目既多職務咸異至於諸侯列國亦各有史官求其位號一同王者釋自首至此逺徴古來史職之名以及王朝侯國兼設之制至如孔甲尹逸名重夏殷史佚倚相譽髙周楚晉則伯黶司籍魯則丘明受經此並厯代史臣之可得言者降及戰國史氏無廢葢一無葢字趙鞅晉之一大夫爾一有猶字有直臣書過操簡筆於門下田文齊之一公子爾每坐對賔客侍史記於屏風至若秦趙二主澠池交㑹各命其御史書某年某月鼓瑟鼓缶此則春秋君舉必書之一本之字重二義也釋此層徴古昔史臣姓氏蹟略見於史傳者王朝侯國皆有然則作然而用官雖無闕而書尚有遺故史臣等差莫辨其序釋四語統繳下言諸職中太史尤重也皆就太史一職言之案吕氏春秋曰夏太史終古見桀惑亂載其圖法出奔商商太吕覽作内史向摰依吕覽作向摰舊本作髙摰誤見紂迷亂載其圖法出奔周晉太史屠黍見晉之亂亦以其圖法歸周又春秋晉齊太史書趙宣二崔襄二十五之弑鄭公孫黒强與於盟使太史書其名且曰七子昭二年上文所引皆不書年此三字疑衍晉韓宣子來聘觀書於太史氏見易象與魯春秋曰周禮盡在魯矣然則諸史之任太史其最優乎至秦有天下太史令胡母敬作博學章此則自夏迄秦斯職無改者矣釋徴諸古籍凡述史事皆稱太史可見諸名銜中太史尤為專職也此處當分節舊本連下便少斷制按此當為第一節是建置原始之正文宜至秦為截其前統徴史官名蹟其後專歸太史一官為漢法縁起也此篇本通首直下非分條體也循代為節從古先發端舊本劃條小注皆非原文並去之倉頡沮誦説文原叙黄帝之史倉頡見鳥獸蹏迒之迹初造書契漢獻紀沮儶注風俗通曰沮姓也黄帝史官沮誦之後衛恒四體書勢科斗古文勢序云昔在黄帝創制造物有沮誦倉頡者始作書契以代結繩盖覩鳥跡以興思也其字勢云黄帝之史沮誦倉頡眺彼鳥跡始作書契按荒略之世史官有無奚庸深究如上所列亦可据而言已郭黄諸本曽不知採此但執所謂歸雲集者硜硜辯駮大似不必孔甲尹逸舊注歸雲集云孔甲黄帝主書史之臣執青纂記言動惟實又史記云武王立於社南召公奭贊采師尚父牽牲尹佚筴祝按逸通佚疑即史佚今以二人屬夏殷豈别有據邪伯黶司籍見書志篇籍談注趙鞅直臣説苑昔周舎事趙簡子立於門三日簡子問之舎曰願為諤諤之臣墨筆操牘司君之過而書之日有記月有效歲有得也簡子說田文侍史孟嘗君傳孟嘗君待客坐語屏風後常有侍史主記君所與客語澠池㑹亷藺列傳趙王與秦王㑹澠池秦王酒酣請趙王鼓瑟秦御史前書曰某年月日秦王令趙王鼓瑟藺相如奉盆缻秦王秦王不懌為一擊缻相如召趙御史書曰某年月日秦王為趙王擊缻終古向摰吕覽先識凡國之亡也有道者必先去夏太史令終古出其圖法執而泣之夏桀迷惑愈甚乃出奔如商殷内史向摰見紂之愈亂迷惑也於是載其圖法出亡之周晉太史屠黍見晉公之驕而無德義也以其圖法歸周髙誘解晉出公之太史也且曰七子左昭元鄭為游楚亂故鄭伯及其大夫盟於公孫段氏罕虎公孫僑公孫段印段游吉駟帶私盟於閨門之外實薰隧公孫黒强與於盟使太史書其名且曰七子博學章漢蓺文小學家倉頡七章者秦丞相李斯所作也爰厯六章者車府令趙髙所作也博學七章者太史令胡母敬所作也文字多取史籀篇而篆體頗異所謂秦篆者也漢興之世武帝又置太史公位在丞相上以司馬談為之漢法天下計書先上太史副上丞相叙事如春秋及談卒子遷嗣遷卒宣帝以其官為令行太史公文書而已釋跟前太史說下徴諸漢初職專記載最為隆重其後漸輕尋自古太史之職雖以一無以字著述為宗而兼掌厯象日月陰陽管窺天器一作度數司馬遷既殁後之續史記者若褚先生劉向馮商揚雄之徒並以别職來知史務於是太史之署非復記言之司故張衡單颺王立髙堂隆等其當官見稱唯知占候而已釋申明上意謂記載反屬他職而本職反專占候矣按此為第二節愚意分節之法宜從三代為界前用逺古作頭後用漢興居首分割尤為定當也史通通部論史而任史職者史官也故外篇首詳其建置意綦重焉漢興司馬氏父子相繼為太史公而史記始作故太史一官逺溯終向下逮談遷名又綦重焉至孝宣之後專司占候而其名始輕官亦尋改自是蘭臺東觀著作之名以漸改稱矣此節實史氏職名沿革之闗鍵也馬貴與象緯考序本此武帝又置至行文書而已並太史公自序如淳注之文按如淳據衞宏漢儀注云云臣瓚非之以為百官表無太史公有太史令索隠因之以為公者遷所著書尊其父云公也而所作實遷之詞衞宏稱位丞相上謬也正義又非之曰虞喜志林云古者主天官者皆上公自周至漢其職轉卑然朝㑹坐位猶居公上尊天之道也諸說相非不定録以備攷兼掌厯象前注已顯又按太史公自序談為太史公曰余自上世嘗顯功名於虞夏典天官事報任安書文史星厯近乎卜祝之間後漢百官志太史令一人六百石本注曰掌天時星厯注漢官曰太史待詔三十七人分治厯龜廬宅日時易筮典禳雨醫等事禇劉馮揚知史務史記孝武紀注韋稜曰褚顗家傳云少孫宣帝時為博士事大儒王式故號為先生續太史公書時漢蓺文志孝武建藏書之䇿置寫書之官至成帝詔光禄大夫劉向挍經傳諸子又向本傳採取詩書所載賢貞及孽嬖者序次為列女傳及採傳記行事著新序說苑又蓺文志馮商續太史公七篇韋昭曰馮商受詔續太史公十餘篇在班彪别録商字子髙師古曰七略云商與孟栁俱待詔頗序列傳未卒也又儒家者流盖出於司徒之官助人君明教化者揚雄所序三十八篇太𤣥法言云云皆按向雄知史務又見正史篇但如志傳所稱不言知史務未詳何據張單王髙知占候後漢張衡傳衡字平子安帝徴拜郎中再遷太史令遂研覈陰陽作渾天儀著靈憲算罔論遷太史令餘見書志篇又方術傳單颺舉孝亷稍王立未詳魏志髙堂隆字升平魯髙堂生後也明帝即位為給事中遷侍中領太史令注魏略曰太史推步為太和厯帝以隆學問優深天文又精詔與尚書郎楊偉太史待詔駱禄參共推挍當王莽代漢改置柱下五史秩如御史聽事侍傍記跡言行盖效古者動則左史書之當有言則右史書之六字今缺此其義也按此為第三節莽何足志而班史百官表言王莽簒位慕從古官盖其時多所變改史職名銜亦見紛更史既載之故劉亦及之柱下五史王莽傳居攝元年莽置柱下五史秩如御史聽政事侍旁記疏言行漢氏中興明帝以班固為蘭臺令史詔撰光武本紀及諸列傳載記又楊子山為郡上計吏獻所作哀牢傳為帝所異徴詣蘭臺斯則蘭臺之職一有者字盖當時著述之所也自章和已後圖籍盛於東觀凡撰漢記此當有者字相繼在乎其中而都為舊譌謂著作任著作之務也時未立著作之名故謂字誤竟無它稱按第四節志後漢也蘭臺東觀著作之所也班固楊子山著作之人也前漢百官表不載史職而有太史公書可據後漢更無專稱故但以其所其人證之子山於史未見成書然能為哀牢立傳亦可以驗史才矣史通故與班氏並舉蘭臺令史前漢百官表御史大夫秦官有兩丞一曰中丞在殿中蘭臺掌圖籍秘書後漢百官志蘭臺令史六百石本注曰掌奏及印工文書按令史自太尉司徒以下諸府屬多有之非史局屬員之專稱楊子山後漢書楊終字子山成都人年十三為郡小吏顯宗徴詣蘭臺拜挍書郎按傳無哀牢傳之文論衡佚文篇子山為上計吏見三府作哀牢傳不成歸郡作上孝明竒之徴在蘭臺後漢地理志哀牢永平中置故牢王國按今為雲南永昌府東觀見前又見後節當魏太和中始置著作郎職𨽻中書其官即周之左史也晉元康初又職𨽻秘書著作郎一人謂之大著作專掌史任又置佐著作郎八人宋齊已來以佐名施於作下原注改佐著作郎為著作佐郎釋此上述設官舊事佐郎職知博採正郎資以草傳如正佐有失則秘監職思舊譌作司其憂其有才堪撰述學綜文史雖居他官或兼領著作亦有雖為秘書監而仍領著作郎者釋此層通之以兼掌見才難之意若中朝曹魏西晉之華嶠陳壽陸機束晳江左專稱東晉之王隱虞預干寶孫盛宋之徐爰蘇寶生梁之沈約裴子野斯並史官之尤美著作之妙選也而齊梁二代又置脩隋志作撰史學士陳氏因循無所變革若劉陟一作涉誤謝昊顧野王許善心之類是也釋此層標舉名其職者以證之按第五節述魏晉及南朝也著作之名始於此其列出諸人氏名意不在表其人意在舉其名銜證當時職制耳中秘著作晉書職官志著作郎周左史之任也漢東京圖籍在東觀故使名儒著作東觀尚未名官魏明帝太和中始有其官及晉惠帝元康二年詔曰著作舊屬中書而秘書既典文籍今以中書著作為秘書著作於是改𨽻秘書省其大與佐一人八人悉同本文隋百官志秘書省著作佐郎人數亦同梁初又有撰史學士束晳晉書夲傳晳字廣微漢疎廣後也王莽末去疎之足改姓焉少遊國學張華召晳為掾轉佐著作郎撰晉書帝紀十志遷博士著作如故蘇寶生正史篇孝建初勅南臺侍御史蘇寶山續造諸傳元嘉名臣皆其所撰寶山被誅云云按寶生譌作寶山正史篇舊本如此今刋正有注劉謝顧許隋經籍志齊紀十卷劉陟撰唐舊志作齊書八卷新志作十三卷又隋志梁書四十九卷梁中書郎謝昊撰本一百卷唐志作三十四卷陳書顧野王字希馮吴人後主在東宫除太子率更令尋領大著作掌國史知梁史事撰通史要略一百卷國史紀傳二百卷未就而卒又文學傳許亨字亨道領大著作子善心早知名北史文苑善心字務本對䇿髙等授度支郎中補􅁧史學士善心述成父志修續家書其序傳末述著作之意曰自入京邑隨見補葺略成七十卷凡稱史臣者皆先君所言下稱名案者皆善心補闕所按本節所引十六人或見前卷或無傳而有著史書略可考見至若偏隅僭國夷狄偽朝求其史官亦有可言者釋起四句總領蜀吳及諸胡案蜀志稱王崇補東觀許盖掌禮儀又卻正為秘書郎廣求益部書籍斯則典挍無闕屬辭有所矣而陳夀評云蜀不置史官者得非厚誣諸葛乎别有曲筆篇内篇第二十五言之詳矣釋已上言蜀吳歸命侯舊脫侯字時有左右二國史之職薛瑩為其左華覈為其右又周處自左國史遷東觀令以斯考察則其班秩可知釋已上言吳此二國所謂偏隅也僭字貼吳説舊本此處截叚非偽漢嘉平初劉聰年號公師彧以太中大夫領左國史撰其國君臣紀傳前涼張駿時劉慶遷儒林郎中常侍在東苑撰其國書蜀李義門訂本有李字他本無與西涼二一作三非朝記事委之門下南涼主烏孤舊作孫誤初定霸基欲造國紀以其參軍郭舊作郎恐譌韶為國紀祭酒使撰録時事自餘偽主一譌作事多置著作官若前趙之和苞後燕之董統是也釋已上錯舉五胡十六國有可徴者及之其無者不及也此總所謂偽朝也按第六節旁及偏小僣偽最為周宻舊本截作二條則於節首四提句不全故當合之又諸評不知以人證職而泛覈史才浮文妨要是謂顧子失母王崇許盖陳夀蜀志併松之注皆無考而劉氏顧云志稱所稱果何志邪或謂夀又撰蜀古志倘載之耶然言古則不及三國時人明矣惟常璩華陽國志有述作王崇名見卷末官為蜀守而不言曽補東觀至掌儀許葢仍亦絶無其人也懸置之以俟後有補者抑嘗見高江村士奇天禄識餘有考史一條其言蜀史則取此立論然漫襲其文不書所出至所出何本了不推尋也竊嘅讀書底裏求到地者天下鮮矣郤正為秘書蜀志本傳正字令先弱冠能屬文入為秘書吏轉令史遷郎至令又孟光傳後進文士秘書郎郤正數從光諮訪蜀不置史官蜀後主評國不置史注記無官是以行事多遺災異靡書諸葛亮雖達於為政凡此之類猶有未周焉歸命侯呉後主也見摸擬篇薛左華右吳志薛綜傳綜子瑩字道言為秘府中書郎孫浩初領少傅以事徙廣州右國史華覈疏留之皓召瑩還為左國史又華覈傳覈字永先武進人孫皓即位後入東觀今領右國史周處左史晉書本傳處仕吳為東觀左丞餘見書志篇後論公師彧見晉書載記劉淵聰二傳止書太中大夫無領左史撰記傳之文劉慶見晉書張軌傳軌孫駿時載有從事劉慶諫討辛晏語不及東苑撰史事叢書崔鴻錄畧有云命西曹掾集閣内外事付索綏著凉春秋亦不及劉慶也蜀李西涼蜀李者國號成後改稱漢正史篇云常璩撰漢書十卷後入晉秘閣改為蜀李書故此云蜀李也晉載記蜀李雄興學校置史官門録畧西凉李暠起静恭堂以議朝政立泮宫増高學士之按劉云二朝記事委門下當在其時也南凉郭韶晉載記南凉傳秃髮烏孤稱武威王梁昶韓疋張昶郭韶中州之才令官方授才咸得其所按舊本作郎韶疑即郭韶也但本傳與叢書録畧皆不載國紀祭酒官和苞見晉載記劉曜傳苞與喬豫諫營夀陵曜恱封為平輿子隋經籍志漢趙記十卷和苞撰董統晉載記後燕傳及録畧皆缺其人按公師彧以下皆證諸國有史官也事當具十六國春秋而崔本已亡但與正史篇十六國一條互證之畧可見矣元魏初稱制即有史臣雜取他官不恒或作常厥職故如崔浩髙閭之徒唯知知如御史知雜之知著述而未列名號其後始於秘書置著作局正郎二人佐郎四人其佐三史者三史一作參史下同未詳不過一二而已普泰前廢帝元或譌作晉秦以來三史稍替别置修史局其職有六人釋此上徴其建置當代都之時史臣毎上奉王言下詢國俗兼取工於翻譯者來直或譌置史曹及洛京之末孝文遷洛朝議又以為國史當專任代人謂部人不宜歸之漢士於是以谷纂郭本注以綦儁易之山偉更主文籍凡經二十餘年其事闕而不載專事粉飾隆平非復稱信史矣釋此層述其任用按第七節述元魏史職也置郎略倣魏晉而添設翻譯則國語傳偏任代人則史事廢稍寓褒貶焉元魏史臣官氏志天興四年罷外蘭臺御史總屬内省其太和中百官著令秘書監在從第二品中崔浩高閭崔浩見直書篇魏書髙閭傳閭字閻士早孤文才儁偉本名驢司徒崔浩見而竒之乃改為閭而字之徴拜中書侍郎領東徐州刺史以功進爵為侯加昭武將軍為中書令委以機宻軍國書檄詔令高允之流稱為二高谷纂魏書谷渾傳渾昌黎人曽孫纂字靈紹領侍御史稍遷著作郎又監國史不能有所緝綴郭注以綦儶易谷纂儶字檦顯其先代人散騎常侍驃騎大將軍與山偉合傳山偉魏書本傳偉字仲才其先代人領著作郎除安東將軍秘書監仍著作初􅈛朱兆之入洛官守奔散國史典書高法顯宻埋史書故不遺落偉自以為功訴求爵賞遂封東阿伯按本節國史專任代人六句並櫽括偉傳之文其中儶偉並稱與傳合郭注殊有見髙齊及周迄於隋氏其史官以大臣統領者謂之監修國史自領則近循魏代逺效江南參雜其間變通而已釋統述三朝如此唯周建六官改著作之正郎為上士佐郎為下士名謚當作號雖易而班秩不殊釋字文襲古周官故抽述如魏收之擅名河朔高齊栁虬之獨步闗右宇文周王劭魏澹展效於開皇之朝諸葛潁劉炫宣功於大業之世亦各一時也釋各舉其人以徵之按第八節述髙齊宇文周而并及於隋也前辨職篇云大臣領史局自晉康帝始而本篇於晉代不言至此始見乍疑前後不符及觀下文近循魏代逺效江南之云乃知文章有互藏之用凡研辨古制必彼此叅詳愈得定凖書固不可以輕心掉也上士下士隋百官志周太祖方偶粗定改創章程遠師周之建職其所制班序内命上士三命下士一命注内命謂王朝之命栁虬周書本傳虬字仲蟠不事容飾馮翊王元季海徵為行臺郎中掌丈翰因使見太祖被留虬上疏言古者立史官非但書事所以為監誡也漢魏以還宻為記註無益當時縱能直筆人莫之知何止物興横議亦且異端互起故班固致受金之名陳夀有求米之論伏請諸記事者當朝顯言其狀然後付之史閣庶令是非明著得失無隱事遂施行秘書雖領著作不叅史事自虬為丞始令兼掌焉魏澹見本紀篇魏著作注諸葛潁隋書文學傳潁字漢建康人煬帝即位遷著作郎帝嘗贈潁詩曰實録資平允傳芳導後昆其見待遇如此撰鑾駕北巡幸江都道里洛陽古今等記劉炫見覈才篇注又隋儒林傳炫與著作郎王劭同考修國史又與諸術者修天文律歴兼於内史省定羣言内史令李德林甚禮之炫嘗曰省官不如省事省事不如省心牛𢎞甚善其言暨皇家之建國也乃别置史館通籍禁門西京則與鸞渚為鄰東都則與鳯池相接而一無而字館宇華麗酒饌豐厚得厠其流者實一時之美舉釋首述國典敦崇史職密近清華至咸亨年以職司多濫髙宗喟然而稱曰朕甚懵焉乃命所司曲加推擇如有居其職而闕其才者皆不得預於修撰原注詔曰修撰國史義存典實自非操履忠正識量該通才學有聞難堪斯任如聞近日以來但居此職即知修撰非唯編緝訛舛亦恐洩漏史事自今宜遣史司精簡堪職不修史人灼然為衆所推者録名進内自餘雖居史得輒聞見所修史籍及未行用國史等之事按此注一本混作大書非是由是史臣拜職多取外司著作一曹殆一作始成虚設此四句即制詔中雖居史職不得輒聞見所修等句之意凡有筆削畢歸於餘館語意不甚清豁恐有譌字釋中段述事局之大槩始自武德迄乎長夀其間若李仁實以直辭見憚敬播以叙事推工許敬宗之矯妄牛鳯及之狂惑此其善惡尤著者也釋未亦證舉任職之人不此獨善惡兼舉由其胸中皁白積而化一涉筆輒露圭角是其少涵養處非本篇正義也按第九節述本朝史局之制也叙盛典則備其辭叙事局則略其槩盖志體應爾至其節尾之未融小注論之矣史官建置正局盡此史官通籍禁門見内篇辨職篇鸞渚鳯池即謂鸞臺鳯閣舊唐志龍朔二年改門下省謂東臺中書省為西臺太后光宅元年改門下為鸞臺中書為鳯閣神龍初復舊按兩省之名起魏晉間門下則黄門給諫遺補等官屬之杜詩晚出左掖即此中書則主書通事舍人等官屬之開元中又號紫薇省兩省並近禁門故亦通謂之北省南則尚書省也又按文兼兩京言武后臨朝在東京也程大昌雍錄多誤李仁實舊唐令狐德棻傳自武德已後有鄧世龍顧𦙍李延夀李仁實前後修撰國史為當時所稱仁實頓􅉌人官左史正史篇仁實續撰于志寧許敬宗李義府等傳載言記事見推直筆敬播唐儒學傳敬播蒲州人貞觀初進士時顔師古孔頴逹撰次隋史詔播詣秘書内省叅纂􅄪遷著作佐郎兼修國史又與令狐徳棻等撰晉書大抵凡例皆播所發也房𤣥齡嘗稱播陳夀之流許敬宗舊書本傳敬宗善心子貞觀中除著作郎兼修國史龍朔中拜太子少傅自掌知國史記事阿曲虚美隱惡高祖太宗兩朝實錄其敬播所修者多詳直敬宗以己愛憎曲事刪改論者􅀹之牛鳯及新舊書俱無專傳王訓故牛鳯及長夀中撰唐書自武徳終𢎞道為百有十卷按此書唐藝文志不録宋晁陳鄭馬諸公亦莫之及大抵其人其書見棄於有道乆矣又案晉令書名著作郎掌起居集注彚集而注記之撰録諸言行勲伐舊載史籍者釋本節另述起居注一職首述晉制則兼編舊籍元魏置起居令史毎行幸讌㑹則在御左右記一作紀録帝言及賓客詶對後别置修起居注二人多以餘官兼掌釋至元魏則專掌當時記録但多他官兼職耳至隋以吏部散官及挍書正字嫺於述注者修之納言監領其事煬帝以為古有内史外史今既有著作是外史宜立起居是内史遂置起居舍人二貟職𨽻中書省如庾自直崔濬祖虞世南蔡允恭等咸居其職時謂得人釋隋代起居之職則始無正貟至焬帝乃始專置皇家因之又加置起居郎二員職與舍人同此之舍人亦曰起居舍人每天子臨軒侍立於玉階之下郎居其左舍人居其右人主有命則逼階延首而聽之退而編錄以為起居注龍朔中改名左史右史今上即位仍從國初之號焉髙祖太宗時有令狐徳棻吕才蕭鈞褚遂良上官儀髙宗則天時有李安期顧𦙍髙智周張太素凌季友斯並當時得名朝廷所屬者一無者字也釋唐制起居郎與舍人同職分侍夫起居注者編次甲子之書至於䇿命章奏封拜薨免莫不随事記錄言惟二字恐當作載言詳審凡欲撰帝紀者皆稱恐是藉字之偽王本作因之以成功即依義門訂本一無即字一誤作命字今為載筆之别曹立言之貳職故略述其事附於斯篇釋我此一層特為此官作注脚也按第十節别述起居注一職所謂載筆之别曹也載筆者開局纂脩之員已前所述皆是起居注則專掌侍朝記錄杜子羙詩云地分清切任才賢舍人退食收封事正詠是官也以其與泛稱史官者職有攸分故曰述附於斯庾崔虞蔡隋文學傳庾自直大業初授著作郎性恭慎不妄交逰以本官知起居舍人事唐書姚思亷傅附隋煬帝時詔與起居舍人崔濬祖修區㝢圖志又虞世南傳世南字伯起餘姚人隋大業中累官秘書郎煬帝疾其峭直弗甚用允又文藝傳蔡允恭仕歴起居舍人煬帝遣教宫人恭恥之數稱疾授内史舍人俾入宫固辭等又按隋書虞綽待詔恩傳云綽與虞世南虞自直蔡允恭常居禁中文翰聁隆洽郎左舍人右唐百官志唐之官制大扺皆沿隋故門下省之屬起居郎二人從六品上掌録天子起居法度後復置起居舍人二人從六品上掌録如記事之制天子居正殿則郎居左舍人居右有命俯陛以聽退而書之若仗在紫宸内閣則夾香案分立殿下直第二螭首和墨濡筆皆即㘭處時號螭頭令狐德棻唐書本傳德棻博貫文史武德初為起居舍人遷秘書丞建言近代無正史梁陳齊周隋事修撰之原自德棻發之吕才唐書本傳貞觀時祖孝孫増損樂律王珪魏徴盛稱才製尺諧契即召直𢎞文舘帝病隂陽家書多偽惡世益拘畏命才刪落煩訛掇可用者才於持論儒而不俚按本傳闕書起居官蕭鈞唐書蕭瑀傳瑀從子鈞永徽中累遷諫議大夫𢎞文館學士左武候屬盧文操盜庫財高宗以當自盜罪死鈞曰恐天下謂陛下重貨輕法任喜怒帝曰真諫議也按亦闕書起居官禇遂良唐書本傳遂良字登善貞觀中累遷起居郎工𨽻楷帝曰卿記起居人君得觀之否對曰今之起居古左右史也善惡必記戒人主不為非法未聞天子自觀史也帝曰朕有不善卿必記邪對曰臣職載筆君舉必書劉洎曰使遂良不記天下之人亦記之矣上官儀唐書本傳儀字㳺韶涉貫墳典貞觀初擢進士第授𢎞文館直學士遷秘書郎太宗毎屬文遣儀視藁轉起居郎高宗時武后得志深惡儀許敬宗構儀大逆死自禇遂良等元老屠覆獨儀納忠自是政歸於后而帝拱手矣李安期唐書李百藥傳百藥七嵗能屬文子安期亦七嵗屬文父貶桂州遇盜將加刃安期泣請代盜釋之貞觀初為符璽郎高宗即位遷中書舍人尋同東西臺三品自德林至安期三世掌制誥顧𦙍令狐徳棻傳附𦙍呉人父覽隋秘書學士𦙍永徽中起居郎兼修國史以撰太宗實録勞加朝散大夫𢎞文館學士論次國史終司文郎高智周唐書本傳智周晉陵人第進士擢秘書郎𢎞文館直學士三遷蘭臺大夫儀鳯初進同中書門下三品是時崔知温等修國史智周監莅致仕卒年八十二張太素凌季友太素見言語篇季友無傳又案詩􅆁風静女之三章君子取其彤管夫彤管者女史記事規誨之所執也釋就詩指出女史之古名古者人君外朝則有國史内朝則有女史内之與外其任皆同故晉獻惑亂驪姫夜泣床第之私房中之事不得掩焉楚昭王讌逰蔡姫對以其願王顧謂史書之此十二字舊夲無之必是脱文無此十二字不成語矣蔡姬許從孤死矣夫宴私而有書事之冊葢受命者即女史之流乎釋就晉楚事證出宴私有記則可見女史之置職至漢武帝時有禁中起居注明徳馬皇后撰明帝起居注凡斯著述似出宫中求其職司未聞位號釋又以兩漢禁中撰述為證隋世王劭上䟽請依古法復置女史之班具錄内儀付於外省周禮宫人女史之職掌於天官此䟽猶存此意文帝不許遂不施行釋終以隋世奏置不行結之舊本此處連下節非是按第十一節更是空中建議之詞謂女史亦當修職古有證据卒莫興行可惜也該舉史職至此備悉包羅識議卓絶攷唐志内官如六尚司記掌言司簿典闈掌籍等職皆載有女史員額史通何不及之葢所謂錄内儀付外省之制既格不行則女史雖設猶不設也彤管毛傳古者后夫人必有女史彤管之法鄭箋彤管筆赤管也按静女四句本左定九傳注之文驪姬夜泣外傳晉語優施教􅌐姬夜半而泣謂公曰君盍殺我無以一妾亂百姓又曰君盍老而授之政彼得所索乃可釋君公曰不可我将圗之蔡姫許從列顧女傳楚昭王燕逰蔡姫在左越姬叅右乃二姬曰樂乎願與子生若此死若此蔡姫曰婢子之身乃比于妃嬪固願生同樂死同時王顧謂史書之蔡姬許從孤死矣至漢武帝八句其文與隋經籍志起居注述語畧同再與載文篇注叅看大抵自古史官其沿革廢置如此釋二句是總統兠結建置之文夫仲尼修春秋公羊高疑脫穀梁赤作傳漢魏之陸賈魚豢晉宋之張璠范曄雖身非史職而私撰國書若斯人者有異於是故不復詳而録之釋以官非史職而史有成書者終焉按第十二節兩句作一截是為總收八句另一截是為以不詳詳之蔑復遺餘矣夫為史之道其流有二何者書事記言出自當時之簡勒成刪定歸於後來之筆然則當時草創者資乎博聞實録若董狐南史是也後來經始者貴乎儶識通才若班固陳夀是也釋先指其分必論其事業前後不同然相須而成其歸一揆本音上聲釋卒歸於同按第十三節判出當時後日之二流滙為相須成業之一揆以此歸宿史事亦辨晳亦融洽如畫沙如連璐而論文於兜羅收裹䖏更復矩叠規重觀夫周秦已徃史官之取人其詳不可得而聞也至於漢魏已降則可得而言然多􅀼虚號有聲無實釋此八字是末節之主案劉後漢曹魏志二史皆當代所撰能成其事者葢唯劉珍蔡邕王沈魚豢之徒耳而舊史載其同作非止一家如王逸阮籍亦預其列一譌作例且叔師研尋章句儒生之腐者也嗣宗沈湎麹蘖酒徒之狂者也斯豈能錯綜一作措置時事裁成國典乎釋借二史所列逸籍二人為附名起例而近代趨競之士尤喜居於史職至於措辭下筆者十無一二焉既而書成繕冩則署名同獻爵賞既行則攘袂争受遂使是非無準真偽相雜是非真偽指列名言生則厚誣當時死則致惑来代而書之譜傳借一作以為羙談載之碑碣増其壮觀舊本既而自厯行事稱其所長則云某代著某書某年成某史加封若干户獲賜若干段諸如此説徃徃而有遂使讀者皆以為名實相符功賞相副沓此段一本作夹注一本作正文按若作正文其文複無理作夹注者亦誤既非䟽體又無别議亦無既而二字起法細玩之葢是初本如此後来改就今本失於塗汰編書者混綴其間實乃羡文耳昔魏帝有言一脫言字舜禹之事吾知之矣此其舊作則効歟釋引言取義譏其無實盜名也末節葢嘅憤之辭按此為篇尾末節其言仍與自叙忤時一合相熟處難忘習氣如此節内細書反覆研辨悟到失汰羡文私喜得解自謂有功古人論史必原職史之官猶買珠并買其匵也故首外篇焉其為體也主考稽其為文也主叙述與史家職官志同方為杜鄭馬三通發軔通觀之有提有束有挨編有抽并元元本本一氣呵成烏得以條列之例例之王逸後漢文苑傳逸字叔師順帝時為侍中著楚辭章句行於世賦誄雜文凡二十一篇按逸列名史事未詳阮籍晉書本傳籍字嗣宗父瑀魏丞相掾籍嗜酒能嘯魏晉之際名士少有全者由是不與世事酣飲為常聞步兵厨營人善釀有貯酒三百斛乃求為步兵校尉又王沈傳沈與阮籍共撰魏書魏帝有言魏志文紀注魏春秋曰帝升壇禮畢顧謂羣臣曰舜禹之事吾知之矣史通通釋卷十一
