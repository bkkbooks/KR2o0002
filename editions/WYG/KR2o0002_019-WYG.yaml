body:
  text: 史通通釋卷十九無錫浦起龍撰外篇漢書五行志錯誤第九班氏著志牴牾者多在於五行蕪累尤甚今輙條其錯繆定為四科一曰引書失宜二曰叙事乖理三曰釋災多濫四曰古學不精又於四科之中疏為雜目一作志非類聚區分一作别編之如后按是篇彊半撿舉錯誤如所指遺脫複沓淆訛糅雜之類皆是至第三科帶糾傅㑹尤為法言第一科引書失宜者其流有四一曰史記左氏交錯相併二曰春秋史記雜亂難别三曰屢舉春秋言無定體四曰書名去取所記不同其志叙言之不從也先稱史記周單襄公吿魯成公曰晉將有亂又稱宣公六年鄭公孫曼滿與王子伯廖語欲為卿兩引並在志中上仿増注所在用便繙撿後此案宣公六年自左傳所載也夫上論單襄則持史記以標首下列曼滿則遺左氏而無言遂令讀者疑此宣公亦舊作上出史記而不或作下誤云魯后莫定何邦是非難悟進退無準此所謂史記左氏交錯相併也按春秋以魯紀年誰不知宣公為魯君者然既先列他書而踵事續叙則固當於宣公之上加春秋魯三字此書法定律也單襄吿魯史記世家周單襄公與晉卻錡卻犫卻至齊國佐語告魯成公曰晉將有亂三卻其當之虖曼滿語左傳宣六鄭公子曼滿與王子伯廖語欲為卿伯廖吿人曰無徳而貪其在周易豐之離弗過之矣間一歳鄭人殺之志云史記成公十六年公㑹諸舊譌作齊侯于周在志中上案成公者即魯侯也班氏凡説魯之某公皆以春秋為冠何則春秋者魯史之號言春秋則知公是魯君一作公今引史記居先成公在下書非魯史而公捨魯名膠柱不移守株何甚此所謂春秋史記雜亂難别也按史記成公四字如何膠并判語如讞然此一事班志之誤更不止此附悉注中㑹于周本志史記成公十六年公㑹諸侯于周單襄公見晉厲公視逺歩髙告公曰晉將有亂魯侯問天道人故對曰吾非瞽史焉知天道吾見晉君之容殆必禍者也按此㑹史記周簡王紀及魯晉二世家皆不載左氏成十六經傳亦不書其文乃在外傳周語下卷然亦不言成十六年但曰柯陵之㑹云云是則史記成公以下十三字乃班志自撰之文本當云國語而誤書史記也又注柯陵之盟在成十七年杜注柯陵鄭西地亦非㑹于周也案班書為志本以漢為主在於漢時直記其帝號諡耳至於它代則云某書某國君此其大例也至如叙火不炎上具春秋桓公十四年次叙稼穡不成直云嚴公原注嚴公即莊公也漢避明帝諱故改曰嚴注舊在後今移置首見處二十八年而已兩引並在志之上夫以火稼之間别書漢莽之事年代已隔去魯尤踈洎乎改説異端仍取春秋為始而於嚴公之上不復以春秋建名遂使漢帝魯公同歸一揆必為永例理亦可容在諸異科事又不爾求之畫一其例無恒一作常此所謂屢舉春秋言無定體也按此所攻在例不畫一故曰屢舉無定體火稼之間本志前言火失其性首舉其文曰春秋桓公十四年八月壬申御廩災已下厯述火事至漢平帝末髙祖原廟災明年莽居攝而止其下更端言稼穡不成乃舉嚴公二十八年冬大水亡麥禾之文中間隔越甚多其前春秋二字管不及此也案本志叙漢已前事多略其書名至於服妖章初云晉獻公使太子率師佩之金玦續云鄭子臧好為聚鷸之冠在志中上此二事之上每加左氏為首夫一言可悉而再列其名省則都捐繁則太甚此所謂書名去取所記不同也按合前條觀之彼以偶脫春秋為軼例此以連綴左氏為冗筆故云去取不同本寧李氏曰古人讀書細心一字不肯放過觀此數條可見珮金玦左閔二晉獻公使太子申生帥師公衣之偏衣佩之金玦後四年申生縊聚鷸冠左僖二十四鄭子臧好聚鷸冠鄭文公惡之使盗殺之第二科叙事乖理者其流有五一曰徒發首端不副徴驗二曰虚編古語討事不終三曰直引時談竟無它述四曰科條不整尋繹難知五曰標舉年號詳略無準志曰左氏昭公十五年晉籍談如周葬穆后既除䘮而燕傳作宴下同叔向曰王其不終乎吾聞之所樂必卒焉今王一歳而有三年之䘮二焉於是乎與䘮賔燕樂憂甚矣禮王之大經也一動而失二禮無大經矣將安用之在志中上案其後七年王室終如羊舌所説此即其效也而班氏了不言之此所謂徒發首端不副徴驗也按前之引言既徴其所料後之書事不要其所終有頭無尾故糾之三年之䘮二昭十五六月王太子夀卒秋八月王穆后崩叔向曰王一歳而有三年之䘮二焉注天子絶期唯服三年故后雖期通謂之三年顧炎武日知録禮為長子三年妻䘮雖期年而傳曰父必三年然後娶逹子之志也是亦有三年之義愚謂天子自絶期后䘮自三年義本兩行耳志云左氏襄公二十九年晉女齊語智伯曰齊髙子容宋司徒皆將不免子容專司徒侈皆亡家之主也專則速及侈則將以力斃九月髙子一作止出奔北燕在志中上所載至此更無他説案左氏昭公二十年宋司徒奔陳而班氏採諸本傳直寫片言閲彼全書唯徵半事遂令學者疑丘明之説有是有非女齊之言或得或失此一多明字所謂虚編古語討事不終也按此條李本寧評最明評曰髙止即髙子容華定即宋司徒二人並書宜雙收以足前志而單徴髙止此叙事逗漏處子容專司徒侈傳髙子容與宋司徒見知伯女齊相禮賔出司馬侯言於智伯曰二子皆將不免子容專司徒侈皆亡家之主也專則速及侈將以其力斃專則人實斃之將及矣杜注為此秋髙止奔燕昭二十年華定出奔陳傳按司馬侯即女齊志云成帝於鴻嘉永始之載好為微行置私田於民間谷永諫曰諸侯夢得田占為失國而况王者蓄私田財物為庶人之事乎在志中上已下弗云成帝悛與不悛谷永言效與不效諫詞雖具諸一作而事闕如此所謂直引時談竟無它述者也按不書悛不書効斷章取義之書則可也班之此志而文惟半至幾成虚設矣鴻嘉永始荀悦漢紀成帝鴻嘉二年行幸雲陽大司馬音上言陛下即位十五年繼嗣不立而日夜出遊外有微行之害内有疾病之憂是時谷永亦上疏諌按成帝十三年改元鴻嘉十七年改元永始其述庶徴之恒寒也先云釐釐即僖也有原注在雜駮篇公十年冬大雨雹今志作雪疑唐初本作雹隨載劉向之占次云公羊經曰大雨雹續書董生之解在志中下案公羊所説與上奚殊而再列其辭俱云大雨雹而已一脫已字釋已上專指志中釐公十年至專壹之政一段而言又一改作入非此科始一脫始字一作乂字言大雪與雹繼言殞霜殺草起自春秋訖一作終乎漢代其事既盡仍重叙雹災並在志中下分散相離斷絶無趣釋此層統本志前後起自劉歆㠯為大雨雪及雨雹殞霜至蜚鳥死一長片千六百字而言夫同是一類而限成二條二句指釐十年首尾紛拏而舊脱而字章句錯糅此統指全文此所謂科條不整尋繹難知者也按此條評家叢刺實未剖疏剖疏之須兩截看前一截先舉左氏釐十年合公羊經所言雨雹以為之的後一截乃統舉全文謂雪雹霜三者忽彼忽此文不歸類始於釐十之前先言桓雪而隨以釐雹間之矣其下復間之雪事焉忽又間之霜事焉後又還而述雹焉故曰科條不整也評者但摘雹字之訛局於釐十年之一事不復從長片章法處加詳是猶覩一指而失肩背也三傳中同經異字如君氏尹氏入郢入楚之類未易一二數傳寫不凖流轉靡常而謂子元不識雪字雹字恐未足以相服也夫公羊雹而左雪亦流轉之譌也則或左經雪而漢志雹又或唐本雹而近本雪鈔胥岐迕事所應有且劉向隂盛之解固以解雨雪即移為雨雹之解亦豈悖理乎愚故於釐十年雨雹注云今作雪疑唐本作雹也劉占董解志釐十年大雨雪劉向以為隂氣盛也公羊經大雨雹董仲舒以為有所漸脅注隂氣脅也按劉向所舉葢左經也左無傳始言繼言志劉歆以為大雨雪及未當雪而雪及大雨雹隕霜殺草皆常寒之罰桓八年十月雪劉董皆有占按此一叚在釐十年左雪公羊雹仲舒占之前又昭公四年及文帝四景帝中六武帝元狩元元鼎二三元帝建昭二四陽朔四等年夹志雪又定公元釐公三及武帝元光四元帝永光元等年夾志霜又釐公二十九昭公三及武帝元封三宣帝地節四等年復志雹按此三叚並在釐十年志文之後夫人君改元肈自劉氏史官所録須存凡例案斯志之記異也下所引並在志中下即前條所述恒寒事内之文首列元封年號不詳漢代何君次言地節河平具述宣成二帝原注宣帝地節四年成帝河平二年其紀年號如此武稱元鼎每歲皆書原注始云元鼎二年又續云元鼎三年案三年宜除元鼎之號也哀曰建平同年必録原注始云哀帝建平三年續復云哀帝建平三年案同是一年宜云是嵗而已不當重言其年也此所謂標舉年號詳略無準者也按古人此等處多不甚檢㸃後世文筆益靡然而犯此者少矣第三科釋災多濫者一脫者字其流有八一曰商㩁前世全違故實二曰影響不接牽引相㑹三曰敷演多端準的無主四曰輕持善政用配妖禍五曰但伸解釋不顯符應六曰考覈雖讜義理非精七曰妖祥可知寢嘿無説八曰不循經典自任胸懐志云史記周威烈王二十三年九鼎震是嵗韓魏趙簒晉而分其地威烈王命以為諸侯天子不恤同姓而爵其賊臣天下不附矣在志中上案周當戰國之世微弱尤甚故君疑竊斧臺名逃債正一有可字比夫泗上諸侯附庸小國者耳至如三晉䟦扈欲為諸侯雖假王命實由已出譬夫近代莽稱安漢匪平帝之至誠卓號太師豈獻皇之本願而作者茍責威烈以妄施爵賞坐貽妖孽豈得謂此三字一作謂得二字人之情偽盡知之矣一無矣字者乎此所謂商𣙜前世全違故實也按揆時勢以立言非奬亂也此為通鑑綱目之所託始其文皆曰命晉大夫魏斯趙籍韓䖍為諸侯司馬氏言天子自壊其禮也釋書法者言以正綱常為萬世戒也皆以病周也夫國形至紐解之時天變垂鼎震之警漢志此占為宋儒發脈是矣然耳食者遂不復以世㑹參之矣要之維世覘世各具識解宋人議論搘撑無救於弱勢積痿不起者妾乗夫奴制主且然矣噫竊斧逃債漢書諸侯王表叙論自幽平之後日以陵夷分為二周有逃責之臺被竊斧之言釋服䖍曰周赧王負責主伯責急乃逃於此臺後人因以名之師古曰鈇鉞王者以為威也周衰政令不行雖有鈇鉞無所用之是謂私竊隠藏之耳陳書紀九錫詔云竊鈇逃責容身之地無所莽稱安漢漢書王莽傳莽諷益州令塞外蠻夷獻白雉羣臣稱盛莽功徳致周成白雉之瑞莽有定國安漢家之功宜賜號安漢公卓號太師後漢董卓傳卓徙都長安諷朝廷使光禄勲宣璠持節拜卓為太師位諸侯王上志云昭公十六年九月大雩先是昭母夫人歸氏薨昭不戚而大一無大字下同蒐于比蒲又曰定公十二年九月大雩先是公自侵鄭歸而城中城二大夫圍鄆在志中上案大舊衍夫字蒐于比蒲昭之十一年城中城圍鄆定之六年也其二役去雩皆非一載夫以國家恒一作常事而坐延災𤯝歳月既遥而方聞響一作感應斯豈非烏有成説扣寂為辭者哉此所謂影響不接牽引相㑹也按傅㑹徵應是五行志真坐病處是科所陳比諸科立意稍岐然仍入肻綮志言某𤯝之罰定作某應此為真傅㑹是科兩大雩於年暌罰異之間糾其繆悠故可作傅㑹用亦仍可作錯誤用也志云嚴公嚴謂莊原注舊在此七年秋大水董仲舒劉向以為嚴母姜與兄齊侯滛共殺桓公嚴釋父舊譌作公讎復娶齊女未入而先與之淫一年再出㑹于道逆亂臣下賤之之舊脫一之字應也又云十一年秋宋大水董仲舒以為時魯宋比年有一作為乗丘鄑之戰百姓愁怨隂氣盛故二國俱水原注謂七年魯大水今年宋大水也並在志之上案此説有三失焉釋三失專指比年戰之占何者嚴公十年十一年公敗宋師於乗丘及鄑夫以制勝克敵䇿勲命賞可以歡一無以字歡一作祈榮降福而反愁怨貽災邪其失一也且先是數年嚴遭大水原注亦謂七年挍其時月殊在戰前而云與宋交兵故二國大水其失二也釋此二失專就大水占戰説况於七年之内已釋水災始以齊女為辭終以宋師為應前後靡定向背何依一作倚其失三也釋此一失合母姜與戰事對勘説夫以一災示𤯝而三說競興此所謂敷演多端準的無主一有者字也按此亦摉抉傅㑹之一間克敵降福之說評者非之以為貪人土地不得云福愚謂本文葢據魯而言人侵我地而我克之豈貪耶劉説非過比年有戰左莊十經公敗宋師於乗丘又十一經公敗宋師於鄑杜注乗丘鄑並魯地鄑子斯反其釋厥咎舒厥罰恒燠以為其政弛􅗦失在舒緩故罰之以燠冬而亡氷在志中下以下並同尋其解春秋之無氷也皆主内失黎庶外失諸侯不事誅賞不明善惡蠻夷猾夏天子不能討大夫擅權邦君不敢制並志内釋無氷之語若斯而已矣次至武帝元狩照志改舊作元封六年冬亡氷而云先是遣衛霍二將軍窮追單于斬首十餘萬級歸而大行慶賞上又閔悔一作恤勤勞遣使巡行天下存賜鰥寡假一多貸字與乏困此二字或作之因舉遺逸獨行君子詣行在所郡國有以為便宜者上丞相御史以聞於是天下咸喜釋述志止此案漢帝其武功文徳也如彼其先猛後寛也如此豈是有懦弱凌遲之失而無刑罰戡定之功哉何得茍以無氷示災便謂與昔人同罪矛盾自已始末相違豈其甚邪此所謂輕持善政用配妖禍也按此譏占者不自闗照解災罰則然徵事實則不然以違反為參合所謂矛盾自已也似此并窮於傅㑹矣崑圃黄氏叔琳謂五行志自走拙路此其是歟志云孝昭元鳯三年太山有大石立眭孟以為當有庶人為天子者京房易傳云太山之石顛而下聖人受命人君虜又曰石立於山同姓為天下雄在志中上案此當是孝宣皇帝即位之祥也夫宣帝出自閭閻坐登宸極所謂庶人受命者也以曾孫血屬上纂皇統所謂同姓一多之字雄者也昌邑見廢謫居逺方所謂人君虜者也釋自案此以下皆子元推説之辭班志脫書所應班書載此徴祥雖具有剖析而求諸後應曽不縷陳叙事之宜豈其若是茍文有所闕則何以載一作成言者哉此所謂但申解釋不顯符應也按此條與第二科徒發首端略同愚謂志五行者止記災祥不摭符應并亦不綴鑿解乃是正體廬陵司天考所以識冠前史也而班志則必申解必徴應至如此志又類例不全能逃子元之駮乎眭孟漢書眭宏傳宏字孟從嬴公受春秋為議郎孝昭元鳯三年泰山萊蕪山南有大石自立孟推春秋之意以石乃隂類下民之象泰山乃王者易姓告代之處此當有從匹夫為天子者霍光惡之誅後五年孝宣帝興於民間徵孟子為郎志云成帝建始三年小女陳持弓年九嵗走入未央宫又云綏和二年男子王襃入北司馬門上前殿在志下上班志雖已有證據言多疎濶今聊演而申之案女子九歲者九一脫九字則陽數之極也男子王襃者王則巨君之姓也入北司馬門上前一少前字殿者王莽始為大司馬至哀帝時就國帝崩後仍此官因以簒位夫人一無人字入司馬門而上殿亦由作猶從大一少大字司馬而升一作登極災祥示兆其事甚明忽而不書為略何甚此所謂解釋雖讜義理非精也按班志此事證應已具特九字未釋王姓姓字未㸃耳加演二言無闗錯誤志云哀帝建平四年山陽女子田無嗇懐姙二字劉補未生二字今依志補二依志改舊作三月兒啼腹中及生不舉葬之陌上三日人過聞啼聲母掘土收養在志下上尋本志雖述此妖災而了無解釋案人從胞至育含靈受氣始末有成一作恒數前後有定凖此何待言毋乃累筆至於一無於字在孕甫爾遽發啼聲者亦由作猶下同物有基業未彰而形象已兆即王氏簒國之徵生而不舉葬而不死者亦由物有期運已定非誅翦所平即王氏受命之應也釋此上為本志補占此下合前條比論又案班云多作志下以字小女陳持弓者陳即莽之所出此語班志所有如女子田無嗇者田故莽之本宗此意班志未言事既同占言無一概豈非唯知其一而不知其二者乎此所謂妖祥可知寢嘿無説也按此因本志田無嗇前後數事相比各著占解惟此獨無故為摘補云爾然在班為闕例在劉為小言葢亦墮入向歆窠臼不能解脫也上二條可省陳之出田之宗莽傳莽下書曰予託于皇初祖考黄帝之後皇始祖考虞帝之苖裔又曰虞帝之先受姓曰姚其在陶唐曰媯在周曰陳在齊曰田在濟南曰王其令天下上此五姓名籍於秩宗封陳崇為統睦侯奉胡王後田豐為世睦侯奉敬王後注孟康曰胡王追王陳胡公敬王追王田敬仲當春秋之時諸國賢俊多矣如沙鹿傳作鹿志作麓其壊梁山云崩鷁退蜚於宋都龍交鬬於鄭水或伯宗子産具述其非妖或卜偃史過傳作周内史叔興盛言其必應並在志下上葢於時有識君子以為美談故左氏書之不刋貽厥來裔既而古今路阻聞見壤隔至漢代儒者董仲舒劉向之徒始别構異聞輔申它説以兹後學陵彼先賢葢今諺所謂季與厥昆爭知嫂諱者也知嫂五字一作私嫂者三字謬原注今諺曰弟與兄爭嫂字以其名鄙故稍文飾之一失此注而班志尚捨長用短捐舊習新茍出異同自矜魁博多見其無識者矣此所謂不循經典自任胸懐也按意宗左氏傳為主而斥羣説之支離所言最直截然則陳持弓之演義田無嗇之補占得毋亦蹈自矜魁博之誚乎沙鹿梁山鷁蜚龍鬬左僖十四秋八月沙鹿崩晉卜偃曰期年將有大咎㡬亡國杜注沙鹿山名人又成五梁山崩晉侯以傳名伯宗伯宗辟重重絳也問焉曰國主山川山崩川竭君為之不舉降服乗縵徹樂出次祝幣史辭以禮焉如此而已伯宗以告而從之又僖十六六鷁退飛過宋都風也周内史叔興聘於宋宋襄公問馬曰是何祥也吉凶焉在對曰君將得諸侯而不終退而告人曰君失問隂陽之事非吉凶所生也禜又昭十九鄭大水龍鬬於時門之外洧淵國人請焉子産弗許曰我鬬龍不我覿也龍鬬我獨何覿焉禳之則彼其室也吾無求於龍龍亦無求於我乃止董劉别構異聞志沙麓崩穀梁曰林屬於山曰麓沙其名也劉向㠯為背叛散亂之象齊桓霸道將廢公羊㠯為沙麓河上邑也董仲舒説略同又梁山崩榖梁曰廱河三日不流晉君率臣哭之廼流劉向㠯為山陽君也水隂民也䘮亡象也董説略同又六鶂退蜚過宋都劉歆㠯為風發它所至宋而髙鶂髙蜚而逢之則退象宋襄與彊楚争盟後六年為楚所執應六之數云又龍鬬於鄭洧淵劉向㠯為近龍孽也鄭㠯小國攝乎晉楚之間重㠯彊吳鄭當其衝子産任政鄭卒無患能㠯徳消變之效也按龍之占後又見雜駮篇第四科古學不精者其流有三一曰博引前書網羅不盡二曰兼採左氏遺逸甚多三曰屢舉舊事不知所出志云庶徴之恒一作常風劉向㠯為春秋無其應劉歆㠯為釐十六年左氏傳釋六鶂同鷁退飛是也在志下上案舊史稱劉向學榖梁一有劉字歆學左氏既祖習各異而聞見不同信矣而周木斯㧞鄭車僨濟風之為害備於尚書春秋向則略而不言歆則知而不傳恐當作博釋此就風占所遺進難又詳言衆怪厯叙羣妖述雨氂為災在志中上而不録趙毛生地書異鳥相育在志中下而不載宋雀生鸇斯皆見小忘大舉輕略重葢學有不同識無通鑒故也釋此又撿出二事之未盡者進難且當炎漢之代厥異尤竒若景當作武帝承平赤風如血于公在職亢陽為旱惟一作在紀與傳各具其詳在於志中獨無其説者何哉釋此更搜出本書所有彼載此遺進難此所謂博引前書網羅不盡也按不盡之欵三而前二欵欵從它出後一欵欵在自邊越追越𦂳覺此老於此事真路熟眼明木㧞見金縢車僨左隠三冬庚戌鄭伯之車僨于濟杜注既盟而遇大風傳記異也雨􅈊志中上天漢元年天雨白毛三年八月天雨白􅈊京房易傳曰前樂後憂厥妖天雨羽趙毛生地風俗通皇霸篇趙王遷信秦反間殺李牧遂為所滅先此童謡曰趙為號秦為笑以為不信視地上生毛謡亦見趙世家鳥相育志中下成帝綏和二年三月天水平襄有燕生爵哺食至大俱飛去京房易傳曰燕生爵諸侯銷一曰生非其類子不嗣世宋雀生鸇王訓故賈誼新書曰宋康王時有雀生鸇于城之陬占曰吉小而生大必霸天下康王喜於是滅滕伐諸侯射天笞地滅社稷齊侯伐之王逃于郳侯之館而死按即宋王偃也赤風如血漢書孝武紀建元四年夏有風赤如血亢陽為旱漢于定國傳父于公為郡决曹東海太守殺孝婦郡中枯旱三年後太守至卜其故于公曰孝婦不當死前太守彊斷之咎儻在是乎於是太守祭孝婦冡表其墓天立大雨左傳云宋人逐猰志作狾狗華臣出奔陳在志中上又云宋公子地舊誤作它下同有白馬景公奪而朱其尾鬛地弟辰以蕭叛在志下上班志書此二事以為犬馬之禍原注此二事是班生自釋非引諸儒所言案左氏所載斯流實繁如季氏之逆也由鬭雞而傅介衛侯之敗也因養鶴以乗軒曹亡首於獲鴈鄭弑舊作殺萌於解黿郄傳作郤至奪豕而家滅華元殺原作煞一作烹羊而卒奔此亦一譌言白黒之祥羽毛之孽何獨捨而不論唯徴犬馬而已此所謂兼採左氏遺逸甚多也按狗猰鬛朱本非物怪故條内拾遺皆同此類然愚以此段科眼尚未猒心不如直折之曰貪採左氏闌入非妖似更快爽也猰狗左襄十七國人逐瘈狗瘈狗入於華臣氏國人從之華臣懼遂奔陳朱尾鬛定十宋公子地有白馬四景公嬖向魋魋欲之公取而朱其尾鬛以予之地怒使其徒抶魋而奪之雞傅介昭二十五季郈之雞鬬季氏介其雞郈氏為之金距平子怒益宫於郈氏且讓之故郈昭伯怨平子鶴乗軒閔二衛懿公好鶴鶴有乗軒者狄伐衛將戰國人受甲者皆曰使鶴鶴實有禄位余焉能戰獲鴈哀七曹伯陽好田弋曹鄙人公孫彊好弋獲白雁獻之使為司城彊言霸説於曹伯從之乃背晉而奸宋宋人伐之晉人不救遂滅曹解黿宣四楚人獻黿於鄭靈公子公子家將見子公之食指動以示子家曰他日我如此必嘗異味及入宰夫將解黿相視而笑公問之以告及食召子公而弗與也怒染指於鼎嘗之而出公怒子公弑靈公奪豕成七晉厲公田婦人先殺而飫後使大夫殺郤至奉豕寺人孟張奪之郤至射而殺之公曰季子欺予謀誅三郤殺羊見模擬篇案太史公書自春秋已前所有國家災𤯝賢哲占候皆出於左氏國語者也今班志所引上自周之幽厲下終魯之定哀而不云國語唯稱史記豈非忘本狥末逐近棄逺者乎此所謂屢舉舊事不知所出也按數典而忘其祖注書家亦通多此病浚儀王氏有云東坡詩黄花後秋節逺自夏小正葢以夏小正有九月榮鞠之句也注者止引月令非也愚鑑於此如史通本摘元魏書也注家輙引北史當之本摘沈宋蕭齊書也注家輙引南史當之自餘雜述枚舉更多拙注一依文返本庶免舉事不原所出之誚云附識不云國語按第一科之二條云公㑹諸侯于周即是不云國語之一也又其他如言不從之徴三郤語火沴水之徴榖洛鬬其誤亦同志中屢見所定多目凡二十或譌一十九或譌二十九種但其失既衆不可殫論故每目之中或時舉一事庶觸類而長他皆可知釋繳過四科又案斯志之作也本欲明吉凶釋休咎懲惡勸善以戒將來釋數語提下言既號五行徴應宜覈矣至如春秋已還漢代而往其間日蝕地震石隕山崩雨雹雨魚大旱大水犬一作雞與注不應豕為禍桃李冬花多一無多字直叙其災而不言其應原注載春秋時日蝕三十六而二不言其應漢時日蝕五十三而四十不言其應又惠帝二年武帝征和二年宣帝本始四年元帝永光三年綏和二年皆地震隕石凡十四總不言其應又髙后二年武都山崩嘉成帝河平二年楚國雨雹大如斧蜚鳥死鴻四年雨魚于信都孝景之時大旱者二成帝昭成二代大雨水三弩擊之皆狗也河平元年長安有如人狀被甲持兵又鴻嘉中狗與豕交惠帝五年十月桃李花棗實不皆不言其應也注字有與行本同者皆照史改此乃一作皆非魯史之春秋漢書之帝紀耳何用復編之於此志哉昔班叔皮云司馬遷叙相如則舉其郡縣著其字此三字照班傳補舊脫蕭曹陳平之屬陳平之屬四字亦舊脫照傳補否則蕭曹亦馬遷並時矣仲舒並時之人不記其字或縣而不郡葢有所未暇也若孟堅此志錯繆殊多豈亦刋削未周者邪不然何脫略之甚也釋已上皆謂志應逗漏不齊亦有穿鑿成文强生異義如蜮之為惑麋之為迷隕五石者齊五子之徴潰舊作崩誤七山者漢七國之象叔服㑹葬郕舊作成非伯來奔亢陽所以成妖鄭易許田魯謀萊國食苖所以為禍諸如此比一作事其類𢎞多徒有解釋無足觀採知音君子幸為詳焉釋此段謂有解有徴而又失之鑿也按此條束上而又推類言之脫略穿鑿四字分括班氏志五行糾轕曼延都為五册雖嗜古之士擥未盈卷輙已神惛今觀史通之編排錯誤也科總以四流别二十如鋪一箔米砂稗粃稃粒中自獻如攤一本律以准皆各例裏出支非穿穴爛熟安從措手嘗竊自料使我下筆能為雜駮體决定不作科别體非不作也不能也後生口滑嗤㸃前賢假有掩去斯篇第令擬立條目蚤恐不見水端旋其面目者矣敢持斯語箴警囂嗸者後史志災祥咸知刋落葛藤矣然篇宗五行卒相踵不改何也門分則有條網舉則無漏班仍事祖哉司馬遷至未暇也皆後漢書班彪傳之文按董仲舒史記入儒林傳蜮為惑志下上嚴公十八年秋有蜮劉向㠯為蜮生南越越地男女同川浴亂氣所生故名之曰蜮蜮猶惑也麋為迷志中上嚴公十七年冬多麋劉向㠯為麋色也青近青祥也麋之為言迷也葢牝獸之淫者五石五子志下下釐公十六年正月隕石于宋五劉歆㠯為正月日在星紀厭在𤣥枵𤣥枵齊分壄也石山物齊太嶽後五石象齊威卒而五公子作亂七山七國志下上文帝元年齊楚地山二十九所大發水潰出劉向㠯為水沴土天戒勿盛齊楚之君後十六年帝分齊地立悼惠王庶子六人皆為王至景帝三年齊楚七國起兵漢皆破之漢七國衆山潰咸被其害按文言潰七山者七國之山皆水潰也叔服郕伯志中上文公二年自十二月不雨至于秋七月天子使叔服㑹葬按事詳雜駮首條又十三年自正月不雨至于秋七月先是曹杞滕來朝郕伯來犇秦使來聘城諸及鄆二年之間五國趨之内城二邑炕陽失衆易田謀萊志下上隠公八年九月螟時鄭伯㠯邴將易許田有貪利心京房易傳曰貪厥災蟲蟲食根又中下桓公五年螽劉向㠯為介蟲之孽易邑興役宣公六年螽劉向㠯為宣比再如齊謀伐萊五行志雜駮第十原注春秋時事違誤最多總十五條按此注的是原文雜駮總不越春秋時也魯文公二年不雨班氏以為自文即位天子使叔服㑹塟毛伯賜命又㑹晉侯于戚上得天子外得諸侯沛然自大故致亢陽之禍志中上案周之東遷日以微弱故鄭取温麥隠三射王中肩桓五楚絶苞茅僖四觀兵問鼎宣三事同列國變雅為風如魯者方大邦不足比小國有餘安有暫降衰周使臣遽以驕矜自恃坐招厥罰亢陽為怪一無為怪二字求諸人事理必不然天髙聼卑豈其若是也按此條所駮專主上得天子句外得諸侯特帶引從周衰入議似隔膜㑹葬賜命㑹戚本志師古注㑹葬葬僖公賜命賜㠯命圭為瑞信也㑹戚大夫公孫敖㑹之戚衛地變雅為風黍離鄭箋幽王之亂宗周滅平王東遷政遂微弱下列於諸侯其詩不能復雅而同歸於國風焉春秋成公元年無氷班氏以為其時王札子一誤作子札下同殺召伯毛伯志中下案今春秋經札子殺毛召事在宣十五年而此言成公時未逹其説下去一譌作云無氷凡有三載按此條糾年分之譌本顔注立説今春秋至未逹其説本志師古注王札子即王子㨗召伯毛伯皆周大夫其下即今春秋五句之文去無氷三載按宣公之年盡於十八今自宣十五下距成公之元凡三年也春秋昭公九年陳火董仲舒以為陳夏徴舒弑君楚嚴王原注嚴即莊也皆依本不改其字下同託欲為陳討賊陳國闢門而待之因滅陳陳之臣子毒恨尤甚極隂生陽故致火災志之上案楚嚴王之入陳乃宣十一年事也始有蹊田之謗取愧叔時一譌作取譏隗叔終有封國之恩見賢尼父毒恨尤甚其理未聞又一脫又字案陳前後為楚所滅者三始宣十一年為楚嚴王所滅次昭八年為楚靈王所滅後哀十七年為楚惠王所滅今董生誤以陳次一脱次字亡之役是楚始滅之時遂妄有占候虚辨物色尋昭之上去於宣魯易四公一作主嚴之下至於靈楚經五代雖懸隔頓别而混雜無分嗟乎下帷三年誠則勤矣差之千里何其闊哉按舊評謂董誤以楚靈之事移於楚莊是也又有評云宣十一年未嘗言滅陳昭公八年乃滅之以三滅之言為不審夫既縣之矣非滅而何其初滅而復封其繼亦滅而復立至哀十七年之滅然後亡子元此條殊無不審之言也宣十一滅陳本志董占及左傳杜注皆有明文蹊田左宣十一楚子為陳夏氏亂故伐陳因縣陳申叔時曰人亦有言曰牽牛以蹊人之田而奪之牛牽牛以蹊者信有罪矣而奪之牛罰已重矣見賢尼父史記陳世家楚莊王伐陳因縣陳而有之申叔時諌莊王乃迎陳靈公太子午於晉而立之復君陳如故是為成公孔子讀史記至楚復陳曰賢哉楚莊王輕千乗之國而重一言按即如此注王本全引左傳而以賢哉一贊貫入之亦不原所出之一端也左傳烏有此贊哉陳為楚滅者三楚始滅陳即宣十一縣陳事注滅陳以為楚縣昭八楚公子棄疾帥師奉孫吳圍陳宋戴惡㑹之冬十一月滅陳晉侯問於史趙曰陳其遂亡乎對曰未也嵗在鶉火卒滅今在析木之津猶將復由哀十七楚白公之亂陳人恃其聚而侵楚楚既寧楚子使武城尹帥師取陳麥遂圍陳秋滅陳楚嚴至靈五代楚世家莊王卒子共王審立共王卒子康王招立康王卒子員立是為郟敖公子圍弑之而自立是為靈王凡五世春秋桓公三年日有蝕之既京房易傳以為後楚嚴始稱王志無始字此用師古注語兼地千里志下下案楚自武王僭號鄧盟是懼荆尸久舊譌又傳亦用師古注語歴文成繆三王一作主方至於嚴是則楚之為王已四世矣何得言嚴始稱之者哉又魯桓公薨後厯嚴閔釐文宣原注釐即僖皆依本書不改其字也下同凡五公而楚嚴始作霸安有桓三年日蝕而已應之者邪非唯叙事有違亦自一無自字占候失中者矣春秋釐公二十九年秋大雨雹劉向以為釐公末年公子遂專權自恣至於弑君隂脅陽之象見釐公不悟遂後二年殺公子赤立宣公志中下案遂之立宣殺子赤也此乃文公末代輙謂僖公暮年世寔世寔一作年世懸殊言何倒錯按此與上條皆駮志中占事年世懸殊之繆年既繆矣占復何施禨祥家言果可依據哉鄧盟桓二蔡侯鄭伯㑹于鄧始懼楚也注楚武始僭號稱王欲害中國蔡鄭近楚故懼而㑹盟荆尸莊四楚武王荆尸授師孑焉注尸陳也更為楚陳兵之法揚雄方言孑㦸也然則楚始於此參用㦸為陳楚始稱王楚世家楚熊通伐隨隨人之周請尊楚王室不聼熊通怒曰吾先鬻熊文王之師也早終成王令我先公以子男田居楚蠻夷率服而王不加位我自尊耳乃自立為武王按此楚始稱王明文也評者云楚先熊渠三子有句亶王鄂王越章王之稱稱王非始於武以此駮劉夫三號者非當國本號乃為子時父名之不乆便除之復何足算且事在春秋前百年矣雜駮諸條皆不越春秋時事題下注又甚明也視短而喙長可謂辯乎殺赤立宣見編次篇事在文公十八年公子遂者襄仲也公子赤者惡也春秋釐公十二年日有蝕之劉向以為是時莒滅杞志下下案釐一無案字一無釐字十四年諸侯城縁陵公羊傳曰曷為城杞滅之孰滅之葢徐莒也如中壘所釋當以公羊為本耳一作爾然則作然而用公羊所説不如左氏之詳左氏襄公二十九年晉平公時杞尚在云在一作存舊贅二云字按此等皆申左之餘有據史記杞亡在獲麟後四十八年而病劉未審者不知劉但據春秋言春秋持左氏已足折公羊矣豈待更要其後乎此亦失記題下注語者也杞尚在左襄二十九晉侯使司馬女叔來治杞田弗盡歸也晉悼夫人愠叔侯曰杞夏餘也而即東夷魯周公之後也而睦於晉何必瘠魯以肥杞注夫人杞女也春秋文公元年日有蝕之劉向以為後晉滅江志下下案本經書文四年楚人滅江今云晉滅其説無取本志師古注亦云且江居南裔與楚為鄰晉處北方去江殊逺稱晉所滅其理難通按此止一字之譌或傳寫者誤未可知左氏傳魯襄公時宋有生女子赤而毛棄之堤下宋平公母共姬之御者見而收之因名曰棄長而美好納之平公生子曰佐後宋臣伊一脱伊字戾䜛太子痤一譌座而殺之原注事在襄二十六年先是大夫華元出奔晉原注事在成十五年華合比奔衛原注事在昭六年劉向以為時則有火災赤𤯝之明應也志中下案災祥之作將應後來事跡之彰用符前兆如華元奔晉在成十五年參諸棄堤實難符㑹又合比奔衛在昭六年而與元奔一作華元奔晉俱云先是惟前與後事並相違者焉按前後既不相㑹後更不得云先一志兩失伊戾䜛左襄二十六宋寺人恵牆伊戾為太子内師而無寵楚客聘于晉過宋太子野享之伊戾從至則欿用牲加書徴之而騁告公曰太子將為亂既與楚客盟矣公使視之信有焉太子縊華元奔晉成十五華元曰吾為右師公室卑而不能正吾罪大矣敢頼寵乎乃出奔晉合比奔衛昭六宋寺人栁有寵太子佐惡之華合比曰我殺之栁聞之告公曰合比將納亡人之族公逐華合比合比奔衛春秋成公五年梁山崩志下上七年鼷䑕食郊牛角志中上襄公十五年日有蝕之志下下董仲舒劉向皆以為自此前一無前字後晉為雞澤之㑹諸侯盟大夫又盟後為湨音讀如葛梁之㑹諸侯一多不字在而大夫獨相與盟君若綴旒不得舉手又襄公十六年五月地震劉向以為是歳三月大夫盟於湨梁而五月地震矣志下上又其二十八年春無氷班固以為天下異也襄公時天下諸侯之大夫皆執國權君不能制漸將日甚原注榖梁云諸侯始失政大夫執國權又曰諸侯失政大夫盟政在大夫大夫之不臣也志中下釋雜引志文止此眼在君若綴旒不得舉手大夫執權君不能制等句案春秋諸國權臣可得言者如三桓六卿田氏而已如雞澤之㑹湨梁之盟其臣豈有若向之所説者邪釋先折去董劉之説然而榖梁謂一作為大夫不臣諸侯失政榖梁傳作正前注同譏其無禮自擅在兹一舉而已非是如一作知非政由寗氏祭則寡人相承世官遂移國柄若斯之失也若董劉之徒不窺左氏直憑二傳遂廣為它説多肆奓陟加切或誤作大多二字或改作侈並非言仍云君若綴旒臣將日甚何其妄也釋原出董劉之說葢本二傳而甚之按所駮總由援左起見亦與申左意同雞澤湨梁二盟蘇黄門轍以為合禮趙氏鵬飛以為尊卑之分正及與諸釋經之言互證之亦復往往而合然至襄十六之盟在晉平之世權移之漸亦自此矣雞澤之㑹左襄三六月公㑹單頃公及諸侯同盟于雞澤陳成公使袁僑如㑹求成晉侯使和組父告于諸侯秋叔孫豹及諸侯之大夫及陳袁僑盟陳請服也杜注其君不來使大夫盟之匹敵之宜湨梁之盟左襄十六晉平公即位改服修官烝于凸沃警守而下㑹于湨梁命歸侵田晉侯與諸侯宴於温使諸大夫舞曰歌詩必類於是叔孫豹晉荀偃宋向戌衛寗殖鄭公孫蠆小邾之大夫盟曰同討不庭政由寗氏二句左襄二十六衛獻公自夷求復國使子鮮與寗喜相要之言也二傳為説襄三榖梁㑹雞澤下即注中云云又十六㑹湨梁下即注中又曰云云又公羊㑹湨梁諸侯皆在是其言大夫盟何信在大夫也君若贅旒然奓言字書奓言猶夸言也唐陸贄傳奓言無驗春秋昭十七年六月日有蝕之董仲舒以為時宿在畢晉國象也晉厲公誅四大夫失衆心以弑死後莫敢復責一有其字大夫六卿遂相與比周專晉國晉君還事之志下下案一脫案字晉厲公所尸唯三郤耳何得云誅四大夫者哉又州滿既死原注今春秋左氏本皆作州蒲誤也當為州滿事具王劭續書志按續疑當作讀悼公嗣立選六官者皆獲其才一作事逐七人者盡當其罪以辱及揚干將誅魏綘覽書後悟引愆授職此則生殺在己寵辱自由故能申五利以和戎馳三駕以挫楚威行夷夏霸復文襄而云不復責大夫何厚誣之甚也自昭公謂晉昭公已降晉政多門如以君事臣居下僭上者此乃因昭之失漸至陵夷匪由懲厲之弑自取淪辱也豈可輙持彼後事用誣先代者乎按節中凡三提句三駮之誅四大夫一駮也莫敢責大夫又一駮也還事其六卿又一駮也細審之劉為此駮還似含糊彼晉厲之事在魯成十七八年間下距昭十七之蝕且逾五十載而董占如是直縁成十七年亦有書蝕之文因而誤牽及此年迷逺近言出支離只從迷處醒之曰渾將兩個十七併做一畨日蝕桶底脫了也劉唯勘未盡徹所以從前書志篇小注反誤昭為成而辯亦不中窽㑹閲者宜取而參挍之所尸唯三郤左成十七晉殺其大夫卻錡卻犨卻至傳長魚矯以戈殺之皆尸諸朝胥童以甲劫欒書中行偃於朝公曰一朝而尸三卿余不忍益也對曰人將忍君州滿成十八晉殺其君州蒲按厲公名也其言州滿具王劭書無考六官七人左成十八春王正月晉人迎周子於京師而立之生十四年矣周子曰孤始願不及此雖及此豈非天乎二三子用我今日否亦今日共而從君神之所福也對曰敢不唯命庚午盟而入逐不臣者七人二月悼公即位於朝始命百官凡六官之長皆民譽也舉不失職官不易方所以復霸也魏綘左襄三㑹於雞澤晉侯之弟揚干亂行於曲梁魏綘戮其僕晉侯怒羊舌赤曰絳無貳志其將來辭言終魏絳至授僕人書將伏劒士魴張老止之公讀書跣而出曰寡人之過也子無重寡人之過晉侯以魏綘能以刑佐民矣反役與之禮食使佐新軍又四魏莊子請和諸戎曰和戎有五利焉貴貨易土穡人成功四隣振動師徒不勤而用徳度公説修民事田以時三駕襄九同盟于戲晉人不得志於鄭歸謀所以息民行之期年國乃有節三駕而楚不能與爭十年晉伐鄭師于牛首十一年四月伐鄭盟于亳城北秋七月伐鄭㑹于蕭魚注此三駕也哀公十三年十一月有星孛于一無于字東方董仲舒劉向以為周之十一月夏九月日在氐出東方者軫角亢也或曰角亢大國之一無之字象為齊晉也其後田氏篡齊六卿分晉志下下案星孛之後二年春秋之經盡矣又十一年左氏之傳盡矣自傳盡後八十二年齊康公為田和所滅又七年晉靜公為韓魏趙所滅上去星孛之歳皆出百餘年辰象所纒氛祲所指若一作共相感應何太疎濶者哉釋此層為正駮且當春秋既終之後左傳未盡之前其間衛弑君越滅吳魯遜越舊衍云云二字賊臣逆子破家亡國多矣此正得東方之象大國之徵何故捨而不述逺求他代者乎釋此層代考時事益見彼强附之拙又范與中行早從殄滅智入戰國繼踵云亡輙與三晉連名總以六卿為目殊為謬也釋此層為抽駮尋斯失所起可以意測何者二傳所引事終西狩獲麟左氏所書語連趙襄滅智漢代學者唯讀二傳不觀左氏故事有不周言多脱略且春秋之後戰國之時史官闕書年祀難記而學者遂疑簒齊分晉時與魯史相隣故輕引災祥用相附㑹白圭之玷何其甚歟釋後以擾劣三傳結按意亦歸於申左也三卿分晉而云六卿師古注亦同此誤亦可證雜駮所陳只筦在春秋年衛弑君哀十七衛侯貞卜其繇曰如魚窺尾衡流而方羊裔焉公使匠久公欲逐石圃石圃因匠氏攻公公踰于北方而墜折股公入于戎州謂已氏曰活我我與女璧已氏曰殺女璧將焉往遂弑之越滅吳哀二十二冬十一月越滅吳請使吳王居甬東辭曰孤老矣焉能事君乃縊魯遜越在哀二十七年語見惑經篇春秋釐公三十三年十二月隕霜不殺草志中下其下劉向占牽及三家逐昭公之文成公五年梁山崩志下上劉向占亦及三家逐魯昭七年鼷䑕食郊牛角劉向以似脱為字其後三家逐魯昭公卒死於外之象志中上單􅄒一占括上三災案乾侯之出事由季氏孟叔二孫本所不預况昭子以納君不遂發憤而卒論其義烈道貫幽明定為忠臣猶且無愧編諸逆黨何乃厚誣夫以罪由一家而兼云二族以此題目何其濫歟按三志見三處皆有三家逐昭之占此葢專駮三家二字也本為叔孫昭子洗雪而筆端少縱帶挈孟孫不免失出釐成與昭隔世三五糾不及此亦更失拈昭子發憤昭二十五季氏逐昭公叔孫昭子自闞歸平子稽顙曰茍使意如得改事君所謂生死而肉骨也昭子從公于齊與公言公使昭子自鑄歸平子有異志十月辛酉昭子齊於其寢使祝宗祈死戊辰卒左氏傳昭公十九年龍鬬於鄭時門之外洧淵劉向以為近龍孽也鄭小國攝乎晉楚之間重以强吳鄭當其衝不能修徳將鬬三國以自危亡是時子産任政内惠於民外善辭令以交三國鄭卒亡患此能以徳銷災之道也志下下案昭之十九年晉楚連盟干戈不作吳雖强暴未擾諸華鄭無外虞非子産之力也又吳為逺國僻在江干必略中原當以楚宋為始鄭居河潁地匪夷庚謂當要衝殊為乖角求諸地理不其爽歟按此專駮鄭當吳衝一語也故曰地匪夷庚至云非子産力不合兼頂晉楚語欠鈎畫太抹煞了鄭居河潁外傳鄭語桓公為司徒問於史伯曰王室多故余懼及焉其何所可以逃死史伯對曰其濟洛河潁之間乎是其子男之國君若寄孥與賄焉不敢不許夷庚左成十八塞夷庚注吳晉往來之要道疏夷平地也詩序云由庚以庚為道也束晢補亡詩蕩蕩夷庚物則由之春秋昭公十五年六月日有蝕之董仲舒以為時宿在畢晉國象也又云舊作云云誤日比再蝕其事在春秋後故不載於經志下下案自昭十五舊作四誤年迄於獲麟之歳其間日蝕復有九舊誤七下同焉事列本經披文立驗安得云再蝕而已又在春秋之後也且觀班志編此九蝕其八舊誤六皆載董生所占復不得言董以事後春秋故不存編録再思其語三覆所由斯葢孟堅之誤非仲舒之罪也按此條所駮主日比再蝕䓁句故本文當作又云其於再蝕三言悟得是班文非董語擘畫最精所謂彼節有間而吾刃無厚觀書不當如是耶九蝕八占按本志志日蝕自昭十五年之後于昭又有十七二十一二十二二十四三十一凡五蝕于定則有五年十二十五凡三蝕下至哀十四之蝕而春秋盡總九蝕也董之占惟哀十四無占總八占也春秋昭公九年陳火劉向以為先是陳侯之弟招殺陳太子偃師楚因滅陳春秋不與蠻夷滅中國故復書陳火也志之上案楚縣中國以為邑者多矣如邑有宜見於經者豈可不以楚為名者哉葢當斯時陳雖暫亡尋復舊國故仍取陳號不假楚名獨不見鄭禆竈之説乎禆竈之説一脱此五字斯災也曰五年陳將復封封五十二年而遂亡此其效也一脱此四字自斯而後若顓頊之墟宛丘之地如有應書於國史者一無者字豈可復謂之陳乎按此為陳火二字申解義以闢不與蠻夷之説也陳火之義具兩解史通從禆説而杜注别為一説今以注補備之陳火左昭九夏四月陳災鄭禆竈曰五年陳將復封封五十二年而遂亡陳水屬也火水妃也而楚所相也今火出而火陳逐楚而建陳也妃以五成故曰五年嵗五及鶉火而後陳卒亡楚克有之天之道也故曰五十二年杜預經注天火曰災陳既為楚縣而書陳災者猶晉之梁山沙鹿崩不書晉災繋於所災故以所在為名招殺偃師昭八經陳侯之弟招殺陳世子偃師傳陳哀公元妃鄭姬生悼太子偃師二妃生公子留二妃嬖留有寵屬諸司徒招哀公有廢疾招殺偃師而立留哀公縊子徴師赴于楚楚滅陳按滅陳事見上史通通釋卷十九
