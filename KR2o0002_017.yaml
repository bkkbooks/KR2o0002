body:
  text: 史通通釋卷十七無錫浦起龍撰外篇雜説中第七十六條諸晉史六條舊作七條非東晉之史作者多門何氏中興實居其最而為晉學者曾未之知倘湮滅不行良可惜也王檀著書一作者是晉史之尤劣者方諸前代其陸賈褚先生之比歟道鸞不揆淺才好出竒語所謂欲益反損求妍更媸者矣按正史篇云貞觀中詔以晉史十八家未能盡善更加纂録為百三十二卷自是言晉史者棄其舊本焉吁自唐初一棄遂絶於今洵不能無湮滅可惜之歎後何從覩其優劣耶評者謂玉海言法盛書竊之郗紹譏子元未考夫何果竊而書果善固無傷於居最一語也不亦所砭非所病耶况其事本見南史不待玉海南史徐廣傳曰郗紹作晉中興書以示法盛法盛曰卿名位貴達不復俟此延譽我寒士無聞宜以為惠紹不與書在齋內後法盛詣紹紹不在直入竊之紹無兼本世遂行何書輇才喜賣弄偏納敗缺也臧氏晉書稱苻堅之竊號也雖疆宇狹於石虎至於人物則過之案後石之時原注田融趙史謂勒為前石虎為後石也張據瓜涼李專巴蜀自遼而左人一作氏屬慕容涉漢舊皆訛作沙漠而一訛作西南地歸司馬逮於苻氏則兼而有之禹貢九州實得其八而言地劣於趙是何言歟夫識事未精而輕為著述此其不以量也張勔隋志作𬗟抄撮晉史不求異同而備揭一訛作被褐此言不從沙汰罪又甚矣按臧史謂苻堅狹於後石其言實踈而劉之所鄙尤在張勔也晚明版行諸書傳刻鹵莽讀者觸處膠牙止如此條曰自遼而左氏屬慕容氏字當由民字之訛唐諱民為人亦有信手忘諱者因民作氏豈復成語又曰沙漠西南地歸司馬自晉之東懸隔朔野逾二千里沙漠二字適從何來細推所自步脫止而成沙漢緣沙而轉漠離而益逺遂失其宗人茍稍涉史書冝皆刺眼自來評者於此類曾莫之省方且撏扯冷僻逞詭臆而衒多知不疑其所當疑而強辨其所不必辨載籍極博文章無口書之受誣獨史通哉涼蜀遼漢苻氏兼之叢書前涼録張天錫十三年苻堅遣苟萇來伐天錫拒戰赤岸為秦所敗靣縛降秦涼亡又前秦録甘露十二年涼州平以梁熙持節鎮姑臧按此苻氏之兼瓜涼也而後石時則張重華據之又蜀録李特起兵至勢降晉晉書載記苻堅以王猛為中書令風化大行仇池氐楊世以地降於堅是歲有赤星見於西南於占明年當平蜀堅命秦梁密嚴兵備晉梁州刺史楊亮退守磬險堅遣王統朱彤冦蜀毛當徐成率步騎入自劍閣楊安進據梓潼當遂陷益州於是卭筰夜郎等皆歸之堅以安為益州牧鎮成都按此苻氏之兼巴蜀也而石氏則未能有蜀叢書前燕録慕容廆世居遼左廆子皓遷都龍城號新宫曰和龍皓子雋取鄴自薊遷鄴雋子暐十一年秦來伐拔鄴城徙暐并諸鮮卑四萬戶於長安又前秦録堅入鄴宫閲其圖籍凡郡百五十七縣千五百七十九以王猛為冀州牧鎮鄴按此苻氏之兼遼左也而石虎時慕容方興虎嘗兵挫遼西棄甲而遁晉載記堅遣其尚書令丕率慕容暐等冦襄陽楊安將樊鄧之衆為前鋒石越出魯陽關慕容垂姚萇出南鄉苟池王顯從武當繼進大會漢陽師次沔北遣池越當屯江陵太元四年苻丕陷襄陽堅以其中壘梁成都督荆州諸軍事領護南蠻校尉配兵一萬鎮襄陽按此苻氏之兼漢南也而石氏雖纍寇襄陽卒未得志張勔隋經籍志晉書鈔三十卷梁豫章內史張𬗟撰按𬗟史通作勔或當時二字通寫也夫學未該博鑒非詳正凡所修撰多聚異聞一作門其為踳駮難以覺悟案應劭風俗通載楚有葉君祠即葉公諸梁廟也而俗云孝明帝時有河東王喬為葉令嘗飛鳬入朝及干寶搜神記乃隱應氏所通一訛作遺而收舊有其字流俗怪説釋此原飛鳬事所始然怪則怪矣節意則謂載在搜神書非正史猶之可也又劉敬叔異苑稱晉武庫失火漢髙祖斬蛇劔穿屋而飛其言不經致誤故梁武帝令殷藝編諸小説及蕭方等撰三十國史乃刋為正言釋此原劒飛事所始然節意謂小説不經猶可撰為正言則非然三十國史猶非正體國史也已下揭出正史立説既而宋求漢事旁取令升之書原注謂范曄後漢書唐徴晉語近憑方等之録原注謂皇家撰晉書編簡一定膠漆不移釋節意所嚴在此正史故令俗之學者説鳬履登朝則云舊書舊記釋不復言搜神記更何問風俗通矣談蛇劍穿屋必曰晉典明文釋不復言三十國春秋更何問異苑矣遮一誤作遞一作托彼虛詞成兹實録語曰三人成市虎斯言其得之者一無者字乎釋小説之遷流延及正史如此故作史貴識也按志怪奚必去諧撰史自宜識大語有軒輊意有隄防非災非祥靡勸靡戒必嚴諸此而後史之為體尊而其為用巨間嘗取後史驗之遇此等事多放活句子元教之歟搜神異苑收之雜述之篇存小説也史而掇取則猥江璧門樞褒以可稱之語徴異兆也事無關係則譏不合全書參互不知出語持平可作事始書觀可作注書家法殷藝小説梁書本傳殷藝字灌蔬不妄交逰博洽羣書隋經籍志小説十卷梁武帝敕司徒左長史殷藝撰陳氏書録邯鄲書目云或題劉餗撰非也此書首題秦漢魏晉宋諸帝注云殷藝撰非劉餗明矣故其敘事止宋初蓋於諸史傳記中抄集或稱商藝者宣祖廟未祧時避諱也按劉餗即知幾子也徴之此條或題之非更不待辭矣蕭方等困學紀聞蕭方等為三十國春秋以晉為主附列劉淵以下二十九國通鑑晉元興三年引方等論綱目但云蕭方誤削等字按梁書忠壯丗子方等字實相世祖長子也貞惠世子方諸字智相世祖第二子也愍懷太子方矩字德規丗祖第四子也方乃晜弟二名之共字也丗祖謂元帝唐宋藝文志亦誤削等字又按隋經籍志作蕭萬等則又訛方為万再誤万為萬考核之學良未易言市虎韓非內儲説龎恭謂魏王曰今一人言市有虎王不信二人言王不信三人言王信之夫市之無虎也明矣然三人言而成市虎願王察之馬遷持論稱堯世一誤作舜無許由應劭著録云漢代無王喬其言讜矣至士安撰髙士傳具説箕山之迹令升作搜神深信葉縣之靈此並向聲背實捨真從偽知而故為罪之甚者北平本此處截條非本條蓋論晉書前特引端之詞非泛論雜家也近者一無者字宋臨川王義慶著世説新語上敘兩漢三國及晉中朝江左事劉峻注釋摘其瑕疵偽迹昭然理難文飾而皇家撰晉史多取此書遂採康王之妄言違孝標之正説以此書事奚其厚顔按與上條同指許由之事史公亦非遽以為無特設為疑詞借其人挑起夷齊之見稱耳愚又疑莊列寓言人名有無顧勿深考若家語所稱少正卯謂其言行偽僻七日受誅然究無亂政實事更未聞請命行刑曾聖人而為是急切專輒之舉乎亦鄙心之所不安也左傳國語皆無其人再詳此條蓋由新晉書採用世説而發義慶之書孝標之摘正如松之之於陳志何去何從亦未可執愚意史氏之文有傳聞異説者主其所共宗無廢其所别見疑以傳疑乃成信史明惠帝實焚而世傳行遁今史以史宬為徴信仍以遜國為傳疑可以質鬼神俟百世矣漢吕后以婦人稱制事同王者班氏次其年月雖與一訛以諸帝同編而記其事迹實與后妃齊貫皇家諸學士撰晉書首發凡例原注序例一卷晉書之首故云首發凡例而云班漢皇后除王吕之外不為作傳並編敘行事寄出外戚篇按凡例語止此此下疑有闕文所不載者唯元后字政君耳按今漢書外戚傳後别列元后傳此云不載殊費解若云元后事不載外戚篇則正與吕氏同例矣又與下句抵牾安得輒引呂氏以為例乎蓋由讀書不精識事多闕徒以本紀標目以編髙后之年遂疑外戚裁篇輒敘娥姁吕后字之事此四句文義亦不可曉其為率略不亦甚邪按此條之駮晉史駮凡例也但文內似多脫訛存而不論楊王孫布囊盛尸一作尸裸身而葬伊籍對吳以一拜一起未足為勞求兩賢立身各有此一事而已而漢書蜀志為其立傳前哲致譏一作議言之詳矣然楊能反經合義雖其事反葬禮之經而其言合達人之義足矯奢葬之愆伊以敏辭辨對可免使乎之辱列諸篇第猶有可取釋此上是引端近者皇家撰晉書著劉伶畢卓傳其敘事也直載其嗜酒沈湎悖禮亂德若斯而已為傳如此復何所取者哉原注舊晉史本無劉畢傳皇家新撰以補前史所闕一本失此注釋所糾在此警蕩也按合前所論搜神異苑世説及此條劉畢傳觀之刋除誕放約勒編摩皆華士所畏惡者故史通往往召謗論者認得劉公是尊嚴國史便自意平談苑説鈴之流原非其所禁絶也楊王孫本傳學黃老之術欲裸葬曰死者終生之化而物之歸者也歸者得至化者得變是物各反其真也反真冥冥亡形亡聲乃合道情夫飾外以華衆厚葬以鬲真使歸者不得至化者不得變是使物各失其所也伊籍本傳籍字機伯隨先主入益州遣使於吳孫權欲逆折以辭籍適入拜權曰勞事無道之君乎籍即對曰一拜一起未足為勞籍之機捷類皆如此權甚異之劉伶本傳伶字伯倫放情肆志與阮籍嵇康欣然神解携手入林常乘鹿車携一壺酒使人荷插隨之曰死便埋我嘗求酒於其妻妻捐酒泣諫伶曰吾不能自禁當祝鬼神自誓耳可便具酒肉妻從之伶祝曰天生劉伶以酒為名一飲一斛五斗解酲婦兒之言切不可聼仍飲酒御肉塊然復醉畢卓本傳卓字茂丗為吏部郎嘗飲酒廢職比舍郎釀熟卓因醉夜至其甕間盜飲之為掌酒者所縛明旦視之乃畢吏部也餘文已見書事篇宋略一條裴幾原子野刪略宋史定為二十篇芟煩一作繁撮要實有其力釋首提略字其意以為略則煩文宜省而所録文章頗傷蕪穢如文帝除徐一作師非傅官詔顔延年元后哀册文顔峻史作竣討二凶檄孝武擬李夫人賦裴松之上注俗本注字作三字非國志表孔希先罪許曜史作耀詞凡此諸文是尤不宜載者釋揭六項作論案何則羡亮威權震主負芒猜忌將欲取之必先與之既而罪名具列刑書是正則先所降詔本非實録而乃先後雙載坐令矛盾兩傷論斷一夫國之不造史有哀册或作䇿自晉宋已還多載於起居注詞皆虛飾義不足觀必以略言之故宜去也論斷二昔漢王數項袁公檄曹若不具録其文難以暴揚其過至於二凶為惡不言可知無俟檄數一作書始明罪狀必刋諸國史豈益一作冝非異同論斷三孝武作賦悼亡鍾心內寵情在兒女語非軍國論斷四松之所論者其事甚末一作下兼復文理非工論斷五熙先搆逆懷姧矯言欺衆且所為藁草一作草藁本未宣行論斷六釋分論至此畢斯並同在編次不加銓一作詮擇豈非蕪濫者邪釋似此不得以略名矣向若除此數文别無他説則宋年美事遺略蓋寡何乃應取而不取宜除而不除乎但近代國史通多此纍有同自鄶無足致譏若裴氏者一有是字衆作之中所可與言史者故偏舉其事以申掎托云按此條須理會略字正名國史何妨詳載子野書既以略名而具列蕪篇則名實不相副矣與載言載文兩篇意皆各出子元歷詆三國裴注為其知博而不知約也裴注徴書甚富而擇言不精富則騖博者尚之如踈寮稱劉孝標注世説引晉氏一朝記載凡一百六十六家皆出正史外亦是此意不精則識大者病之如朱子論李延夀南北史除司馬公通鑑所取其餘只是一部好看的小説亦是此意除徐傅官詔徐羡之傳字宗文髙祖踐阼進號將軍加散騎常侍封南昌縣公少帝失德羡之等廢之遷於吳郡遂加害太祖即位進司徒改封南平郡公傅亮傳字季友宋國初建從還夀陽髙祖有受禪意亮悟旨曰臣暫宜還都至都即徴髙祖入輔至於受命進尚書僕射中書令少帝廢亮至江陵迎太祖既至太祖問少帝薨廢本末悲號嗚咽亮於是布腹心於到彥之等深自結納太祖登阼加左光祿大夫儀同三司進爵始興郡公按太祖即文帝也其二人除官詔沈書不載元嘉三年二人皆受誅元后哀册后妃傳文帝袁皇后諱齊媯左光祿大夫敬公湛之庶女也生子劭上待后恩禮甚篤後潘淑妃愛傾後宫因稱疾不復見上元嘉十七年疾篤上執手流涕因引被覆面崩上甚悼痛詔前永嘉太守顔延之為哀策文甚麗云云按延之字延年討二凶檄二凶本傳元凶劭文帝長子也有女巫嚴道育自言通靈劭姊東陽公主白上託言善蠶召入劭興始興王濬敬事之號曰天師遂為巫蠱上後知驚惋須檢核廢劭賜濬死以語濬母潘淑妃妃以告濬濬報劭劭詐上詔入宫行弒世祖及南譙王義宣隨王誕舉義兵檄京邑云云又顔竣傳父光祿大夫延之竣為世祖撫軍主簿世祖鎮潯陽遷記室參軍世祖入討任總內外并造檄書南史延之為劭光祿大夫劭以檄文示延之曰此筆誰造延之為陛下曰竣之筆也劭曰何乃至爾曰竣尚不顧老臣何能擬李夫人賦孝武十四王傳始平王子鸞母殷淑儀寵子鸞愛冠諸子丁母憂追進淑儀為貴妃班亞皇后諡曰宣痛愛不已擬漢李夫人賦曰朕以亡事棄日閲覽前王詞苑見李夫人賦凄其有懷因感而會焉云云注國志表見補注篇罪許曜詞事附范曄傳孔熙先有縱橫才志父默之下廷尉彭城王義康保持之得免義康被黜熙先密懷報效素善天文云太祖必以非道晏駕江州應出天子以為義康當之有法靜尼出入義康家熙先善疹胍法靜尼妹夫許耀領隊在臺宿衛殿省嘗病熙先為合湯一劑耀疾即損因成周旋熙先以耀膽幹因告逆謀耀許為內應熙先使曄作義康書與徐湛之宣示同黨湛之封上凡所連及並伏誅按罪許詞沈書亦不載又按裴略不可得見而以全史較之所收浮文反簡於裴故史通云爾後魏書二條宋書載佛貍之入冦也其間勝負蓋皆實録焉魏史所書原注謂魏收所撰者則全出沈本釋所書用師宋實不競則收書仍之如事有可恥者則加減隨意依違飾一作罕非言至如劉氏獻女請和太武以師此二字一改作求字非婚不許此言尤可怪也釋揭出魏書飾言何者江左皇族水鄉庶姓若司馬劉蕭韓王或出於亡命或起自俘囚一詣桑乾皆成禁臠此皆魏史自述非他國所傳釋南士北奔多為北壻據此以折拒婚之飾誇也然則北之重南其禮如此安有黃旗之主親屈己以求婚而白登之陳反懷一作乃致疑而不納其言河漢不亦甚哉釋駮拒婚止此觀休文宋典誠曰不工必比伯起魏書更為良史而收每云我視沈約正如或有一字奴耳原注出關東風俗傳一本失此注此可謂飾嫫姆而誇西施持魚目而笑明月者也釋統以收書劣於沈書作束筆按劉氏凡涉魏書只是一味斥誇佛貍入冦宋書索虜傳魏元明帝子燾字佛貍自率大衆渡河曰自頃歲成民阜當東巡吳會以盡遊豫臨滄海探禹穴陟姑蘇之臺搜長洲之苑燾自彭城南出盱眙至瓜步伐蒹葦造箄筏聲欲渡江遣使餉太祖駱駝名馬求和請婚上遣奉朝請田竒餉以珍味燾以手指天而以孫兒示竒曰至此非唯為功名實是貪結姻援若能酬酢自今不復相犯秋毫又求嫁女於世祖魏書島夷劉氏傳車駕登瓜步伐葦結筏示欲渡江義隆大懼欲走建業士女咸荷擔而立義隆遣黃延年朝於行宮獻百牢并請和求進女於皇孫世祖以師婚非禮許和而不許婚按宋云燾即魏世祖太武帝也魏云義隆即宋太祖文帝也司馬劉蕭韓王魏書司馬楚之晉宣帝弟馗之八丗孫劉裕誅夷司馬戚屬亡於汝潁之間奚斤略地河南楚之請降後尚諸王女河內公主生子金龍又劉昶義隆第九子也子業立婚狂肆暴委母妻携妾作丈夫服間行來降尚武邑公主歲餘主婚更尚建興長公主又蕭寶夤蕭鸞第六子寶卷母弟也蕭衍克建業殺其兄弟其家穿牆夜出寶夤具小船著烏巾𥜗潛赴江畔躡屩徒步腳無全皮至夀春戍主推檢知實至京師世宗禮之尋尚南陽長公主賜帛一千匹并給禮具又韓延之司馬德宗平西府録事參軍太常二年與司馬文思來入國延之前妻羅氏生子措隨入國又以淮南王女妻之生道生又王慧龍司馬德宗僕射愈之孫散騎緝之子也劉裕微時愈不為禮及得志愈家見誅慧龍為沙門僧彬所匿太常二年歸國崔浩弟恬以女妻之浩既見曰信王家兒也王氏世齇鼻江東謂之齇王慧龍鼻大真貴種矣按慧龍非婚於魏宗借用桑乾宋書索虜傳索頭託跋開字涉圭王有中州自稱曰魏號年天賜治代郡桑乾縣之平城禁臠晉謝安傳安孫混字淑源少有美譽孝武帝求為晉陵公主壻未幾帝崩袁嵩欲以女妻之王珣曰卿莫近禁臠初元帝始鎮建業公私窘罄每得一豚以為珍膳項上一臠尤美輒以薦帝呼為禁臠故珣因以為戲混竟尚主黃旗吳志權傳注曰吳書曰先哲祕論紫蓋黃旗運在東南按語本江表傳又魏書李平傳平子諧為聘使至石頭梁主客郎范胥當接胥曰金陵王氣兆於先代黃旗紫蓋本出東南白登漢胸奴傳冒頓圍髙帝於白登注白登在平城東南按平城地在桑乾即元魏所都也近者沈約晉書喜造竒説稱元帝牛金之子以應牛繼馬後之徴鄴中學者王劭宋孝王言之詳矣而魏收深嫉南國幸書其短著司馬睿傳遂具録休文所言釋此上糾魏收又崔浩諂事狄君曲為邪説稱拓跋之祖本李陵之胄當時衆議抵一作相誤斥事遂不行或有竊其書以渡江者沈約撰宋書索虜傳仍傳伯淵所述釋此上糾沈約凡此諸妄其流甚多儻無迹可尋則真偽難辨者矣按此段雖繫在説魏之條其實魏沈並舉劉氏深斥史家淆訛傅會之習愚甚韙之此與上條之説前者因習言語敘事曲筆諸篇纍纍言之矣此復贅言之故知雜説諸條多半是前書底本非後來繼作也觀開章第一篇便云自古編述文籍外篇言之備矣可驗外篇非定在內篇後也牛繼馬後魏書僣晉司馬睿字景文晉將牛金子也初琅邪王覲妃譙國夏侯氏字銅環與金姦通生睿因冒姓司馬按王宋辨語無可考舊唐書元行沖傳魏明帝時河西栁谷瑞石有牛繼馬後之象魏收以晉元帝是牛氏子冒姓司馬以應石文行沖推尋事迹以昭成帝名犍繼晉受命考校謠讖著論以明之按行沖故拓跋之後自張祖統其言亦未必得實但夏侯醜語牛後讕言通鑑綱目皆屏不録是知大雅正人操觚纂著固無取乎黯黕罔據之談也拓拔之祖宋書索頭虜姓託跋氏其先漢將李陵後也陵降胸奴有數百千種各立名號索頭亦其一也又見序傳篇北齊諸史三條百諸一作書誤不專論藥書故曰諸史王劭國史至於論戰爭述紛擾賈其餘勇彌見所長至如敘文宣逼孝靖以受魏禪二王當作常山殺楊燕以廢乾明雖左氏載季氏逐昭公秦伯納重耳欒盈起於曲沃楚靈敗於乾溪殆可連類也又敘髙祖破宇文於邙一訛印一訛卭史作芒山周武自晉陽而平鄴雖左氏書城濮之役鄢陵之戰齊敗於鞍傳作鞍吳師入郢亦不是過也按知幾稱君懋書不一而足恨不得見矣此所論載四事非止述事乃論文也事最巨而文亦最詳練今觀二李令狐所撰次大率皆藉為藍本故引注冝稍盡其曲折不得與他處節見事略者同例文宣逼魏禪北史帝從容沈雅有孝文風渤海王髙澄以崔季舒為中書黃門侍郎令監察動靜澄與季舒書曰癡人復何似癡勢小差未及將禪位於文宣襄城王昶等入奏事昭陽殿昶曰五行遞運有始有終願陛下則堯禪舜帝便斂容答曰此事推挹已久謹當遜避帝下御座步就東廊口詠范蔚宗後漢書贊云獻生不辰身播國屯終我四百永作虞賔所司奏請發帝曰古人念遺簮敝履與六宫别可嬪趙國李氏誦陳思王詩云王其愛玉體俱享黃髮期皇后已下皆哭及出雲龍門王公百寮衣冠拜辭帝曰今日不減常道鄉公漢獻帝衆皆悲愴常山廢乾明北史文宣天保十年紀云初帝改年天保有識者曰天保為一大人只十其不過十乎又曾問太山道士得幾年為天子曰得三十年後帝謂李后曰十年十月十日得非三十也人生有死但憐正道幼人將奪之耳廢帝乾明元年紀云正月常山王演矯詔誅尚書令楊愔尚書右僕射燕子獻等八月以太皇太后令廢帝為濟南王以常山王演入纂大統初文宣命邢卲制帝名殷字正道從而尤之殷家弟及正字一止吾身後兒不得也因謂昭帝曰奪時但奪慎勿殺也孝昭紀云帝與濟南約不相害及鄴乃密殺之後有見文宣從楊燕等西行言復讐帝在晉陽亦見焉乃講武以厭之有兔驚馬帝墜而絶肋太后問濟南曰殺去邪死其宜矣季逐昭公昭二十五事見上卷秦納重耳僖二十四秦穆公納之欒盈起襄二十三欒盈夜見胥午而告之午伏之而觴曲沃人樂作午言曰今也得欒孺子何如對曰得主而為之死猶不死也皆歎有泣者爵行又言皆曰得主何二之有盈出遍拜之欒盈率以入綘乾溪昭十二雨雪楚子皮冠秦復陶翠被豹舄執鞭以出右尹子革夕誦祈招之詩王不自克以及於難髙祖破邙山北史武定元年二月北豫州刺史髙慎據武牢西叛三月周文率衆援髙慎神武大敗之於芒山明日復戰西師盡鋭來攻神武失馬赫連陽順下馬授神武蒼頭馮文洛扶上俱走從步騎六七人追騎至親信都尉興慶曰王怯矣興慶腰百箭足殺百人神武曰事濟以爾為懷州若死用爾子興慶曰兒小願用兄許之興慶鬭矢盡而死西魏賀拔勝以十三騎逐神武劉洪徽射中其二勝槊將中神武段孝先橫射勝馬殪遂免豫洛二州平神武使劉豐徇地至恆農而還按芒山即北邙也張載七哀作北邙周武平鄴北史周武帝建德五年冬十一月帝發京師十二月次晉州置陳東西二十餘里乘常御馬從數人巡陳所至輒呼主帥姓名慰勉之將戰所司請换馬帝曰朕乘良馬何之齊人填塹南引帝勒諸軍擊之齊主與數十騎走并州帝率諸軍追齊主諸將請還師帝曰卿等若疑朕將獨往麾軍直進次并州齊主走鄴六年春正月傳位于其太子恆改年承光帝至鄴率諸軍奮擊遂平齊齊主走青州遣大將軍尉遲勤追之二月以齊主至帝降自阼階見以賔主禮按劭本齊人此事敘齊後主當更有致語被削必多城濮鄢陵城濮之戰在僖二十八鄢陵之戰在成十七春秋晉楚三大戰之二也敗于鞍成二晉卻克師陳于鞍齊師敗績逐之三周華不注吳入郢事在定四略見上卷按條內援左為况先後凡八事皆大篇也事熟故但舉年從略或問曰王劭齊志多記當時鄙言為是乎為非乎對曰古往今來名目各異區分壤隔稱謂不同所以晉楚方言齊魯俗語六經諸子載之多矣釋首原古俗方言經籍並載自漢已降風俗屢遷求諸史籍差覩其事或君臣之目施諸朋友或尊官之稱屬諸君父曲相崇敬標以處士王孫輕加侮辱號以僕夫恐作役夫為允舍長亦有荆楚訓多為夥廬江目橋為圯南呼北人曰傖西謂東胡曰虜渠們底箇江左彼此之辭乃若君卿中朝汝我當作爾汝之義斯並因地而變隨時而革布在方册無假推尋足以知氓俗之有殊驗土風之不類釋次言近古史籍亦載俗稱然自二京失守四夷稱制夷夏相雜音句尤媸而彥鸞伯起務存隱諱舊注謂長為藏蓋為姚萇諱按偏舉諱名與本義無涉非原注也重規德棻志在文飾遂使中國數百年內其俗無得而言釋自晉失中原國音迭變而史氏鄙而諱之失其真矣蓋語曰知古而不知今謂之陸沈又曰一物不知君子所恥是則時無逺近事無巨細必籍通藉多聞以成博識釋數語呼起劭志自居瑣細言有分寸如今之一無之字所謂者若中州名漢關右稱羌易臣以奴呼母云姊主上有大家之號師人致兒郎之説六句皆言現在俗傳口語凡如此例其流甚多必尋其本源莫詳所出閲諸齊志王劭作則了然可知由斯而言劭之所録其為𢎞益一作益彌多矣足以開後進之蒙蔽廣來者之耳目微君懋吾幾面墻於近事矣而子奈何妄加譏誚者哉釋唯王劭能存質語特深許之按知幾論史黜飾崇真偏於里音不惜紙費可云有質癖矣處士王孫後漢禰衡傳衡為江夏太守黃祖作書記各得體冝祖持其手曰處士正得祖意楚辭招隱士王孫遊子不歸春草生子凄凄漢韓信傳吾哀王孫而進食豈望報乎注蘇林曰王孫如言公子也僕夫舍長左襄四虞人之針曰獸臣司原敢告僕夫文元楚世子商臣享江芉而勿敬江芉怒曰呼役夫舍史記扁鵲傳扁鵲姓秦氏名越人少時為人長注守客館之司故云舍長也多為夥史記陳涉世家涉既王故人入見曰夥頤涉之為王沈沈者楚人謂多為夥故天下傳之橋為圯史記留侯世家良嘗間從容步遊下邳圯上注徐廣曰圯橋也東楚謂之圯音怡南呼北傖晉書周玘傳殺我者諸傖子宋書索虜傳傖人謂换易為博世説雅量禇公乘估客船投錢唐亭住時縣令當送客出亭吏驅公移牛屋下令問牛屋下是何物人吏云昨一傖父來寄亭中有尊貴客權移之按所指皆北人也西謂東虜史記髙祖紀項羽伏弩射中漢王傷胸乃捫足曰虜中吾指又婁敬傳敬諫伐丐奴上罵曰齊虜以口舌得官後漢書光武擊尤來大槍反為所敗笑曰幾為虜嗤北史僭燕傳關中謠曰太歲南行當復虜西人呼徒河為白虜按所指皆東人也渠們底箇郭注漢書云渠有其子乎切今填詞家言俺們我們集韻們莫奔郭注隋唐嘉話崔湜為中書令張嘉貞為舍人湜輕之常呼為張底楊子法言箇枚也儀禮三個注今俗名枚曰個左昭三二惠競爽又弱一個焉南史王鎮之傳若遣一個有以相存按渠們底箇並可兩字連説渠們猶言他們底箇猶言那箇乃若君卿祭統衛孔悝之鼎銘曰若纂乃考服鄭注若乃猶汝也按乃亦作乃張良傳豎儒幾敗乃公事唐韻古音古人讀若為汝史記云吾翁即若翁漢書云吾翁即汝翁可據也東坡墨君堂記凡人相與稱謂貴之則公賢之則君韻會敵體相卿隋唐以來下已則稱卿愚按隋前已然晉庾峻傳峻子敳王衍不與敳交敳卿之不置衍曰君不得為爾敳曰卿自君我我自卿卿中州名漢北齊帝后傳受漢老嫗斟酌崔季舒傳漢兒文官連名總署按古來威懾邊朔惟漢最久遂襲以為華稱關中稱羌師曠禽經張華杜宇注曰鱉靈鑿巫山蜀人住江南羌住江北號曰西州北史儒林傳李業興師事徐遵明鮮于靈馥曰李塵久逐羌博士何所得也又北史周尉遲迥襲洛陽齊將段韶曰西羌窺逼膏肓之病按二傳言羌正指關右言臣奴易臣為奴南北朝史如北齊恩幸傳云帝家諸奴叨竊貴幸北史藝術傳云齊文襄曰我家羣奴猶極貴皆指近習僕役言非正謂朝臣也因閲宋書魯爽傳魏主燾南寇爽與弟秀從渡河謀歸南請曰奴與南有讐云云下自釋云羣下於其主稱奴猶稱臣也按此為的據母姊姊本作姊北齊書文宣皇后李氏武成踐阼逼淫有娠太原王至閣不得見愠曰兒豈不知耶姊姊腹大故不見康熙字典北齊太子稱生母曰姊姊主上大家蔡雍獨斷天子親近侍從稱為大家北齊神武紀何故觸大家又恩幸傳大家正作樂又大家去大家去師人兒郎爾雅釋言師人也郭注謂人衆左傳師人多寒舊唐書封常清傳髙仙芝呼謂所召募兵曰我於京中召兒郎輩得少許物裝束未能足按書傳所見上梁文每發號必喚兒郎偉皇家修五代史梁陳北齊後周隋館中墜藁仍存皆因彼舊事定為新史觀其朱墨所圗通塗鉛黃所拂猶有可識者或以實為虛以非為是釋節首統舉以下專糾百藥北齊其北齊國史皆稱諸帝廟號及李氏撰齊書其廟號有犯時諱者原注謂有世字犯太宗文皇帝諱也即稱諡焉至如變世宗誤作祖為文襄改世祖誤作宗為武成茍除兹世字而不悟襄成有别句意未足恐有脫字諸如此謬不可勝紀釋因避諱而失者一又舊誤故其列傳之敘事也或以武定臣佐降在成朝或以河清事迹擢居襄代故時日不接而隔越相偶使讀者瞀亂而不測驚駭而多疑釋紊時代而失者又一嗟乎因斯而言則自古著書未能精讜書成絶筆而遽捐舊章遂令玉石同燼一作盡真偽難尋者不其痛哉釋末復總慨按此條糾百藥書所言改廟稱諡似非大病紊時則不可然亦約舉以見失真之概也至首尾言墜藁塗拂舊章捐燼尤增浩歎矣本來面目屈受改移推其用心不殊於惡害已而去其籍者恭慎君子戒之哉愚綜礉此書有行本互異者必注一作某有更定訛謬者必注舊作某蓋深懼塗拂捐燼之為戾也世宗世祖北齊書髙澄神武長子天保初追尊文襄皇帝廟號世宗髙湛神武第九子諡武成皇帝廟號世祖武定河清魏書孝武既入關齊神武迎清河王亶世子立之是為東魏孝靖帝天平四年改元武定北齊書武成帝湛改元河清周書一條今俗所行周史是令狐德棻等所撰其書文而不實雅而無檢真迹甚寡客氣尤煩釋皆就變俚為雅立論尋宇文初習華風事由蘇綽至於軍國詞令皆凖尚書太祖敕朝廷他一無他字文悉凖於此蓋史臣所記皆稟其規栁虬之徒從風而靡釋始於令敕倣古因而史筆從風案綽文雖去彼淫麗如南朝北梁諸書存茲典實謂規倣尚書之體而陷於矯枉過正之失乖夫適俗隨時之義茍記言若是則其謬逾多爰及牛𢎞彌尚儒雅即其一有書字舊事因而勒成務纍上聲清言罕逄佳句據文義佳句恐是往句之訛謂無復原初質語也釋此層申論上意而本指所糾乃在下文而令狐不能别求他述一作術述通用廣異聞唯憑本書重加潤色原注案宇文氏事多見於王劭齊志隋書及蔡允恭後梁春秋其王褒庾信等事又多見於蕭韶太清記蕭大圜淮海亂離志裴政太清實録杜臺卿齊記而令狐德棻了不兼採以廣其書蓋以其中有鄙言故致遺略遂使周氏一代之史多非實録者焉釋糾令狐書是節主按此條蓋糾令狐周書也其中間一片皆是原往關右倣行周官啓自蘇綽其人好緣飾經術以宇文周而貌成周豈特碔砆之與美玉而已用夏變夷聖賢所喜史臣載筆烏得舉其國書盡辨髦之客氣左定八公侵齊門於陽州士皆坐列曰顔髙之弓六鈞皆取而傳觀之師退冉猛偽傷足而先又侵齊攻廪丘之郛主人出師奔冉猛逐之顧而無繼偽顛陽虎曰盡客氣也蘇綽詞令周書本傳綽字令綽歷官大行臺左丞自有晉之季文體浮華周文因魏帝祭廟羣臣畢至乃命綽依尚書體為大誥自是之後文筆皆依此體按今取其書覆之頗有類王莽傳者後閲王應麟語亦云蘇綽大誥近於莽矣栁虬見史官建置篇牛𢎞見世家篇隋書一條昔賈誼上書朝錯對䇿皆有益軍一作於國足貽勸戒而編於漢史一作史漢非讀者猶恨其繁如隋書王劭袁充兩傳唯録其詭辭妄説遂盈一篇尋又申以詆訶尤其諂惑夫一多史字一多人字載言示後一多世宇者貴於辭理可觀既以無益而書豈一作孰若遺而不載蓋學者神識有限而述者注記無涯以有限之神識觀無涯之注記必如是則閲之心目視聽告勞書之簡編繕寫不給嗚呼茍自古一脫古字著述其皆若此也則知李斯之設坑穽董卓之成帷蓋雖其所行多濫終亦有可取焉有激之辭按觀兩傳所録詭辭其人諒不得為純臣矣但袁充無别見若劭則平生著述實非一種隋書一概抹煞而獨揚其所醜實於史體有乖揚雄著書美新最穢班史不録獨於法言玄經書之甚詳是可識去取之則也王劭任北朝史事大概都輯國書不為飾説人盡醜之令與袁充同傳顓載蕪篇意顯出於偏抑知幾力與申理言又豈無過激讀者參取史與史通而持平劑量焉庶乎兩見其情矣此論愚於曲筆篇頗及之王劭袁充兩傳隋書王劭齊滅入周言上有龍顔戴干之表上表言符命云云有人於黃鳯泉得二白石頗有文理遂附致其文為字又撰皇隋靈感志文獻皇后崩復上言生天之應按此所録王劭詭辭也廢袁充字德符陳滅歸國頗解占候領太史令時將太子因希旨觀象言當廢復表奏隋興已後日景漸長又言上本命與隂陽律吕合者六十餘條煬帝初充奏曰景逾長即位與堯受命年合信所謂唐哉皇哉皇哉唐哉者矣按此所録袁充詭辭也又按北史房彥謙傳太原王劭北海髙構蓨縣李綱中山郎茂郎穎河東栁彧薛孺皆一時知名雅淡之士彥謙並與為友門無雜賔據此卲固名流所推重也彥謙玄齡父時所稱素儉無私者李斯坑穽史記秦紀丞相斯請史官非秦記皆燒之非博士官所職天下敢有藏諸書百家語者􅊖詣守尉雜燒之使御史悉案問諸生諸生傳相告引四百六十餘人皆坑之咸陽董卓帷蓋後漢儒林傳序初光武遷洛陽經牒祕書載之二千餘兩及董卓移都自辟雍東觀蘭臺石室宣明鴻都諸藏競共割散其縑帛圖書大則連為帷蓋小乃制為縢囊王允所收而西裁七十餘乘長安之亂一時焚蕩案隋史譏王君懋撰齊隋二史舊有其字敘録煩碎此處當補及其自編隋書仍復蕪辭不翦云云方得文義清劃行本缺至如劉臻還宅訪子方知王劭思書為奴所侮此而畢載為失更多可謂尤而效之罪又甚焉者矣按此復抽論令狐隋書之猥雜也節首譏王君懋等句止是挑筆若其脫句不補幾不知此條何指劉臻還宅隋書本傳臻字宣摯位儀同三司臻性多忘有劉訥亦仕儀同臻欲尋訥謂從者曰汝知劉儀同家乎從者不知謂臻還家于是引之而去既扣門臻尚未悟據鞍大呼曰劉儀同可出矣其子迎門臻驚曰汝亦來耶其子曰此是大人家顧盼久之方悟王劭思書隋書本傳劭篤好經史用思既專性頗恍惚每至對食閉目凝思盤中之肉輒為僕從所噉劭弗之覺唯責肉少數罰厨人厨人以白劭劭依前閉目伺而獲之其專固如此史通通釋卷十七
