body:
  text: 史通通釋卷十五無錫浦起龍撰外篇㸃煩第五煩或作繁文內並同小序一正條十四夫史之煩文已於叙事篇言之詳矣舊有然凡俗難曉下愚不移九字可厭冝削雖七叙事篇在六卷疑當作六卷成言而三隅莫反蓋語曰百聞不如一見是以聚米為谷寇虜之虛實此二字一止作居字可知畫地成圗山川之形勢一少勢字易悉釋揭出丹黃㸃示之象昔陶隱居本草藥有冷熱味者朱墨㸃其名阮孝緒七録書有文德殿者丹筆寫其字由是區分有别品類可知釋援出成式可仿今輒擬其事鈔自古史傳文有煩者皆以筆㸃其煩一無煩字上原注其㸃用朱粉雌黃並得凡字經㸃者盡宜去之如其間有文句虧缺者細書側注於其右原注其側書亦用朱粉雌黃等如正行用粉則側注者用朱黃以此為别或回易數字或加足片言俾分布得所彌縫無闕庶觀者易悟其失自彰知一作如我托實而談非是一作是非茍誣前哲釋結明所以鈔明㸃示之意按河東云參之太史以著其潔潔非瘦削之謂也劉子則以削為宗然當六朝塗澤之餘從未有此辣手刮世眼者故是韓栁輩前驅也可惜傳刻失真㸃去文留譬眺古者空憑廢蹟而已聚米為谷後漢馬援傳援字文淵屯田上林苑中帝自西征隗囂至漆召援援於帝前聚米為山谷指畫形勢開示衆軍所從道徑往來分析曲折昭然可曉帝曰虜在吾目中矣畫地成圗漢張湯傳湯子安世安世長子千秋與霍光子禹隨擊烏丸還謁大將軍光問戰鬬方略山川形勢千秋口對兵事畫地成圗無所忘失禹不能記曰皆有文書光由是歎曰霍氏世衰張氏興矣孔子家語曰魯公索氏將祭而忘其牲孔子聞之曰公索氏不及二年一有必亡二字矣一年而亡門人問曰昔公索氏亡其祭牲而夫子曰不及二年必亡今果如期而亡夫子何以知然右除二十四字按篇內加除標數舊作小書繫本條大書之下兹緣增有小注及摘辨語因移置次行亞一格大書除上加右字標數必不免有差誤㸃失無考惜哉家語曰晉將伐宋使覘之宋陽門之介夫死司城子罕哭之哀覘者反言於晉侯曰宋陽門之介夫死而郭無而字司城子罕哭之哀民咸悅矣宋殆未可伐也右除二十一字加三字加一作移按此條亦見檀弓㸃煩本㸃史筆之煩而首之以家語二條者蓋假前古復叠文法啓示其端隨手涉筆偶及之非有所定主也己下大概皆就史記㸃之亦是隨筆所至史記五帝本紀曰諸侯之史無之字朝覲者不之丹朱而之舜百姓之史無此三字獄訟者不之丹朱而之舜謳歌者皆古本有皆字史內無皆字不謳歌此二字一作之字按一作之字者當是除前獄訟句內不之等七字并入此一句中故加皆字以該之則其下謳歌二字亦當作之字也丹朱而謳歌舜已止堯紀舜年二十以孝聞三十而帝堯問可用者云云舜年二十以孝聞年舊脫年事三十舜年以下等字古本有俗本削堯舉之已上舜紀右除二十九字加七字按文內如百姓之三字及之字皆字等即細書側注之所加也傳寫者溷入之今轉嫌溷而存者遺落不全耳又節內有空格者以意起例别斷文也如謳歌舜之下則堯舜二紀分章處用者云云之下則舜紀中間節句處也凡此類後皆倣是舜年二十復出之文見舜紀篇尾劉所㸃除正在於此古本有之而郭本削之㸃安所施北平本反從郭本未之思耳夏本紀曰禹之父曰鯀鯀之父曰帝顓頊顓頊之父曰昌意昌意之父曰黃帝禹者黃帝之𤣥孫而帝帝字照史補顓頊之孫也禹之曽大父舊衍曰字昌意及父鯀皆不得在帝位為人臣右除五十七字加五字除數太多恐有誤案顓頊紀中已具云黃帝是顓頊祖矣此篇下云禹是顓頊孫則其上不得更言黃帝之𤣥孫既上云昌意及鯀不得在帝位則於下文不當復云為人臣今就於朱㸃之中復有此重復造次筆削庸可盡乎按此上四行舊本與除加標數連下今離列之似較清畫也項羽本紀曰項籍者下相人也字羽初初字照史補起時年二十四其季父項梁梁父即即字照史補楚將項燕為秦將王翦所殺史作戮者也項氏世世史有為字楚將封於項故姓項氏右除三十二字加二十四字釐革其次序按此條皆史記原文不見有加字處蓋其所云細書側注者已盡失之矣抑恐此條所鈔亦當不止於此若止此三行亦安得有三十餘字之除革乎况文內殊少煩復異於他所摘者亦安所庸其除革乎更恐此條原本全失但存項羽本紀四字後人聊寫篇頭數語以當之耳吕后郭誤作氏本紀曰吕太后者髙祖微時妃也生孝惠帝史有女字魯元公主及髙祖為漢王得定陶戚姬愛幸生趙隱王如意髙祖嫌史無此三字孝惠為人仁弱髙祖以為不類我常欲廢太子立戚姬子如意如意郭脫如意二字類我又史無又字戚姬幸常獨史無獨字從上之關東日夜啼泣欲立其子如意以史無此三字代太子吕后年長常留守希見上益踈如意立為趙王後幾代太子者數矣賴大臣諍史作爭之及留侯䇿太子得無廢原注此事見髙惠二紀及諸王叔孫通張良等傳過為重叠矣今又見於吕后紀固可略而不言劉意蓋謂并可不㸃矣而史既有之姑就其文㸃之右除七十五字加十字據文止加八字按此除加一行舊亦與前注并寫今照例離立按文亦多髙祖嫌又獨如意以等字欲去煩而煩轉滋矣故知皆側注所加之文也而㸃則失之蓋見加不見除也宋世家曰初元公之孫紏景公殺之史無此十字皆細書溷入者景公卒紏之此二字史作宋公據上易糾之字則此公字亦宜省子特攻殺太子而自立是為昭公昭公者此下史有元公之曽庶孫也昭公九字父公孫糾糾父公子郭脫此二字褍秦史叠褍秦二字即元公少子也景公殺昭公父糾故昭公怨殺太子而自立據節首所加則自昭公者以下大半皆在所㸃除也右除三十六字加十三字據文止加十二字按諸條間有加字闌入處而無除去原文之文獨此失元公曽庶孫等九字必是朱黃所㸃㸃或稍重侵入字裏傳寫者遂遺去之實亦應留受㸃者也三王世家曰大司馬臣去病昧死再拜上疏皇帝陛下陛下過聽使臣去病待罪行間冝專邉塞之思慮暴骸中野無以報乃敢惟他議以干用事者誠見陛下憂勞天下哀憐百姓以自忘虧膳貶樂損郎貟皇子賴天能勝衣趨拜至今無號位師傅官陛下恭讓不恤羣臣私望不敢越職而言臣竊不勝犬馬之史無之字下同心昧死願陛下詔有司因盛夏吉時定皇子位惟陛下幸察臣去病昧死再拜以聞皇帝陛下三月乙亥御史臣光守尚書令奏未央宫郭脫宫字制曰下御史六年三月戊申朔乙亥御史臣光守郭脫守字尚書令丞非下御史書到言丞相臣青翟御史大夫臣湯太常臣充大行令臣息太子少傅臣安行宗正事昧死上言大司馬臣去病上疏曰陛下過聼使臣去病待罪行間冝專邉塞之思慮暴骸中野無以報乃敢惟他議以干用事者誠見陛下憂勞天下哀憐百姓以自忘虧膳貶樂損郎貟皇子賴天能勝衣趨拜至今無號位師傅官陛下恭讓不恤羣臣私望不敢越職而言臣竊不勝犬馬之心昧死願陛下詔有司因盛夏吉時定皇子位惟陛下幸察制曰下御史臣謹謹字照史補與中二千石二千石叠三字照史補臣賀等議曰史無曰字古者裂地立國並建諸侯以承天子所以尊宗廟重社稷也今臣去病上疏不忘其職因以宣恩乃道天子卑讓自貶以勞天下慮皇子未有號位臣青翟臣湯等宜奉義遵職愚憃史作憧音義同不逮事方今盛夏吉時臣青翟臣湯等郭本此上脫二十二字昧死請立皇子臣閎臣旦臣胥為諸侯王昧死請所立國名右除一百八十四字加一字據文加三字已上有言語相重者今略㸃廢如此但此一篇所記全冝削除今輒具列於斯藉為鑒戒者爾凡為史者國有詔誥十分不當取其一焉句意過當有誤故漢元帝詔曰蓋聞安民之道本由隂陽間者隂陽錯謬風雨不時朕之不德庶幾羣公有敢言朕之過者今則不然偷合茍從未肯極言朕甚憫焉永惟蒸庶之饑寒遠離父母妻子勞於非業之作衛於不居之宫恐非所以佐隂陽之道也其罷甘泉建章宫衛士各令就農百官各省費條奏母有所諱有司勉之毋犯四時之禁丞相御史舉天下明隂陽災異者各三人及荀悅撰漢記略其文曰朕惟衆庶之饑寒遠離父母妻子勞於非業之作衛於不居之宫其罷甘泉建章宫衛士各令就農丞相御史舉天下明隂陽災異者各三人自餘鈔撮他皆倣此近則天朝諸撰史者凡有制誥一字不遺唯去詔首稱門下詔尾去諸本作云誤主者施行而已時武承嗣監修國史見之大怒謂史官曰公輩是何人而敢輒减詔書自是史官寫詔書雖門下贊詔亦録後豫聞此說每嗢噱或作唱歎或作唱噱並誤而已必以三王世家相比其煩碎則又甚於斯是知史官之愚其來尚矣今之作者何獨笑武承嗣而已哉按已上一假是引例語亦係另文舊本混作正條謬甚今刋置之按御史叙録霍疏大似近代公移每轉行一畨必全叙一畨所以然者一以免鈍胥之摘句失當也一以防姦吏之舞文售欺也乃若垂為史法安可不知所裁魏公子傳曰髙祖始微少時數聞公子賢及即天子位每過大梁常祠公子髙祖十二年從擊黥布還為公子置守冡五家世世歲以四時奉祠公子太史公曰吾過大梁之墟求問其所謂夷門以徴信陵君故事說者云當戰國之時史無以徴以下十五字夷門者城之東門也天下諸公子亦有喜照史改舊誤作嘉士者矣然而信陵君之接巖穴隱者不恥下交名冠諸侯有以也此七字史作有以也名冠諸侯不虛耳髙祖每過之奉祠二字照史刋正郭王本並倒不絶也舊脫也字右除十五字加二十字加數亦不合按此條亦見加不見除之一證傳贊加字反覺退味此其手筆落時處攻者顧莫之察要是此書敗端也愚不敢蔽魯仲連傳曰仲連好竒偉倜史作俶音義同儻之畫史有䇿字而不肯仕官王訛作宦任職好持髙節逰於趙趙照史叠趙字孝成王時而秦王使白起破趙長平之軍前後四十餘萬秦史有兵字遂東圍邯鄲趙王恐諸侯之救兵莫敢擊秦軍軍字照史補亦作兵魏安釐王使將軍晉鄙救趙畏秦止於蕩隂不進魏王使客將軍新垣衍間入邯鄲因平原君謂趙王曰秦所為或作以急圍趙者前與齊湣史衍下同王爭强為帝已而復歸帝號史無號字今齊湣王已益弱方或脫方字今惟秦雄天下此非必貪邯鄲其意欲復求為帝趙誠發使尊秦昭史衍王為帝秦必喜罷兵王衍而字去平原君猶豫未有所决此時魯史有仲字下同連適逰趙㑹秦圍趙聞魏將欲令趙尊秦為帝乃見平原君曰事將奈何平原君曰勝也何敢言事前亡四十萬之衆於外今又內圍邯鄲而不能能字照史補去魏王使客將軍新垣衍令趙帝秦今其人在此史作是勝也何敢言事魯連曰吾始以君為天下之賢公子也吾乃今然後知君非天下之賢公子也梁客新垣衍安在吾請史作且為君責而歸之平原君曰勝請為紹介而見之於先生平原君遂見新垣衍曰東國有魯連先生者今其人在此勝請為紹介而交之於將軍新垣衍曰吾聞魯連先生齊史有國字之髙士也衍人臣也使事有職吾不願見魯連先生平原君曰勝史有既字已泄之矣新垣衍許諾魯仲連見新垣衍而無言新垣衍曰吾視居此圍城之中者者字照史補皆有求平原君者也今吾觀先生之玊貌非有所求於平原君者也曷為一脫為字史又有久字居此重圍重圍史作圍城之中而不去魯連云云梁未覩秦稱帝之害故耳此二字一作也使梁覩秦稱帝之害則必助趙矣新垣衍曰秦稱帝之害奈何魯連曰云云吾將使秦王烹醢梁王新垣衍怏然不悅曰嘻史作噫嘻亦太一脫太字甚矣先生之言也先生又烏一作焉能使秦王烹醢梁王魯連曰固也誤作矣吾將言之云云依例當有云云字舊脫今秦萬乘之國也梁亦萬乘之國也俱據萬乘之國交史作各有稱王之名覩其一戰而勝欲從而帝之云云於是新垣衍起再拜舊多而字謝曰始以先生為庸人吾乃今日知先生為天下之士也云云云云字亦舊脫適㑹魏公子無忌奪晉鄙軍以救趙擊秦軍秦軍舊脫秦軍二字遂引而去於是平原君欲封魯連魯連照史叠魯連二字諸本脫辭謝者三此四字史作辭讓使者三終不肯受平原君乃置舊訛致酒酒酣起前以千金為魯連夀云云右除二百七十五字加七字二百一作三百屈原賈生二字舊脫傳曰依例當有曰字今補漢有賈生為長沙王太傅過湘水投書以弔屈原賈生名誼洛陽人也云云二字亦依例補謫謫字史作乃以二字賈生為長沙王太傅賈生既辭往史有行字聞長沙卑濕自以為史無為字夀不得長又以謫去意不自得及渡湘水為賦以弔屈原其詞曰云云賈生為長沙史有王太二字傅三年有梟飛入賈生舍止於坐隅楚人命梟曰鵩賈生既以謫居長沙長沙一脫長沙叠字卑濕自恐恐字史作以為二字夀不得長傷悼之乃為賦以自廣其詞曰云云懷王騎墮馬而死無後賈生自傷為傅二字脫照史補無狀哭泣二字脫照史補歲餘亦死時年三十三舊訛二矣右除七十六字加三字扁鵲倉公傳曰太倉公者齊太倉長臨淄人也姓淳于氏一脫氏字名意少而喜醫方術髙后八年更受師同郡元里公乘陽慶慶年七十餘無子使意盡去其故方更悉以禁方與之傳黃帝扁鵲之脉書五色診病知人死生决嫌疑定可治及藥論甚精受之三年為人治病决死生决嫌疑以下六句古本有俗削多驗云云二字亦依例補詔召召字照史補問所為治病死生驗者幾何人主名為誰詔問故太倉長臣意方伎所長及所能治病者者字照史補有其書無有皆安受學受學幾何歲常有所驗何縣里人也何病醫藥已訛作與照史改其病之狀皆何如具一作其悉而一作以對臣意對曰自意少時喜醫藥史叠醫藥二字方試之多不驗者至髙皇皇字史脫后八年舊多中字得見師臨淄元里公乘陽慶慶諸本慶字作已字年七十餘意得見事之謂意曰盡去而方書非是也慶有古先道遺傳黃帝扁鵲之疹書五色診病知人死生决嫌疑定可治及藥論論字補書甚精我家給富心愛公欲盡以我禁方書悉教公臣意即曰幸甚非意之所敢望也臣意即避席再拜謁受其脉書上下經五色診竒史音羇咳術揆度隂陽外變藥論石神接隂陽禁書受讀解驗之可一年史有所字明歲即驗之有驗之有驗三字脫照史補然尚未精也要事之三年所即嘗諸本脫即字嘗作常以為人史有治字診病决死生有驗精良今慶已死十年史有所字臣意年盡三年二字脫照史補三十九歲一脫歲字也齊侍御御字脫照史補史成自言病頭痛頭痛或誤作也或誤作邪臣意診其脉告曰君之病惡不可言也原注已下皆述一生醫療效驗事此十一字諸本皆與標數併寫愚意移作尾注為是右除二百九十五字按本節前假先有决嫌疑六句二十二字亦由㸃重侵字而遺者古本有之須悟是篇諸所採摘文愈復則㸃煩之意愈顯注家以為此廢卷也竟束史不詳孤負多矣宋世家初云襄公嗣立一訛位後詳文義當有後字諸本脫仍謂為宋襄公不去宋襄一多公字非二字吳世家云闔閭越世家云勾踐每於其號上加吳王越王字句句未嘗捨之孟嘗君傳曰馮公形容狀貌甚辨案形容狀貌同是一說而敷演重出分為四言凡如此流不可勝載其十二諸侯表曰孔子次春秋約其辭文去其煩重又屈原傳曰其文約其辭微觀子長此言實有深鑒及自撰史記榛蕪若此豈所謂非言之難而行之難乎按此一節再就史記統摘之以概其餘亦非㸃煩正條故亦用亞一格之例漢書龔遂傳曰上遣使者徴遂議曹王生請史作願從功曹以為王生素諸本作每照史改嗜酒亡節度不可使諸本作從照史改遂不聼聽字史作忍逆二字從至京師王生日飲酒不視太守㑹遂引入宫王生醉從後呼曰明府且止願有所白遂還問其故王生曰天子即問君何以治渤海君不可有所郭脫所字陳對宜曰皆聖主之德非小臣之力也遂受其言既至前上果問以治狀遂對如王生史有言字天子悅其有讓笑曰君安得長者之言而稱之遂因前曰臣非知此乃臣議曹教戒臣也云云上以議曹王生為水衡丞右除八十四字新晉書袁宏傳曰袁宏有逸才文章絶美曽為詠史詩是其風情所寄少孤貧以運租自業謝尚時鎮牛渚秋夜乘月率爾與左右微服泛江㑹宏在舫中諷其所作詠史詩史無此六字詳下文有即其詠史句不應此處先提恐是羡文詠聲既清㑹㑹字照史補詞又藻麗史作拔遂駐聼久之遣問焉答云是袁臨汝郎誦詩即其詠史之作也尚傾諸本訛頃照史改率有勝致即迎升舟與之談論申旦不寐自此名譽日茂云云從桓溫北伐史作征作北征賦皆皆字照史補其文之髙者嘗與王珣伏滔同在舊衍桓字溫坐溫令滔讀其北征賦至聞所傳於相傳云獲麟於此或訛北野誕靈物以瑞德奚授或訛受體於虞者疚尼父之慟泣似實慟而非假豈一性之足傷乃致傷於天下其本至此便改韻珣云此賦方傳千載無容率爾今於天下之後諸本衍使改二字不成語移韻徙諸本訛從照史改事然於寫送之致似為未盡滔云得益寫韻一句或為小勝史有溫曰卿思益之六字宏應聲答曰感不絶於豫心訴流風而獨寫云云謝安嘗賞其機對辨速後安為揚州刺史宏郭脫宏字自吏部郎出為東陽郡乃祖道於冶舊訛治亭時賢皆集謝安欲卒迫試之臨别執其手顧郭訛願就左右取諸本作以照史改一扇而授之曰聊以贈行宏應聲答曰輒當奉揚仁風慰彼黎庶觀者無不歎服史無此六字而歎字下復重出亦恐羡文時人歎其率或作卒而能要焉原注此事出檀道鸞晉陽秋及劉義慶世說右除一百一十四字加十九字按節首云新晉書注又云事出檀劉蓋是新晉採二書之語入史也但文內兩羡句不類加字細書亦决非彼書如此更思之亦即加字處其下復句乃其所㸃除也十六國春秋曰郭瑀有女始笄妙選良偶有心於劉昞遂别設一席於座前謂諸弟子郭本作子弟非凡在坐者皆瑀之及門也曰吾有一女年向成長欲覓一快女壻一作聓即古壻字誰坐此席者吾當婚或作壻焉昞遂奮衣來坐神志湛魏書作肅不如湛字勝然曰向聞先生欲求快女壻昞郭脫昞字其人也右除二十二字文句不多除數恐不到二十有餘必有誤按此節文與魏書劉昞傳同總按㸃煩一篇㸃既失傳靡從撿核矣然深心嗜古者按切史篇循文審挍亦自理緒可尋諸家或未暇也故訛漏尤多云㸃煩所列皆撿章句最繚繞者為條總十有四而摘遷史者乃居其九蓋舉正史首部以發凡也太史公雜取國語世本國䇿之羣書而彚為一書叠見復出古趣自流數墨尋行大家弗屑雖煩亦復何疵然劉氏之前論之者已振振有辭矣班叔皮曰一人之身文重思煩故其書刋落不盡尚有盈辭也觀是書者切磋究之固不必為煩者病亦不得謂㸃者苛補按史記內所摘三王世家一節劉氏施㸃固允而辨類却踈何也事係當日現件安得預撰世家其時漢初作誥録卷式一宗可備禮書一欵當云題目誤爾何煩不煩之云又張晏注以為篇亡禇補作也史通通釋卷十五
