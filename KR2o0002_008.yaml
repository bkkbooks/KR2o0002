body:
  text: 史通通釋卷八無錫浦起龍撰內篇摸擬第二十八夫述者相效自古而然故列禦冦之言理也則憑李叟揚子雲之草玄也全師孔公符朗晉書作苻朗則比迹於莊周范曄則參蹤於賈誼况史臣注記其言浩博若不仰範前哲何以貽厥後來釋篇言摸擬者師古之義也開局渾舉蓋摸擬之體厥途有二一曰貌同而心異二曰貌異而心同釋貌猶文也心猶實也二句分提下作兩扇應之何以言之蓋古者列國命官卿與大夫為别必於國史所記則卿亦呼為大夫此春秋之例也當秦有天下地廣殷周變諸侯為帝王目宰輔為丞相而譙周撰古史考一脫考字思欲擯抑馬記師放孔經其書李斯之棄市也乃云秦殺集內殺多作煞其大夫李斯夫一脫此三字以諸侯之大夫名天子之丞相以此而擬春秋所謂貌同而心異也釋擬書大夫第一則當春秋之世列國甚多每書他邦皆顯其號至於魯國直云我而已如金行握紀海內大同君靡客主之殊臣無彼此之異而干寶撰晉紀至天子之葬必云葬我某皇帝且或作但疑當作時無二君何我之有以此而擬春秋又所謂貌同而心異也釋擬稱我第二則狄滅二國君死城屠齊桓行霸興亡繼絶左傳云邢遷如歸衛國忘亡言上下安堵不失舊物也如孫皓暴虐人不聊生晉師是討後豫相怨而干寶晉紀云吳國既滅江外忘亡豈江外安一作被典午之善政同歸命之未滅乎以此而擬左氏又所謂貌同而心異也釋擬襲忘亡第三則春秋諸國皆用夏正原音征魯以行一作用天子禮樂故獨用周家正朔至如書元年春王正月者年則魯君之年月則周王之月原注考竹書紀年始達此義而自古説春秋者皆妄為解釋也如曹馬受命躬為帝王非是以諸侯守藩行天子班􅍓而孫盛魏晉二陽秋每書年首必云某年春帝正月夫年既編帝紀而月又列帝名以此而擬春秋又所謂貌同而心異也釋擬仿王正第四則五始所作是曰春秋三傳並興各釋經義如公羊傳屢云何以書記某舊作其事也此則先引經語而繼以釋辭勢使之然非史體也如吳均齊春秋每書災變亦曰何以書記異也夫事無他議言從已出輒自問而自答者豈是敘事之理者耶以此而擬公羊又所謂貌同而心異也釋擬用何以書句第五則作議論之文可一用之史法則非體且史漢每於列傳首書人名字至傳內有呼字處則於傳首不據文義刋正舊作已非詳如漢書李陵傳稱隴西任立政此下當有至胸奴招陵五字脫簡也陵字立政曰少公歸易耳夫上不言立政之字而輒言字立政曰少公者此省文從可知也至令狐德棻周書於伊婁穆傳首云伊婁穆字奴干既而續云太祖字之曰奴干作儀同面向我也夫上書其字而下復曰字豈是事從簡易文去重復者耶以此而擬漢書又所謂貌同而心異也釋擬字呼其人第六則愚謂此似無妨已下總評昔一本誤多謝承二字家語有云蒼梧人娶妻而美以讓其兄雖一多則字一多其字為讓非讓道也又揚子法言曰士一脫士字有姓孔字仲尼其文是也其質非也如向之諸子所擬古作其殆蒼梧之讓姓孔一有而字字仲尼者歟蓋語曰世異則事異事異則備異必以先王之道持今世之人一作民此韓子所以著五蠧之篇稱宋人有守株之説也世之述者鋭志於恐矜字之訛奇喜編次古文撰敘今事而一無而字巍然自謂五經再生三史重出多見其無識者矣釋總評貌同而心異至此束惟夫明識之士則不然何則其所擬者非如圖畫之寫真鎔鑄之象物以此而似也一作彼其所以為似者取其道術相會義理玄一作互同若斯而已亦猶孔父賤為匹夫栖皇舊作惶放逐而能祖述堯舜憲章文武亦何必居九五之位處南面之尊然後謂之連類者哉釋此段總挈貌異心同意蓋左氏為書敘事之最自晉已降景慕者多有類效顰彌益其醜然求諸偶中亦可言焉釋又一小挈後所列貌異心同凡七則皆以左氏為式也蓋君父見害臣子所恥義當略説不忍斥言故左傳敘桓公在齊遇害而云彭生乘公公舊脫一公字薨於車桓十八如干寶晉紀敘愍帝殁於平陽而云晉人見者多哭賊懼帝崩以此而擬左氏舊多又字所謂貌異而心同也釋師左氏不忍斥書之法第一則夫當時所記或未盡則先舉其始後詳其末前後相會隔越取同若左氏成七年鄭獲楚鍾儀以獻晉至九年晉歸鍾儀於楚以求平其類是也至裴子野宋略敘索虜臨江太子劭使力士排徐湛二字疑衍江湛僵仆於是始與劭有隙其後三年有舊衍徐字江湛舊無湛字為元凶所殺事以此而擬左氏亦一作又所謂貌異而心同也釋師左氏書事前後伏應之法第二則凡列姓名罕兼其字茍前後互舉則觀者自知如左傳上言羊斟則下曰叔牂一作子臧一止作臧並誤前稱子産則次見國當作曰僑其類是也至裴子野宋略亦然何者上書桓玄則下云舊誤作有敬道後敘殷鐵則先著景仁以此而擬左氏又所謂貌異而心同也釋師左氏書人名字互見之法第三則左氏與論語忽添論語是古文參錯處有敘人酬對茍非煩詞積句但是往復唯諾而已則連續而説去其對曰問曰等字如裴子野宋略云李孝伯問張暢卿何姓曰姓張張長史乎以此而擬左氏論語又所謂貌異而心同也釋師左傳論語敘應對省曰字之法第四則善人君子四字通泛恐有誤功業不書見於應對附彰其美如左傳稱楚武王欲伐隨舊誤作隋熊率且比曰季梁在何益桓六至蕭方等一脫等字三十國春秋説朝廷聞慕容俊死曰中原可圖矣桓溫曰慕容恪在其憂方大以此而擬左氏又所謂貌異而心同也釋師左氏彰美不待實敘之法第五則夫將敘其事必預張其本彌縫混説無取眷與眷通回顧之義言如左傳稱叔輒聞日蝕而哭昭子曰子一脫子字叔其將死乎秋八月叔輒卒昭二十一至王劭齊志稱張伯德夢山上挂絲占者曰其為幽州乎秋七月拜為幽州刺史以此而擬左氏又所謂貌異而心同也釋師左氏書預兆後省之法第六則蓋文雖缺略理甚昭著此丘明之體也至如敘晉敗於邲先濟者賞而云上當作中軍下軍爭舟舟中之指可掬宣十二夫不言攀舟恐脫擾字亂以刃斷指而但曰舟指可掬則讀者自覩其事矣至王劭齊志述髙季式破敵於韓陵追奔逐北而云夜半方歸槊血滿袖夫不言奮槊深入擊刺甚多而但稱槊血滿袖則聞者亦知其義矣以此而擬左氏又所謂貌異而心同也釋師左氏敘事片言蔽全形之法第七則意略與用晦篇同已下合論兩扇大抵作者自魏已前多效三史從晉已降喜學五經夫史才文淺而易摸經文意深而難擬既難易有别故得失亦殊蓋貌異而心同者摸擬之上也貌同而心異者摸擬之下也然人皆好貌同而心異不尚貌異而心同者何哉蓋鑑識不明嗜愛多僻悅夫似史而憎夫真史此子張所以致譏於魯侯有葉公好龍之喻也袁山松云書之為難也有五煩而不整一難也俗而不典二難也書不實録三難也賞罰不中四難也文不勝質五難也夫擬古而不類此乃難之極者何為獨闕其目乎嗚呼自子長以還似皆未覩斯義後來明達其鑒之哉釋結到教人學古神似毋貌似以為歸宿按此篇所論前論書法後論筆法也六朝著述率趨摸擬子元就彼風尚析出形神兩途頓使仙凡立判貌同心異貌異心同學古合離祕方盡此愚於左氏讀賈辛適縣悟韓栁贈行體讀薳啓疆對楚靈識歐蘇論事訣亦所謂貌異心同者乎若六朝之擬漢貌同而已左氏敘一人名封字諡傳中錯出讀者苦之必斟牂産僑之為擬竊謂非是符朗比莊周晉載紀苻朗字元達堅之從兄子也幼懷逺操不屑時榮著苻子亦老莊之流也隋經籍志符子二十卷在道德莊列類按苻隋志作符又宋書志及世説并注凡引符秦事並從竹符苻之辨具在正史篇范曄參賈誼曄本傳與諸甥姪書云吾於循吏以下諸序論筆勢縱放實天下之奇作其中合者往往不減過秦論貌同心異駱賓王文類同心異者龍蹲歸而宋樹伐質殊聲合者魚形出而吳石鳴按四傑與劉同時而稍前劉似仿其語意譙周古史考蜀志夲傳周字允南位亞九列不與政事撰定法訓五經論古史考之屬百餘篇江外忘亡按左閔二年言衛國忘亡為齊桓存衛加贊也今晉乃滅吳與存亡國異道而干寶乃套用其文故史通駮之歸命吳志後主皓降晉舉家遷於京師詔曰孫皓窮迫歸降其賜號為歸命侯春王正月春秋傳元年春王周正月按杜注云言周以别夏殷也誤解始此愚嘗論之春秋繫正於王者别魯於天子非别周於夏令也是侯國之史法也今述史通意益私慰所謂先得我心帝正月按孫盛魏晉陽秋不可得見今所傳王氏元經起晉惠帝太熙元年每嵗首亦必書帝正月史通仍不糾及愚前言其書在依託然否間者信矣陵字立政李陵傳昭帝立大將軍霍光左將軍上官桀素與陵善遣陵故人隴西任立政至胸奴招陵立政曰咄少卿良苦霍子孟上官少叔謝女請少卿來歸故鄉陵字立政曰少公歸易耳恐再辱奈何字之曰奴干周書伊婁穆傳穆字奴干弱冠為太祖內親信嘗入白事太祖望見悅之字之曰云云於是拜車騎大將軍儀同三司按此曰字之即史家所稱不名之義也不得云復蒼梧人按此事俗本史通並作謝承家語云云謝承三國吳人吳志無傳隋唐志但有謝承後漢書更無别著家語一書及得映鈔古本史通核之原無謝承二字因檢家語其文在卷四六本篇也蒼梧人家語作蒼梧橈姓孔字仲尼見法言吾子篇江湛南史宋江夷子湛字徽深領博士轉吏部尚書家甚貧無兼衣餘食魏太武至瓜步以湛兼領軍魏遣使求昏上召太子劭以下集議衆並謂宜許湛謂許之無益劭怒曰詎宜茍執異議聲色甚厲坐散俱出劭使班劔推排之殆於傾倒及劭之入弒湛直上省據窗受害意色不撓宋書徽深作徽淵魏太武作索虜再按本傳及徐湛之傳俱無同受排仆之文雖裴略不可得見而歷考時事知是史通衍文也羊斟叔牂左傳宣二鄭公子歸生受命于楚伐宋宋華元御之將戰華元殺羊食士其御羊斟不與及戰曰疇昔之羊子為政今日之事我為政輿入鄭師故敗華元逃歸見叔牂曰子之馬然也對曰非馬也其人也子産國僑按左傳云子産相鄭伯以如晉其下云僑聞文公之為盟主也傳中似此者多有但止稱僑或稱公孫僑而不稱國僑王伯厚嘗辨之愚故疑國字當作曰字以配下曰叔牂之句桓玄敬道按本傳玄字敬道但於所論書法未有明證而宋略又不可得因取晉宋二史與桓事有涉之人如劉道規何無忌魏詠之檀憑之諸葛長民等十餘人傳遍閲之都無是語蓋史家改易字句不盡舊文此等處即以史通作故實可也殷鐵景仁宋書劉湛傳湛與殷景仁素欵及俱被時遇猜隙漸生湛黨劉敬文父成未悟其機詣景仁求郡敬文遽往謝湛曰老父悖耄遂就殷鐵干祿又南史范泰傳泰卒議贈開府殷景仁曰泰素望未重不可王𢎞撫棺哭曰君生平重殷鐵今以此為報張長史乎此魏太武南侵時其尚書李孝伯與張暢臨城呼問之語也按今宋書暢傳節去問姓語南史則又增孝伯曰句並與裴略小異矣暢字少微蕭方等見稱謂篇慕容恪在晉載記恪字玄恭皓之第四子也皓將終謂雋曰恪智勇俱濟汝其委之及雋嗣位封太原王初建鄴聞雋死曰中原可圖也桓溫曰慕容恪尚存所憂方大耳山上挂絲北齊張亮傳亮字伯德拜太中大夫薛琡嘗夢亮云云亦與劭志稱伯德自夢小異槊血滿袖北齊帝紀爾朱兆等同會鄴挾洹水而軍神武乃於韓陵為圓陳合戰大敗之髙季式以七騎追奔度野馬岡與兆遇高昂望之不見哭曰喪吾弟矣夜久季式還血滿袖葉公好龍莊子逸篇子張見魯哀公不禮而去曰君之好士也有似葉公子髙之好龍屋室雕文盡寫以龍於是天龍下之窺頭於牖拖尾於堂葉公見之失其魂魄是葉公非好龍也好夫似龍而非龍也按王氏應麟曰莊子逸篇十有九司馬彪注唐世猶存今亡後漢書文選世説注藝文類聚太平御覽問見之書事第二十九昔荀悅有云立典有五志焉一曰達道義二曰彰法式三曰通古今四曰著功勳五曰表賢能干寶之釋五志也體國經野之言則書之用兵征伐之權則書之忠臣烈士孝子貞婦之節則書之文誥專對之辭則書之才力技藝殊異則書之干寶釋語不必與五志分貼於是採二家之所議徴五志之所取蓋記言之所網羅書事之所總括粗得於兹矣釋首引舊志論史家書事之體必其重大有關係者乃書之也然必謂故無遺恨猶恐未盡者乎今更廣以三科用增前目一曰敘沿革二曰明罪惡三曰旌怪異何者禮儀用舍節文升降則書之君臣邪僻國家喪亂則書之幽明感應禍福萌兆則書之三科以補五志也亦不與後文關貼於是以此三科參諸五志則史氏所載庶幾無闕求諸筆削何莫由斯釋此節特廣書事之途已上二節皆言所當書者大致與煩猥反對是為首截但自一無自字古作者鮮能無病茍書而不法則何以示後釋總提中截三節蓋班固之譏司馬遷也論大道則先黃老而後六經序遊俠則退處士而進姦雄述貨殖則崇勢利而羞賤貧此其所蔽也又傅玄之貶班固也論國體則飾主闕而折忠臣敘世教則貴取容而賤直節述時務則謹辭章而略事實此其所失也譏馬貶班引用成語以見作史最易招駮勿黏看尋班馬二史咸擅一家而各自彈射遞相瘡痏夫雖自卜者審而自見為難可謂笑他人之未工忘已事之已拙上智猶其若此而况庸庸者哉節中作頓挫茍目或訛作自前哲之指蹤校後來之所失若王沈孫盛之伍伯起德棻之流論王業則黨悖逆而誣忠義敘國家則抑正順而褒篡奪述風俗則矜夷狄而陋華夏其説散見諸篇之中此其大較也必伸以糾摘窮其負纍雖擢髮而數庸可盡耶子曰於豫何誅於此一無此字數家見之矣釋此節兩層皆從事理乖違處論書事之失抑又聞之怪力亂神宣尼不語而事鬼求福墨生所信故聖人於其間若存若亡而已若存若亡最圓活若吞燕卵而商生啓龍漦而周滅厲壞門以禍晉鬼謀社而亡曹江使返璧於秦皇圯橋授書於漢相此則事關軍國理涉興亡有而書之以彰靈驗可也節中頓挫而王隱何法盛之徒所撰晉史乃專訪州閭細事委巷瑣言非關軍國興亡者聚而編之目為鬼神傳録其事非要其言不經異乎三史之所書五經之所載也釋此節兩層從物異徴驗邊論書事之得失范曄博採衆書裁成漢典觀其所取頗有奇工至於方術篇及諸蠻夷傳乃録王喬左慈廩君槃亦作盤瓠言唯迂誕事多詭越可謂美玊之瑕白圭之玷惜哉無是可也節中頓挫又自魏晉已降著述多門語林笑林世説俗説皆喜載調一作啁謔小辨嗤鄙異聞在小説家可無譏也雖為有識所譏頗為無知所説而斯風一扇國史多同馴而濫入國史矣至如王思狂躁起驅蠅而踐筆畢卓沈湎左持螯而右杯劉雍榜吏以膳痂齡石戲舅而傷贅其事蕪穢其辭猥雜而歷代正史持為雅言茍使讀之者為之解頤聞之者為之撫掌一作抃固異乎記功書過彰善疸惡者也釋此節兩層從論詭誕謿諧邊書事之得失愚謂此諸點綴略見無妨已上三節統為中截大扺近代史筆敘事為煩榷而論之其尤甚者有四釋四句提後截夫祥瑞者所以發揮盛德幽贊明王至如鳯凰來儀嘉禾入獻秦得若雉魯獲如麕求諸尚書春秋上下數千載其可得言者蓋不過一二而已爰及近古則不然凡祥瑞之出非關理亂蓋主上所惑臣下相欺故德彌少而瑞或作祥彌多政逾劣而祥或作瑞逾盛是以桓靈受祉比文景而為豐劉石應符比曹馬而益倍而史官徵其謬説録彼邪言真偽莫分是非無别其煩一也釋侈寫符瑞為四煩之一當春秋之時諸侯力爭各擅雄伯自相君臣一作長經書某使來聘某君來朝者蓋明和好所通盛疑威字之訛德所及此皆國之大事不可闕如而自史漢已還相承繼作至於呼韓入侍肅慎來庭如此之流書之可也若乃藩王嶽牧朝會京師必也書之本紀則異乎春秋之義原注若漢書載楚王囂等來朝宋書載檀道濟等來朝之類是也夫臣謁其君子覲其父抑惟恆亦作常理非復異聞載之簡䇿一何辭費其煩二也釋常朝入紀為四煩之二愚謂有事入覲即臣子亦當書若乃一作乃若百職一作辟非遷除干官黜免其可以書名本紀者蓋惟槐鼎而已故西京撰史唯編丞相大夫東觀著書止列司徒太尉而近世自三公以下一命已上茍沾厚祿莫不備書且一人之身兼預數職或加其號而闕其位或無其實而有其名南北諸史以後大抵皆然贊唱為之口勞題署由其力倦具之史牘夫何足觀其煩三也釋虛銜備載為四煩之三夫人之有傳也蓋唯書其邑里而已其有開國承家世祿不墜積仁纍德良弓無改項籍之先世為楚將史記項羽本紀石建之後亷謹相承史記萬石君傳此則其事尤異略書於傳可也其失之者則有父官令長子秩丞郎聲不著於一鄉行無聞於十室而一無而字乃敘其名位一二或作一一無遺此實家牒非關國史其煩四也釋贅録世官為四煩之四於是考兹四事以觀今疑當作近古足驗積習忘返流宕不歸乖作者之規模違哲人之凖的也孔子曰吾黨之小子狂簡斐然成章不知所以裁之其斯之謂矣釋總繳書事四煩後截歸宿在此亦有言或可記功或可書而紀一作記闕其文傳亡其事者何則始自太上迄于中古其間文籍可得言焉夫以仲尼之聖也訪諸郯子始聞少皞之官叔向之賢也詢彼國僑載辨黃能一作熊之祟或八元才子因行父而獲傳見後篇元凱注或五羖大夫假趙良而見識商君列傳則知當時正史流俗所行若三墳五典八索九丘之書虞夏商周春秋檮杌之記其所缺略者多矣釋此節反以遺缺圓其説是餘文既而汲冡所述方五經而有殘一作殊馬遷所書比三傳而多别裴松補陳夀之闕謝綽拾沈約之遺斯又言滿五車事逾三篋者矣夫記事之體欲簡而且詳疏而不漏若煩則盡取省則多捐此乃忘折中之冝失均平之理惟夫博雅君子知其利害者焉釋末又帶及經傳正史之外掇拾殘叢折衷貴審也按書事與敘事篇各義敘事以法言書事以理斷法戒浮華理歸體要用意尤尊嚴也局分三截旁引正規森如律令荀悅五志語在荀紀髙祖第一班譏司馬見探賾篇此處多採一句傅玄貶班晉書傅玄字休奕御史中丞遷太僕撰論經國九流及三史故事評斷得失各為區例名為傅子為內外中篇笑他人二句陸機豪士賦序中語指蹤史記蕭相國世家髙帝曰夫獵追殺獸兔者狗也而發蹤指示狗處者人也吞燕卵鄭氏商頌譜有娀氏之女名簡狄吞鳦卵而生契殷本紀簡狄為帝嚳次妃爾雅釋鳥燕燕鳦啓龍漦外傳鄭語宣王之時童謠曰檿弧箕服實亡周國有夫婦鬻是器者夏之衰褒神化為二龍王請其漦藏之殷周莫之發也及厲王發之漦流於庭童妾遭之而孕育而棄之鬻弧服者取之以逸於褒是為褒后周本紀亦載之厲壞門左成十年晉侯夢大厲被髮及地搏膺而踊曰殺余孫不義余得請於帝矣壞大門及寢門而入公懼入於室又壞户公覺召桑田巫巫言如夢公曰何如曰不食新矣鬼謀社左哀七年初曹人或夢衆君子立于社宫而謀亡曹曹叔振鐸請待公孫強旦而戒其子曰我死爾聞公孫強為政必去之及伯陽即位好田弋曹鄙人公孫強好弋説之因訪政事有寵使聽政夢者之子乃行八年宋滅曹江使返璧注見書志篇再按前注鄭客樂資春秋後傳作鄭容圯橋授書事在史記留侯世家裴注徐廣曰圯橋也圯音怡李奇云上下邳人謂橋為圯按圯橋二字連用似誤然其後雜説中有廬江目橋為圯之文知其非失考也特隨俗通用耳王喬左慈見採撰篇廩君槃瓠後漢南蠻傳巴郡南郡蠻本有五姓未有君長乃共令各乘土船約能浮者當以為君餘姓悉沈唯務相獨浮因共立之是為廩君廩君死魂魄世為白虎槃瓠見斷限篇語林笑林隋經籍志語林十卷東晉處士裴啓撰笑林見因習篇世説俗説世説即臨川所撰見尚書家隋經籍志俗説三卷沈約撰驅蠅魏志注魏略云王思性急常執筆作書繩集筆端驅去復來思恚怒自起驅蠅不能得還取筆擲地踏壞之持螯晉書畢卓字茂世嘗謂人曰得滿數百斛船四時甘味置兩頭右手持酒杯左手持蟹螯拍浮酒船中便足了一生矣膳痂宋書劉穆之傳穆之之孫雍嗜食瘡痂以為味似鰒魚嘗詣孟靈休靈休瘡痂落牀上取食之靈休大驚答曰性之所嗜靈休瘡痂未落者悉褫取以飼雍遂舉體流血南康國吏二百許人不問有罪無罪遞互與鞭鞭瘡痂常以給膳傷贅南史朱齡石字伯兒少好武不事崖檢舅淮南蔣氏才劣齡石使舅臥聽事剪紙方寸帖著舅枕以刀子縣擲之相去八九尺百擲百中舅畏齡石終不敢動舅頭有大瘤齡石伺舅眠密割之即死按傷贅即割瘤也嘉禾書序唐叔得禾異畝同穎獻之天子王命唐叔歸周公於東作歸禾周公既得命禾旅天子之命作嘉禾秦得若雉史記封禪書秦文公獲若石云於陳倉北阪城祠之其神來也常以夜則若雄雞其聲殷云野雞夜鳴以一牢祠號曰陳寶按雄雞漢書郊祀志作雄雉魯獲如麕公羊傳哀公十四年春西狩獲麟孰狩之薪采者也薪采者則微者也曷為以狩言之大之也麟者仁獸也有王者則至無王者則不至有以告者曰有麕而角者孔子曰孰為來哉孰為來哉反袂拭面涕沾袍呼韓入侍漢宣帝紀甘露二年胸奴呼韓邪單于款五原塞三年春正月行幸甘泉郊泰畤呼韓邪單于稽侯狦來朝贊謁稱藩臣而不名上自甘泉宿池陽宫蠻夷君長夾道陳上登渭橋咸稱萬嵗肅慎來庭孔子世家武王克商通道九夷八蠻肅慎貢楛矢石砮長尺有咫後漢書挹婁古肅慎之國也在夫餘東北千餘里晉文帝紀肅慎來獻石砮貂皮等天子命歸於大將軍府按魏志陳留王紀景元三年肅慎遣使重譯入貢即其事又晉武紀咸寧五年肅慎來獻楛矢石砮黃能之祟晉語鄭簡公使公孫成子來聘平公有疾韓宣子贊授客館客問君疾對曰今夢黃能入于寢門人殺乎抑厲鬼耶子産曰昔者鯀違帝命殛之于羽山化為黃能以入于羽淵實為夏郊三代舉之今周室少卑晉實繼之其或者未舉夏郊耶左昭七黃能作黃熊二傳皆無叔向問語史通似誤謝拾沈遺謝綽宋拾遺十卷見書志五行章人物第三十夫人之生也有賢不肖焉若乃其惡可以誡世其善可以示後而死之日名無得而聞焉是誰之過歟蓋史官之責也釋此篇前半以有關法戒之人當見史册為説觀夫文籍肇創史有尚書知逺疏通網羅歷代至如有虞進賢時宗元凱夏氏中微國傳寒浞殷之亡也是生飛亷惡來周之興也實有散宜閎夭若斯人者或為惡縱暴其罪滔天或纍仁積德其名蓋世雖時淳俗質言約義簡此而不載闕孰甚焉洎夫子修春秋記二百年行事三傳並作史道勃興若秦之由余百里奚越之范蠡大夫種魯之曹沫公儀休齊之寧戚田穰苴斯並命代亦作世天才挺生傑出或陳力就列功冠一時或殺身成仁聲聞四海茍師其德業可以治國字人慕其風範可以激貪勵俗此而不書無乃太簡釋首以尚書春秋有闕開端又子長著史記也馳騖窮古今上下數千載至如臯陶伊尹傅説仲山甫之流並列經誥名存子史功烈尤顯事迹居多盍各採而編之以為列傳之始而斷以夷齊居首何齷齪之甚乎其言與探賾篇不相顧既而孟堅勒成漢書牢籠一代至於人倫大事亦云備矣其間若薄昭楊僕顔駟史岑之徒其一脫其字事所以見遺者蓋略小而存大耳夫雖逐麋之犬不復顧兔而雞肋是棄能無惜乎當三國異朝兩晉殊宅若元則仲景時才重於許洛何楨許詢文雅髙於楊豫而陳夀國志王隱晉史廣列諸傳而遺此不編此亦網漏吞舟過為迂濶者釋以上述馬班夀隱諸史列傳有闕觀東漢一代賢明婦人如秦嘉妻徐氏動合禮儀言成規矩毁形不嫁哀慟傷生此則才德兼美者也董祀妻蔡氏載誕胡子受辱虜廷文詞有餘節槩不足此則言行相乖者也至蔚宗後漢傳標列女徐淑不齒而蔡琰見書欲使肜管所載將安凖的釋此補述後漢書取舍失當也文當列三國兩晉之前緣是婦女故另綴焉裴幾原刪略宋史時稱簡要至如張禕陰受君命戕賊零陵乃守舊作宗道一作通不移飲鴆而絶雖古之鉏麑義烈宣二何以加諸鮑昭文宗學府馳名海內方于漢代褒朔之流事皆闕如何以申其褒奬釋此述子野宋略傳亦有闕也此處截上言當傳而不立傳者下言不必專傳而傳者夫天下善人少而惡人多其一有有字書名竹帛者蓋唯記善而已故太史公有云自獲麟以來四百餘年明主一無明主二字賢君忠臣死義之士廢而不載余甚懼焉即其義也至如四凶列於尚書三叛見於春秋西漢之紀江充石顯東京之載梁冀董卓此皆干紀亂常存滅興亡所繫一本此三句中干作千無亂字滅字既有關時政故不可闕書釋此段轉關書善虛運書惡實拈皆有關國紀故不可闕載耳是引下之辭但近史所刋有異於是至如不才之子羣小之徒或陰情醜行或素餐尸祿其惡不足以曝揚其罪不足以懲戒莫不搜其鄙事聚而為録不其穢乎釋近史則庸碌宵小亦書不足示戒矣抑又聞之十室之邑必有忠信而斗筲之才何足算也若漢傳之有傅寬靳歙蜀志之有許慈宋書之虞丘進魏史之王憲若斯數子者或才非拔萃或行不軼羣徒以片善取知微功見識闕之不足為少書之唯益其纍而史臣皆責其譜狀徵其爵里課虛成有裁為列傳不亦煩乎釋近史於尋常流品亦書不足示勸矣語曰君子於其所不知蓋闕如也故賢良可記而簡牘無聞斯乃察所不該謂明不能遍理無足咎至若愚智畢載妍媸靡擇此則燕石妄珍齊竽混吹者矣夫名刋史册自古攸難事列春秋哲人所重筆削之士其慎之哉釋單收後半不必專傳者一截按以書善書惡植史體以勸善懲惡宏史才若善不足以勸惡不足以懲則其用無所施而於體不冝褻乃史或闕書焉或濫書焉兩皆失之論非不讜也雖然談何容易非矢質鬼神之公心而炳俟百世之明識其孰能與於斯兩截臚列或荒逺或細碎舉之恐不勝舉與品藻篇一類不免翰墨煩勞元凱左文十八昔髙陽氏有才子八人蒼舒隤凱檮演大臨尨降庭堅仲容叔達天下之民謂之八愷髙辛氏有才子八人伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍天下之人謂之八元此十六族也世濟其美舜臣堯舉八愷使主后土以揆百事舉八元使布五教於四方寒浞左襄四昔有夏之方衰也后羿因夏民以代夏政而淫於原獸棄武羅伯因熊髠尨圉而用寒浞寒浞伯明氏之讒子弟也行媚於內而施賂於外樹之詐慝以取其國家飛亷惡來秦本紀伯翳之裔中潏在西戎保西垂生蜚亷蜚亷生惡來惡來有力蜚亷善走父子俱以材力事紂散宜閎夭按散閎二人明列尚書君奭篇史通乃與元凱等同以闕載為疑疏矣由余秦本紀由余其先晉人也亡入戎戎聞繆公賢故使由余觀秦秦繆公示以宫室積聚由余曰使鬼為之則勞神矣使人為之亦苦民矣繆公怪之由余笑曰夫戎夷上含淳德以遇其下下懷忠信以事其上不知所以治此此真聖人之治也於是繆公懼以女樂遺戎王間由余由余降秦百里奚史記秦本紀云晉獻公滅虞虢虜虞君與其大夫百里傒以為秦穆公夫人媵於秦按左傳之言媵秦穆姫者為井伯無百里奚之名唯僖十三晉人來乞糴有秦伯問百里與之一語亦無奚名蠡種外傳越語越王句踐即位三年興師伐吳不勝棲於會稽王使大夫種行成於吳曰蠡為我守於國范蠡對曰四封之內百姓之事蠡不如種四封之外敵國之制主斷其事種不如蠡四年伐吳居軍三年遂滅吳曹沫按刺客傳曹沫魯人於魯莊齊桓之時有戰敗會柯劫盟之事而公羊書盟柯手劒曹子無名左穀則名曹劌又皆無劫桓事故曰三傳不書曹沫公儀休趙岐孟子注案史記云公儀休魯博士以髙第為魯相奉法循理無所變更百官自正使食祿者不得與民爭利受大者不得取小按事又見董子賢良䇿對寧戚管子小稱篇桓公管仲鮑叔牙寧戚四人飲鮑叔奉杯而起曰使公毋忘如莒時也管子毋忘束縳在魯也寧戚毋忘飯牛車下也按呂覽淮南並云擊牛角疾歌注曰歌碩鼠也而呂作寧戚淮南作寧越至應劭述歌又别歌曰南山矸白石爛生不遭堯與舜禪短布單衣適至骭從昏飯牛薄夜半長夜漫漫何時旦三書互異識以備考田穰苴史記本傳司馬穰苴者田完之苗裔也齊景公時晏嬰乃薦田穰苴曰穰雖田氏庶孽然其人文能附衆武能威敵願君試之景公召穰苴與語兵事大説之以為將軍將兵捍燕晉之師薄昭附見外戚薄姫傳髙后崩迎立代王為皇帝封太后弟昭為軹侯又見淮南王傳淮南厲王恣不用漢法時帝舅薄昭為將軍尊重上令昭豫厲王書諫數之楊僕酷吏傳僕以千夫為吏南越反拜樓船將軍有功封將梁侯按僕非附傳不得云見遺顔駟文選張衡思玄賦云尉尨眉而郎潛兮逮三葉而遘武注漢武故事孝武過郎署見一郎鬢眉皓白問何其老也對曰臣顔駟文帝好文臣好武景帝好老臣尚少陛下好少臣已老是以三葉不遇上擢為都尉史岑參雕龍選注雕龍云武仲之美顯宗史岑之述熹后選注漢有兩史岑一在王莽末字子孝東觀漢記東平王蒼上光武中興頌明帝問可與誰等者挍書郎對前丗史岑之比者是也其一頌和熹鄧后字孝山在莽後百有餘年書典散亡莫詳爵里集林諸家以孝山之文載於子孝之集范曄遂謂王莽末沛國史岑字孝山以文顯誤也按選注見出師頌史通所列則莽末字子孝者是元則魏志附見曹爽傳裴注魏略曰桓範字元則曹爽輔政以範鄉里老宿特敬之及宣王起兵範南見爽勸爽兄弟以天子詣許昌徵四方以自輔卿别營在闕南呼召如意所憂在穀食而大司農印章在我身爽不從及宣王收範持之甚急範謂部官曰徐之我亦義士耳遂送廷尉魏氏春秋曰範哭謂爽曰曹子丹佳人生汝兄弟犢耳何圖今日坐汝族滅仲景遍撿三國裴注絶無其人劉意豈謂張仲景耶皇甫謐釋勸革陀存精於獨識仲景垂妙於定方蓋仲景醫聖與陀齊名隋志方書亦二人連載並注漢人漢末魏初也而陳夀止傳華陀不及仲景知幾特舉出之理或然耶讀書志名醫録云仲景南陽人名機舉孝廉官長沙太守著傷寒論二十二篇證合內外三百九十七法一百一十二方書録解題仲景文辭簡古奧雅古今治傷寒未有能出其外者按史通云名重許洛地亦合何楨張隱文士傳何楨字元幹有文學器幹甚偉歷幽州刺史廷尉楨子龕朂惲多至大官自後纍世昌阜晉書何充傳充字次道魏光祿大夫楨之曽孫也許詢世説文學許掾年少時人比王茍子許大不平時諸人士及支法師並在會稽西寺講王亦在焉許使往與王論理遂大屈許復執王理王執許理更相覆疏王復屈支從容曰何至相苦耶按許掾即詢也字玄度劉惔嘗云清風明月恨無玄度茍子王修小字又按新晉書錯見孫綽郗愔及諸王謝傳秦嘉妻徐玉臺新咏秦嘉贈婦詩序云嘉為上郡掾妻徐淑寢疾還家不獲面别贈詩云爾淑答詩略云妾身兮不令感疾兮來歸曠廢兮侍覲情敬兮有違君今兮奉命逺適兮京師悠悠兮離别夢想兮容輝恨無兮羽翼高飛兮相追藝文類聚淑復嘉書云昔詩人有飛蓬之感班姫有誰榮之嘆素琴明鑑當待君還未奉光儀寶叉不列丹鉛録豫觀藝文玊臺二書見東漢婦人徐淑與夫書及詩皆麗則可誦幽明録淑晝卧流涕嫂問之曰適見嘉自説往津亭鄉病亡一客齎書還日中當至舉家大驚書至事如夢董祀妻蔡後漢列女傳陳留董祀妻者同郡蔡雍之女也名琰字文姫博學有才辨又妙於音律適河東衛仲道夫亡無子興平中天下喪亂為胡騎所獲沒於南胸奴左賢王在胡中生二子曹操素與雍善遣使者以金壁贖之而重嫁於祀張禕晉書忠義傳張禕吳郡人少有操行恭帝踐祚劉裕以禕帝之故吏素所親信封藥酒一罌付禕密令鴆帝禕既受命歎曰鴆君求生何面目視息世間哉不如死也因自飲之而死按宋書則於其子暢傳見之易代之史體自應爾可無闕如之譏鮑昭宋書臨川王傳義慶為宗室之表招聚文學之士東海鮑照等引為佐使照字明逺文辭贍逸為河清頌序甚工世祖好為文章自謂物莫能及照悟其旨為文多鄙言纍句當世咸謂照才盡實不然也按唐人避武后諱瞾多作鮑昭三叛左昭三十一齊豹為衛司寇作而不義其書為盜邾庶其莒牟夷邾黑肱以土地出不求其名賤而必書所以懲肆而去貪也春秋書齊豹曰盜三叛人名以懲不義其善志也傅靳漢書樊酈夏侯灌傅靳周同傳按傅靳恐當作傅周蓋七人中敘功惟傅寬周緤事最少也許慈蜀志本傳慈字仁篤又有胡潛字公興並為博士典掌舊文更相克伐書籍有無不相通借時尋楚撻其矜已妬彼至於此虞丘進宋書本傳進纍戰有功封望蔡縣男除宋臺令書史臣曰諸將起自豎夫心一乎主百死而不顧遂饗封侯之報王憲魏書本傳憲字顯則北海劇人歸誠太祖見之曰此王猛孫也厚禮待之進爵劇縣侯卒年八十九北史憲作幰燕石闞子宋之愚人得燕石梧臺之側藏之以為大寶周客聞而觀馬革匱十重緹巾十襲客見之掩口盧胡而笑曰此燕石也與瓦甓同齊竽韓子內儲説一聽則愚智不分責下則人臣不參其説在吹竽齊宣王使人吹竽必三百人南郭處士為王吹竽王説之宣王死湣王立好一一聽之處士逃史通通釋卷八
