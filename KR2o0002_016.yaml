body:
  text: 史通通釋卷十六無錫浦起龍撰外篇雜說上第六二十五條春秋二條舊本紀條文書直下然其中連斷多舛非原文也今改用側注案春秋之書弒也稱君君無道稱臣臣之罪如齊之簡公未聞一脫聞字失德陳恆搆逆罪莫大焉而哀十四年書齊人弒其君壬於舒州斯則賢君見抑而賊臣是黨求諸舊例理獨有違但此是絶筆獲麟之後弟子追書其事豈由以索續組不類將聖之能者乎何其乖刺之甚也按論語陳恆弒其君請討之聖語森然斥弒者以名矣而春秋乃書人劉子摘之是也稱君稱臣宣四左傳凡弒君稱君君無道也稱臣臣之罪也杜注稱君謂唯書君名而稱國以弒言衆所共絶也稱臣者謂書弒者之名以示來世終為不義改殺稱弒辟其惡名取有漸也齊人弒哀十四續六月齊人弒其君壬于舒州為齊簡公之在魯也闞止有寵焉及即位使政陳成子憚之驟顧諸朝子我欲盡逐陳氏成子兄弟四乘如公子我在幄出遂入公與婦人飲酒於檀臺成子遷諸寢子我歸陳氏追之殺諸郭關庚辰陳恆執公于舒州甲午陳恆弒其君壬于舒州孔某三日齊而請伐齊三按子我即闞止案春秋左氏傳釋經云滅而不有其地曰入如入陳入衛入鄭入許即其義也至柏舉之役子常之敗庚辰吳入獨書以郢夫諸侯列爵並建國都國謂楚都謂郢惟取國名不稱都號何為郢之見入遺其楚名比於他例一何乖踳尋二傳所載謂公穀所載之經皆云入楚豈左氏之本本亦謂經獨為謬歟謬猶誤也按此條糾左也不以入左傳條而以入春秋何也此事左經與公穀經不同仍本經以為言也入楚入郢若此類讀書略去者何限可砭心粗者釋經曰入左襄十三經夏取邿傳凡書取言易也用大師焉曰滅弗地曰入注謂勝其國邑不有其地入陳衛鄭許左宣十一楚子入陳閔二狄入衛隱十宋人衛人入鄭隱十一公及齊侯鄭伯入許吳入書郢定四左氏經庚辰吳入郢傳吳從楚師及清發敗諸雍澨五戰及郢庚辰吳入郢以班處宫二傳云入楚定四公羊經庚辰吳入楚傳日入易無楚也易無楚者壞宗廟徙陳器撻平王之墓榖梁經庚辰吳入楚傳吳何以不稱子反夷狄也其反夷狄奈何君舍於君室大夫舍於大夫室左氏傳二條左氏之叙事也述行師則簿領盈視哤舊訛作叱聒沸騰論備火則區分在目修飾峻整言勝捷則收獲都盡記奔敗則披靡橫前申盟誓則慷慨有餘稱譎詐則欺誣可見談恩惠則煦如春日紀嚴切則凛若秋霜叙興邦則滋味無量陳亡國則凄凉可憫或腴辭潤簡牘或美句入詠歌跌宕而不羣縱橫而自得若斯才者殆將工侔造化思涉鬼神著述罕聞古今一衍之字卓絶如二傳之叙事也榛蕪溢句疣贅滿行華多而少實言拙而寡味若必方於左氏也非唯不可為魯衛之政差肩雁行亦有雲泥路阻君臣禮隔者矣按此亦申左之餘也申左多論載事之合離此條乃論文字之工拙衡二傳太軒輊失平哤聒字本蜀都賦詳申左注彼篇舊作籠聒此又作叱聒並哤聒之訛也左傳稱仲尼曰鮑莊子之智不如葵葵猶能衛其足夫有生而無識有質而無性者其唯草木乎然自古設比興而以草木方人者皆取其善惡薰蕕榮枯貞脆而已必言其含靈畜智隱身違禍則無其義也尋葵之向日傾心本不衛足由人覩其形似強為立名亦由作猶今俗文士謂鳥鳴為啼花發為笑花之與鳥一有又字安有啼笑之情哉必以人無喜怒不知哀樂便云其智不如花花猶善笑其智不如鳥鳥猶善啼可謂之讜言者一無者字哉如鮑莊子之智不如葵葵猶能衛其足即其例也而左氏録夫子一時獻言以為千載篤論成微婉之深纍玷良直之髙範不其惜乎按舊評謂葵猶衛足似詩家興趣黏皮帶骨則笨矣知幾此條誠不免是知不如葵舌端浮佻無關垂訓劉氏如曰此非聖人語則入理矣葵猶衛足成十七齊慶克通於聲孟子與婦人䝉衣乘輦而入於閎鮑牽見之以告國武子武子召慶克而謂之夫人怒訴之秋七月刖鮑牽仲尼曰鮑莊子之智不如葵葵猶能衛其足公羊傳二條公羊云許世子止弒其君曷為加弒譏子道之不盡也其次因言樂正子春之視疾以明許世子之得罪尋子春孝道義感神明固以已通方駕曾閔連蹤丁蘭郭巨茍事親不逮樂正便以弒逆加名斯亦一無亦字擬失其流責非其罪蓋公羊樂正俱出孔父門人思欲更相引重曲加談述所以樂正行事無理輒書無理者擬不於倫之意致使編次不倫比喻非類言之可為嗤怪也按弒與孝是善惡兩盡頭處故以擬失其倫怪之許止弒昭十九公羊止進藥而藥殺曷為加弒焉爾譏子道之不盡也樂正子春之視疾也復加一飯則脫然愈復損一飯則脫然愈復加一衣則脫然愈復損一衣則脫然愈止進藥而藥殺是以君子加弒焉爾丁郭黃補注逸士傳丁蘭河內人少喪考妣不及供養乃刻木為親形像事之如生氏族箋釋郭巨林縣人至孝生子三歲母常減食與之因謂妻曰貧乏分母之食盍埋此兒及掘坑得黃金一釜俱出門人曝書亭考戴宏論春秋曰子夏傳與公羊髙梁武帝曰公羊禀西河之學孔穎逹曰商授弟子公羊髙鄭康成曰樂正子春曽子弟子按何休亦曰樂正子春曾子弟子以孝名聞語曰彭蠡之濵以魚食犬斯則地之所富物不稱珍案齊密邇海隅鱗介惟錯故上客食肉中客食魚一脫食肉中客四字斯即齊之舊俗也然食魴鱠鯉詩人所貴必施諸他國是曰珍羞如公羊傳云晉靈公使勇士殺趙盾見其方食魚飱曰子為晉國重卿而食魚飱是子之儉也吾不忍殺子蓋公羊生自齊邦不詳晉物以東土所賤謂西州亦然遂目彼嘉饌呼為菲食著之食録以為格言非惟與左氏有乖亦於物理全爽者矣按土物貴賤詎云一概然辨亦稚矣且又無謂史通往往有此若晉陽無竹之類上客中客陳氏嶨圃萱蘇列士傳曰孟嘗君食客三千厨有三列上客食肉中客食魚下客食菜食魚飱宣六公羊趙盾朝而出靈公使勇士某者往殺之勇士入其大門則無人門焉者入其閨則無人閨焉者上其堂則無人焉俯而窺其戶方食魚飱勇士曰嘻子為晉國重卿而食魚飱是子之儉也君使我殺子吾不忍殺子也汲冡紀年一條語曰傳聞不如所見斯則史之所述其謬已甚况乃傳寫舊記而違其本録者乎至如虞夏商周之書春秋所記之說可謂備矣而竹書紀年出於晉代學者始知后啓殺益太甲殺伊尹文丁舊誤作王與疑古同殺季歷共伯名和此四字一本無一本在文丁之上鄭桓公厲王之子句有誤厲王疑本作宣王則與經典所載乖刺甚多又孟子曰晉謂春秋為乘尋汲冡璅語即乘之流邪其晉春秋篇云平公疾夢朱羆窺屏左氏亦載斯事而云夢黃熊入門必欲捨傳聞而取所見則左傳非而晉文一作史實矣謂左書晉事是他國傳聞而竹書晉文則出自本國也嗚呼向若二書不出學者為古所惑則代成聾瞽無由覺悟也嗚呼已下二十四字王張諸本多作細書郭本作大書詳嗚呼字非注體起法姑從郭本按此亦疑古之餘也贅尾數語尤為害理觀本傳其子彚嘗以汲冡諸書皆後人追修非當時正史特著外傳以判之意亦不直其父說與雜說中凡此類皆出成卷書之前蓋其平日觀書隨手籍記之所存也若已作疑古篇後豈復綴此耶唐人遺集蕪章纇句迭見錯出不自割棄多似此共伯名和共和見稱謂篇竹書紀年厲王十二年王亡奔彘十三年王在彘共伯和攝行天子事二十六年王陟于彘周定公召穆公立太子靖為王共伯和歸其國鄭桓厲王子按史記鄭世家鄭桓公友者周厲王少子宣王庶弟也宣王立二十二年友初封於鄭而史通之述紀年亦作厲王子則與舊典正同不得云乖刺矣今考竹書紀年宣王二十二年王錫王子多父命居洛幽王二年晉文侯同王子多父伐鄫克之乃居鄭父之丘是為鄭桓公八年王錫司徒鄭伯多父命云云是紀年之書王子在宣王之年而名又不同封又在幽王世故劉氏與諸異聞連舉而以紀年之文為桓是宣子然則厲字之本作宣字無疑也朱羆內外傳黃能黃熊事已見書事篇今朱羆事云在晋春秋王訓故引瑣語云晉平公夢見赤羆而疾使問子産子産曰昔共工之御曰浮游既敗于顓頊自沒于淮淵其色赤其狀羆祭顓頊共工則瘳公如其言而疾間見晉春秋則瑣語中篇名非二書也卷首春秋家史記八條夫編年叙事溷雜難辨紀傳成體區别異觀昔讀太史公書每怪其所採多是周書謂逸周書國語世本戰國䇿之流獨未見左氏內傳故云近見皇家所撰晉史其所採亦多是短部小書省功易閲者若語林世說搜神記幽明録之類一作徒是也如曹干兩氏紀孫檀二陽秋則皆不之取故其中所載美事遺略甚多原注劉遺民曹纘皆於檀氏春秋有傳至於今晉書則了無其名若以古方今此處有脫字當然諸本并脫當然二字則知一有太字史公亦同其失矣斯則遷之所録甚為膚淺而班氏稱其勤者何哉舊本此下連孟堅又云非是按或疑此為八條之序此中不應有序例也知幾服膺左氏內傳惜司馬之未見故首條及之所云亦略見採撰篇所採多小書按困學紀聞亦取此條之說而申之以朝子止之語曰晉史叢冗最甚又按唐書房喬傳亦云史官多文詠之士好採碎事􅔡為豓體然則子元之言非無據也曹千孫檀隋經籍志晉紀十卷晉前將軍咨議曹嘉之撰又晉紀二十三卷干寶撰訖愍帝又晉陽秋三十二卷訖哀帝孫盛撰又續晉陽秋二十卷宋永嘉太守檀道鸞撰稱其勤司馬遷傳贊遷貫穿經傳馳騁古今上下數千載間斯以勤矣孟堅又云劉向揚雄博極羣書皆服一作伏其善叙事釋本條皆論叙事法起筆提醒豈時無英秀易為雄霸者乎不然何虛譽之甚也舊本此處分條非史記鄧通傳云文舊脫文字帝崩景帝立向若但云景帝立不言文帝崩斯亦可知矣何用兼書其事乎釋摘論叙事一諸本此下分條又非又倉公傳稱其傳黃帝扁鵲之脉書五色診病知人死生决嫌疑定可治詔一脫詔字召問其所長對曰傳黃帝扁鵲之脉書以下他文盡同上說夫上既有其事下又載其言言事雖殊委曲何别釋摘論叙事又一案遷之所述多有此類而劉揚服其善叙事也何哉釋應轉劉揚一本此處連下條非按此亦簡晦㸃煩餘論凡章節離立各有定分即如此條所言皆屬叙事而首尾呼應復有劉揚句眼其為片段較然明白諸本此斷彼連當開反合皆所謂隙中觀鬬者也向雄皆服司馬遷傳贊劉向揚雄博極羣書皆稱遷有良史之材服其善叙事理辨而不華質而不俚其文直其事核不虛美不隱惡故謂之實録文帝崩景帝立佞幸鄧通傳文帝嘗病癰鄧通嘗為帝唶吮之太子入問病文帝使唶雍唶癰而色難之已而聞鄧通嘗為帝唶吮之心慙由此怨通矣及文帝崩景帝立鄧通免家居按此事連觀太子已心怨之文則知文帝崩三字可省太史公撰孔子世家多採論語舊說至管晏列傳則不取其本書原注謂管子晏子也以為時俗所有故不復更載也案論語行於講肆列於學官俗訛作宫重加編勒秪覺煩費如管晏者諸子雜家經史外事棄而不録實杜異聞夫以可除而不除宜取而不取以斯著述未覩厥義按論語從何處節採劉子能見其大至史公之傳管晏論其軼事意固别有感也然以史法繩之畢竟劉言為正列於學官北平評作史記時論語未嘗行於講肆列於學宫按漢書藝文志古論語二十一篇齊二十二萹魯二十篇其總論云漢興有齊魯之學是則漢初師承講授固在壞宅發壁之前矣即以孔子丗家驗之所採略具而如傳首伯夷篇亦屢述之可見其不絶於時也再按唐書薛放云漢時論語首列學官更當有据也昔孔子力可翹關不以力稱何則大聖之德具美者衆不可以一介標末此二字一作末事持為百行端首也至如逹者七十分以四科而太史公述儒林則不取游夏之一無之字下同文學著循吏則不言冉季之政事至於貨殖為傳獨以子貢居先掩惡揚善既忘此義成人之美不其闕如按此段人多誤㑹細按之非吝儒林循吏之絀四賢乃嗤子長之以貨殖纍端木也蓋為范白猗卓之間闌及聖門弟子而發兩層文勢側注而先以德不稱力比例引端意可知已後閲王厚齊考史已得此解孔子翹關列子說符孔子之徑能招國門之關而不肯以力聞集韵招祁堯切音翹舉也貨殖按史記貨殖列傳卷在六十九次當末篇亦意所羞稱也傳本范蠡居首子贛第二漢書因之司馬遷自一無自字序傳云為太史七年而遭李陵之禍幽於縲絏乃喟然而歎曰是豫之罪也身虧不用矣自叙如此何其略哉夫云遭李陵之禍幽於縲絏者乍似同陵陷沒以一作遂置於刑又似為陵所間一作陷獲罪於國遂令讀者難得而詳賴班固載其與任安書書中具述被刑所以儻無此録何以克明其事者乎按子長以别簡白罪由懼史體之䙝也子元即以報書攻自叙誡史筆之率也作書讀書各自不茍學者兩有所取法焉七年而遭句若刋云七年而以訟李陵獲罪則事由便明與任安書漢書遷本傳遷既被刑之後為中書令尊寵任職故人益州刺史任安豫遷書責以古賢臣之義遷報之云云篇本傳皆採録史公自序特於傳末增此一故史通表出之漢書載子長與任少卿書歷說自古述作皆因患而起末云不韋遷蜀世傳呂覽案呂氏之一少之字修撰也廣招俊客比跡春陵此頂招客說下陵一作秋誤共集異聞擬書荀孟此句才說成書思刋一字購以千金則當時宣布為日久矣豈以遷蜀之後方始傳乎且必以身既流移書方見重則又非關作者本因發憤著書之義也而輒引以自喻豈其倫乎若要多舉故事成其博學何不云虞卿窮愁著書八篇而曰不韋遷蜀世傳呂覽斯蓋識有不該思之未審耳按從發憤著書得間此條開宋人說部家言不韋見六家春秋家春陵謂春申信陵也班固西都賦節慕原嘗名亞春陵虞卿亦見春秋家昔春秋之時齊有夙沙衛者拒晉殿師郭最稱辱伐魯行唁臧堅抉死此閹官一作宦史記漢書並作閹官見鄙其事尤著者也而太史公與任少卿書論自古刑餘之人為士君子所賤者唯以彌子瑕為始何淺近之甚邪但夙沙出左氏傳漢代其書不行故子長不之見也夫博考前古而捨兹不載至於乘傳車探禹穴亦何為者哉按此亦惜史公不見左傳之一證郭最左襄十八晋伐齊入平隂遂從齊師夙沙衛連大車以塞隧而殿殖綽郭最曰子殿國師齊之辱也子姑先乎乃代之殿注奄人殿師所以為辱臧堅左襄十七齊髙厚圍臧紇於防獲臧堅齊侯使夙沙衛唁之且曰無死堅稽首曰拜命之辱抑君賜不終姑又使其刑臣禮於士以杙抉其傷而死魏世家太史公曰說者皆曰魏以不用信陵君故國削弱至於亡余以為不然天方令秦平海內其業未成魏雖得阿衡之徒曷益乎釋已上並魏世家贊語夫論成敗者固當以人事為主必推命而言則其理悖矣釋提四句起論蓋晋之獲也由夷吾之愎諫秦之滅也由胡亥之無遺周之季也由幽王之惑褒姒魯之逐也由稠父之違子家釋對敗而言歷舉敗象為例就舉例中先徴人事為言然則敗晉於韓狐突已志其兆亡秦者胡始皇久銘其說檿弧箕服彰於宣厲據傳在宣王時之年徴褰與襦顯自文武舊作成之世惡名早著天孽難逃假使彼四君才若桓文德同湯武其若之何釋將氣數納入人事中苟推此理而言則亡國之君他皆倣此安得於魏無譏舊衍責字者哉釋兜合魏贊夫國之將亡也若斯則其將興也亦然釋翻轉對徴蓋媯後之為公子也其筮曰八世莫之與京畢氏之為大夫也其占曰萬名其後必大姬宗之在水滸也鸑鷟鳴於岐山劉姓之在中陽也蛟龍降於豐澤斯皆瑞表於先而福居其後釋徴興運則先徴氣數與前局順逆相乘向若四君德不半古才不逮人終能坐登大寶自致宸極矣乎釋推人事為氣數主必如一有太字史公之議也則亦當以其命有必至理無可辭不復嗟其智能頌其神武者矣夫推命而論興滅委運而忘褒貶以之垂誡不其一作其不惑乎釋至此折到魏贊自兹以後作者著述往往而然如魚豢魏略議舊脫議字虞世南帝王論或叙遼東公孫之敗原注魚豢魏略議曰當青龍景初之際有彗星出於箕而上徹是為掃除遼東而更置也苟其如此人不能違則德教不設而淫濫首施以取族滅殆天意也或述江左陳氏之亡原注虞世南帝王略論曰永定元年有㑹稽人史溥為揚州從事夢人著朱衣武冠自天而下手執金版有文字溥看之有文曰陳氏五主三十四年諒知冥數不獨人事其理並以命而言可謂與子長同病者也釋末復引類作餘波按不信禨祥是知幾識髙處勝五行錯誤諸篇諸雜說中當推此條為最論既入理文復成章合作可誦敗晉於韓左僖八晋侯改葬共太子狐突適下國遇太子太子曰夷吾無禮余得請於帝矣將以晋畀秦七日新城西偏將有巫者而見焉遂不見及期而往告之曰帝許我伐有罪矣敝於韓又十三晉荐饑秦輸粟于晋十四秦饑乞糴於晉晉人弗與慶鄭曰背施幸災民所棄也弗聼十五秦伯伐晉晉侯小右慶鄭吉弗使戰於韓原晉戎馬還濘而止號慶鄭慶鄭曰愎諫違卜固敗是求又何逃焉亡秦者胡秦本紀燕人盧生使入海還以鬼神事因奏録圖書曰亡秦者胡也裴注鄭康成曰胡胡亥秦二世名也秦見圖書不知此為人名反備北胡檿弧箕服周宣王時童謡國語文也見書事篇蓋述褒姒禍周事史記本紀亦載之其文略同徴褰與襦昭二十五有鸜鵒來巢書所無也師已曰異哉吾聞文武之丗童謡有之謡見言語篇九月公伐季氏平子請以五乘亡弗許子家子曰君其許之政之自出久矣隱民多取食焉為之徒者衆矣日入慝作君必悔之弗聼孟氏遂伐公徒公孫于齊次于陽州按文武之世史記作文成之世賈逵注魯文公成公也但二公非接世者冝以左傳為正媯後莫京莊二十二陳公子完奔齊齊侯使敬仲為卿初懿氏卜妻敬仲其妻占之曰吉是謂鳳凰于飛和鳴鏘鏘有媯之後將育于姜五世其昌八世之後莫之與京畢萬必大閔元晉侯賜畢萬魏以為大夫卜偃曰畢萬之後必大萬盈數也魏大名也以是始賞天啓之矣初畢萬筮仕於晉遇屯之比辛廖占之曰吉公侯之子孫必復其始水滸鸑鷟詩大雅率西水滸至于岐下外傳周語周之興也鸑鷟鳴于岐山中陽蛟龍漢髙紀髙祖沛豐邑中陽里人父太公母劉媪劉媪嘗息大澤之陂夢與神遇是時雷電晦冥太公往視則見蛟龍於其上已而有身遂産髙祖魏略議魚豢魏略見題目篇其曰魏略議者猶史漢之論贊體也舊本無議字蓋脫文也按三國裴注亦有引魏略議之文帝王論唐藝文志虞世南帝王略論五卷宋中興書目唐貞觀間太子中書舍人虞丗南承詔撰起太昊訖隋凡帝王事迹皆略紀載假公子答問以考訂云諸漢史十條漢書孝成紀贊曰成帝善修容儀升車正立不內顧不疾言不親指臨朝淵默尊嚴若神可謂穆穆天子之容貌矣已上皆贊語又五行志曰成帝好微行選期門郎及私奴客一訛作各十餘人皆白衣袒幘自稱富平侯家或乘小車御者在茵上或皆一作駿非騎出入逺至旁縣故谷永諫曰陛下晝夜在路獨與小人相隨亂服共坐溷淆無别此三句參用疏語志內無公卿百寮不知陛下所在積數年矣一作積有數年已上皆志文見中上由斯而言則成帝魚服嫚游烏舊作鳥集無度雖外飾威重而內肆輕薄人君之望不其缺如觀孟堅紀志所言前後自相矛盾者矣按贊與志殊體有婉辭有實録固不相妨然嘗因是有警焉臨朝所接異彼私奴色莊者流時聞􅑁行推之而讓千乘者勃溪於豆羮逃空谷者攖情於好爵皆其類也故君子慎之魚服張衡東京賦白龍魚服見困豫且注吳王欲從民飲伍子胥曰昔白龍化為魚豫且射中其目白龍不化豫且不射君今棄萬乘之尊而從於民臣恐有豫且之患烏集按國䇿有烏集烏飛之文而此處則用烏集為合荀悅漢紀成帝鴻嘉二年上好微行谷永言與小人晨夕相隨烏集醉飽吏民之家正指本事也觀太史公之創表也於帝王則叙其子孫於公侯則紀其年月列行縈紆以相屬編字戢孴而相排雖燕越萬里而於徑寸之內犬牙可接雖昭穆九代而於方尺一作寸之中雁行有叙使讀一衍書字者閲文便覩舉目可詳此其所以為快也釋此統言之也凡表皆然不黏史記獨人表為無當耳如班氏之古今人表者唯以品藻賢愚激揚善惡為務爾既非國家遞襲祿位相承而亦復界重行狹書細字比於他表殆非其類歟蓋人列古今本殊表限必吝而不去則宜以志名篇始自上上終於下下並當明為標榜顯列科條以種類為篇章持優劣為次第仍每於篇後云右一脫右字若干品凡若干人亦猶地理志肇述京華末陳邊塞先列州郡後言户口也釋所言體狀大似鍾嶸書品設言改為此格差勝然亦假立之辭按古今人表之贅而為酌以志名例以地理就格言格云爾非質言也如前者載言一篇及書志篇人形方言等論拈死句者胥失之節首表體一段與表歷篇異議彼按已論之自漢已降作者多門雖新書已行而舊録仍在必挍其事一有則字可得而言案劉氏初興書唯陸賈而已子長述楚漢之事專據此書譬夫行不由徑作路字用出不由戶未之聞也然觀遷之所載往往與舊不同如酈生之初謁沛公髙祖之長歌鴻鵠非唯文句有别遂乃事理皆殊釋已上言陸書本遷史所据然事語往往有不同者又韓王名信都而輒去都留信去都留信一作去都字用使稱其名姓全與淮隂不别班氏一準太史曾無弛張一作書無更張靜言思之深所未了釋謂前所云云從陸從馬皆可至韓王信都更不應承訛去都字也然所言郤非按班之襲馬實多有太因仍者即如後條所論司馬遷傳可見已至韓王信云云乃子元誤非孟堅誤也後注辨之由徑由戶列子說符稽度皆明而不道也譬之出不由門行不從徑也徑字作路字解酈生初謁按史記本傳初叙沛公略地陳留郊及酈生先屬沛公騎士語次叙沛公召生入謁据牀跣足生長揖激沛公語次叙沛公罵生豎儒生責沛公倨見長者語次乃叙沛公輟洗攝衣延坐事至卷末朱建附傳之後復取陸賈所叙酈生入謁事并載之與前文迥别同事異詞即於一卷中見之歌鴻鵠留侯世家上欲易太子立戚夫人子趙王如意上有不能致者四人太子請以為客從入朝上乃大驚四人為夀已畢趨去上目送之召戚夫人指示四人者曰羽翼已成難動矣戚夫人泣上曰為我楚舞吾為楚歌歌曰鴻鵠髙飛一舉千里羽翮已就橫絶四海橫絶四海當可奈何雖有矰繳尚安所施容齊三筆陸賈書當時事多與史不合師古屢辨之楚漢春秋今不復見按本條辨語闕韓王信舊注歸雲集漢書功臣表留侯張良以韓申都下韓師古注韓申都即韓王信也楚漢春秋作信都古文信申通用劉攽云韓申都即韓申徒也張良傳云以韓司徒下韓數城史記作申徒者司徒之聲轉也申都者又申徒之聲轉也良下韓時乃韓王成非韓王信師古注誤按師古一誤沿及史通然攽言亦缺了了詳史漢留侯世家傳韓王信傳功臣侯表或作韓申徒㦯作韓司徒或作韓申都字雖轉實一官乃項梁授張良之官與兩韓王無干也諸人迷本而盲猜其失直鈞再韓王信當時直為韓信賈誼云淮隂侯王楚韓信王韓文且叠見舉封舉名轉用之此切據也滕灌傳可推而概已又按史記凡其人以官封著者即以其所著名篇如蕭相國留侯綘侯之屬皆是此在藏山之書原無不可班氏奉詔勒為國史既皆以名書而萬石君題獨留口號亦失撿也至若郊祀之襲封禪司馬遷貨殖等傳之悉仍舊文更非體矣司馬遷之叙傳也始自初生及乎行歷事無巨細莫不備陳可謂審矣而竟不書其字者豈墨生所謂大忘一有也字者乎而班固仍其本傳了無損益此又韓子所以致守株之說也如固之為遷傳也其初一脫初字宜云遷字子長馮翊陽夏人其序曰云云至於事終則言其自叙如此此句傳後本有之因論銓叙全法故兼及之著述之體不當如是耶一本連下馬卿條此條與下二條可分為三可合為一大忘墨生前已有此語鬻子文王問于鬻子敢問人有大忘乎馬卿為自叙傳具在其集中子長因録斯篇即為列傳班氏仍舊曾無改奪一作作尋一無尋字固於馬揚傳末皆云遷雄之自序如此至於相如篇下獨無此言蓋止憑太史之書未見文園之集故使言無畫一其例不純按合兩條其序曰其自叙如此觀之可得纂狀為文之體廬陵碑版多用之困學紀聞云史通云相如以自叙為傳今考之本傳未見其為自叙意者相如集載本傳如賈誼新書末篇歟伯厚似未見此節而云然馬卿自叙更可取隋劉炫語參之見序傳篇注文園相如本傳相如從上還過宜春宫奏賦以哀二丗行失其辭云云拜為孝文園令漢書東方朔傳委瑣一作曲煩碎不類諸篇且不述其亡歿歲時及子孫繼嗣正與司馬相如一脫此四字司馬遷揚雄傳相類尋其傳體必曼倩之自叙也但班氏脫略脫略者謂脫去其自叙如此一句故世莫之知按東方傳之為自叙更無考序傳篇亦未之及北平本譏脫略亡歿等語以為見小不考洞冥記者噫亦失考矣雜述篇云郭子橫之洞冥全搆虛詞用驚愚俗其言侃侃顧意其為未見而小之邪史通凡王喬左慈輩皆斥其不經洞冥荒誕之尤者也紫海丹漿大雅不道夏侯孝若序東方像贊曰談者以先生神交造化靈為星辰此又竒怪恍惚不可備論者也蓋昔人掃棄久矣蘇子卿父建行事甚寡韋𤣥成父賢舊誤作孟德業稍多漢書編蘇氏之傳則先以蘇建標名列韋相之篇疑唐本漢書以𤣥成名篇則不以韋賢誤孟冠首並其失也按此條所論論篇題也蘇建子武韋賢子𤣥成並父子同傳而父之事簡子之事煩二事亦同如此則宜一例標題矣今乃蘇傳以建名篇韋傳則以𤣥成名篇傳同例異故為此論或笑之曰子未見漢書耶漢書明是韋賢傳子何據而言若是曰據史通是節也節之文曰蘇傳以建標名韋篇不以賢冠首故知題是𤣥成也古人詩集文集篇題一本作某一本作某者不可悉數史傳何獨無之唐代未行版本隨手寫録流傳各異子元適見是本耳曰是則然矣其不曰父賢而曰父孟有說乎曰誤耳自孟至賢五丗故曰其先韋孟家子元非懵豈未見之此又後人塗竄之咎也蘇建按本傳蘇建杜陵人也以校尉從大將軍青擊胸奴封平陵侯云云傳止八十三字故曰行事甚寡韋賢按本傳韋賢字長孺魯國鄒人也賢為人質朴少欲篤志於學兼通禮尚書以詩教授號稱鄒魯大儒徴為博士給事中進授昭帝詩云云宣帝即位賢以與謀議安宗廟賜關內侯食邑云云傳凡一百七十八字故曰德業稍多至其述孟之文止是傳前原丗系之體附見字行不過二十字而已安得云稍多乎至所列二詩則又附中之附也孟字之誤無疑矣班固稱項羽賊一作弒義帝自取天亡又云于公髙門以待封嚴母掃地以待喪如固斯言則深信夫天怨神怒福善禍淫者矣至於其賦幽通也復以天命久定非人理一少理字所移故善惡無徴報施多爽斯則同理異說前後自相矛盾者焉按此與孝成帝一條相似然贊是史論賦祗言懷固非一概于公髙門于定國傳定國字曼倩諡安侯父于公其閭門壞父老方共治之于公謂曰少髙大門閭令容駟馬髙蓋車我治獄多隂德子孫必有興者至定國為丞相子永為御史大夫封侯傳世云嚴母掃地酷吏嚴延年傳初延年母從東海來欲從延年臘到雒陽適見報囚母大驚便止都亭不肯入府延年出至都亭謁母母閉閣良久乃見之因數責延年我不意當老見壯子被刑戮也去女東歸掃除墓地耳歲餘果敗東海莫不賢知其母按荀紀于嚴二句本時人語賦幽通漢書叙傳固弱冠而孤作幽通賦以致命遂志注陳吉凶性命遂明已之志或問張輔著班馬優劣論云遷叙三千年事五十萬言固叙二百年事八十萬言是固不如遷也斯言為是乎答曰不然也案太史公書上起黃帝下盡宗周年代雖存事跡殊略至於戰國已下始有可觀然遷雖叙三千年事其間詳備者唯漢興七十餘載而已其省也則如彼其煩也則如此求諸折中未見其宜班氏漢書全取史記仍去其日者倉公等傳以為其事煩蕪不足編次故也若使馬遷舊作遷固後人因易地句竄易耳反使上下不相顧易地而處撰成漢書將恐多言費辭有踰班氏恐當作史安得以此而定其優劣邪按此即內篇煩省之說而其下語則煩省篇較平允以此見雜說諸條非一時所作亦非作正書了才作雜說隨觸隨書或先或後故異時所見有合有離觀者平心循理而進退之則得矣此條合馬班言之故附分論史漢之後張輔字丗偉見鑒識煩省二篇漢書斷章事終新室如叔皮存歿時入中興而輒引與前書共編者蓋序傳之恆或作常例者耳釋言在班氏書述之則是荀恱既刪略班史勒成漢紀而彪論王命列在末篇釋在荀氏紀越收之則非夫以規諷隗囂翼戴光武忽以東都之事擢居西漢之中必如是則賔戲幽通亦宜同載者矣按兩漢之交凡所論著為新莽作者前紀收之可也為隗囂作即與先漢不相及矣若叙傳家追稱厥考則雖事關來代而巨製必登論撰先美禮所尚也此種鈎畫明晢諦當珥筆者其知所取衷哉此乃糾荀恱漢紀也觀已上二條知前所標漢諸史三字渾成該舉委是原文至其下所記條數决非初數耳彪論列末篇荀悅漢紀第三十卷之末云王莽既敗天下雲擾隗囂據隴擁衆收集英雄班彪在焉彪即成帝媫妤之弟之稚子也囂問彪曰往者周亡天下分裂縱橫之事復起於今日乎將乘運迭興在一人也願先生論之論曰云云囂曰愚人習識劉氏而謂漢家重興疏矣彪感其論又閔禍患之不息乃著王命論以救時難賔戲幽通按漢書叙傳叙父彪載王命論固自叙載答賔戲幽通賦二篇此二篇荀紀不收故借結之史通通釋卷十六
