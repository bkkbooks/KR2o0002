body:
  text: 史通通釋卷七無錫浦起龍撰内篇品藻第二十三葢聞方以類聚物以羣分薰蕕不同器梟鸞不比翼若乃商臣冒頓南蠻北狄萬里之殊也伊尹霍光殷年漢日千載之隔也而世之稱悖逆則云商冒論忠順則曰伊霍者何哉葢厥跡相符則雖隔越為偶奚必差肩接一作步武方稱連類者乎釋篇首言品藻果允雖時地不相及而人可類舉也史氏自遷固作傳始以品彚相從然其中或以年世迫促或以人物寡鮮求其具體必同不可多得是以韓非老子共在一篇董卓袁紹無聞二録豈非韓老俱稱述者書有子名韓非子老子袁董並曰英雄生當漢末用此為斷麄得其倫亦有厥類衆夥宜為流别而不能定其同科申其異品用使蘭艾相雜朱紫不分是誰之過歟葢史官之責也釋此節總冒案班書古今人表仰包億載旁貫百家分之以三科定之以九等其言甚髙其義甚愜及至篇中所列奚不類於其叙哉若孔門達者顔稱殆庶至於他子難為等衰通差今乃先伯牛而後曾参進仲弓而退冉有原注伯牛仲弓並在第二等曾参冉有並在第三等求諸折中厥理無聞又楚王楚武王子文王過鄧三甥聃甥騅甥飬甥請一作欲殺之鄧侯不許卒亡鄧國莊六今定鄧侯入下愚之上原注即第七等夫寧人負我為善獲戾持此致尤將何勸善如謂小不忍亂大謀失於用權故加其罪是則三甥見機而作决在未萌自當髙立標格寘諸雲漢何得止與鄧侯鄰伍列在中庸下流而已哉原注三甥皆在第六等又其叙晉文之臣佐也舟之僑為上陽處父次之士㑹為下原注舟之僑在第三等陽處父在第四等士㑹在第五等其述燕丹一脱丹字之賔客也髙漸離居首荆軻亞之秦舞陽居末原注髙漸離在第四等荆軻在第五等秦舞陽在第六等事詳史記刺客傳斯並是非瞀亂善惡紛拏或珍瓴甋而賤璠璵或䇿駑駘而捨騏驥以兹為監欲誰欺乎釋此節專糾漢書古今人表又江充息夫躬䜛謟惑上使禍延儲后毒及忠良論其姦凶過於石顯逺矣而固叙之不列佞幸楊王孫祼𦵏悖禮狂狷之徒考其一生更無他事而與朱雲同列一有仍字冠之傳首不其穢歟釋因古今人表及到列傳分合就班書作轉遞已下皆言傳類也若乃旁求别録側窺雜傳諸如此謬其累實多案劉向列女傳載魯之秋胡妻者尋其始末了無才行可稱直以怨懟厥夫投川而死輕生同於古冶殉節異於曹娥此乃凶險之頑人强梁之悍婦兩言罪過輒與貞烈為伍有乖其實者焉釋列女傳一則又嵇康髙士傳其所載者廣矣而顔回蘧瑗獨不見書葢以二子雖樂道遺榮安貧守志而拘忌名教未免流俗也揣薄周孔者之意正如董仲舒揚子雲亦鑚仰四科馳驅六籍漸孔門之教義服魯國之儒風亦是誦述禮法者與此何殊而並可甄録夫回瑗可棄而揚董獲升可謂識二五而不知十者一本誤作百字也釋髙士傳一則已上二書非國史盖類而及之爰及近代史臣所書求其乖失亦往往而有借如陽瓉効節邉城捐軀死敵當有宋之代抑劉卜之徒歟原注劉謂劉康祖卜謂卜天與而沈氏竟不别加標牓唯寄編於索虜篇内紀僧珍南齊書及南史並作僧真砥節礪行終始無瑕而蕭氏乃與羣小混書都以恩幸為目王頍文章不足武藝居多躬詣戚藩首階逆亂撰隋史者如不能與梟感並列原注隋世皆以楊𤣥感為梟感即宜附出楊諒傳中輙與詞人共編吉士為伍原注隋書列王頍在文苑傳也凡斯纂録豈其類乎釋此節收歸國史謂沈蕭令狐諸書類多分配未當也子曰以貌取人失之子羽以言取人失之宰我光武則受誤於龎萌曹公則見欺於張邈事一無事字列在方書句有脱字惟善與惡昭然可見不假許郭之深鑒裴王之妙詧而作者存諸簡牘不能使善惡區分故曰誰之過歟史官之責也釋此節推到作者識鑒應前作繳夫一作矣能申藻鏡一多區字别流品使小人君子臭味得朋上智中庸等差有叙則懲惡勸善永肅將來激濁揚清鬱為不朽者矣按班史人表老手判之只銷一語曰不作可耳他所論列亦恐更僕未易盡也品藻非直論史直論人矣論人者衡懸鑑照平明葢難一挂百漏拈放何主愚恐是篇輕犯棘叢髙士傳一節非欲其攀載顔蘧乃譏其冒收揚董也史通此類文法甚多解者勿誤商冒商臣楚成王太子王後欲立少子軄商臣以宮甲圍王王縊遂自立見左傳文元年冒頓匈奴頭曼太子頭曼愛後閼氏子欲立之冒頓射殺頭曼自立事見史記匈奴傳按此二逆連舉見宋明帝詔伊霍漢書霍光字子孟位大司馬大將軍昭帝崩亡嗣承皇太后詔迎昌邑王賀賀即位行淫亂光憂懣田延年曰伊尹相殷廢太甲㠯安宗廟後丗稱其忠將軍若能行此亦漢之伊尹也光即白太后詔歸賀昌邑立孝宣皇帝晉景紀伊尹放太甲以寧殷霍光廢昌邑以安漢三科九等漢書古今人表叙云可與為善不可與為惡是謂上智可與為惡不可與為善是謂下愚可與為善可與為惡是謂中人因兹㠯列九等之序晉之臣佐左僖二十七八晉文作三軍魏犨為戎右圍曹魏犨傷於胸立舟之僑以為戎右城濮之戰舟之僑先歸晉侯殺之以殉於國又文五晉陽處父聘於衛寗嬴從之及温而還其妻問之嬴曰以剛天為剛德猶不干時况在人乎是以去之又士㑹見叙事用晦篇江充息夫躬纂舊注江充幸於武帝造巫蠱殺太子息夫躬幸於哀帝上變告東平王雲造詐諼之策按漢書二人與蒯通伍被同傳石顯漢書佞幸傳石顯少坐法腐刑元帝委㠯政事為人巧慧習事能探得人主微指内深賊持詭辯㠯中傷人楊王孫漢書楊王孫者孝武時人學黄老之術病且終令其子臝𦵏為布囊盛尸入地七尺既下從足引脱其囊以身親土秋胡妻列女傳潔婦者魯秋胡子妻也納之五日去而宦於陳五年乃歸未至家見路傍婦人採桑秋胡子悦之下車謂曰力田不如逢豐年力桑不如見國卿吾有金願以與夫人婦人不願秋胡子遂去至家母喚婦至乃向採桑者也婦曰子束髪辭親五年乃還當馳驟疾至今乃悦路傍婦人而下子之􅋔是亡母也不孝好色淫佚不義妾不忍見遂去投河而死按傅𤣥詩彼夫既不淑此婦亦太剛兩言最允劉殊失平古冶晏子春秋公孫棲田開疆古冶子事景公勇而無禮晏子言於公餽之二桃公孫棲田開疆曰吾勇不若子功不逮子取桃不讓是貪也然而不死無勇也皆反其桃契領而死古冶子曰二子死之吾獨生不仁亦契領而死曹娥後漢列女傳孝女曹娥上虞人父盰為巫祝五月五日於縣江泝濤迎婆娑神溺死不得屍娥年十四沿江號哭旬有七日投江死縣長度尚為立碑注㑹稽典録曰度尚弟子邯鄲淳作碑文後蔡邕題八字曰黄娟幼婦外孫韲臼晉隱逸傳夏統曰曹娥德過梁宋國人為歌河女之章識二五不知十梁書劉峻傳峻著辯命論曰言而非命有六蔽焉靡顔膩理哆噅顣顣形之異也朝秀辰終龜鶴千歳年之殊也聞言如響智昏菽麥神之辨也知三者定乎造化榮辱之境獨曰由人是知二五而未識于十其蔽一也葢用越丗家語陽瓚宋書索虜傳永初三年虜悉力攻滑臺城城東北崩壞王景度出奔景度司馬陽瓉堅守不動衆潰抗節不降為虜所殺劉卜宋書劉康祖傳太祖大舉北伐康祖軍出許洛㑹厙仁真相及於尉氏大戰一日一夜矢中頸死虜傳康祖首示彭城靣如生又元凶傳元凶劭文帝長子也元嘉三十年劭齋帥張超之手行弑劭進至合殿中閤太祖左細仗主卜天與攻劭於東堂見殺紀僧珍南齊恩倖傳紀僧真少隨蕭思話及其子惠開惠開罷益州不得志僧真事之愈謹惠開曰我子弟異才政是諱耳僧真憶其言乃請事太祖太祖頓新亭賊突入東門僧真與左右拒戰賊退除南臺御史僧真容貌言吐雅有士風按真作珍誤諱謂道成也王頍隋書文學傳王頍字景文通經曉兵法有縱横之志授漢王諒府諮議叅軍諒潜有異志文帝崩舉兵反多頍計也楊素至蒿澤頍謂其子曰氣候殊不佳於是自殺又庶人諒傳髙祖幼子漢王諒字德章出為并州總管諒自以所居天下精兵處有異圖既反王頍曰王所部將吏家屬盡在闗西宜長驅亰都所謂迅雷不及掩耳及楊素襲蒿澤諒欲還師頍諫不從窮蹙降除名為民絶屬籍龎萌張邈萌見載文篇魏志邈傳邈字孟卓太祖袁紹皆與邈友紹既為盟主使太祖殺邈太祖不聼曰孟卓親友也邈畏太祖終為紹擊已心不自安太祖將陳宮等共謀叛説邈曰此亦縱横之一時也邈從之遂以其衆迎呂布據濮陽二年間自為其下所殺評曰昔光武謬於龎萌近魏祖亦蔽於張邈知人則哲惟帝難之許郭後漢書郭太字林宗太原人性明知人好奬訓士類許劭字子將汝南人少峻名節好人倫多所賞識故天下言㧞士者咸稱許郭裴王晉書裴秀従弟楷字叔則明悟有識量少與王戎齊名吏部郎闕文帝問其人於鍾㑹㑹曰裴楷清通王戎簡要皆其選也又王戎字濬仲神彩秀徹裴楷目之曰戎眼爛爛如巖下電直書第二十四直書一作直言誤夫人禀五常士兼百行邪正有别曲直不同若邪曲者人之所賤而小人之道也正直者人之所貴而君子之德也然世多趨邪而棄正不踐君子之跡而行由一本由作曲又多自陷二字小人者何哉語曰直如弦死道邉曲如鈎反封侯故寧順從以保吉不違忤以受害也釋泛從直道不伸説起况史之為務申以勸誡樹之風聲其有賊臣逆子滛君亂主茍直書其事不掩其瑕則穢跡彰於一朝惡名被於千載一作古言之若是吁可畏乎釋此貼到作史者直道彰則為惡者懼矣振起下文夫為於可為之時則從為於不可為之時則凶如董狐之書法不隱趙盾之為法受惡彼我無忤行之不疑然後能成其良直擅名今古至若齊史之書崔弑馬遷之述漢非韋昭仗正於吴朝崔浩犯諱於魏國或身膏斧鉞取笑一有於字下同當時或書填坑窖無聞後代夫世事如此而責史臣不能申其強項之風勵其匪躬之節盖亦難矣是以張儼發憤私存嘿記之文孫盛不平竊撰遼東之本以兹避禍幸獲兩舊作而誤全足舊作是誤以驗世途之多隘知實録之難遇耳釋此節暢言古道既逺醜正實多作者畏避詭隨為通篇正嘅然則歴考前史徴諸直詞雖古人糟粕真偽相亂而披沙揀金有時獲寳案金行晉在歴史氏尤多當宣懿景師開基之始曹馬搆紛之際或列營渭曲見屈武侯或發仗雲臺取傷成濟陳夀王隱咸杜口而無言陸機虞預各栖毫而靡述至習鑿齒乃申以死葛走舊有生字達之説疑脱干令升亦斥以六字抽戈犯蹕之言歴代厚誣一朝如一作始雪考斯人之書事葢近古之遺直歟釋此節實拈晉初事人多曲諱得習干而一彰也次有宋孝王風俗傳王劭齊志其叙述當時亦務在審實案于時河朔謂元魏王公箕裘未隕鄴城謂髙齊將相薪構仍存而二子書其所諱曾無憚色剛亦不吐其斯人一本人字作之謂二字歟釋此節用虚運見貴胄方多二子不阿其上丗也已上二節總對直道難行發意葢烈士狥名壯夫重氣寧為蘭摧玊折不作瓦礫長存若南董之仗氣直書不避强禦韋崔之肆情奮筆無所阿容雖周身之防有所不足而遺芳餘烈人到於今稱之與夫王沈魏書假回邪以竊位董統燕史持謟媚以偷榮貫三光而洞九泉曽未足喻其髙下也釋末乃浩然唱歎自寄素懐按此篇與忤時同㫖低囬史筆表襮直材非黏論也其以矜作手正以概時情也文有形有神讀者神遇句外是為得之彼扣槃捫燭者難與説日也直如弦四句樂府集郭茂倩注云後漢書五行志順帝之末京都童謠為於可為二句揚雄解嘲中語董狐左宣二晉趙穿攻靈公於桃園宣子未出山而復太史書曰趙盾弑其君以示於朝宣子曰嗚呼我之懐矣自貽伊慼其我之謂矣孔子曰董狐古之良史也書法不隱趙宣子古之良大夫也為法受惡惜乎越竟乃免書崔弑左襄二十五齊崔杼弑公以説於晉太史書曰崔杼弑其君崔子殺之其弟嗣書而死者二人其弟又書乃舎之南史氏聞太史盡死執簡以往聞既書矣乃還述漢非後漢蔡邕傳王允曰武帝不殺司馬遷使謗書流於後世章懐注凡史官記事善惡必書謂遷所著史記但是漢家不善之事皆為謗也非獨指武帝之身也韋昭仗正見本紀篇𢎞嗣吴史注崔浩犯諱魏書崔浩字伯淵清河人博覽經史𤣥象隂陽百家之言無不闗綜爵東郡公拜太常卿神䴥二年詔撰國書北史本傳著作令史閔堪郄摽謟事浩請立石銘載圖史以彰直筆浩書國事備而不典而石銘顯在衢路北人忿毒搆浩於帝帝怒誅浩張儼嘿記張儼見載文篇注隋經籍志嘿記三卷吴大鴻臚張儼撰遼東本晉書孫盛撰晉陽秋詞直而理正桓温見之謂盛子曰枋頭誠為失利何至乃如尊君所説此史行闗君門戸事諸子改之盛寫兩定本寄於慕容儁大元中孝武博求異聞始於遼東得之以相考校多有不同書遂兩行金行注見斷限篇渭曲見屈蜀志諸葛亮傳亮據武功五丈原與司馬宣王對於渭南其年卒于軍松之注漢晉春秋曰楊儀等整軍而出百姓奔告宣王宣王追焉姜維令儀反旗鳴鼓若將向宣王者宣王乃退不敢偪儀結陣而去百姓為之諺曰死諸葛走生仲達雲臺取傷魏志髙貴鄉公紀注云漢晉春秋曰帝召王經等謂曰司馬昭之心路人所知也當自出討之經曰宿衛空闕兵甲寡弱禍殆不測帝出懐中版令投地曰行决矣賈充逆戰帝自用劒太子舎人成濟曰事急矣當云何充曰畜飬汝等正為今日濟即前刾帝刅出于背又魏氏春秋曰帝自將冗從僕射李昭等下陵雲䑓鎧仗授兵出討又按抽戈犯蹕亦見本注乃干寶晉紀語非出習書董統燕史外篇正史篇後燕建興元年董統受詔草創後書三十卷按是書隋唐二志皆不載縁其後范亨等合諸燕史并成一書而董書遂逸也范亨書二志載之曲筆第二十五肇有人倫是稱家國父父子子君君臣臣親踈既辨等差有别葢子為父隱直在其中論語之順也略外别内掩惡揚善春秋之義也自兹已降率由舊章史氏有事渉君親必言多隱諱雖直道不足而名教存焉釋首用諱尊諱親似曲而直者翻起此䖏曲字其有舞詞弄札飾非文過若王隱虞預毁辱相凌子野休文釋紛相謝一作射誤用舎由乎臆説威福行乎筆端斯乃作者之醜行人倫所同疾也釋此與下節標出二種曲筆此種偏私意見之曲也亦有事每憑虚詞多烏有或假人之美藉為私惠或誣人之惡持報已讎若王沈魏録濫述貶甄之詔陸機晉史虚張拒葛之鋒班固受金而始書陳夀借米而方傳此又記言之奸賊載筆之凶人下字􅑯狠雖肆諸市朝投畀豺虎可也釋此種恩讐賄賂之曲也其言憤激意已對著魏收然則史之不直代有其書茍其事已彰則今無所取謂前人説過其有往賢之所未察來者之所不知今略廣異聞用標先覺釋上二種標作提頭此數語挈下案後漢書更始傳稱其懦弱也其初即位南面立朝羣臣羞愧流汗刮席不敢視夫以聖公身在㣲賤已能結客報讎避難緑林名為豪傑安有貴為人主而反至於斯者乎將作者曲筆阿時獨成光武之美䛕言媚主用雪伯升之怨也且中興之史出自東觀或明皇即明帝所定或馬后攸刋而炎祚靈長簡書莫改遂使他姓追撰空傳偽録者矣釋此揣後漢之曲詆更始也陳氏國志劉後主傳云蜀無史職故災祥靡聞案黄氣見於秭歸羣烏墮於江水成都言有景星出益州言無宰相氣若史官不置此事從何一作何從而書一多之字葢由父辱受髠故加兹謗議者也釋此揣蜀志之曲議諸葛也古者諸侯並爭勝負無恒而他善必稱已惡不諱逮乎近古一作丗無聞至公國自稱一作謂為我長家相謂為彼短而魏收以元氏出於邉裔見侮諸華遂髙自標舉比桑乾元魏開國處於姬漢之國曲加排抑同建鄴於蠻貊之邦夫以敵國相讎交兵結怨載諸移檄用可致誣列諸緗素謂史難為妄説茍未逹此義安可言於史邪釋前范陳二曲皆意想出之此乃顯刾魏收誇抑之曲其文未了夫史之曲筆誣書句不過一二句語其罪負一作負罪為失已多而魏收雜以寓言殆將過半固以王本作知倉頡已降罕見其流而李氏齊書稱為實録者何也葢以重規李百藥字亡考未達伯起以公輔相加字出大名一誤作若事同元歎既無德不報故舊多以字虚美相酬然必謂昭公知禮吾不信也釋加此一層仍是刾魏其言百藥曲推非本意所屬語曰明其為賊敵乃可服如王劭之抗詞不撓可以方駕古人而魏收持論激揚稱其有慚正直夫不彰其罪謂於卲所著諸史無所指實而輕肆其誅此所謂兵起無名難為制勝者尋此論之作葢由君懋書法不隱取咎當時或有假手史臣以復私門之恥不然何惡直醜正盜憎主人之甚乎釋再加一層亦是刾魏非讃卲也收書劉之所深惡故重斥之刾魏之文至此方了自夫史之曲筆至此一本錯簡在鑒識篇彈射矣之下葢霜雪交下始見貞松之􅍾國家喪亂方驗忠臣之節若漢末之董承耿紀曲在魏晉初之諸葛母一作毌音貫丘曲在晉齊興而有劉秉一譌作康袁粲曲在齊周滅而有王謙尉迥曲在隋斯皆破家徇國視死猶生而歴代諸史皆書之曰逆將何以激揚名教以勸事君者乎古之書事也令賊臣逆子懼今之書事也使忠臣義士羞若使南董有靈必切齒於九泉之下矣釋此節羅舉諸史之曲凡前朝末造之忠義率多受枉也自梁陳已降隋周而往諸史皆貞觀年中羣公所撰近古易悉情偽可求至如朝廷貴臣必父祖有傳考其行事皆子孫所為而訪彼流俗詢諸故老事有不同言多爽實昔秦人不死驗苻生之厚誣蜀老猶存知葛亮之多枉斯則自古所歎豈獨於今哉釋此節脱到當時勅修前史仍不免瞻徇貴胄之曲也葢史之為用也記功司過彰善癉惡得失一朝榮辱千載茍違斯法豈曰能官但古來唯聞以直筆見誅不聞以曲詞獲罪是以隱侯沈約宋書多妄蕭武梁武知而勿尤伯起魏史不平齊宣覽而無譴故令史臣得愛憎由已髙下在心進不憚於公憲退無媿於私室欲求實録不亦難乎嗚呼此亦有國家者所宜懲革也釋篇末歸到功罪失平勸懲倒置斯為探本深言益透前篇寄慨隱𠂻按昌黎人旤天殃之説戒心不小懼曲也評者有意斥劉因而悉力怙史夫古人往矣信否何憑秉史筆者讀之能勿知懼聖公刮席一段與曩言宜列帝紀相因其言誠别然論人於成敗之間代興之㑹疑案正自可存史通歸美王卲書果於犯衆忌而不去口何耶葢觀齊丘之讖齧索之謠類於其書見之推此而知近膩辭夥匿瑕地尠召怒深矣彼隋書一傳懸詆其著書而獨牓其謟語果盡生平耶卲即未云佳士史亦豈無憎詞李安平叙崔浩被誅訾其所著曰備而不典備者弗隱也不典者無飾也率是道也亦憎詞也知㡬之在史曹徑情載筆以此忤時激而為言言及君懋則進之及伯起則揮之伯起者尤工為飾者也所揮在飾即所進在無飾河上之歌曰同病相憐此之謂與虞預相凌晉書王隱傳大興初令隱撰晉史時著作郎虞預私撰晉書而生長東南不知中朝事數訪於隱并借隱所著書盜寫之後更疾隱形於顔色隱竟以謗免歸休文釋紛南史裴子野曽祖松之齊永明末沈約撰宋書稱松之已後無聞焉子野更撰為宋略二十卷其叙事評論多善而云戮淮南太守沈璞以其不従義師故也沈懼徒跣謝之請兩釋焉王沈濫述貶甄晉書王沈傳髙貴鄉公將攻文帝召沈告之沈馳白帝不忠於主甚為衆論所非按沈所撰魏書已逸述甄事無考郭評沈不忠於魏故甄后之貶濫述其事彰曹醜也陸機虚張拒葛陸機有晉三祖紀見本紀篇按晉書宣紀魏太和五年及青龍二年懿凡兩拒蜀丞相亮受金借米班生受金陳夀求米見史官建置篇栁虬注困學記聞受金事未詳予考陳夀傳有謂丁廙子覔千斛米丁不與竟不立傳之説但有或云二字或之者疑之也恐亦未可盡信伯升之怨後漢書齊武王演字伯升光武長兄也王莽簒漢兵革並起伯升部署賔客自稱柱天都部聖公即位拜伯升大司徒及伯升㧞宛光武破王尋王邑兄弟威名益盛更始君臣謀誅伯升害之明皇所定後漢東平王蒼傳顯宗永平十五年行幸東平帝以所作光武本紀示蒼蒼因上光武受命中興頌帝甚善之按顯宗明帝廟號馬后攸刋後漢皇后紀顯宗明德馬皇后伏波將軍援小女也肅宗即位尊之曰皇太后自撰顯宗起居注削去兄防叅醫藥事曰吾不欲令後世聞先帝數親后宫之家蜀無史軄後主傳評國不置史注紀無官是以行事多遺灾異靡書黄氣見秭歸先主傳章武二年先主軍秭歸於猇亭駐營黄氣見自秭歸十餘里中廣數十丈羣烏墮江水後主傳注漢晉春秋曰江陽有烏從江南飛渡江北不能達墮水死者以千數有景星出後主傳景耀元年史官言景星見於是大赦改元無宰相氣費褘傳延熙十四年夏成都望氣者曰都邑無宰相氣父辱受髠晉書陳夀傳夀父為馬謖叅軍謖為諸葛亮所誅夀父亦坐被髠夀為父立傳謂亮將略非長無應敵之才議者以此少之李稱實録語見浮詞篇原注公輔大名北史李百藥父德林少孤未有字魏收謂之曰卿識度必至公輔吾以此字卿王訓故左傳云魏大名也故云按大名句見左傳閔元元歎吴志顧雍傳雍字元歎蔡伯喈嘗避怨於吴雍從學琴書注江表傳曰伯喈謂曰卿必成名今以吾名與卿故雍與伯喈同名也又吴録曰言為伯喈所歎故以為字焉惡直醜正語見左傳昭二十八盜憎主人家語觀周盜憎主人民怨其上君子知天下之不可上也故下之亦見左傳成十五董承耿紀蜀志先主同曹公還許時獻帝舅車騎將軍董承辭受帝衣帯詔當誅曹公先主遂與承等同謀魏武紀備之未東也隂與董承䓁謀反舉兵屯沛五年承等謀洩伏誅按耿紀攻許燒營見因習篇又魏武紀注三輔决録曰紀字季行為丞相掾又獻帝春秋曰收紀等將斬之紀呼魏王名曰恨吾不自主意竟為羣兒所誤耳諸葛母丘諸葛誕見因習篇晉景紀正元二年魏鎮東大將軍毌丘儉揚州刺史文欽舉兵作亂矯太后令移檄郡國為壇盟於西門之外帥衆六萬渡淮而西帝征之儉聞欽敗宵遁安風津都尉追斬之魏志誕儉傳誕字公休儉字仲恭儉都督揚州反敗見夷滅誕不自安朝廷徴知徴誕為司空誕愈恐遂反按王應麟曰儉誕䓁千載有生氣矣故鄭漁仲有晉史黨晉之言又按通志略母丘以邑為氏無貫音劉秉袁粲宋書袁粲傳粲字景倩與齊王劉秉平決萬機順帝即位詔移石頭時齊王功髙天命有歸粲宻有異圖劉秉宋代宗室與粲相結謀克日矯太后令使攻齊王事洩齊王遣軍主戴僧靜向石頭僧靜挺身暗往粲子最覺有異人以身衛粲僧靜直前斬之父子俱殞其後並誅秉秉事在宗室傳王謙尉迥亦見因習篇秦人不死未詳蜀老猶存未詳按困學紀聞云蜀老猶存知葛亮之多枉武侯事蹟湮没多矣然則蜀老事王氏亦未有所考也鑒識第二十六夫人識有通塞神有晦明毁譽以之不同愛憎由其各異葢三王之受謗也值魯連而獲申五霸之擅名也逄孔宣而見詆斯則物有恒準而鑒無定識欲求銓覈得中其唯千載一遇乎釋篇意論鑒古不明之失首以明者難遇領局况史傳為文淵浩一作源廣博學者茍不能探賾素隱致逺鉤深烏一作焉足以辨其利害明其善惡釋從鑒人擘歸鑒史觀左氏之書為傳之最而時經漢魏竟不列於學官儒者皆折此一家而盛推二傳夫以丘明躬為魯史受經仲尼語世則並生論才則同恥一作體非彼二家者師孔氏之弟子預達者之門人才識本殊年代又隔安得持彼傳説比兹親受者乎加以二傳理有乖僻言多鄙野方諸左氏不可同年故知膏肓墨守乃腐儒之妄述賣餅太官誠智士之明鑒也釋此節以左傳言其抑沒之久由於明鑒者少也逮史漢繼作踵武相承王充著書既甲班而乙馬張輔持論又劣固而優遷原注王充謂彪文義浹備紀事詳贍觀者以為甲以太史公為乙也張輔名士優劣論曰丗人稱司馬遷班固之才優劣多以班為勝余以為史遷叙三干年事五十萬言班固叙二百年事八十萬言煩省不敵固之不如遷必矣然此二書雖互有修短逓聞一作有得失而大抵同風可為連類釋自此已下以班馬言先列平論張晏云遷歿後亡龜䇿日者傳禇先生補其所一無所字缺言詞鄙陋非遷本意案遷所撰五帝本紀七十列傳稱虞舜見阨遂匿空而出宣尼既殂門人推奉有若此二事又於暗惑篇論之其言之鄙又甚於兹安得獨罪禇生而全宗馬氏也釋一條論馬對鑒者立説是駮張非抑馬也劉軌思商㩁漢史雅重班才惟譏其本紀不列少帝而輒編髙后案𢎞非劉氏而竊養漢宫時天下無主一作君呂宗稱制故借其歳月寄以編年而野雞行事自具外戚譬夫成周成王為孺子史刋攝政一作正之年厲亡流彘歴紀共和之日而周召二公各丗家有傳句必有誤詳此句當云各有丗家班氏式遵曩例殊合事宜豈謂雖濬發於巧心反受嗤於拙目也釋一條論班亦對鑒者立説是駮劉非揚班也右通史漢為一大節劉祥撰宋書序一脱序字録歴説一作序諸家晉史其略云法盛中興荒莊草盛貌一作拙少氣王隱徐廣淪溺罕華夫史之叙事也當辯而不華質而不俚其文直其事核若斯而已可也一作矣必令同文舉之含異疑當作末異等公幹之有逸如子雲之含章類長卿之飛藻此乃綺揚繡合雕章縟彩欲稱實録其可得乎以此詆訶知其妄施彈射矣釋此節列諸晉史亦對鑒者説亦是駮劉非優劣諸史也一本此下入前篇夫史一段恐非夫人廢興時也窮達命也而書之為用亦復如是葢尚書古文六一作七經之冠冕也春秋左氏三傳之雄霸也而自秦至晉年踰五百其書隱沒不行於世既而梅氏寫獻一作狀杜侯訓釋然後見重一時擅名千古若乃一無若乃二字一止有乃字老經撰於周日莊子成於楚年遭文景而始傳值嵇阮而方貴若斯流者可勝紀哉故曰廢興時也窮逹命也適使時無識寳丗缺知音若論衡之未遇伯喈太𤣥之不逢平子逝將煙燼火滅泥沈雨絶安有歿而不朽揚名於後世者乎釋末節仍以鑒識難遇感慨攝全篇按曲筆以恩怨廢興言鑒識以明暗異同言曲筆是史之書人鑒識是人之辨史兩篇本無一語相混錯簡二百字持此判之三王獲申文選曹子建與楊德祖書曰昔田巴毁五帝罪三王一旦而服千人魯連一説使終身杜口注説見魯連子五霸見詆漢董仲舒傳仲尼之門五尺之童羞稱五伯為其先詐力而後仁誼也左氏不列學官隋經籍春秋志左氏漢初出張蒼家本無傳者文帝時賈誼為訓詁其後劉歆欲立於學諸儒莫應建武中韓歆陳元訟之乃以李封為左氏博士封卒遂罷至晉時杜預為集解盛行而公羊榖梁浸微膏肓墨守後漢儒林傳何休字卲公任城人也太傅陳蕃辟之以叅政事作公羊解詁又作公羊墨守左氏膏肓穀梁廢疾鄭𤣥傳𤣥隱修絰業乃發墨守鍼膏肓起廢疾休見而嘆曰康成入吾室操吾矛以伐我乎賣餅太官魏略嚴翰善公羊春秋時鍾繇好左氏謂左氏為太官厨公羊為賣餅家數與翰㑹辨析長短王充著書後漢本傳充字仲任師事班彪著論衡八十五篇注袁山松曰充作論衡中土未有傳者蔡邕入吴始得之恒秘玩以為談助張輔持論晉書本傳輔字丗偉御史中丞論班固司馬遷云云按所論凡五則文煩不録褚先生補史記裴注漢書音義曰十篇有録無書張晏曰遷沒後亡景紀武紀漢興將相年表禮樂律書三王丗家日者龜䇿傳靳蒯列傳元成之間褚先生補缺日者龜䇿言辭鄙陋非遷本意劉軌思北齊儒林傳劉軌思説詩甚精故其鄉曲多為詩者仕齊國子博士按傳不載論史之文野雞封禪書野雞夜雊注如淳曰野雞雉也呂后名雉故曰野雞巧心拙目語見陸禨文賦劉祥南齊書劉祥字顯徵性韻剛踈宋丗解褐撰宋書譏斥禪代上銜而不問後徙廣州按後周亦有劉祥字休徴以字行劉璠子也繕定梁典與此無涉郭本誤引王本刋正徐廣見左傳家徐賈注文舉公幹後漢書孔融字文舉魯國人為北海相魏志東平劉楨字公幹魏文帝典論今之文人魯國孔文舉氣體髙妙理不勝辭又云文本同而末異又與吴質書公幹有逸氣但未遒耳子雲長卿漢書揚雄字子雲蜀郡人好深沈之思先是蜀有司馬相如作賦甚𢎞麗雄常擬之㠯為式又司馬相如字長卿相如奏賦天子大悦飄飄有凌雲氣㳺天地之間梅氏寫獻隋經籍尚書志孔安國以古文開其篇第成五十八篇晉丗秘府所存永嘉之亂並亡至東晉豫章内史梅賾始得安國之傳奏之又闕舜典一篇齊建武中吴姚興方於大桁市得其書奏上多二十八篇於是始列國學按丗説方正篇梅頤豫章太守其字仲真見注晉諸公讃似即其人賾與頤未知孰是杜侯訓釋杜預為春秋左氏經傳集解已略見前按本傳又叅考衆家譜第謂之釋例又作盟㑹圖春秋長歴備成一家之學老莊遭值揚雄傳昔老聃著虚無之言兩篇後丗好之者㠯為過於五經自文景之君及司馬遷皆有是言晉書嵇阮傳嵇康好老莊著養生論阮籍著達莊論按漢初言黄老者先有膠西葢公晉丗𤣥風尤甚起於何王流於向郭而史通第舉文景嵇阮為言約辭也太𤣥逢平子平子張衡字注詳自叙篇探賾第二十七古之述者豈徒然㢤或以取舎難明或以是非相亂由是書編典誥宣父辨其流詩列風雅卜商通其義夫前哲所作後來是觀苟失其指歸則難以傳授而或有妄生穿鑿輕究本源是乖作者之深㫖誤生人之後學其為謬也不亦甚乎釋首節標出述㫖之得失見探賾大意昔夫子之刋一作作魯史學者以為感麟而作案子思有言吾祖厄於陳蔡始作春秋此四字舊脱今補夫以彼聿修傳諸詒厥欲求實録難為爽誤是一譌事則義包微婉因攫莓莓一作苺皆誤當作煤而剏詞時逢西狩乃泣麟而絶筆傳者傳者集内凡三見並作儒者當由書傭譌傳作偽故徒知其一而未知其二以為自反袂拭靣稱吾道窮然後追論五始定名三叛此豈非獨學無友孤陋寡聞之所致耶釋此節論春秋始作當以祖孫傳語為正探知他説之非作諸條標準孫盛稱左氏春秋書吳楚則略荀悦漢紀述匈奴則簡葢所以賤夷狄而一無而字貴諸夏也案春秋之時諸國錯峙闗梁不通史官所書罕能周悉傳本不畧此但據時勢折之耳異乎炎漢之丗四海一家馬遷乗傳舊多以字求自古遺文而州郡上計皆先集太史若斯之備也况彼吴楚者僻居南裔地隔江山去彼魯邦尤為迂濶丘明所録安能備諸且必以蠻夷而固畧也若駒支預於晉㑹長狄埋於魯門葛盧之辨牛鳴郯子之知鳥軄斯皆邉隅小國人品最微猶復收其𤨏事見於方册安有主盟上國勢迫宗周爭長諸華威陵一作凌强晉而可遺之者哉傳書楚事甚多正辯在此又荀氏著書抄撮班史其取事也中外一概夷夏皆均非是獨簡一作畧胡鄉而偏詳漢室盛既疑丘明之擯吴楚遂誣仲豫之抑匈奴可謂强奏庸音持為足曲者也釋此一條探孫盛所論華夷詳略取證左荀之説都為未的葢明月之珠不能無瑕夜光之璧不能無纇故作者著書或有病累而後生不能詆訶其過又更文飾其非遂推而廣之强為其説者葢亦多矣如葛洪有云司馬遷發憤作史記百三十篇伯夷居列傳之首以為善而無報也項羽列於本紀以為居髙位者非闗有德也案史之於一作所書也有其事則記無其事則闕尋一作馬遷之馳騖今古上下數千載春秋已往得其遺事者葢唯首陽之一作山二子而已然適使夷齊生於秦代一作氏死於漢日而乃升之傳首庸謂有情言如此或可云發憤之故今者考其先後隨而編次斯則理之恒一作常也烏可怪乎必謂子長以善而無報推為傳首若伍子胥大夫種孟軻墨翟賈誼屈原之徒或行仁而不遇或盡忠而受戮何不求其品類簡一作同在一科而乃異其篇目各分為卷一作分為數卷也又遷之紕繆其流甚多夫陳勝之為丗家既云無據項羽之稱本紀何必有憑必謂遭彼腐刑怨刺孝武故書違一譌作為凡例志存激切若先黄老而後六經進姧雄而退䖏士此之乖刺復何為乎言此等乃為被刑而發耳若項紀豈闗怨刺乎釋此一條探葛洪以表善人蔑髙位臆揣夷羽之位置説亦未的也隋内史李德林著論稱陳夀蜀人其撰國志黨蜀而抑魏刋之國史以為格言案曹公之創王業也賊殺母后幽逼主上罪百田常禍千王莽文帝臨戎不武為國好奢忍害賢良踈忌骨肉而夀評皆依違其事無所措言是未嘗抑魏者劉主地謂門地居漢宗仗順而起夷險不撓終始無瑕方諸帝王可比少康光武以宗室言譬以侯伯宜輩秦繆楚莊以功烈言而夀評抑其所長攻其所短亦不似黨蜀者是則夀之意以魏為正朔之國典午攸承蜀乃僣偽之君中朝所嫉故曲稱曹美而虛説劉非安有背曹而向劉踈魏而親蜀也此下舊有注引陳夀上諸葛集表語殊無取義去之夫無其文而有其説不亦憑虚亡是者耶釋此一條探李德林論陳志之説殊為不確下條另段同事别書習鑿齒之撰漢晉春秋以魏為偽國者此葢定邪正之途明順逆之理耳而檀道鸞稱其當桓氏執政故撰此書欲以絶彼瞻烏防兹逐鹿歴觀古之學士為文以諷其上者多矣若齊冋一作趙失德豪士於焉作賦賈后無道女史由其一作之獻箴斯皆短什小篇可率爾此二字一作俯字而就也借諷之作祗有短篇從無巨怢安有變三國之體統改五行之正朔勒成一史傳諸千載而藉以權濟物議此六字舊作藉其權以濟物取誡當時豈非勞而無功博而非要與夫班彪王命一何異乎王命論亦止一篇非如習書大部也求之人情理不當爾理不當然也或訛爾作耳非釋此一條探檀論習書其説亦非自二京板蕩羣雄稱制崔鴻鳩諸偽史聚成春秋其所列者十有六家而已魏收云鴻丗仕江左故不録司馬劉蕭之書又恐識者尤之未敢出行於外以上並收語見鴻本傳案于時中原乏主海内横流逖彼東南更平為正朔適使素王再出南史重生終不能别有異同忤非其議安得以偽或作魏書無録而猶罪歸彦鸞者乎且必以崔氏祖宦一作官吴朝故情私南國必如是則其先徙居廣固委質慕容何得書彼南燕而與羣雄並列愛憎之道豈若是耶且觀鴻書之紀綱皆以晉為主亦猶班書之載吳項必繫漢年陳志之述孫劉皆宗魏丗何止獨遺其事不取其書而已哉但伯起躬為魏史傳列島夷不欲使中國著書推崇江表所以輙假言崔志用紓魏羞追出訶鴻心曲且東晉之書宋齊一脱此四字之史考其所載㡬三百篇而偽邦墳籍僅盈百卷若使收矯鴻之失南北混書斯則四分有三事歸江外非唯肥瘠非類衆寡不均兼以東南國史皆須紀傳區别兹又體統不純難為編次者矣收之矯妄其可盡言乎釋此一條探出收之議鴻全是私心造言尤為最妄者條探盡此於是考衆家之異説叅作者之本意或出自胸懐枉申探賾此云探賾貼論史者説或妄加向背輙有異同而流俗腐儒後来末學習其狂狷成其詿誤自謂見所未見聞所未聞銘諸舌端以為口實唯智者不惑無所疑焉釋告後人無惑異説也按此篇亦非論史是論論史者易傳曰聖人有以見天下之賾而擬之其形容字書云賾通嘖然則探賾者探衆論之嘖有煩言而辯正之也郭評云孫葛失之迂猶可言也李失之誣檀失之鑿魏收失之悍其能逭於子元之掊擊乎愚嘗論伯夷篇之為傳首也當作七十列傳揔序觀傳非本紀丗家之比人兼顯晦事待表章龍門寄意於首篇所傳在伯夷所附託乃在孔子也稚川之見偏居巢之説臆似皆未得其肯吾祖始作春秋孔叢居衛篇宋樂朔圍子思既免曰文王困牖里作周易祖君屈陳蔡作春秋吾今困於宋可無作乎作中庸四十九篇按太史公自序及公羊篇首注並宗此説又按孔叢子先儒多以為偽病其雜也書有夫子子思問答髙似孫子略以魯繆公年推之證其祖孫之丗不相及而堯峯汪氏復據漢書孔光傳證其丗譜出自子孫之手非他書臆度者比兩説相持録以存叅攫莓吕覽任數陳蔡之間七日不嘗粒索米得而㸑之孔子望見顔淵攫其甑中而食之起曰今者夢見先君食潔而後饋回曰嚮者煤入甑中棄食不祥回攫而飯之孔子嘆曰所信者目也目猶不可信知人固不易矣按史通明用此事莓字斷誤上計先集太史太史公自序百年之間天下遺文古事靡不畢集太史公太史公仍父子相續纂其軄隋經籍志漢帝始置太史公天下計書皆先上太史副上丞相按志葢本之衛宏漢儀注今見史記如淳注其説於史官建置篇詳之又周禮小宰䟽漢之朝集使謂之上計吏上一年計㑹文書及功狀也駒支左襄十四㑹于向將執戎子駒支范宣子親數諸朝曰詰朝之事爾無與焉對曰官之師旅無乃實有所闕而罪我諸戎不與于㑹亦無瞢焉賦青蝇而退長狄左文十二冬十月敗狄于鹹獲長狄僑如富父終甥樁其喉以戈殺之埋其首于子駒之門以命宣伯墨翟史記附見孟荀傳其文云葢墨翟宋之大夫善守禦為節用或曰並孔子時或曰在其後先黄老二句漢書史馬遷傳賛中語又後漢班彪傳彪作論畧其論遷記先有崇黄老薄五經句李稱陳夀黨蜀隋李德林傳論齊書起元事其中云漢獻帝死劉備自尊崇陳夀蜀人以魏為漢賊寕肯蜀主未立已云魏武受命乎賊后逼主後漢伏后紀自帝都許宿衛兵侍莫非曹氏黨姻操入見帝不任其憤曰幸垂恩相捨操失色後乃逼帝廢后以尚書令華歆勒兵入宫收后歆就牽后出時帝在外殿后被髪跣行泣過訣曰不能復相活耶帝曰我亦不知命在何時鑿齒當桓執政晉書習傳是時桓温覬覦非望鑿齒在郡著漢晉春秋以裁之於三國之時以魏為簒逆至文帝平蜀乃為漢亡而晉興按其詳已見論賛篇但此皆今晉書所有今子元以為是道鸞語而雜説篇又有新晉不取曹干孫檀之説則亦非盡不用也瞻烏逐鹿後漢郭㤗傳陳蕃竇武為閹人害㤗哭于野曰人之云亡邦國殄瘁瞻烏爰止不知于誰之屋耳史記淮隂侯傳蒯通曰秦失其鹿天下共逐之髙材疾足者先得豪士賦晉書陸機傳齊王冋矜功自伐受爵不讓陸機惡之作豪士賦以刺焉女史箴見載文篇崔鴻十六家鴻字彦鸞前見表歴篇又魏書本傳云孝昌初給事黄門侍郎弱冠便有著述之志見劉石等並因丗故跨僣一方國書未有統一乃撰為十六國春秋勒成百卷又詳後正史篇崔氏祖宦按崔鴻傳首云伯父光名孝伯字長仁東清河人祖曠従慕容德南渡河居青州之時水慕容氏滅仕劉義隆為樂陵太守父靈廷劉駿龍驤將軍長廣太守觀此鴻之丗仕江左固有明文而史通云委質慕容傳無其語意祖曠從渡時名在仕籍傳或闕書何官也崔氏清河丗望故在諸燕境中子元之言必非無徴史通通釋卷七
