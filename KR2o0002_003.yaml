body:
  text: 史通通釋卷三無錫浦起龍撰內篇表歷第七表以世系年月為行次故曰歷蓋譜之建名起於周代一作氏表之所作因譜象形故桓君山有云太史公三代世表旁行邪通斜上並效周譜此其證歟釋首原表所由起與其格式夫以表為文用述時事施彼譜牒舊本作歷容或可取載諸史傳未見其宜何則易以六爻窮變化經春秋以一字成褒貶傳包五始詩含六義故知文尚簡要語惡煩蕪何必欵曲重㳫方稱周備釋此節泛提史家不必有表觀一作睹馬遷史記則不然矣一作夫屬下句天子有本紀諸侯有世家公卿以下有列傳至於祖孫昭穆年月職官各在其篇具有其說用相考核居然可知而重列之以表成其煩費豈非謬乎釋此層貼到遷史申說上意且表次在篇第編諸卷軸得之不為益失之不為損用使讀者莫不先看本記越至世家表在一有乎字其間緘而不視語其無用可勝道哉釋此層就編次言嫌其夾置本紀世家之間觀者往往越過既而班東二史原注東謂東觀漢記各相祖述迷而不悟無異逐狂釋遞到後史效之勒住已下疏論必曲為銓擇强加引進則列國年表或可存焉何者當春秋戰國之時天下無主羣雄錯峙各自年世若申之於表以統其時則諸國分年一時盡見如兩漢御歷四海成家公卿既為臣子王侯才比郡縣何用表其年數以别於天子者哉釋此節疏言史記所綜在列國時代則可用之至一統之世則不必有又有甚於斯者異哉班氏之人表也區别九品網羅千載論世則異時語姓則他族自可方以類聚物以羣分使善惡相從先後為次何藉而為表乎且其書上自庖犧下窮嬴氏不言漢事而編入漢書鳩居鵲巢蔦施松上附生疣贅不知翦截何斷而為限乎一脫乎字釋此又摘出班史中人表加一駮真屬可怪至法盛書載中興改表為注名目雖巧蕪纍亦多釋言他史改其名目亦無謂當晉氏播遷南據揚越魏宗勃起北雄燕代其間諸僞十有六家不附正朔自相君長一作臣崔鴻著表頗有甄明比於史漢羣篇其要為切者矣釋此推到東晉諸寇國分土裂宜用之然則唐修晉書不為十六國立表亦闕典也若諸子小說編年雜記如韋昭洞紀陶𢎞景帝代年歷舊作帝王歷皆因表而作用成其書既非國史之流故存而不述釋末以表代單行之書結之按表自三國而下暨乎南北朝皆無之後漢書初亦無表宋熊方補入今本既有故斷自三國言之劉氏謂分國時可有一統時不必有故是酌分寸刋枝葉之言然亦難以概後世矣揆之史法參以時宜親若宗房貴如宰執傳有所不登名未可竟沒胥以表括之亦嚴密得中之一道哉歸安吳提學大受言國史有表似煩文實省文外篇雜說云觀太史公之創表也燕越萬里而徑寸之內牙可接昭穆九代而方尺之中雁行有序使讀者舉目可詳郭評據此以駮兹篇良是大抵內外篇非出一時互有未定之說兩存參取折衷用之不為無助近時四明萬季野氏補作歷代史表六十卷論者推為史氏功臣云桓君山後漢桓談傳談字君山沛國相人世祖即位徴待詔㑹議靈臺所處帝曰吾欲䜟决之談極言䜟之非經帝怒出為六安郡丞初談著書二十九篇號曰新論周譜史記十二諸侯年表叙云太史公讀春秋歷譜牒梁書劉杳傳王僧孺被敕撰譜訪杳血脉所因杳云桓談新論云三代世表旁行邪上並效周譜以此而推當起周代按歐陽五代諸世家名譜本此六義五始六義見子夏詩序五始公羊隱元注即位者一國之始政莫先於正始故先言正月而後言即位先言王而後言正月先言春而後言王先言元而後言春五者同日並見乃天人之大本疏大正始是以春秋作五始法盛唐藝文志何法盛晉中興書八十卷諸僞十六家詳見外篇正史篇崔鴻十六國春秋條韋昭洞紀韋昭即韋曜吳志曜傳孫皓收曜付獄曜因獄吏上辭曰愚情縷縷竊有所懷貪令上聞昔見世間有古歷注其所紀載既多虛無在書籍者亦復錯見因尋按傳紀考合異同采托耳目所及以作洞紀起自庖犧至於秦漢凡為三卷當起黃武以來别作一卷事尚未成帝代年歷南史隱逸傳陶𢎞景字通明秣陵人明五行星算地里醫術著帝代年歷推知漢熹平三年丁丑冬至時加在日中而天實以乙亥冬至加時在夜半凡差三十八刻是漢歷後天二日十二刻也卒諡貞白先生通志略作帝王年歷書志第八序論論天文協論藝文文論五行後論五項舊注未本非原今刋正夫刑法禮樂風土山川求諸文籍出於三禮及班馬著史别裁書志考其所記多效禮經且紀一訛記傳之外有所不盡隻字片文於斯備録語其通博信作者之淵海也釋統提書志之該博以發端原夫司馬遷曰書班固曰志蔡雍曰意舊作東觀曰記非華嶠曰典張勃曰録何法盛曰說按歐陽五代史記又曰考名目雖異體統不殊亦猶楚謂之一無之字檮杌晉謂之乘魯謂之春秋其義一也釋一層書志名色更改不一於其編目舊作次非則有前曰平準史記中名後云食貨漢書改名古號河渠史記中名今稱溝洫漢書改名析郊祀漢書中名為宗廟後漢有此篇名然非總類名分禮樂漢書中名為威儀隋志之禮名禮儀懸象魏書作天象出於天文漢書中初名郡國後漢改名生於地理漢書中初名如斯變革不可勝計或名非而物是或小異而大同但作者愛竒恥於仍舊必尋源討本其歸一揆也釋一層志中條目同事而異名若乃五行藝文班補子長之闕八書中無此也百官輿服謝謝承拾孟堅之遺班有百官無輿服也王隱後來加以瑞異隱書無考新晉書刪去宋書有符瑞魏收晚進𢎞以釋老魏志末篇斯則自我作故出乎胸臆求諸歷代不過一二者焉釋一層後來志目漸有增加已上三層為一大節蓋緣諸史中獨書志一門命名條目析補日多故特數而出之大抵志之為篇其流十五六家而已釋二句轉遞其間則有妄入編次虛張部帙而積習已久不悟其非釋四語籠起中幅三條亦有事應可書冝别標一有篇字題而古來作者曽未覺察釋四語籠起後尾一條今略陳其義列於下云此下或注已上總序或注書志序皆非原文可刪也中後同按此為序論序中含議推美該備之意居多後乃籠下之辭也曰書曰志六句按此六句鄭氏通志略兩引之一在總序則東觀句作蔡雍曰意一在起卷之首則蔡雍句又作東觀曰記緣知迪功家所藏史通有二本兩時採用隨手檢録遂異其文也但東觀漢記一書總名而此論書志乃一門之名不得以總名混之畢竟作蔡雍句為是今用總序篇文刋正之夫兩曜百星麗於𤣥象非如九州萬國廢置無恆故海田可變而景緯無易古之天猶今之天也今之天即古之天也必欲刋之國史施於何代不可也釋首節函舉大意天字指體度星象言但史記包括所及區域指世代言綿長故書有天官讀者竟忘其誤𣙜而為論未見其宜班固因循復以天文作志志無漢事而𨽻入漢書尋篇考限覩其乖越者矣降及有晉迄於隋氏或地止一隅或年才二世而彼蒼列志其篇倍多流宕忘歸不知紀極方於漢史又孟堅之罪人也釋此節言史記之作該代甚廣故首列天體星象之文班史不應襲書而越限而小朝促祚尤無取鋪張也竊以國史所書宜述當時之事必為志而論天象也但載其時彗孛氛祲薄食晦明禆竈梓慎之所占京房李郃之所候至如一作於熒惑退舍宋公延齡中台告坼晉相速禍星集潁川而賢人聚月犯少微而處士亡如斯之類志之可也釋此言天變代異乃可斷限志之若乃體分濛澒色著青蒼丹曦日也素魄月也之躔次黃道日作之道紫宮紫微宮垣之分野既不預於人事輒編之於䇿書故曰刋之國史施於何代不可也釋繳應復陳體象之非其間唯有袁山松著後漢書沈約著宋書蕭子顯著南齊書魏收著魏書等數家頗覺其非不遵舊例凡所記録多合事宜寸有所長賢於班馬逺矣釋四人皆專志本朝象變者按此條就書志中抽出天文論之所論非謂歷數也謂日月列星之象也日之黃道月之九行千古不變三垣之鼎立四七之碁布亦千古不變見之一史足矣何必凡史悉陳但當取其變者志之劉氏之意如此然歷術屢更而宫度改移宮名革易亦未可不約舉其目蓋為晉隋二志而發二志成於李淳風標著懸象最為精整然所列天體經星七曜諸條二書兩載修既並時復由一手以此䝉誚也顧此事愈推而愈精近法推尊郭術矣至西法起而體象俱為改觀西術言三垣四七間諸星有古今多少有無之異則恆星亦有變時矣詳見明史天文志見端於晚明而大闡於昭代乃為千古立極是其發端表象有不可不特書者禆竈梓慎注見下五行條京房漢書京房字君明治易事焦延夀贛其說長於灾變分六十四卦更直日用事以風雨寒溫為候各有占驗房用之尤精以孝廉為郎李郃後漢方術傳李郃字孟節南鄭人縣召署幕門候吏和帝分遣使者微服單行各至州縣觀採風謠使者二人當到益部投郃候舍時夏夕露坐郃因仰觀問曰二君發京師時寧知朝廷遣二使耶二人驚相視曰何以知之郃指星示云有二使星向益州分野故知之耳熒惑退舍吕氏春秋季夏紀宋景公時熒惑在心公召子韋問焉子韋曰禍當君雖然可移於相公曰相所與治國家也曰可移於民公曰民死寡人將誰為君曰可移於歲公曰歲害則民必死誰以我為君乎子韋曰君有至德之言三天必三賞君熒惑其徙三舍舍行七星星當一年君延年二十一矣熒惑果徙三舍中台告坼晉書張華傳華字茂先惠帝即位為太子少傅初趙王倫諂事賈后求録尚書事華執不可由是致怨華少子韙以中台星坼勸華遜位華曰天道𤣥逺惟修德以應之耳及倫將廢賈后華遂被收星集潁川世說德行篇陳太丘詣荀朗陵使元方將車季方持杖長文尚小載著車中既至荀亦使叔慈應門慈明行酒餘六龍下食文若亦小坐著䣛前注於時德星聚太史奏五百里賢人聚月犯少微世說棲逸注續晉陽秋曰㑹稽謝敷入太平山中徵博士不就初月犯少微星時戴逵先敷著名時人憂之俄而敷死㑹稽人士嘲之曰吳中髙士求死不得晉天文志少微四星在太微東一名處士星伏羲已降文籍始備逮於戰國其書五車傳之無窮是曰不朽夫古之所制我有何力而班漢定其流别編為藝文志論其妄載事等上篇釋藝文之志始自班史故首言之續漢已還祖述不暇夫前志已録而後志仍書篇目如舊頻煩互出何異以水濟水誰能飲之者乎釋遞到後史函下隋書且漢書之志天文藝文也蓋欲廣列篇名示存書體而已文字既少披閲易周故雖乖節文而未甚穢纍既而後來繼述其流日廣天文則星占月㑹渾圖渾天周髀蓋天之流藝文則四部七録中經祕閣之輩莫不各踰三篋自成一家史臣所書宜其輟簡而近世有著隋書者乃廣包衆作勒成二志騁其繁富百倍前修非唯循覆車而重軌亦復加濶眉以半額者矣釋此言書益增多史益汗漫用天文陪說但自史之立志非復一門其理有不安多從沿革唯藝文一體古今是同詳求厥義未見其可愚謂凡撰志者宜除此篇釋此節單折到除藝文必不能去當變其體近者宋孝王關東風俗傳亦有墳籍志其所録皆鄴下文儒之士讎校之司所列書名唯取當時撰者習兹楷則庶免譏嫌語曰雖有絲麻無棄菅蒯於宋生得之矣釋結到單録近籍為是按此條抽論藝文也為文史日多而發與天文同㫖故雙舉言之蓋藝文之志始自漢班硎谷灰燼藜照藂殘有幸心焉陳范以還斯志中絶唐初敕撰隋書于李顔孔分編史志復有經籍之目故篇內所指唯此兩家其言有砥瀾之功亦有懲噎之弊書有五厄里仁牛氏三致志焉宋崇文祕省諸目仍登國史而明史則祗載一朝撰述毋亦儀監於史通抑煩不勝叢録乎自邇學士購藏家往往私為目録繼軌朝陳藉是以當史補續通考者所宜亟收也五車莊子天下篇惠施多方其書五車四部隋經籍志魏氏代漢采托遺亡藏在祕書中外三閣鄭默始著中經荀勗又因中經更著新簿分為四部一曰甲部六藝小學等書二曰乙部諸子兵書術數三曰景部史記舊事皇覽部雜事四曰丁部詩賦圖讃汲冡書七録梁書處士傳阮孝緒字士宗所著七録等書行於世隋經籍志孝緒博采宋齊以來王公之家凡有書記參校官簿更為七録一經典録二記傳録三子兵録四文集録五枝術録六佛録七道録濶眉半額後漢書馬楥子廖上疏長樂宫述長安語曰城中好髙髻四方髙一尺城中好廣眉四方且半額城中好大袖四方全匹帛章懷注當時諺也宋孝王北史宋隱傳族裔世景從孫孝王為北平王文學非毁朝士撰朝士别録二十卷㑹周武滅齊改為關東風俗傳更廣見聞成三十卷雖有絲麻二句見左傳成九年夫灾祥之作以表吉凶此理昭昭不易誣也然則麒麟鬭而日月蝕鯨鯢死而彗星出河變應於千年山崩由於朽壤又語曰太嵗在酉舊作丑誤乞漿得酒太歲在已販妻鬻子皆貼氣數說則知吉凶遞代如盈縮循環此乃關諸天道不復繫乎人事釋首節領起天人不相雜糅之意且周王决疑龜焦蓍折宋皇誓衆竿壞幡亡梟止涼一作梁一作京並非師之營鵩集賈生之舍斯皆妖災著象而福祿來鍾愚智不能知晦明莫之測也然而古之國史聞異則書未必皆審其休咎詳其美惡也故諸侯相赴有異不為灾見於春秋其事非一釋此節申舉休咎不相符應之證洎漢興儒者乃考洪範以釋隂陽釋三句提起後文蓋指董劉等書即五行志所本也其事也如江璧傳於鄭客一作谷誤逺應始皇卧栁植於上林近符宣帝門樞白髮元后之祥桂樹一作梓柱黃雀新都之䜟舉夫一二良有可稱釋欲奪之先豫之是開筆至於蜚蜮蝝螽震食崩坼隕霜雨雹大水無氷其所證明實皆迂濶釋數語急轉是正奪之故當春秋之世其在於魯也如有旱雩舛候螟蜷傷苗之屬是時或秦人歸襚或毛伯賜命或滕邾入朝或晉楚來聘皆持此恆事應彼咎徵昊或作旻穹垂謫厥罰安在探賾索隱其可略諸釋此以咎徵無應證明所奪之指其可略諸者不必附㑹深求也且史之記載難以周悉近者宋氏年唯五紀地止江淮書滿百篇號為繁富作者猶廣之以拾遺加之以語録况彼春秋之所記也二百四十年行事夷夏之國盡書而經傳集解杜預注本卷才三十則知其言一無言字所略蓋亦多矣而漢代儒者羅災眚於二百年外討符㑹於三十卷中安知事有不應於人應而人舊作人而失其事何得茍有變而必知其兆者哉釋借劉宋近書與左相衡見狹者繁而濶者簡舒向輩執簡本以窮天變考證於漏略之中勢有難於悉協者自其事也至此皆約舉五行家大致統折之已下拈條摘駮若乃採前文而改易其說謂王札子之作亂在彼成年原注春秋成公元年二月無冰董仲舒以為其時王札子殺召伯毛伯案今春秋經札子殺毛伯事在宣十五年非成公時在志中下又見五行雜駮夏徴舒之構逆當夫昭代原注春秋昭公九年陳災董仲舒以為楚嚴王為陳討夏徴舒因滅陳陳之臣子毒恨故致火災案楚嚴王之滅陳在宣十一年如昭九年所滅者乃楚靈王時且莊王卒恭王立恭王卒康王立康王卒夾敖立夾敖卒靈王立相去凡五世在志之上亦見五行雜駮楚嚴作霸荆國始僣稱王原注春秋桓公三年日有食之既京房易傳以為後楚嚴稱王兼地千里案自武王始僣號歷文成穆三王始至於嚴然則楚之稱王已四世矣何得言嚴始稱哉又魯桓薨後世歷嚴閔釐文宣凡五君而楚嚴作霸安有桓三年日食而應之邪在志下下亦見五行雜駮髙宗諒隂亳都實生桑榖原注書序曰伊陟相太戊亳有桑穀共生劉向以為殷道衰髙宗承弊而起盡諒隂之哀天下應之既獲顯榮怠於政事而國將危亡故桑穀之異見案太戊崩其後嗣有仲丁河亶甲祖乙盤庚凡歷五世始至武丁即髙宗是也桑榖自太戊時生非髙宗事髙宗又本不都於亳在志中下書序曰舊作尚書脫序字今照志改晉悼臨國六卿專政以君事臣原注董仲舒以為成公十七年六月甲戌朔日有食之時宿在畢晉國象也晉厲公誅四大夫四大夫欲殺厲公後莫敢責大夫六卿遂相與比周專晉國君還事之案春秋成公十二月丁巳朔日食非是六月在志下下亦見五行雜駮但此一占志作昭公注作成公誤在注而晉厲事本在成世不在昭世誤實在班至案中所糾只糾月舛不糾占舛則更因誤入誤矣留在雜駮篇并詳之魯僖末年三桓世官殺嫡立庶原注春秋釐公三十三年十二月隕霜不殺草劉向以為是時公子遂專權三桓始世官向又曰嗣君微失秉事之象也又釐公二十九年秋大雨雹劉向以為釐公末年信用公子遂專權自恣至於殺君故隂脅陽之象見釐公不悟遂終專權後二年殺子赤立宣公案此事乃文公末世不是釐公時也遂即東門襄仲赤文公太子即惡也在志中下斯皆不憑章句直取胸懷或以前為後以虛為實移的就箭曲取相諧掩耳盜鐘自云無覺詎知後生可畏來者難誣者邪釋此段駮其任意遷就又品藻羣流題目庶類謂莒為大國菽為强草鶖著青一作素色疑脫偶句四字負蠜非中國之蟲原注春秋嚴公二十九年有蜰劉歆以為蜰負蠜也劉向以為非中國所有南越盛暑男女同川浴淫風所生是時嚴公取齊淫女為夫人既入淫於兩叔故蜰至案負蠜中國所生不獨出南越在志中下鸜鵒為夷狄之鳥原注春秋昭公二十五年鸜鵒來巢劉向以為夷狄之禽案鸜鵒中國皆有唯不踰濟水耳事見周官在志中下如斯詭妄不可殫論而班固就加纂次曽靡銓擇因以五行編而為志不亦惑乎釋此段駮其狀物不實且每有叙一災推一怪董京之說前後相反向歆之解父子不同原注桓公三年日有食之董仲舒劉向以為魯宋殺君易許田劉歆以為晉曲沃莊伯殺晉侯京房以為後楚嚴稱王兼地千里也又嚴公七年夜中星隕如雨劉向以為夜中者即中國也劉歆以為晝象中國夜象夷狄劉向又以為蜮生南越劉歆以為盛暑蜮所生非自越來也按桓公三年一條舊本在董京相反之下今詳條內亦有向歆不同之語故移而并之又按劉向又以之上當有嚴公十七年秋有蜮八字今補此遂乃雙載其文兩存厥理言無準的事益煩費豈所謂撮其機要收彼菁華者哉釋此段駮其占論岐忤統上三段皆是正斥五行志之不足泥自漢中興已還迄於宋齊其間司馬彪續漢書臧榮緒晉書沈約宋書蕭子顯齊書相承載筆競志五行雖未能盡善而大較多實何者如彪之徒皆自以名慙漢儒才劣班史凡所辨論務守常途既動遵繩墨故理絶河漢兼以古書從略求徵應者難該近史尚繁考祥符者易洽此昔人所以言有乖越後進所以事反一訛作不精審也釋後史之志五行差少穿鑿此以寬後史者甚班志也然則天道遼逺禆竈焉知日蝕不常文伯所對至如梓慎之占星象趙達之明風角單揚識魏祚於黃龍董養徵晉亂於蒼鳥一作鵝斯皆肇彰先覺取驗將來言必有中語無虛發茍志之竹帛其誰曰不然若乃前事已往後來追證課彼虛說成此游詞多見其老生常談徒煩翰墨者矣釋此節數人皆非作史者蓋以前事先見之明剔彼後來强附之術仍是以寬為甚之詞子曰蓋有不知而作之者我無是也又曰君子於其所不知蓋闕如也又曰知之為知之不知為不知是知或作智也嗚呼世之作者其鑒之哉談何容易駟不及舌無為强著一書一作言受嗤千載也釋作誡辭結按此條抽論班志五行也漢自廣川董氏湛深經術頗雜緯書伏勝更生後起應和率取春秋洪範影附黏連其流益蕃矣世祖中興喜徵符䜟孟堅撰史特志五行亦㑹逄其適歟其文博而奧其說臆而膠蓋史部之竒文而經學之死句也劉論明通與歐史司天合契可作外篇錯誤題辭杜岐公通典無二文五行門遼史不志天文麟鬭鯨死二語見淮南子天文訓河變拾遺記丹􅉌千年一燒黃河千年一清山崩左傳成五梁山崩絳人曰山有朽壤而崩太歲在酉四句馬總意林袁雅正書曰太歲在酉乞漿得酒太歲在已販妻鬻子知災有自然之理周王决疑說苑權謀篇武王伐紂至於有戎之隧大雨卜而龜􅑒散宜生曰此其妖歟武王曰不利禱祀利以擊衆是􅑒之已武王順天地犯妖而禽紂其所獨見者精也按其事亦見齊太公世家書泰誓正義引之云周本紀太公曰枯骨朽蓍不踰人矣誤以齊世家為周本紀也宋皇誓衆宋武紀上公征盧循至左里公所執麾竿折折幡沈水衆懼公歡笑曰往年覆舟之戰幡竿亦折今者復然賊必破矣即攻柵而進循單舸走梟止凉營晉前凉張軌傳重華以謝艾為中堅將軍配步騎五千擊麻秋引師出振武夜有二梟鳴於牙中艾曰六博得梟者勝尅敵之兆於是進戰大破之鵩集賈舍漢書賈誼為長沙傅三年有鵩飛入誼舍鵩似梟不祥鳥也乃為賦以自廣後嵗餘文帝思誼徵之江璧漢五行志中上史記秦始皇三十六年鄭客從關東來至華隂望見素車白馬從華山上下持璧與客曰為我遺滈池君今年祖龍死忽不見鄭客奉璧即始皇二十八年過江所湛璧也栁植荀悅漢紀昭帝元鳳三年上林苑中枯栁斷而自起復生有蟲食其葉成文曰公孫病已當立符節令眭𢎞上書言當有匹庶興坐妖言誅及宣帝起民間立以𢎞子為郎按宣帝初名病已門樞白髮漢五行志下上哀帝建平四年京師郡國民聚㑹里巷阡陌博具歌舞祠西王母又傳書曰毋告百姓佩此書者不死不信視門樞下當有白髮杜鄴曰外家丁傅並侍帷幄指象以覺聖朝一曰此異乃王太后葬之應桂樹黃雀武帝時謠邪徑敗良田讒口亂善人桂樹華不實黃雀巢其顛故為人所羡今為人所憐郭茂倩注桂赤色漢家象王莽自謂黃也見五行志春秋恆事應咎徵秦人歸隧在文十二毛伯錫命在文元滕朝魯者五邾七晉聘魯十一楚三皆所謂恆事也其間災咎不絶書宋氏百篇沈約宋書凡一百卷拾遺語録隋志宋拾遺十卷梁少府卿謝綽撰鄭樵藝文略宋齊語録十卷孔思尚撰移的盜鐘移的句未詳所本淮南說山范氏之敗有竊其鐘負而走者鎗然有聲懼人聞之遽掩其耳憎人聞之可也自掩其耳悖矣後生可畏二句見魏文帝與吳質書禆竈左傳昭十七有星孛於大辰鄭禆竈曰宋衛陳鄭將同日火若我用瓘斚玊瓚鄭必不火子産弗與十八年夏宋衛陳鄭皆火禆竈曰不用吾言鄭又將火子産曰天道逺人道邇竈焉知天道遂不與亦不復火文伯左傳昭七夏四月日有食之士文伯曰魯衛惡之衛大魯小其大咎其衛君乎魯將上卿八月衛襄公卒十一月季武子卒晉侯曰日食從矣可常乎對曰同始異終何可常也梓慎左傳昭十七冬有星孛於大辰西及漢申須曰諸侯其有火災乎梓慎曰火出而見今兹火出而章必火入而伏其居火也久矣火出於夏為三月於商為四月於周為五月夏數得天若火作其四國當之在宋衛陳鄭乎趙達吳志趙達河南人渡江治九宮一算之術此術微妙頭乘尾除常笑諸星氣風術者曰當回算帷幕不出戶牖以知天道而反晝夜暴露以望氣祥不亦難乎單揚後漢方術傳單揚字武宣善明天官算術熹平末黃龍見譙橋𤣥問何祥揚曰其國當有王者興不及五十年龍當復見魏郡人殷登密記之至建安二十五年春黃龍復見譙其冬魏受禪董養晉隱逸傳董養字仲道到洛下楊后廢因游太學升堂歎曰建斯堂也何為乎人理滅大亂作矣永嘉中洛城東北步廣里地陷有二鵝出其蒼者飛去白者不能飛養聞歎曰昔周時盟狄泉地也蒼者胡象白者國家之象其可盡言乎乃與妻荷擔入蜀莫知所終哀江南賦出狄泉之蒼鳥或以為天文藝文雖非漢書所宜取而可一作有廣聞見難為刪削也對曰茍事非其限而越理成舊訛作來來成二字行草相類也書自可觸類而長於何不録又有要於此者今可得而言焉釋借前二項衍出後二項皆非質言也解在後夫圓首方足一作趾含靈受氣吉凶形於相貌古貌字貴賤彰於骨法生人之所欲知也四支六府痾瘵所纒茍詳其孔穴則砭灼無誤此養生之尤急也且身名並列身謂人形名謂天象親踈自眀豈可近昧形骸而逺求辰象既天文有志何不為人形志乎釋因天衍人是一項然技流豈反大於歷象乎茫茫九州言語各異大漢依班史所稱輶軒之使譯導而通足以驗風俗之不同示皇威之廣被且事當炎運尤相關涉爾雅釋物非無往例既藝文有志何不為方言志乎釋因文衍言是一項然鄙語豈反重於經籍乎但班固綴孫卿之詞以序刑法探孟軻之語用裁食貨五行出劉向洪範藝文取劉㰴七略因人成事其目遂多至若許負相經揚雄方言並當時所重見傳流俗若加以二志幸有其書何獨舍諸深所未曉釋此節是輕掉之文蓋言彼二項當志則此二項亦可志矣歷觀衆史諸志列名或前略而後詳或古無而今有雖遞補所闕各自以為工榷而論之皆未得其最釋此節乃繳落前文轉入下文謂前所云云日增日多實皆不必也唯下三項或可酌補耳蓋可以為志者其道有三焉一曰都邑志二曰氏族志三曰方物志釋三項提綱何者京邑翼翼四方是則千門萬戶長安兆庶仰其威神虎踞龍蟠建鄴帝王表其尊極兼復土階卑室好約者所以安人阿房未央窮奢者由其敗國此則其惡可以誡世其善可以勸後者也且宫闕制度朝廷軌儀前王所為後王取則故齊府髙齊肇建誦魏都以立宫代國元魏初國號代初遷寫吳京而樹闕故知經始之義卜揆之功經百王而不易無一日而可廢也至如一作於兩漢之都咸洛咸陽洛陽晉宋之宅金陵魏徙伊瀍齊居漳滏鄴都隋氏二世分置兩都此並規模宏逺名號非一凡為國史者宜各撰都邑志列於輿服之上釋此節議補都邑志與輿服類列金石草木縞紵絲枲之流鳥獸蟲魚齒革羽毛之類或百蠻攸稅或萬國是供夏書則編於禹貢周書則託於王㑹亦有圖形九牧之鼎左宣三年列狀四荒之經山海經觀之者擅其博聞學此二字一本倒刋之者騁其多識自漢氏拓境無國不賔則有笻竹傳節䈮醬流味大宛獻一作輸其善馬條支致其巨雀爰及魏晉迄於周隋咸亦遐邇來王任土作貢異物歸於計吏竒名顯於職方凡為國史者宜各撰方物志列於食貨之首釋此節議補方物志與食貨類列帝王苗裔公侯子孫餘慶所鍾百世無絶能言吾祖郯子見師於孔公不識其先籍談取誚於姬后故周撰世本式辨諸宗楚置三閭實掌王族逮乎晚葉譜學尤煩用之於官可以品藻士庶施之於國可以甄别華夷自劉曹受命雍豫為宅世胄相承子孫蕃衍及永嘉東渡流寓揚越代氏南遷革夷從夏於是中朝江左一作右南北混淆華壤邉民虜漢相雜隋有天下文軌大同江外南兼陳氏山東東并髙齊人物殷凑其間髙門素一作貴族非復一家郡正州曹舊作都世掌其任凡為國史者宜各撰氏族志列於百官之下釋此節議補氏族志與百官類列蓋自都邑以降氏族而往實為志者所宜先而諸史竟無其録如休文宋籍廣以符瑞伯起魏篇加之釋老徒以不急為務曾何足云惟此數條粗加商略得失利害從可知矣庶夫後來作者擇其善而行之釋此總結三項之當補此下舊本另條非或問曰子以都邑氏族方物宜各纂一作纘次以志名篇夫史之有志多憑舊說茍世無其録則闕而不編此都邑之流所以不果列志也釋此總上三項設問見考證之難對曰案帝王建國本無恆所作者記事亦在相時逺則漢有三輔典近則隋有東都記並記一統之都於南則有宋南徐州記晉宫闕名記南朝於北則有洛陽伽藍記鄴都故事記北朝蓋都邑之事盡在是矣釋答言都邑有考譜牒之作盛於中古漢有趙岐三輔决録晉有摯虞族姓舊作姓族記記一統世族江左有兩王百家譜記南族中原有方思殿疑當作選格記北族蓋氏族之事盡在是矣釋答言氏族有考自沈瑩著臨海水土周處撰陽羡風土舊作土風二者舉其始作厥類衆夥諒非一族是以地理為書陸澄集而難盡水經加注酈元編而不窮總括續撰蓋方物之事盡在是矣釋答言方物有考凡此諸書代不乏作必聚而為志奚患無文譬夫涉海求魚登山採木至於鱗介修短柯條巨細蓋在擇之而已茍為魚人匠者何慮山海之貧罄哉釋結言有考則取材不難但當擇而用之耳按此為篇後餘論人形方言二項是設辭特假設以决天文藝文之當除耳四者相衡洪纎雅俗學究能辨之知幾顧為此戲論乎其後三說乃是商語然嘗考之都邑則略具於地理非同輿服之無附方物則雜出於外域豈比食貨之有經至如氏族一門自是魏晉相沿四姓尚官之習而任子積輕後世尤不可通行獨魏書官氏志兼及氏族知幾議論大率偏於枯尅不圖此處忽生葛藤所言雖不行於史家然後來漁仲貴與諸人已被他爮動癢處爾雅釋物按爾雅無釋物篇即謂釋草釋木釋蟲魚鳥獸等篇也綴孫卿探孟軻此四句宋書志序之文劉向洪範王訓故漢書云劉向集上古以來歷春秋六國至秦漢符瑞災異之記推跡行事著其占驗比類相從各有條目凡十一篇號曰洪範五行傳論七略漢藝文志成帝時劉向校諸書輒條其篇目撮其㫖意奏之向卒子歆卒父業於是總而奏其七略故有輯略六藝略諸子略詩賦略兵略術數略方技略許負相經舊注孔衍漢春秋許負溫縣婦人裴松之云今東人呼母為負衍以許負為婦人如有據藝文類序相術篇陶𢎞景劉孝標俱有許負相經序揚雄方言讀書志方言十三卷雄齎油素問上計孝亷異語悉集之題其首曰輶軒使者絶代語釋列國方言齊頌魏都北齊文宣紀天保九年營三臺於鄴下因其舊基而髙博之大起宫室改銅爵曰金鳯金獸曰聖應冰井曰崇光帝登三臺朝宴羣臣並命賦詩代寫吳京後魏孝文紀太和十七年幸洛陽定遷都之計詔司空經始洛邑南史崔祖思傳齊武帝時魏使蔣少游至祖思從弟元祖曰少遊有班倕之巧今來必模寫宮樣少游果圖畫而歸王㑹逸周書序周室既寧八方㑹同各以職來獻欲垂法厥後作王㑹卭竹䈮醬宛馬巨雀並見史記大宛及漢書西域二傳郯子左傳昭十七郯子來朝公與之宴昭子問焉曰少皥氏鳥名官何故也郯子曰吾祖也我知之我髙祖少皡摯之立也鳳鳥適至故紀於鳥為鳥師而鳥名云云仲尼聞之見於郯子而學之籍談左傳昭十五晉荀躒如周籍談為介王曰諸侯皆有以鎮撫王室晉獨無有何也籍談對曰晉居深山戎狄之與鄰而逺於王室拜戎不暇其何以獻器王曰叔氏而忘諸乎唐叔成王之母弟也其反無分乎且昔而髙祖孫伯黶司晉之典籍故曰籍氏及辛有之二子董之晉於是乎有董史女司典之後也何故忘之籍談不能對賔出王曰籍父其無後乎數典而忘其祖世本後漢班彪傳唐虞三代世有史官以司典籍有記録黃帝以來至春秋時帝王公侯卿大夫號曰世本一十五篇三閭王逸離騷注屈原與楚同姓仕於懷王為三閭大夫三閭之職掌王族三姓曰昭屈景屈原序其譜屬以厲國士符瑞釋老沈約宋書志四十卷其五行志之前有符瑞志三卷魏收魏書志三十卷其末曰釋老志漢三輔典按隋唐二志俱無三輔典之名疑即謂三輔黃圖也漢人撰亡撰人名其書所載皆都城宮苑辟雍明堂宗廟郊社庫廄嬌陵之屬與所引正合隋東都記隋唐二志皆不載通志略載有東都記三十卷鄧世隆撰未審即是否宋南徐州記唐志地理類山謙之南徐州記二卷晉宫闕名按此指東晉者隋唐二志亦不載洛陽伽藍記讀書志記三卷元魏羊衒之撰魏遷都洛陽一時王公大人多造佛寺或舍其私第為之故僧舍多為天下最衒之載其本末及事跡甚備書録解題以爾朱之亂城廓􅉌墟追述斯記鄴都故事無考黃補注唐志有馬溫鄴都故事二卷按注云肅代時人其書後出非劉所云三輔决録後漢趙岐傳岐字邠卿初名嘉字臺卿拜太常著三輔决録自序云三輔本雍州地世世徙公卿吏二千石及髙資者以陪諸陵五方雜㑹非一國之風其士貴於名行其俗失則趨勢進權余嘗夢黃髮之士姓𤣥名明字子真與余寤言善惡之間無所依違命操筆者書之從建武至於斯玊石朱紫由此定矣故謂之决録矣摯虞族姓晉書摯虞傳虞字仲洽太子舍人以漢末喪亂譜傳多亡失雖其子孫不能言其先祖撰族姓昭穆十卷上疏進之以為足以備物致用廣多聞之益兩王譜隋志譜系類百家集譜十卷王儉撰百家譜三十卷百家譜集鈔十五卷並王僧孺撰方思選格唐志譜牒類後魏方思格一卷又栁冲傳魏太和時詔諸郡中正各列本土姓族次第為舉選格名曰方思格臨海水土唐書地理類沈瑩臨海水土異物志一卷按志曰夷州在臨海東南去郡二千里地無霜雪草木不死四靣山溪人皆髠髮穿耳女人不穿耳地有銅鐵唯摩礪青石以作弓矢陽羡風土晉書周處傳處字子隱陽羡人少孤馳騁恣肆州曲患之曰三害未除處曰何為也曰南山白額獸長槁下蛟并子為三矣曰吾能除之乃入山殺猛獸投水殺蛟而入吳尋二陸學入洛以身殉國贈平西將軍著默語及風土記并撰集吳書隋志風土記三卷地里書南齊陸澄傳澄字彥深王儉戲之曰陸公書厨也撰地里書死後乃出隋志地里書一百四十九卷録一卷陸澄合山海經以來一百六十家以為此書水經注讀書志水經漢桑欽撰成帝時人水經三卷後魏酈道元歷覽竒書注水經魏書本傳道元字善長范陽人御史中尉關右大使史通通釋卷三
