body:
  text: 史通通釋卷五無錫浦起龍撰內篇採撰第十五子曰吾猶及史之闕文是知史文有闕其來尚矣自非博雅君子何以補其遺逸者哉釋首引闕文不補之義領起採撰冝慎之旨蓋珍裘以衆腋成溫廣厦以羣材合構自古探穴藏山之士懷鉛握槧之客何嘗不徵求異説採托羣言然後能成一家傳諸不朽觀夫丘明受舊作授誤經立傳廣包諸國蓋當時有周志晉乘鄭書楚杌等篇遂乃聚而編之混成一録向使專憑魯䇿獨詢孔氏何以能殫見洽聞若斯之博也馬遷史記採世本國語戰國䇿楚漢春秋至班固漢書則全同太史自太初已後又雜引劉氏新序説苑七略之辭此並當代雅言事無邪僻故能取信一時擅名千載釋此節提出􅉌明馬班諸史非不博徴必求雅正所以可貴也但中世作者其流日煩雖國有册書殺青不暇而百家諸子私存撰録寸有所長實廣聞見其失之者則有茍出異端虗益新事至如禹生啓石伊産空桑海客乘槎以登漢姮娥竊藥以奔月如斯踳駮不可殫論固難以汙南董之片簡霑班華一作曄非之寸札而嵇康髙士傳好聚七國寓言玄晏皇甫謐帝王紀多採六經圖讖引書之誤其萌一多始字於此矣釋此節言後來雜撰益多人情好怪史體所必禁而其萌自此不可遏矣至范曄增損東漢一代自謂無慙良直而王喬鳬履出於風俗通應劭撰左慈羊鳴傳於抱朴子葛洪撰朱紫不别穢莫大焉沈氏著書好誣先代於晉則故造奇説在宋則多出謗言前史所載已譏其謬矣而魏收黨附北朝尤苦南國尤苦謂汚衊之承其詭妄重以加諸一作重加誣語遂云一多司字馬睿出於牛金原注王劭曰沈約晉書造奇説云琅琊國姓牛者與夏矦妃私通生中宗因逺敘宣帝以毒酒殺牛金符證其狀收承此言乃云司馬睿晉將牛金子也宋孝王曰收以睿為金子計其年全不相干案前史尚如此誤况後史編録者耶劉駿上淫路氏原注沈約宋書曰孝武於路太后處寢息時人多有異議魏書因云駿蒸其母路氏醜聲播於甌越也可謂助桀為虐幸人之災尋其生絶胤嗣死遭剖斫一訛作割斷蓋亦隂過之一無之字所致也釋此節言范書既猥沈書多誣至魏之穢史借詞汙衊身受殃僇所深惡在此也晉世雜書諒非一族若語林裴榮撰世説幽明録劉義慶撰摉神記干寶撰之徒其所載或詼諧小辨或神鬼怪物其事非聖揚雄所不觀其言亂神宣尼所不語皇舊作唐朝新或作所撰晉史多採以為書夫以干寶鄧粲之所糞除王隱虞預之所粳粃持一作以為逸史用補前傳此何異魏朝之撰皇覽梁世之修遍略務多為美聚博為功雖取説於一無於字下同小人終見嗤於君子矣釋此節言國朝敕修前史擇亦不精所規在此也下皆散摘夫郡國之記譜諜之書務欲矜其州里誇其氏族讀之者安可不練其得失明其真偽者乎至如江東五俊始自會稽典録郡國記也潁川八龍出於荀氏家傳譜諜書也而修晉漢史者皆徵彼虛譽定為實録茍不别加研核何以詳其是非釋此層言偏狹之志乘宜擇又訛言難信傳聞多失至如曾參殺人不疑盜嫂翟義不死諸葛猶存此皆得之於行路傳之於衆口儻無明白其誰曰王本注疑脫不字然故蜀相薨於渭濵晉書稱嘔血而死魏君崩於馬圈齊史云中矢而亡沈炯罵一作薦書河北以為王偉魏收草檄關西謂之邢邵夫同説一事而分為兩家蓋言之者彼此有殊故書之者是非無定釋此層言一時之訛傳宜擇况古今路阻視聽壤隔而談者或以前為後或以有為無涇渭一亂莫之能辨而後來穿鑿喜出異同不憑國史别訊流俗及其記事也則有師曠將軒轅並世公明與方朔同時承前後言堯有八眉夔唯一足烏白馬角救燕丹而免禍犬吠雞鳴逐劉安以髙蹈承有無言此之乖濫往往有旃釋此層言舊説之舛訛宜擇故作者惡道聽塗説之違理街談巷議之損實觀夫子長之撰史記也殷周已往採彼家人安國孫盛之述陽秋也梁益舊事訪諸故老夫以芻蕘鄙説刋為竹帛正言而輒欲與五經方駕三志競爽斯亦難矣嗚呼逝者不作冥漠九泉毁譽所加逺誣千載異辭疑事學者宜善思之釋末節繳上三層為採撰者致誡按此篇持論正大方嚴劉子嘗言作史三難首尚學識即此可以證其本領殺青後漢吳祐傳父恢為南海太守欲殺青間以寫經書注以火炙簡令汗去其青易書復不蠧謂之殺青亦曰汗簡字已見國語篇戰國䇿注中禹生啓石路史餘論夏后氏生而母化為石説見世紀蓋原禹母獲月精石吞之而生禹也淮南修務云禹生於石而今登封廟有一石號啓母石漢元封元年武帝幸緱氏制曰朕至中嶽見啓母石云化石啓生地在嵩北按韻府言禹通轘轅謂塗山氏欲餉聞鼓乃來禹跳石誤中鼓塗山忽至見禹方作熊慙而去至嵩山下化為石禹曰歸我子石破北方生啓云云謂是淮南之文淮南實無其文亦編書家不根之一徴也伊産空桑列子天瑞后稷生乎巨迹伊尹生乎空桑吕覽本味有侁氏女得嬰兒於空桑察其所以曰其母居伊水之上孕夢神告曰臼若出水而東走明日視臼出水東走十里顧其邑盡為水身因化為空桑故命之曰伊尹海客博物志天河與海通近世有人居海渚者年年八月有浮槎去來不失期此人乘槎而去至一處屋舍甚嚴遙望宫中多織婦見一丈夫牽牛渚次飲之後至蜀問嚴君平曰某年月日有客星犯牽牛宿也姮娥後漢天文志注張衡靈憲曰羿請無死之藥於西王母姮娥竊之以奔月將往枚筮之曰翩翩歸妹獨將西行毋驚毋恐後其大昌遂託身於月是為蟾蜍王喬左慈後漢方術傳王喬顯宗時為葉令每月朔望自縣詣臺朝帝怪其來數密令太史伺望言其臨至輒有雙鳬從東南飛來於是舉羅張之但得一雙舄詔尚方侯視則四年中所賜尚書官屬履也又左慈字元放少有神道曹操欲收殺之慈卻入壁中霍然不知所在後又逢慈於陽城山頭因復逐之入走羊羣操乃令就羊中告之曰不復相殺欲試君術耳忽有一老羝屈前兩膝人立而言曰遽如許即競往赴之而羣羊數百皆變為羝並屈前膝人立云遽如許非聖不觀漢書揚雄傳雄自有大度非聖哲之書不好也按語本法言皇覽魏志劉邵傳邵字孔才黃初中為散騎侍郎受詔集五經羣書以類相從作皇覽舊注魏略云常侍王象受詔撰皇覽藏於祕府合四十餘部部有數十卷遍略梁文學傳何思澄字元靜天監十五年舉學士入華林撰遍略徐勉舉思澄等五人應選又顧杳傳徐勉舉杳及顧協等五人撰遍略又鍾嶸傳弟嶼亦預按諸傳錯舉止及四人其一人無考南史劉駿傳梁安成王給其書籍使撰類苑一百二十卷帝命諸學士撰華林遍略以髙之舊注編略七百卷五俊晉書薛兼傳兼字令長丹陽人清素有器宇少與同郡紀瞻廣陵閔鴻吳郡顧榮會稽賀循齊名號為五俊初入洛司空張華見而竒之曰皆南金也八龍後漢荀淑傳淑字季和潁川人有子八人儉緄靖燾汪爽肅敷並有名稱時人謂之八龍潁隂令苑康改其里曰髙陽里曾參殺人戰國秦䇿有與曾子同名族者而殺人人告曾子母母織自若有頃又告尚織自若頃之又告母懼投杼而走不疑盜嫂漢書直不疑傳人或毁不疑曰不疑狀貌甚美然母奈其善盜嫂何也不疑聞曰我乃無兄然終不自明也翟義不死漢書翟方進傳少子義字文仲為東郡守王莽居攝義移檄討莽軍破而亡後漢王昌傳昌一名郎莽篡位郎詐稱成帝子檄州郡曰天命佑漢使東郡太守翟義擁兵征討郎以百姓思漢多言翟義不死故詐稱之諸葛猶存蜀志魏延傳亮出北谷口病延密與楊儀薑維作身歿之後退軍節度亮適卒祕不發喪亮傳注楊儀等整軍而出宣王追焉薑維令反旗鳴鼓宣王退不敢逼百姓為之諺曰死諸葛走生仲達宣王曰吾能料生不便料死也按諸葛猶存似是成語俟再詳之嘔血蜀志諸葛傳注魏書曰亮糧盡勢窮憂恚嘔皿一夕燒營遁走入谷道發病卒臣松之以為亮在渭濵魏人躡迹勝負之形未可測量而云嘔血蓋因亮亡而自誇大也夫以孔明之略豈為仲達嘔血乎馬圈魏書髙祖紀蕭寶卷遣太尉陳顯達冦荆州攻陷馬圈戍車駕南伐至馬圈破之帝疾甚北次穀塘崩於行宮按今蕭子顯齊書無中矢之文寶卷齊廢帝東昏諱也沈炯罵書史通云沈炯罵書河北以為王偉按陳書炯傳炯武康人梁侯景之難王僧辨購得炯羽檄軍書皆出於炯梁書侯景傳景圍守宮闕抗表言陛下貪臣汝潁絶好河北檄詈髙澄南史賊臣傳王偉魏行臺郎髙澄以書招景偉為景報書澄問誰作左右稱是偉文據此則炯為僧辨檄乃檄候景非檄河北也梁武詈澄是受愚於景決不假手於偉也至北人之稱偉文本是偉作非炯作也史通似誤魏收草檄史通云魏收草檄關西謂之邢邵按北史魏收傳侯景叛入梁文襄令收為檄五十餘紙不日而就周書獨孤信傳東魏侯景之南奔也魏收為檄梁文矯稱無關西之憂欲以威梁也北史邢邵傳邵字子才人稱北間第一才子巨鹿魏收年事在後稱邢魏焉歷考魏齊周諸史其言草檄及收邵並稱處大略如此皆無收檄邵作出自關西人語之文史通或别有據耶師曠軒轅並世列子湯問焦螟集於蚊睫師曠俯耳弗聞其聲唯黃帝與容成子居空洞之上砰然聞之若雷霆又齊民要術師曠占曰黃帝問曰吾欲占藥善一心可知否對曰歲欲雨雨草先生藕欲旱旱草先生蒺藜欲荒荒草先生蓬欲病病草先生艾史記黃帝少典之子名軒轅公眀方朔同時公眀魏管輅字其語未詳堯八眉淮南修務訓堯眉八采髙誘注堯母慶都出觀于河有赤龍負圖而至奄然隂雲堯生眉有八采之色尚書大傳堯八眉舜四瞳子夔一足王訓故韓子哀公問於孔子曰吾聞夔一足信乎曰夔無他異獨通於聲堯曰夔而一足矣使為樂正非一足也按此事所見非一呂氏春秋風俗通皆有之烏白馬角語見史記刺客傳贊博物志燕丹質於秦欲歸秦王謬言曰烏頭白馬生角乃可丹仰而歎烏即頭白俯而嗟馬亦生角秦王不得已而遣之犬吠雞鳴葛洪神仙傳漢淮南王劉安者髙帝之孫也好儒學方術有八公詣門皆鬚眉皓白門吏白王八公皆變為童子王迎燒百和香八童子復為老人授王丹經藥成雷被伍被共誣安謀反八公謂安曰可以去矣安登山白日升天人傳去時餘藥器雞犬舐啄之盡得升天故雞鳴天上犬吠雲中也載文第十六夫觀乎人文以化成天下觀乎國風以察興亡是知文之為用逺矣大矣若乃宣僖善政其美載於周詩懷襄不道其惡存乎楚賦讀者不以吉甫奚斯為諂屈平宋玉為謗者何也蓋不虛美不隱惡故也釋以文之不載於史者引起是則文之將史其流一焉固可以方駕南董俱稱良直者矣釋四語牽文搭史已上為載文起因爰洎中葉文體大變樹理者多以詭妄為本飾辭者務以淫麗為宗一多故作者三字譬如一作以女工之有綺縠音樂之有鄭衛釋數語仍從文引入下乃遞及史之所載蓋語曰不作無益害有益至如史氏所書固當以正為主是以虞帝思理夏后失御尚書載其元首禽荒之歌鄭莊至孝二字謬許晉獻不眀春秋録其大隧狐裘之什其理讜而切其文簡而要足以懲惡勸善觀風察俗者矣若馬卿之子虛上林揚雄之甘泉羽獵班固兩都馬融廣成喻過其體詞沒其義繁華而一無而字下同失實流宕而忘返無禆勸奬有長姧詐而前後史漢皆書諸一脫諸字列傳不其謬乎釋已上是發凡一正一反為載文表式且漢代詞賦雖云虛矯自餘它文大抵猶實至於魏晉已下則訛謬雷同榷而論之其失有五一曰虛設二曰厚顔三曰假手四曰自戾五曰一概釋揭出五失之綱失字貼載者説何者昔一無昔字大道為公以能而授故堯咨爾舜舜以命禹自曹馬已降其取之也則不然若乃上出禪書下陳讓表其間勸進殷勤敦諭重沓迹實同於莽卓言乃類於虞夏且始自納陛迄於登壇彤弓盧矢新君膺九命之錫白馬侯服舊主蒙一作加三恪之禮徒有其文竟無其事此一脫此字所謂虛設也釋其一舉得國而言魏晉南北無非攘竊乃以禪讓錫恪之文載之史䇿豈非虛設古者兩軍為敵二國爭雄自相稱述言無所隱何者國之得喪句以兵形勝負言如日月之蝕焉非由飾辭矯説所能掩蔽也逮於近古則不然一有至如二字曹公歎蜀主之英略曰劉備吾儔周帝美齊宣之強盛云髙歡不死或移都以避其鋒或斫一作斷氷以防其渡及其申誥誓降移檄便稱其智昏菽麥識昧玄黃列宅建都若鷦鷯之巢葦臨戎賈勇猶螳螂之拒轍並當時誥檄中語此所謂厚顔也釋其二舉當敵而言忌勝則歎彼英強張詞則侈為誥檄以此諸篇載入史中豈非厚顔古者國有一脫此二字詔命皆人主所為故漢光武時第五倫為督鑄錢掾見詔書而歎曰此聖主也一見決矣至於近古則不然凡有詔敕皆責成羣下但使朝多文士國富辭人肆其筆端何事不録是以每發璽誥下綸言申惻隱之渥恩敘憂勤之至意其君雖有反道敗德唯頑與暴觀其政令則辛癸不如讀其詔誥則勳華再出此所謂假手也釋其三舉書詔而言恭主多遜辭諛臣飾恩意近史所載盡出文人是假手也蓋一無蓋字天子無戲言茍言之有失則取尤天下故漢光武謂龎萌可以託六尺之孤及聞其叛也乃謝百官曰諸君得無笑朕乎是知褒貶之言哲王所慎至於近古則不然凡百具寮王公卿士始有褒崇則謂其圭璋特達善無可加旋有貶黜則比諸舊脫諸字斗筲下一作不才罪不容責夫同為一士之行同取一君之言愚智生於倐忽是非變於俄頃帝心不一皇鑒無恆此所謂自戾也釋其四舉馭下而言鑑識靡定前後相違史並載之非自戾而何夫國有否泰世有汚隆作者形言本無定準故觀猗與之頌而驗有殷方興覩魚藻之刾而知宗周將殞至於近代一作古則不然夫談主上之聖明則君盡三五述宰相之英偉則人皆二八國止方隅而言併吞六合一作國非福不盈眥或訛作時而稱感致百靈雖人事屢改而文理無易故善之與惡其説不殊欲令觀者疇為準的此所謂一概也釋其五舉頌上而言時有隆汚詞無進退史等載之非一概而何於是考兹五失以尋文義雖事皆形似而言必憑虛夫鏤氷為璧不可得而一無此二字下同用也畫地為餅不可得而食也是以行之於世則上下相蒙傳之於後則示一作世人不信而世之作者恆一作復不之一作知察聚彼虛説編而次之創自起居起居注成於國史連章疏一作畢録一字無廢非復史書更成文集釋此節總括五失如上所載則史也而集矣史體嚴集家備也若乃歷一作類選衆作求其穢纍王沈魚豢是其甚焉裴子野何之元抑其次也陳夀干寶頗從簡約猶時載浮訛罔一作本盡機要唯王邵撰齊隋二史其所取也文皆詣一作諳實理多可信至於悠悠飾詞皆不之取此實得去邪從正之理捐華托實之義也釋前皆統論所載之失此節拈出諸史約指其優劣以實之蓋山有木工則度之况舉世文章豈無其選但苦作者書之不恐當有皆可二字讀耳至如詩有韋孟諷諫賦有趙一嫉邪篇上中下分篇故曰篇則賈誼過秦論則班彪王命張華述針於女史張載題銘於劔閣諸葛表主以出師王昶書字舊作家誤以誡子劉向谷永之上疏朝錯李固之對策荀伯子之彈文此所取未允其人好訐沽直山巨源之啓事此皆言成軌則為世龜鏡求諸歷代往往而有茍書之竹帛持以一作之不刋則其文可與三代同風其事可與五經齊列古猶今也何逺近之有哉釋此節又約舉舊文以示準的言文必似此自當登載耳昔夫子修春秋别是非申黜陟而賊臣逆子懼凡今之一無之字為史而載文也茍能撥浮華採貞一作真實亦可使夫雕蟲小技者聞義而知徙矣此乃禁淫之隄防持雅之管轄凡為載削者可不務乎釋末仍繳歸載者轉借載者以警作者按前之載言欲掣出篇文此之載文就擇言著論五失大半皆篡亂褊小時文字標而出之信禁淫之隄防持雅之管轄也其於賈班諸人之作不復以隔越敘事為言足可彌縫前語之隟著書家參互相救視諸此矣唐置中書省宋設內外制大抵玉言胥歸官掌假手一條不可泥然讀此亦足當訓詞爾雅之針余讀五失而恧然也間嘗泛濫史材凡九錫禪代之文檄誥揚言之作撮其艷句用備荒穀以為不虛度矣而此種學問古人鄙之謂之流宕伊川玩物喪志之訶亦為讀史不知擇言者戒與綺縠鄭衛王訓故漢宣帝曰辭賦大者與古詩同義小者辨麗可喜辟如女工有綺縠音樂有鄭衛兩都後漢班固傳建初中京師修宮室而關中耆老猶望西顧固感前世文辭諷勸乃上兩都賦盛稱洛邑制度以折西賔之論廣成後漢馬融傳融字季長鄧太后臨朝世士以為文德可興武功冝廢馬融以為文武之道聖賢不墜五材之用無或可廢上廣成頌以諷諫注廣成苑名劉備吾儔魏武紀注山陽公載記曰曹公船艦為備所燒引軍從華容道步歸死者甚衆既而出謂諸將曰劉備吾儔也但得計少晚向使早放火吾徒無類矣髙歡不死北齊文宣紀周文帝率衆出陜城分騎北渡至建州帝親戎出次周文帝聞帝軍容嚴盛歎曰髙歡不死矣遂退師移都蜀志關羽傳羽攻曹仁於樊威震華夏曹公議徙都許以避其鋭斫氷北史齊文宣紀周人常懼齊兵西渡恆以冬月中河椎氷智昏菽麥曹魏檄吳文孫權小子未辨菽麥按語本左氏謂晉悼公兄劉則借曹之誚吳以例誚蜀也再按識昧玄黃定是宇文誚髙語未覯其文俟補古詔命厚齋紀聞漢詔令人主自親其文光武詔曰司徒堯也赤眉桀也明帝詔曰方今上無天子下無方伯豈代言者所為哉按此可證不假手之説第五倫讀詔後漢書倫字伯魚為督鑄錢掾領長安市每讀詔書常歎息曰此聖主也一見決矣龎萌後漢劉永傳龎萌為人遜順甚見信愛帝嘗稱曰可以託六尺之孤寄百里之命者龎萌是也拜平狄將軍擊董憲而萌反帝聞之大怒與諸將乎書曰吾嘗以龎萌為社稷之臣將軍得無笑其言猗與之頌商書首篇那小序那祀成湯也魚藻之刾小序魚藻刺幽王也言萬物失其性王居鎬京將不能以自樂故君子思古之武王焉起居荀恱申鑒先帝故事有起居注動靜之節必書焉書録解題起居注自漢明德馬皇后始漢魏以來因之唐藝文志凡實録詔令等並入起居注類西亰雜記葛洪家有漢武禁中起居注一卷諷諫嫉邪韋孟諷諫詩見載言篇後漢文苑傳趙一字元叔作刾丗嫉邪賦上計到京師司徒袁逢受計執其手延置上坐謂坐中曰此人漢陽趙元叔也吾請為諸君分坐過秦王命賈誼過秦論見載言篇漢書敘傳彪遭王莽敗光武即位於冀州時隗囂據隴輯英俊囂曰往者周亡戰國並爭天下分裂抑者縱橫之事復起於今乎彪愍狂狡之不息乃著王命論以救時難張華針女史晉書華懼后族之盛作女史針以諷按今晉書本傳不載文選注引曹嘉之晉紀為徴蓋曹紀載之也張載銘劔閣文選善注臧榮緒晉書曰張載父收為蜀郡太守載隨父入蜀作劒閣銘益州刺史張敏見而竒之乃表上其文丗祖遣使鐫石記焉按載字孟陽銘見晉書本傳諸葛表按蜀志建興五年亮率諸軍北駐漢中臨發上疏即此表也又六年裴注漢晉春秋曰亮聞魏兵東下關中虛弱十一月上言云云於是有散關之役此表亮集所無出張儼默記王昶誡魏志王昶字文舒為兄子及子作名字皆依謙實兄子默字處靜沈字處道其子渾字玄沖深字道沖遂書戒之曰欲使汝曹遵儒者之教履道家之言顧名思義不敢違越也諺曰救寒莫如重裘止謗莫如自修斯言信矣劉谷朝李劉向谷永朝錯並見二體篇後漢李固傳固字子堅陽嘉二年有地動山崩火災之異公卿舉固對䇿詔又特問當世之敝為政所宜固對云云荀伯子彈文宋書伯子官御史中丞蒞職勤恪有匪躬之稱立朝正色外內憚之凡所奏劾莫不深相訶毁或延及祖禰示其切直山巨源啓事晉書山濤字巨源武帝受禪為吏部尚書前後選舉並得其才所奏甄拔人物各為題目時稱山公啓事雕蟲法言吾子或問吾子好賦曰童子雕蟲篆刻俄而曰壯夫不為也補注第十七昔詩書既成而毛孔立傳傳之時義以訓詁為主亦猶春秋之傳配經而行也降及中古始名傳曰注蓋傳者轉也轉授於無窮注者流也流通而靡絶進一作唯此二名其歸一揆釋首原訓詁之體名殊義一如韓戴服鄭鑽仰六經裴李應晉訓解三史開導後學發明先義古今傳授是曰儒宗釋此節舉注經之家陪注史之家儒宗者即訓詁為主之意是注家正體也既而史傳小書人物雜記若摯虞一作趙岐之三輔決録陳夀之季漢輔臣周處之陽羡風土舊二字倒常璩之華陽士女文言美辭列於章句委曲敘事存於細書此之注釋異夫儒士者矣釋此節入史注類異夫儒士者於本文外增補事緒是注家之變體已上標舉領局次有好事之子思廣異聞而才短力微不能自達庶憑驥尾千里絶羣遂乃掇衆史之異辭補前書之所闕若裴松之三國志陸澄劉昭兩漢書劉彤晉紀劉孝標世説之類是也釋此節列史注三家説部注一家自此以下後有論斷於述史處别出世説者謂孝標才堪注史而惜其小用之也觀後文論斷自分曉亦有躬為史臣手自刋補雖志存該博而才闕倫敘除煩則意有所吝畢載則言有所妨遂乃定彼榛楛列為子注注列行中如子從母若蕭大圜淮海亂離志羊衒之洛陽伽藍記宋孝王關東風俗傳王劭齊志之類是也釋此節是官居史職而著為雜録又復加注者後亦有論斷榷其得失求其利害少期松之字集注國志以廣承祚所遺而喜聚異同不加刋定恣其擊難坐長煩蕪觀其書成表獻自比蜜蜂兼採但甘苦不分難以味同萍實者矣釋此論松之之注三國陸澄所注班史多引司馬遷之書若此缺一言彼增半句皆採摘成注標為異説有昏耳目難為披一作搜覽釋此論陸澄之注前漢竊惟范曄之刪後漢也簡而且周踈而不漏蓋云備矣而劉昭採其所捐以為補注言盡非要事皆不急譬夫人有吐果之核棄藥之滓而愚者乃重加捃拾潔以登薦持此為工多見其無識也釋此論劉昭之注後漢依前所列此下當有劉彤注晉紀論斷今缺孝標善於攻繆博而且精固以已通察及泉魚辨窮河豕嗟乎以峻之才識足堪逺大而不能探賾彪嶠網羅班馬方復留情於委巷小説鋭思於流俗短書可謂勞而無功費而無當者矣釋此論孝標之注世説自兹已降其失逾甚若蕭羊舊誤楊之璅雜王宋之鄙碎言殊揀金事比雞肋異體同病焉可勝言釋此論蕭羊宋王四人雜志大抵撰史加注者或因人成事依文設訓者或自我作故另出意見者記録無限規檢不存難以成一家之格言千載之楷則凡諸作者可不詳之釋此節總結至若鄭玄王肅述五經而各異何休馬融論三傳而競爽欲加商榷其流實繁斯則義涉儒家言非史氏今並不書於此焉釋末仍收繳經注與前文應按篇首云傳者轉也注者流也以訓詁為主此三言者即本篇立説之主乃若聚異同以長煩蕪拾吐棄以侈登薦皆非劉氏所喜後世顧以托遺録别為多知博辨之資韓子曰古今人不相及此之謂與宋人著班馬異同一書分校字句之間足資參互之用而劉云此缺彼增採摘成注有昏耳目其言太執雖考對之小辨亦注例之一端也附見楊正衡注晉書竇蘋董衝注唐書廢徐無黨注五代史今行韓戴服鄭漢儒林傳韓嬰燕人推詩人之意作內外傳數萬言又后倉曲臺記授梁戴德延君戴聖次君德號大戴聖號小戴以博士論石渠後漢儒林傳服虔字子慎滎陽人作春秋左傳解又以左傳駮何休之所駮鄭玄傳玄字康成髙密人所注易書詩儀禮禮記論語孝經尚書大傳又著禮禘祫義六藝論毛詩譜凡百餘萬言鄭興父子傳興字少贛開封人少學公羊尤明左氏周官自杜林桓談衛宏之屬莫不斟酌焉子衆字仲師從父受左氏春秋作難記條例兼通易傳為大司農作春秋刪十九篇裴李應晉裴駰史記集解敘注索隱曰駰字龍駒宋兵曹參軍正義曰駰採經史及衆書之目而注史記顔師古漢書注敘例李斐不詳所出李竒南陽人應劭後漢太山太守晉灼河南人晉尚書郎摰虞三輔摰虞注趙岐三輔決録見書志篇陳夀季漢蜀志楊戲傳戲著季漢輔臣贊其所頌述今多載於蜀書其贊而不作傳者余皆注疏本末於其辭下周處風土即陽羡風土記見書志篇常璩華陽吕大防華陽國志引晉常璩作華陽國志自先漢至晉初踰四百歲士女可書者四百人晉書璩字道將散騎常侍按周常二書注皆無考松之三國宋書裴松之字世期中書侍郎上使注陳夀三國志松之表竊惟繢事以衆色成文蜜蜂以兼採為味臣實頑乏顧慙二物按世期史通作少期北平本云避唐諱也陸澄見書志篇隋經籍志漢書注一卷齊金紫光祿大夫陸澄撰困學紀聞其書不傳劉昭劉彤南史文學傳劉昭字宣卿臨川王記室初昭伯父彤集衆家晉書注干寶晉紀為四十卷至昭集後漢同異以注范曄後漢世稱博悉一百八十卷孝標世説世説見尚書家梁文學傳劉峻字孝標荆州戶曹參軍髙祖招文學之士峻不能隨衆沈浮故不任用髙氏緯略孝標注此書引援漢魏辭史如晉氏一代凡一百六十六家皆出於正史之外蕭大圜周書大圜字仁顯梁簡文帝子客長安太祖開麟趾殿招集學士大圜預焉隋志淮海亂離志四卷蕭世怡撰敘侯景之亂新舊唐志並作蕭大圜撰世怡豈即其人歟按本傳缺録其書而志亦不言有注羊衒之見書志篇按雒陽伽藍記序余才非著述多有遺漏後之君子詳其闕焉亦不言記內有注萍實家語孔子曰吾聞童謠曰楚王渡江得萍實大如斗赤如日剖而食之甜如蜜王肅見尚書家何休後漢儒林傳何休字卲公任城人精研六經作春秋公羊解詁馬融後漢本傳拜議郎著三傳異同説注孝經論語易詩三禮尚書融為梁冀草奏李固頗為正直所羞因習第十八一作因習上與下篇同題分次習與襲通蓋聞三王各異禮五帝不同樂故傳稱因俗易貴隨時况史書者記事之言耳夫事有貿遷而言無變革此所謂膠柱而調瑟刻船以求劔也釋領起隨時變通大意反對因字古者諸侯曰薨卿大夫曰卒故左氏傳稱楚鄧曰王薨於行國之福也莊四又鄭子産曰文襄之伯君薨大夫弔昭三即其證也案夫子修春秋實用斯義而諸國皆卒魯獨稱薨者此略外别內之旨也馬遷史記西伯已下與諸列國王侯謂諸丗家凡有薨者同加卒稱此豈略外别內邪何貶薨而書卒也釋此節指遷史書卒誤因之矣蓋著魯史者不謂其邦為魯國撰周書者不呼其上一作王曰周王如史記者事總古今勢無主客故言及漢祖多為漢王斯亦未為纍也班氏既分裂史記定名漢書至於述髙祖為公王之時皆不除沛漢之字凡有異方降欵者以歸漢為文肇自班書首為此失迄於仲豫荀恱字仍踵厥非積習相傳曾無先覺者矣釋此節指班荀二史沛漢誤因之失魏志武紀起事之時直書太祖至建安初封武平侯改書公二十一年進爵魏王遂書王凡公王之上皆不安魏字劉蓋準此立論也况班固身為漢臣體更應爾近有以除沛漢二字為非者為參取其文證之又史記陳涉世家稱其子孫至今血食漢書復有涉傳乃具載遷文案遷之言今實孝武之世也固之言今當孝明之世也事出百年語同一理即如是豈陳氏苖裔祚流東京者乎斯必不然漢書又云嚴君平既卒蜀人至今稱之皇甫謐全録斯語載於髙士傳夫孟堅士安年代懸隔至今之説豈可同云夫班之習馬其非既如彼謐之承固其失又如此迷而不悟奚其甚乎釋此節指固謐二書誤因今字之失何法盛中興書劉隗一作魏誤録稱其議獄事具刑法志依檢志內了無其説既而臧氏榮緒晉書梁朝通史於大連劉隗字之傳並有斯言志亦無文傳仍一訛作乃虛述此又不精之咎同於玄晏也釋此節言何書既脫志事於前臧通二書因仍其誤於後也尋班馬之為一無為字列傳皆具編其人姓名如行狀尤相似者則共歸一稱若刺客日者儒林循吏是也范曄既移題目於傳首列姓名於卷中卷中謂傳中也而猶於列傳之下注為列女髙隱等目茍姓名既書題目又顯是則一脫則鄧禹冦恂之首當署為公輔者矣岑彭吳漢之前當標為將帥者矣觸類而長實繁其徒何止列女孝子髙隱獨行而已釋此節指范史既用司馬標類之例而又添列姓名則因而不因矣按此與題目篇後幅意同其論太泥魏收著書標榜南國桓劉諸族咸曰島夷是則自江而東盡為卉服之地至於劉昶沈文秀等傳敘其爵里則不異諸華原注劉昶等傳皆云丹徒縣人也沈文秀等傳則云吳興武康人按魏書劉昶傳無丹徒人句蓋據劉宋祖籍而言豈有君臣共國父子同姓闔閭季札便致土風之殊二句頂父子孫䇿虞翻乃成夷夏之隔二句頂君臣求諸往例所未聞也釋此節指魏收例斥南朝為島夷至如南士來歸等傳并且不能自因矣當晉宅江淮實膺正朔嫉彼羣雄稱為僣盜故阮氏孝緒七録以田范裴段諸記劉石苻舊作符姚等書别創一名題為偽史及隋氏受命海內為家國靡愛憎人無彼我而世有撰隋書經籍志者其流别羣書還依一作同阮録案國之有偽其來尚矣如杜宇作帝勾踐稱王孫權建鼎峙之業蕭察為附庸之主而揚雄撰蜀紀子貢著越絶虞裁江表傳蔡述後梁史考斯衆作咸是偽書自可類聚相從合成一部何止取東晉一世十有六家而已乎釋此節偽史二字只當編紀二字用古近偏紀皆可依類同編而隋志泥定晉人遺録專收劉石等書是亦滯於因習而不知適變者夫王室將崩霸圖云搆必有忠臣義士捐生殉節若乃韋耿謀誅曹武欽誕問罪馬文司馬昭而魏晉史臣書之曰賊此乃迫於當世難以直言至如荀濟元瑾蘭摧於孝一訛作李靖之末王謙尉迥玉折於宇文之季而李百藥刋齊史顔師古述隋篇時無逼畏事須矯枉而皆仍舊不改謂數君為叛逆書事如此褒貶何施釋此節言勝國拒命之士興代被以惡名後來修史應申其節李顔輩因仍曲筆大非也條駮止此已下總結昔漢代有修奏記於其府者遂盜葛龔所作而進之既具録他文不知改易名姓時人謂之曰作奏雖工宜去葛龔及邯鄲氏撰笑林載之以為口實嗟乎歷觀自古此類尤多其有宜去而不去者豈直葛龔而已何事於斯獨致解頤之誚也凡為史者茍能識事詳審措辭精密舉一隅以三隅反告諸往而知諸來一多者字斯庶幾可以無大過矣按本篇因字該義不同有在昔為是而在後因之則非者有前人既踈而後人因之仍誤者有因往例而不盡因者有自為例而不自因者有當代書例則然而異代不必因不當因者條分乃晳混舉則蒙偽史一節猝難會悟議者大率於十六國史牢執偽字於越絶書牢執子貢作三字遂生多少驚疑愚初亦鍥舟以求不能灑脫至第三易藳乃始悟劉之意不過曰凡方隅偏據之史皆可收歸一門語最平直也蓋東晉之十六國正如殘唐之十國也考宋史藝文志於史類之末分置霸史一門首列越絶九州春秋等書次則常璩和苞范亨諸志記其後則南唐蜀閩吳越荆湘湖楚諸小史以及劉恕之十國紀年并録無遺兼該數代以是知子元所言早為宋史闢其藩籬也歷覽前後史諸志藝籍者從無一門止收一時之册而隋志獨立此狹門唐志復因之狃於阮録不能自出宜為通識所嗤矣崔鴻十六國春秋唐志有宋志無不知何年散佚膠柱刻船史記亷藺傳趙王以趙括代亷頗藺相如曰王以名使括若膠柱而鼓瑟耳按調瑟又用淮南子語吕覽察今扁楚人涉江劍墜水遽契其舟曰吾劍所從墜也廣韻契鍥通刻也曰薨曰卒公羊隱三天子曰崩諸侯曰薨大夫曰卒士曰不祿劉隗晉書劉隗字大連避亂渡江元帝以為從事中郎遷丞相司直委以刑憲按今晉書議獄事收入本傳竄去具刑法志一語不襲臧書通史之誤矣劉昶沈文秀魏書劉昶傳昶字休道義隆第九子也按又沈文秀傳文秀字仲逺吳興武康人義隆者宋文帝之諱也文秀則世為宋臣宋書亦有傳二人皆出奔仕魏者魏書島夷其君父而邑里其子臣是使父子君臣異籍也闔閭季札按史記吳太伯十九世至夀夢夀夢四子長諸樊季季札諸樊子光是為闔閭於季札為子行也孫策虞翻按吳志孫䇿字伯符漢討逆將軍弟權稱尊號追諡䇿長沙桓王虞翻為孫䇿功曹田范裴段隋經籍霸史志趙書十卷一曰二石集偽燕太傅田融撰燕書二十卷偽燕尚書范亨撰記秦記十卷宋殿中將軍裴景仁撰涼十卷偽涼著作郎段龜龍撰劉石苻姚前趙起劉淵後趙起石勒前秦起苻洪後秦起姚弋仲按田范句錯舉十六國書劉石句錯舉十六國姓總統之詞也並詳外篇正史篇乂按苻舊作符有參證語亦具正史篇杜宇華陽國志有王曰杜宇教民務時朱提有梁氏女利宇納以為妃自號曰望帝更名蒲卑蜀記越絶隋經籍志蜀王本記一卷揚雄撰越絶書十六卷子貢撰越絶本事絶謂句踐時也貴其內能自約外能絶人也吳越賢者所作按書內有春申秦皇漢祖諸人乂有毗陵無錫鹽官太末丹陽豫章諸地皆後世名其非子貢撰可知江表後梁晉書虞溥字允源鄱陽內史撰江表傳唐書蔡允恭仕隋為起居舍人著後梁春秋十卷後梁蕭察也見世家篇韋耿後漢獻帝紀建安二十三年少府耿紀丞相司直韋晃起兵誅曹操不克夷三族魏志武紀漢太醫令吉本與少府耿紀司直韋晃等反攻許燒丞相長史王必營必與嚴光討斬之欽誕魏志母􅉌儉傳揚州刺史前將軍文欽與儉矯太后詔罪狀大將軍司馬景王舉兵反大將軍統兵討破之欽亡入吳吳以欽為鎮北將軍乂諸葛誕傳誕字公休景王東征使誕督軍向夀春欽之破也誕纍見夷滅懼不自安遂反吳人與文欽來應大將軍司馬文王討之欽與誕有隙誕殺欽大將軍乃自臨圍擊斬誕誕麾下不降皆曰為諸葛公死不恨荀濟元瑾百藥齊文襄紀尚書祠部郎中元瑾與梁降人荀濟及淮南王宣洪等謀害文襄事發伏誅又荀濟傳濟字子通及見執楊愔謂曰遲暮何為然濟曰叱叱氣耳王謙尉迥師古隋髙祖紀相州總管尉遲迥自以重臣宿將志不能平遂舉兵東夏髙祖命韋孝寬討破迥傳首闕下初迥之亂也上柱國王謙為益州總管見幼主在位政由髙祖遂起巴蜀之衆以匡復為辭進屯劒閣陷始州命梁睿討平之按周書王謙字敕萬尉遲迥字薄居羅又按師古敘謙迥事在本傳殊得體但於他臣如髙熲王述李德林梁士彥等傳每及此二人皆書賊書逆曰王謙作亂曰尉遲迥反不一而足冝史通摘之葛龔後漢文苑傳葛龔字元甫以善文記知名按篇末所引具章懷注中笑林隋經籍志笑林三卷後漢給事中邯鄲淳撰邑里第十九或作因習下昔五經諸子廣書人物雖氏族可驗而邑里難詳逮太史公始革兹體凡舊作惟有列傳先述本居一作太古至於國有弛張鄉有併省隨時而載用明審實案夏侯孝若撰東方朔贊云一少云字朔字曼倩平原厭次人魏建安中分厭次為樂陵郡故又為郡人焉夫以身沒之後地名改易猶復追書其事以示後來則知身或訛生或作在生之前故宜詳録者矣釋首揭書里之法貴原委詳明得實異哉晉氏之有天下也自雒陽蕩覆衣冠南渡江左僑立州縣不存桑梓由是斗牛之野郡有青徐吳越之鄉州編冀豫欲使南北不亂淄澠可分得乎此二字一作其于屬下句繫虛名於本土者雖百代無易二句有訛脫文亦可省釋此層為貼身引端從晉家東渡僑置紛淆起議既而天長地久文軌大同二句入唐州郡則廢置無恆名目則古今各異而作者為人立傳指現在事每云某所人也其地皆取舊號施之於今原注近代史為王氏傳云琅琊臨沂人為李氏傳曰隴西成紀人之類是也非惟王李二族久離本居亦自當時無此郡縣皆是晉魏已前舊名號欲求實録不亦難乎釋此層正述現在事承僑置之遺而書里襲舊詎云得實且人無定質舊訛作所因地而化故一無故字生於荆者言皆成楚居於晉者齒便從黃涉魏而東已經七葉歷江而北一作左非唯一世四句謂南北互徙本唐而言不蒙南渡而猶以本國為是此鄉為非是則孔父里於昌平舊訛平昌隂氏家於新野而系纂微子源承管仲乃為齊宋之人非關一作曰魯鄧之士求諸自古其義無聞原注時修國史豫被配纂李義琰傳琰家於魏州昌樂已經三代因云義琰魏州昌樂人也監修者大笑以為深乖史體遂依李氏舊望改為隴西成紀人既言不見從故有此説釋此層即申透上意通三層為一節自訴書里從實而反招時議為可怪也且自世重髙門人輕寒族􅔡即競字或誤竟以姓望所出邑里相矜若仲逺之尋鄭玄先云汝南應劭文舉之對曹操自謂魯國孔融是也爰及近古其言多偽至於碑頌所勒茅土定名虛引他邦冒為已邑若乃稱袁則飾之陳郡言杜則係之京邑姓卯金者咸曰彭城氏禾女者皆云巨鹿原注今有姓邴者姓𢎞者以犯國諱皆改為李氏如書其邑里必曰隴西趙郡夫以假姓猶且如斯則真姓者斷可知矣又今西越鄙人多冇姓明及卑者如加五等爵或稱平原公或號東平子為明氏出於平原卑氏出於東平故也夫邉荒羣寇尚竊美名則諸夏士流固無慙德也在諸史傳多與同風原注如隋史牛𢎞傳云安定鶉觚人也本姓尞氏至它篇所引皆謂之隴西牛𢎞唐史謝偃傳云本姓庫汗氏續謂陳郡謝偃並其類也此乃尋流俗之常談忘著書之舊體矣釋此層推出病根為晉宋俗尚門籍故因習如此此豈得為體要乎又近世有班秩不著一多姓氏非者始以州壤自標若楚國龔遂漁陽趙一是也至於名位既隆則不從此列若蕭何鄧禹賈誼董仲舒是也觀周隋二史每述王庾諸事髙楊數公必云琅琊王褒新野庾信𢎞農楊素渤海髙熲以此成言豈曰省文從而可知也釋此層亦從上意申出以當時口號證之每舉一人必帶地望殊覺詞費通兩層為一節凡此諸失皆由積習相傳寖以成俗迷而不返蓋語曰難與慮始可與樂成夫以千載遵行持為故事而一朝糾正必驚愚俗此莊生所謂安得忘言之人而與之言斯言已得之矣庶知音君子詳其得一脫得字失者焉釋末仍綰到本身憫通識之難遇也按詳篇內注語為當日身預史局書地招笑而作邑里從今不從舊定理也好議論者云僑置本州猶存􅉌首歐陽寓潁仍署廬陵以謂子元失豺獺之義夫論事者亦論其所歸而已請即近者徴之由宋逮明國史班班任舉一人一傳其曰某處人者有不書當代郡邑者乎假令明冒宋州宋蒙唐縣有不起而非笑之者乎小言詹詹徒多事耳野客叢談載髙從所跋昌黎盤谷序稱隴西李願隱者也云云隴西去太行數千里而序之文曰居之其題曰送歸殊不相合此亦舉其郡望之一徵也即此可悟襲舊之不足從矣江左僑立晉地里志晉都河南仍魏名為司州元帝渡江僑置於徐非本所也後於尋陽僑立𢎞農郡於武陵僑立河東郡兖州則僑置於京口後改廣陵為南兖州又僑置青州又分立陳留郡山陽郡豫州則僑立於襄陽又於襄陽分立京兆扶風河南廣平等郡至志徐荆揚三州則凡幽冀青并雍涼兖豫諸州邑名錯寄其中多不勝録居晉齒黃嵇康養生論蝨處頭而黑麝食柏而香頸處嶮而癭齒居晉而黃推此而言凡所食之氣蒸性染身莫不相應按文選善注蝨麝頸並有義證而齒黃獨無蓋當時已莫詳矣史通直用康語也昌平史記世家孔子生魯昌平陬邑其先宋人也曰孔防叔索隱家語曰宋微子之後宋襄公至孔父嘉五世親盡别為公族姓孔氏至防叔畏華氏之逼而奔魯故孔氏為魯人隂氏通鑑光武紀帝在宛納新野隂氏之女麗華胡三省注風俗通云管修自齊適楚為隂大夫其後氏焉氏族大全修管仲七世孫也後漢隂識傳秦漢之際始家新野漢地里志新野鄧屬南陽郡應劭孔融後漢鄭玄傳袁紹要玄大會時汝南應劭亦歸於紹因自贊曰故太山太守應仲逺北靣稱弟子何如楊彪傳曹操奏收彪孔融往見操曰楊公四世清德公今橫殺孔融魯國男子便當拂衣而去融本傳融字文舉龔遂趙一漢書龔遂字少卿山陽南平陽人也後漢書趙一字元叔漢陽西縣人也按遂非楚國而曰楚國一非漁陽而曰漁陽標所望也王庾髙楊後周書王褒字子淵琅琊臨沂人庾信字子山南陽新野人隋書髙熲字昭玄渤海蓚人楊素字處道𢎞農華隂人按史通本節引蕭鄧賈董漢世稱其人皆不舉地望而近時王庾髙陽必以郡稱文滋煩重矣故曰豈曰省文史通通釋卷五
