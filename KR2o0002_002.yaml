body:
  text: 史通通釋卷二無錫浦起龍撰內篇二體第二二體者一編年一紀傳也三五之代書有典墳悠哉邈矣不可得而詳自唐虞以下迄於周是為古文尚書然世猶淳質文從簡略求諸備體固以一作已闕如釋篇首揭過非編年非紀傳者既而丘明傳春秋編年之祖子長著史記紀傳之祖載筆之體於斯備矣釋既而四語通幅全提後來繼作相與因循假有改張變其名目區域有限孰能踰此蓋荀悅張璠丘明之黨也班固華嶠子長之流也釋已上總為二體標出原委大意言自得左馬分創史家千古宗之惟此舊脫此字二家各相矜尚必辨其利害可得而言之釋四語又一提下分編年紀傳兩扇各言其利害夫春秋者謂左傳也此一扇論編年繫日月而為次列時歲以相續中國外夷同年共世莫不備載其事形於目前理盡一言語無重出此其所以為長也釋長即利也謂其勝紀傳也其所以勝本編年之體自所應有也至於賢士貞女髙才俊德事當衝要者其人有關國政必盱衡而備言迹在沈冥者其人無預國事不枉道而詳説如絳縣之老把梁之妻或以酬晉卿而獲記或以對齊君而見録衝要故也其有賢如柳惠仁若顔回終不得彰其名氏顯其言行沈冥故也故論其細也則纎芥無遺語其粗也則丘山是棄此其所以為短也釋短即害也是其不及記傳處也其所以不及亦編年之體自所不免也史記者舉史該漢此一扇論紀傳紀以包舉大端傳以委曲細事表以譜列一作序其年爵志以總括遺漏逮於天文地理國典朝章顯隱必該洪纖靡失此其所以為長也釋此其勝編年處故長而利也亦紀傳之體自應有也若乃同為一事分在數篇斷續相離前後屢出於髙紀涉及項事則云語在項傳髙主項賔故於項傳涉及髙祖則云事具髙紀項主髙賔故又編次同類如屈賈曹荆不求年月謂時代後生而擢居首帙先輩而抑歸末章遂使漢之賈誼將楚屈原同列魯之曹沫與燕荆軻並編此其所以為短也釋此其不及編年處故短而害也亦紀傳之體自不免也兩扇利害皆對校而出考兹勝負互有得失而晉世干寶著書乃盛譽丘明而深抑子長其義云能以三十卷之約括囊二百四十年之事靡有遺也尋其此説可謂徑挺之詞乎釋前幅分扇立論此借寶語一詰詰起二體合勘案春秋時事入於左氏所書者蓋三分得其一耳丘眀自知其略也故為國語以廣之然國語之外尚多亡逸安得言其括囊靡遺者哉釋此八句只就寶語一駮以下申窮之駮左單駮編年文若偏訶意實互勘也向使丘眀世為史官一作而非皆倣左傳也至於前漢之嚴君平鄭子真後漢之郭林宗黃叔度身隱位卑者朝古作鼂錯董生之對䇿劉向谷永之上書文煩事博者斯並德冠人倫名馳海內識洞幽顯言窮軍國或以身隱位卑不預朝政嚴鄭郭黃或以文煩事博難為次序朝董劉谷皆略而不書斯則可也此是掉句必情有所吝不加刋削則漢氏之志傳百卷併列於十二紀中一作事非將恐碎璅多蕪闌單失力者矣釋至此一勒言設使左為漢史仍用編年則如上所云不載既不安載之又費力有不得不變為紀傳者矣故班固以固例遷知其若此設紀傳以區分使其歷然可觀綱紀有别釋四句勒過變為紀傳荀悅厭其迂濶又依左氏成書翦截班史篇才三十歷代褒舊作保恐誤之有踰夲恐當作紀傳釋此數語抵前駮干寶一長段言世又有厭迂濶而褒翦截者則又轉而效編年焉由是觀之改來改去恐不出此二體也互勘之文止此然則班荀二體角力爭先欲廢其一固亦難矣後來作者不出二途故晉史有王虞紀傳而副以干紀編年宋書有徐沈紀傳而分為裴略編年各有其美並行於世釋結尾平收異夫令升之言唯守一家而已釋繳應借詰之詞按此篇與六家頂接六家舉史體之大全二體定史家之正用先分論其得失不以有失而不行後合勘其兩行不得偏任而廢一以左荀等字當編年字觀以班馬等字當紀傳字觀會此替身乃得縣解自後祕省敕撰唯此二途藝文史部必先二類知幾是篇誠百代之質的也或問替身云云何謂也曰錯舉多書總歸二體蓋揭二體之兩行非評諸書之優劣也其利害短長體中應有亦不妨兩有非此利彼害之謂更非利優害劣之謂但謂二體既立一以詮歲時一以管事行國史乃無偏缺耳舊評不會作替身字看遂皆拋體而議書體兩書煩臆揣都錯干寶一節能因單得互才是善讀書人二體兩字貫徹全書綱維羣史人言自袁機仲樞紀事本末出史體參而三矣余曰亦從二體出非别出也且降史書為類書法不參立故其書不由史館不奉敕亦編荀恱張璠見左傳家皆編年體華嶠晉書華表傳表子嶠字叔駿元康初為內臺中書散騎著作門下撰集皆典統之初嶠以漢紀煩穢慨然有改作之意會為臺郎典官制事得遍觀祕籍遂就其緒為紀典傳譜凡九十七卷改名漢後書文質事實有遷固之規絳縣老左傳襄三十晉悼夫人食輿人之城把者絳縣人或年長矣無子而往與於食有與疑年使之年曰臣生之歲正月甲子朔四百有四十五甲子矣吏走問之朝師曠曰七十三年矣趙孟召之而謝過焉曰使吾子辱在泥塗久矣武之罪也與之田使為君復陶把梁妻左傳襄二十三齊侯􅊞莒杞殖載甲宿於莒郊莒子親鼓之獲杞梁齊侯歸遇把梁之妻於郊使弔之辭曰殖之有罪何辱命焉若免於罪猶有先人之敝廬在下妾不得與郊弔齊侯弔諸其室杜注祀梁即杞殖栁惠不彰左傳僖二十六齊孝公伐我北鄙公使展喜犒師使受命於展禽杜注栁下惠也按惠見左傳有此明文今云不彰不顯與顔子並説是史通踈處賈誼屈原史記屈原賈生列傳第二十四原楚懷王時人誼漢文帝時人曹沫荆軻史記刺客列傳第二十六沫魯莊公時人軻衛人遊燕在燕王喜時按曹沫左氏穀梁並作曹劌前漢嚴鄭王貢龔鮑傳敘谷口有鄭子真蜀有嚴君平皆修身自保成帝時元舅大將軍王鳳以禮聘子真子真不詘君平卜筮於成都市人有邪惡非正之問各因藝導之以善日閲數人得百錢足自養則閉肆下簾而授老子揚雄著書稱此二人後漢郭黃郭太傳太字林宗家世貧賤遊於洛陽見河南尹李膺後歸鄉里與膺同舟而濟衆賔以為神仙焉舉有道不應黃憲傳憲字叔度父為牛醫潁川荀淑遇憲於逆旅與語移日既而至袁閎所曰子國有顔子寧識之乎閎曰見吾叔度耶太守王龔不能屈郭林宗少過袁閎不宿從憲纍日方還或問之林宗曰奉髙之器譬之泛濫清而易挹叔度汪汪若千頃陂澄之不清淆之不濁不可量也按林宗此語本傳亦載故史通二人合舉朝董對䇿漢書鼂錯傳錯為人峭直刻深孝文時拜太子家令號為智囊後詔舉賢良文學士錯在選中上親䇿之以明國體通人事能直言三道之要對䇿惟錯為髙第董仲舒傳仲舒廣川人少治春秋孝景時為博士下帷講誦三年不窺園武帝即位舉賢良文學凡三問仲舒三對天子以為江都相向永上書漢書楚元王傳向字子政本名更生元帝初為宗正外戚許史放縱宦官𢎞恭石顯弄權乃上封事諫成帝即位顯等服辜更生更名向召拜中郎數奏封事遷光祿大夫時上無繼嗣政由王氏上封事極諫天子召見歎息以為中壘挍尉谷永傳永字子雲博學經書為太常丞數上疏言得失後為刺史奏事京師時有黑龍見天子問所欲言永對切諫永自知有內應展意無所依違闌單未詳大抵是當日方言渙散不振攝之意盧照鄰釋疾文云草木扶踈兮若此豫獨蘭驒兮不自勝疑即此二字之别寫也集韻驒他干切按今俗亦有闌闌灘灘之語王虞晉書王隱傳隱字處叔父銓有著述之志每私録晉事及功臣行狀未就而卒元帝召隱為著作郎令撰晉史時著作郎虞預私撰晉書數訪於隱所聞漸廣虞預傳預字叔寧唐藝文志王隱晉書八十九卷虞預晉書五十八卷干紀即干寶晉紀見左傳家徐沈徐爰傳見正史篇注書録解題宋書本何承天山謙之蘇寶生所撰至徐爰勒為一史起義熙迄大明自永光以來闕而不補梁書沈約傳約字休文吳興人髙祖勛業既就約嘗扣其端曰今不可以淳風期萬物攀龍附鳳者莫不云明公其人也髙祖受禪為尚書僕射卒諡曰隱著宋書百卷其目詳外篇正史篇裴略即裴子野宋略見左傳家載言第三此篇以下皆就紀傳一體中分條著論古者言為尚書事為春秋左右二史分尸其職蓋桓文作霸糾糾通合同盟春秋之時事之大者也而尚書闕紀載也一作記秦師敗績繆公誡誓尚書之中言之大者也而春秋靡録此則言事有别斷可知矣泥古太甚於尚書家已論之釋首節推原記事記言古體本不相合以引下文逮左氏為書不遵古法言之與事同在傳中然而言事相兼煩省合理故使讀者尋繹不倦覽諷忘疲釋至左氏則言事兩收矣然非傳體無隔越之患其勢自可兼行也此上下轉遞之文至於史漢則不然凡所包舉務存恢博文辭入或訛作之記繁富為多是以賈誼朝錯董仲舒東方朔等傳唯上尚通或作止録言罕逢載事釋自此歸到紀傳約舉專載文辭之篇以發論端夫方述一事得其紀綱一作綱紀而隔以大篇分其次序一作序次遂令披閲之者有所懵然後史相承不改其轍交錯分一作紛擾古今是同釋承上言以長篇夾入敘事中閲者苦之逼起本指案遷固列君臣於紀傳統遺逸於表志雖篇名甚廣而一作唯言無獨無獨舊作獨無誤録愚謂凡為史者宜於表志之外更立一書釋數語揭本指若人主之制册誥令羣臣之章表移檄收之謂收出之紀傳悉入書部題為制册當有書字章表書以類區别他皆放此亦猶志之有禮樂志刑法志者也者也二字於文勢當有對下段亦當有舊脫釋此段制册章表等皆朝典頒奏之言又詩人之什自成一家故風雅比興非三傳所取自六義不作文章生焉若韋孟諷諫之詩揚雄出師之頌馬卿之書封禪賈誼之論過秦諸如此文皆施紀傳竊謂宜從古詩例斷入書中據前例亦當有題為某書之文疑脫亦猶舜典列元首之歌夏書包五子之詠者也釋此段詩頌書論等是詞人著述之言夫能使一無使字史體如是庶幾春秋尚書之道備矣釋以上二項為一節意謂當於書志帙中加立載言一條也昔一作晉誤干寶議撰晉史以為宜準一多左字丘明其臣下委曲仍為譜注於時議者莫不宗之故前史之所未安後史之所宜革釋此借寶言以見酌更舊體成例可援是用敢同有識爰立兹篇庶世之作者覩其利害如謂不然請俟來哲按上二篇標列史體已備自此而下别出已議也彼編年一體緒無雜出而紀傳則名類多門商𣙜宜審是篇蓋就列傳而言方銓事狀忽夾長篇未免文氣隔越故設此論嘗竊計之就如賈生董傅方朔馬卿未作要官無他政迹其生平不朽正在陳書對䇿詩頌論著等文設撿去之以何擔重且使此册果立幾與摯虞流别同科即劉於載文篇亦言非復史書更成文集不且自矛乎况乎後世著述如林彌滋轇轕矣此論不可行韋孟諷諫漢書韋賢傳韋賢鄒人也其先韋孟家本彭城為楚元王傅及孫王戊荒淫不遵法孟作詩諷諫後遂去位徙家於鄒又作一篇其詩或曰子孫好事述先人之志而作也揚雄出師按漢書揚雄傳載河東長楊等賦及離騷解嘲等詞太玄法言等序而無出師頌郭注引文選注云成帝時西羌有警上思將帥之臣追美趙充國乃召雄即充國圖頌之文選充國頌後編有出師頌則史孝山作豈史通誤以為雄耶馬卿封禪漢書司馬相如字長卿見上好仙遂奏大人賦天子大恱飄飄有凌雲氣遊天地之間意病免家居茂陵天子使取其書使所忠往而相如已死問其妻對曰長卿未死時為一卷書曰有使來求書奏之其遺札書言封禪事所忠奏焉賈誼過秦按漢書賈誼傳不載過秦論於陳勝項籍傳贊取史記褚少孫所述之文録之止三篇之一又按史通所舉韋揚馬賈諸篇或置傳首或出他書或入傳中或附贊內舉非一例其意祗取有關勸戒傳頌藝林法當採入史中者用示擇言之例耳本紀第四昔汲冡竹書是曰紀年呂氏春秋肇立紀號其書有十二紀蓋紀者綱紀庶品網羅萬物考篇目之大者其莫過於此乎釋首原紀字來歷及司馬遷之著史記也又列天子行事以本紀名篇後世因之守而勿失譬夫行夏時之正朔服孔門之教義者二句喻言本紀法立而分定雖地遷陵谷時變質文而此道常行終莫之能易也釋自及司馬至此贊其創立紀名專歸天子至當不易無容混冒然遷之以天子為本紀諸侯為世家斯誠讜矣但區域猶言門類既定而疆理猶言界畫不分遂令後之學者罕詳其義釋數語轉意案姬自后稷至於西伯嬴自伯翳至於莊襄襄舊作王下同爵乃諸侯而名𨽻本紀釋此下言自名之而自亂之摘周秦起案若以西伯莊襄以上别作周秦世家持殷紂以對遞代之義武王拔秦始以承周赧使帝王傳授昭然有别豈不善乎釋先設平論必以西伯以前其事簡約别加一目不足成篇其書不過兩畨則伯翳之至莊襄其書先成一卷甚不簡矣而不共世家等列輒與本紀同編此尤可怪也釋此正駮之而文義側注周之先事少卷促耳秦未帝前卷長另立何亦混稱乎項羽僣盜而死未得成君大業未就求之於古則齊無知衛州吁之類也未成君也安得諱其名字呼之曰王者乎二句言豈等於諱名而奉尊稱者春秋吳楚僣擬書如列國假使羽竊帝名正可抑同羣盜羣盜即勝廣輩漢書勝廣項籍同傳句蓋準以為言况其名曰西楚號止霸王者乎霸王者即當時諸侯即如彭韓之類謂其號正同也諸侯而稱本紀求名責實再三乖謬釋前節就帝王上世亂例駮之此節就身未成帝亂例駮之蓋紀之為體猶春秋之經繫日月以成歲時書君上以顯國統釋二句正透出命名的旨上無壓制自得紀年方許題為本紀名義相符曹武雖曰人臣實同王者以未登帝位國不建元陳志權假漢年編作魏紀亦猶兩漢書首列秦莽之正朔也連莽舉例據光武紀後來作者宜準於斯而陸機晉書列紀三祖直序其事竟不編年年既不編何紀之有釋此與下節皆摘後史之不符紀例者本節就開代言夫位終北靣一槩人臣儻追加大號止入傳限是以𢎞嗣韋曜吳史不紀孫和𬗟求故實非無往例即下文戾園也逮伯起魏收之次魏書一脫書字乃編景穆於本紀以戾園諸本訛作國虛諡間厠武昭欲使百一作下世之中若為魚貫釋此節摘繼體追尊為言已上總就本字紀字名義發撝又紀者既以編年為主唯敘天子一人有大事可書者則見之於年月其書事委曲付之列傳此此郭本作則其義也如近代述者魏著作李安平之徒其撰魏齊二史舊注魏彥淵撰後魏書李百藥撰北齊書按淵為唐諱恐非原注下同於諸帝篇或雜載臣下或兼言他事巨細畢書洪纖備録舊注如彥淵帝紀載沙苑之捷百藥帝紀述淮南之敗是也全為傳體有異紀文迷而不悟無乃太甚世之讀者幸為詳焉釋末節乃從紀體立論體似春秋之經事止提綱書其大者雜載他兼則褻矣可謂搜義無窮按史記索隱釋本紀曰本其事而記之故曰本紀若是則凡紀人事皆可通稱不已泛乎史通則曰繫日月以成歲時書君上以顯國統其於列傳篇又曰紀者編年編年者歷帝王之歲月蓋言用其紀元紀其時事也似此析義則凡混假是名如項羽前附秦年後附漢年全與本身無與不待辨而其非灼然矣裴世期論史目云天子稱本紀諸侯稱世家繫其本系故曰本是則劉説之所因歟儕項於州吁無知初看似過細按其意特以未成君等之耳非以逆例也或曰魏武權假漢年紀是乎曰帝魏為文者勢所必然猶晉三祖也尊創業也非是則唐髙宋太之先世矣莫謊於元魏稱謂篇斥之孫和元晃一條斷制嚴明濮議興獻議聚訟可息自此至題目篇條疏抽論皆是紀傳體中之體例后稷至西伯按史記周本紀后稷以下曰不窋曰鞠曰公劉曰慶節曰皇僕曰羌弗曰毁隃曰公非曰髙圉曰亞圉曰公叔祖類曰古公亶父曰公季曰西伯凡十五世文幅甚簡附按羅氏路史云夏十七世商三十世蓋四十七世而後有周文王此敘止十五世踈脫甚矣伯翳至莊襄按史記秦本紀伯翳本名大費與禹平水土傳至非子當周孝王時始封為附庸邑之秦至襄公平王封為諸侯賜之岐以西之地於是始國至繆公開地千里遂霸西戎至孝公天子致伯子惠文始稱王以至莊襄通為紀一卷編始皇紀之前無知州吁左傳莊八齊公孫無知有寵於僖公襄公絀之公田而反賊入弒之立無知九年雍廪殺無知又隱四衛州吁弒桓公而立衛人使右宰醜涖殺州吁於濮權假漢年魏志武帝紀紀年起漢獻帝初平元年盡建安二十五年陸機晉紀晉書本傳機字士衡吳郡人祖遜父抗太康末與弟雲俱入洛成都王頴勞謙下士機委身焉宦人孟玖譖機於穎遂遇害所著丈章二百餘篇按傳不言作晉紀而隋唐二志鄭馬二通並有陸機晉紀四卷並入編年門今史通云歷紀三祖直敘其事以為不合本紀之體得毋機書之以紀名原是荀袁漢紀之紀而非本紀之紀歟識以存疑三祖謂所追尊宣帝懿景帝師文帝昭也𢎞嗣吳史𢎞嗣韋曜字即韋昭也見國語家吳志曜傳孫皓即位欲為父和作紀曜執以和不登帝位宜名為傳如是者非一皓積嫌憤遂誅曜按今吳志孫和傳在五子之列殆因曜之舊歟伯起魏書北史魏牧字伯起小字佛助與溫子升邢子才齊譽世號三才齊天保元年除中書令兼著作郎二年詔撰魏史魏書紀恭宗景穆皇帝諱晃太武皇帝長子也薨於東宮即柩諡曰景穆髙宗即位追尊皇帝廟號史臣曰恭宗明德令聞夙世殂天其戾園之悼歟按此紀繼太武紀下是僣紀也當附太武紀末不合分萹戾園漢宣帝紀武帝戾太子納史良娣産子史皇孫皇孫生帝巫蠱事起太子亡至湖遇害武五子傳宣帝初即位詔曰故皇太子在湖未有號諡歲時祠其議諡置園邑有司奏請諡曰戾置奉邑二百家湖閺鄉祁里聚為戾園後又益戾園滿三百家魏著作北史魏季景傳季景子淡字彥深仕齊殿中郎中書舍人入周遷著作郎帝以魏收所撰後魏書褒貶失實詔淡别成魏史義例與魏收多所不同按淡本字彥淵唐諱為深李安平唐書李百藥字重規定州安平人隋內史令德林子也幼多病祖母趙以百藥名之七歲能屬文號竒童貞觀元年拜中書舍人封安平縣男所撰齊史行於世世家第五自有王者便置諸侯列以五等疏為萬國當一無當字周之東遷王室大壞於是禮樂征伐自諸侯出迄乎秦世分為七雄司馬遷之記諸國也其編次之體與本紀不殊各國自用其年蓋欲抑彼諸侯異乎天子故假以他稱名為世家釋首標世家創設名義之故已下皆即遷史搜駮案世家之一無此四字易一其字為義也豈不以開國承家世代相續至如一作於陳勝起自羣盜稱王六月而死子孫不嗣社稷靡聞無世可傳無家可宅而以世家為稱豈當然乎夫史之篇目皆遷所創豈以自我作故一作古集內屢見此語並作故而名實無準釋既立世家一門陳勝最難安放故作第一駮且諸侯大夫家國本别三晉之與田氏自未為君而前齒列陪臣屈身藩后而前後一統俱歸世家使君臣相雜升降失序何以責季孫之八佾舞庭管氏之三歸反玷三晉田齊之先猶帝紀之上世也又當有田齊二字列號東帝抗衡西秦地方千里髙視六國而沒其本號唯以田完制名原注謂田完世家也求之人情孰謂其可釋第二駮夲是三晉田齊總駮而田完題上獨缺齊字故多一層當漢氏之有天下也其諸侯與古不同夫古者諸侯皆即位建元專制一國綿綿瓜瓞卜世長久至於漢代則不然其宗子稱王者皆受制京邑自同州郡異姓封侯者必從宦一作官天朝不臨方域漢初不盡然或傳國唯止一身或襲爵才經數世雖名班一多爵字非胙土而禮異人君必編世家實同列傳而馬遷強加别録以類相從雖得畫一之宜詎識隨時之義釋第三駮專舉漢封為言隨時二字具有通識蓋班漢知其若是釐革前非至如蕭曹茅土之封荆楚葭莩之屬並一概稱傳無復世家事勢當然非矯枉也釋落到班史廢去世家事勢當然正是為時所轉自兹已降年將四百及魏有中夏而揚吳益蜀不賔終亦受屈中朝見稱偽主為史者必題之以紀則上通帝王榜之以傳則下同臣妾梁主敕撰通史定為吳蜀世家持彼僣君比諸列國去太去甚其得折中之規乎此論於蜀未允次有子顯齊書北編魏虜牛𢎞周史南記蕭察考其傳體宜曰世家釋自漢而後代多分據宜若可用然亦不為決詞也但近或作今誤古著書通無此稱用使馬遷之目或訛作册湮沒不行班固之名相傳靡易者矣釋末以舍馬從班結之按由周而來五等相仍當子長時漢封猶在故立此名目以處夫臣人而亦君人者自兹以降去古益逺藩微封耗史無世家時為之也隨時之義四字乃持論主句三國南北朝體勢相埓各為一史理事當然宋之遼金亦猶是也晉十六國載記統之唐之藩鎮是不一姓凡此諸朝都無置世家處獨唐末五代十國擅世廬陵逺法龍門繼列兹體比於揚益魏虜之云似較櫽當亦時之適逢也然設以十國擬諸載記亦殊妥協帝魏則傳蜀帝蜀則紀漢蜀不得與吳例故獨不可世家位孔子以世家先儒非之愚謂史記乃從其世及而世家之也故敘後系獨長至十一傳安國而與已同時繼以子卬孫歡而止厥後褒成褒亭宗聖奉聖崇聖恭聖紹聖褒聖衍聖之封與世無極焉乃悟世家二字千古唯孔氏顛撲不破史通糾史於孔子無綴詞其亦有會於斯歟宋史龔歐諸國世家夾置傳內名類雜糅三晉史記趙世家叔帶去周如晉事晉文侯始建趙氏於晉國五世晉獻公賜趙夙耿晉悼公立趙武續趙宗晉頃公年趙簡子出有人當道曰主君之子且必有代晉懿公年趙襄子與韓魏滅知氏於是北有代南有知氏襄子卒獻侯立卒子烈侯籍立韓魏趙皆相立為諸侯魏世家畢萬事晉獻公獻公以魏封萬卜偃曰萬滿數也魏大名也以是始賞天開之矣晉文公令武子襲魏氏晉悼公任魏絳政其後魏桓子與韓康子趙襄子共伐滅知伯分其地桓子之孫曰文侯都與趙韓列為諸侯注世本曰都斯也韓世家韓之先與周同姓其後事晉得封於韓原曰韓武子後三世有韓厥從封姓為韓氏晉作六卿而韓厥在一卿之位號為獻子子宣子徙居州子貞子徙居平陽至康子與趙襄子魏桓子共敗知伯分其地地益大子武子武子子景侯虔與趙魏俱得立為諸侯田氏田敬仲完世家陳完者陳厲公他之子也奔齊齊桓公使為工正完卒諡為敬仲敬仲之如齊以陳氏為田氏按完之後九世為太公和遷齊康公於海上與魏文侯會濁澤求為諸侯魏使使言周天子天子許之田和立為齊侯列於諸侯葭莩漢書中山靖王勝對曰羣臣非有葭莩之親鴻毛之重注莩者葭中白皮至薄喻著去太去甚老子無為章聖人去甚去奢去泰子顯編魏虜梁書蕭子恪傳子恪弟子顯字景陽啓撰齊史書成表奏之子顯齊書列傳第三十八題為魏虜牛𢎞周史隋書本傳𢎞字里仁開皇初授祕書監拜禮部尚書敕修撰五禮勒成百卷有文集十三卷按𢎞撰周史本傳缺書隋經籍志周史十八卷未成牛𢎞撰亦見外篇正史篇讀書志蘇綽秉政軍國詞令多準尚書牛𢎞為史尤務清言蕭察後周書蕭察字理孫梁武帝之孫昭明太子之第三子昭明卒武帝舍察兄弟而立簡文大同元年除持節都督雍梁隨諸軍事察以襄陽梁武創基之所志存綏養侯景作亂梁元帝時鎮江陵察與搆隙恐乃稱藩於魏江陵平太祖立察為梁主資以江陵一州之地察遂稱帝於其國在位八載薨又命其太子巋嗣位巋字仁逺有文學善撫御在位二十三載薨又命其太子琮嗣位琮字溫文倜儻善弓馬二年隋徴入朝廢梁國自察初即位至是歲三十有三年矣按察於後周若題以世家實為宜稱列傳第六夫紀傳之興肇於史漢蓋紀者編年也傳者列事也編年者歷帝王之歲月猶春秋之經列事者録人臣之行狀猶春秋之傳春秋則傳以解經史漢則傳以釋紀釋此篇論列傳也其以本紀並提者何蓋紀傳之為書其中有表有志而言者皆約舉兩端以名之故並提以析其義也一則紀以配經傳以配左以明詳略之攸分如本節所云也一則傳無他體淆訛偏與本紀出入宜審義例之各當如下文所辨也尋兹例草創始自子長而朴略猶存區分未盡如項王宜舊訛作立傳而以本紀為名非唯羽之僣盜不可同於天子且推其序事一脫事字皆作傳言年從秦漢便是傳體求謂之紀不可得也或曰遷紀五帝夏殷亦皆列事而已史記此三紀皆無年子曾不之怪何獨尤於項紀哉對曰不然夫五帝之與夏殷舊作殷夏也正朔相承子孫遞及雖無年可著紀亦何傷如項羽者事起秦餘身終漢始殊夏氏之后羿羿世無君似黃帝之蚩尤譬諸閏位容可列紀謂羿方之駢拇難以成編謂蚩尤且夏殷之紀不引他事紀體尊嚴夷齊諫周實當紂日而析古析字為列傳不入殷篇項紀則上下同載君臣交雜多端時事盡入篇中紀名傳體所以成嗤一作媸釋此段所言本紀篇先已論過似乎復出而非也在紀言紀惟譏僣置此乃詳研紀文實皆傳體去名存實定合收遝蓋彼篇雖有書君顯國之言而於論項之處未暢斯旨留此盡之也夫紀傳一作傳紀之不同猶詩賦之有别而後來繼作亦多所未詳案范曄漢書記或作紀后妃六宫其實傳也從君之年而謂之為紀陳夀國志載孫劉二帝其實紀也用其國年而呼之曰傳考數家之所作其未達紀傳之情乎茍上智猶且若斯則中庸故可知矣釋已上兩層皆是借紀剔傳先糾史記次及范陳年託他人者反不入傳年由我紀者反以傳名皆失實也論傳例之失至是止又傳之為體大抵相同而述者多方有時而異舊有耳字如二人行事首尾相隨則有一傳兼書包括令盡若陳餘張耳合體成篇陳勝吳廣相參並録是也亦有事迹雖寡名行可崇寄在他篇為其標冠若商一作南山四皓事列王陽之首廬江毛義名在劉平之上是也釋單行傳體可以不論合傳寄傳變體也故抽論之合傳謂二人合事非儒林循吏之類寄傳謂别列傳頭非召平沮授之類自兹已後史氏相承述作雖多斯道都一作多廢其同於古者唯有附出而已釋附出謂附見傳中因合寄二項觸類及之尋附出之為義攀列傳以垂名若紀季之入齊顓臾之事魯皆附庸自託得厠舊有於字朋流然世之求名者咸以附出為小蓋以其因人成事不足稱多故也竊以書名竹素豈限詳略但問其事竟如何耳借如召平紀信沮授陳容或運一異謀樹一竒節並能傳之不朽人到於今稱之豈假編名作傳然後播其遺烈也釋假附出之可傳引濫登之可鄙嗟乎自班馬以來獲書於國史者多矣其間則有生無令聞一作問死無異一作遺迹用使遊談者靡徴其事講習者罕記其名而虛班史傳妄占篇目若斯人者可勝紀哉古人以沒而不朽為難蓋為此也釋自自兹以後至末寓情尤逺果可片端不朽奚須揚厲滋多警後波靡屹然底柱按初謂列傳宜無紊例之患又疑史通何多牽涉之辭久而後知其解也拈出本紀連為互文透頂直指曰紀者紀年也年仰他人者雖紀實傳年得自主者雖傳實紀片言折獄紀法定而后傳例清焉逮乎文勝益流甚者騰聲穢史縱謗書其或免寧實録之靡慚篇後發藥又是傳者通病子長之倡傳首也曰非附青雲烏施後世子元之嚴傳例也曰生無令聞虛占篇目舉意故殊贈言彌逺國史體尊可使夷於家乘哉后羿見書五子之歌又見左傳襄四年哀元年蚩尤史記五帝紀軒轅之時神農氏世衰諸侯相侵伐於是軒轅乃習用干戈以征不享而蚩尤最為暴索隱蚩尤蓋諸侯號也范后妃紀范曄後漢書以皇后紀列帝紀之後其敘曰考列行迹以為皇后本紀雖成敗事異而同居正號者並列於篇親屬别事各依列傳陳志孫劉陳夀吳志權曰吳主傳改元五曰黃武黃龍嘉禾赤烏太元亮休皓曰三嗣主傳亮改元三曰建興五鳳太平休改元曰永安皓元八元興甘露寶鼎建衡鳳皇天册天璽天紀蜀志先主曰先主傳傳略曰魏武帝稱尊號改元黃初傳聞漢帝見害先主乃發喪制服議郎陽泉侯劉豹等上言宜即帝位以纂二祖謹上尊號即皇帝位於成都武擔山之南為文曰惟建安二十六年四月丙午皇帝備敢用玄牡昭告皇天后土漢有天下歷數無疆曩者王莽篡盜光武皇帝震怒致誅社稷復存今曹操阻兵安忍戮殺主后操子丕載其凶逆竊居神器羣臣將士以為社稷隳廢備宜修之嗣武二祖龔行天罰率土式望在備一人謹擇元日與百寮登壇受皇帝璽綬建元章武後主傳元四建興延熙景耀炎興按二國主傳皆不用魏年實紀體也餘耳勝廣史記漢書並兩人合一傳四皓列王陽之首漢書王吉等傳傳首有敘敘內云漢興有園公綺里季夏黃公甪里先生此四人者當秦之世避而入商山自髙祖聞而召之不至吕氏用留侯計使皇太子卑辭安車迎而致之四人從太子見髙祖客而敬待之太子得以為重遂用自安王吉本傳吉字子陽與貢禹為友世稱王陽在位貢公彈冠毛義在劉平之上後漢劉平等傳傳首亦有敘敘內行云中興廬江毛義少節家貧以孝稱南陽張奉慕其名往候之而府檄適至以義守令義奉檄而入喜動顔色奉心賤之及義母死去官行服後舉賢良公車徵遂不至張奉歎曰賢者固不可測往日之喜乃為親屈也劉平本傳平字公子本名曠顯宗後改為平紀季入齊左傳昭三經紀季以酅入於齊杜注酅紀邑季以邑入齊為附庸先祀不廢按史通與魯附庸顓臾並舉皆以喻傳之附出者召平紀信漢書召平附見蕭何傳紀信附見項籍傳沮授後漢袁紹傳紹領冀州牧引沮授為别駕授進曰將軍忠義奮發威陵河朔迎大駕於長安復宗廟於洛邑號令天下其功不難興平二年車駕為李傕等所追沮授曰西迎大駕即宫鄴都挾天子而臨諸侯稸士馬以討不庭誰能禦之若不早定必有先之者紹不從紹攻許沮授為操軍所執大呼曰授不降也為所執耳操曰國家未定方當與君圖之授曰速死為福乃誅之章懷注獻帝傳曰沮授廣平人存研樓集近宜興儲會元大文撰有沮授補傳陳容魏志臧洪傳洪領東郡袁紹興兵殺之洪邑人陳容少為書生親慕洪隨洪為東郡丞見洪當死謂紹曰將軍欲為天下除暴而專先誅忠義豈合天意紹使人牽出謂曰汝非臧洪儔空爾為容顧曰仁義豈有常蹈之則君子背之則小人今日寧與臧洪同日而死不與將軍同日而生復見殺在紹坐者無不歎息竊相謂曰如何一日殺二烈士史通通釋卷二
