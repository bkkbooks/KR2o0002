  - {type: page-break, offset: 0, content: '', id: KR2o0002_WYG_012-1a, image: WYG0685/WYG0685-0330a.png}
body:
  text: 史通通釋卷十二無錫浦起龍撰外篇古今正史第二舊注總十八條四字按之不合削之易曰上古結繩以理後世聖人易之以書契儒疑當作傳蓋指注經者者云伏犧氏始畫八卦造書契以代結繩之政由是文籍生焉又曰伏犧神農黃帝之書謂之三墳言大道也少昊顓頊髙辛唐虞之書謂之五典言常道也春秋傳載楚左史疑當有倚相二字能讀三墳五典禮記曰外史掌三皇五帝之書由斯而言則墳典文義三五史一作典䇿至於春秋之時猶大行於世釋已上是原始之文爰及後古一作世其書不傳惟唐虞已降可得言者然自堯而往聖賢猶述求其一二髣佛存焉而後來諸子廣造奇說造唐虞已上之說其語不經其書非聖故馬遷有言神農已前吾不知矣班固亦曰顓頊之事未可明也斯則墳典所記無得而稱者焉釋此層言荒逺無稽不足證據蓋是撇掠之文按第一節為正史發端是裝頭體不作正文用舊本有右說三墳五典一行是以無徵不信之書為史家首項殊與節末文義自相違反矣凡此皆非原有之文今槩削之後倣此伏羲氏至言常道也並尚書孔安國序文神農已前史記貨殖傳老子曰至治之極民各甘其食美其服安其俗至老死不相往來太史公曰神農以前吾不知己顓頊之事漢書司馬遷傳贊曰唐虞以前雖有遺文其語不經故言黃帝顓頊之事未可明也案一無案字堯舜相承已見墳典周監二代各有書籍至孔子討論其義刪為尚書始自唐堯下終秦穆其言百篇而各為之序釋數語提清尚書原本屬秦為不道坑儒禁學孔子之末孫曰一多孔字惠壁藏其書漢室龍興旁求儒雅聞故秦博士伏勝能傳其業詔太常使掌故一本作固據漢書作故朝錯受焉時伏生年且百嵗言不可曉口授其書才二十九篇自是傳其學者有歐陽氏大小夏侯宣帝時復有河內女子得泰誓一篇獻之與伏生所誦合三十篇行之於世其篇所載年月不與序相符㑹又與左傳國語孟子所引泰誓不同故漢魏諸儒原注謂馬融鄭𤣥王肅也咸疑其繆釋一番顯晦古文尚書者即孔惠之所藏科斗之文字也魯恭王壞孔子舊宅始得之於壁中博士孔安國以挍伏生所誦增多二十五篇更以𨽻古字寫之編為四十六卷司馬遷遷字舊訛在故字下屢訪一作採其事故多有古說安國又受詔為之訓傳值武帝末巫蠱事起經籍道息不獲奏上藏諸私家劉向取挍歐陽大小夏侯三家經文脫誤甚衆至於後漢孔氏之本遂絶其有見於經典者諸儒皆謂之逸書原注謂馬融鄭𤣥杜預也王肅亦注今文尚書而大與古文孔傳相類或肅私見其本而獨祕之乎釋又一番顯晦晉元帝時豫章一多王字內史梅賾始以孔傳奏上而缺舜典一篇乃取肅之堯典從慎徽以下分為舜典以續之自是歐陽大小夏侯家等學馬融鄭𤣥王肅諸注廢而古文孔傳獨行列於學官或作宫非永為世範齊建武中吳興人姚方興孔穎達作方興隋書方字在下采馬王之義以造孔傳舜典云於大航隋書作杭購得詣闕以獻舉朝集議咸以為非原注梁武帝時博士議曰孔叙稱伏生誤合五篇蓋文句相連所以成合舜典必有曰若稽古伏生雖云昏耄何容闕典由是遂不見用也按誤合五篇者孔序云伏生以舜合於堯典益稷合於皋陶謨盤庚三篇合為一康王之誥合於顧命也及江陵板蕩其文入北中原學者得而異之隋學當作博士劉炫遂取此一篇列諸本第故今人所習尚書舜典元出於姚氏者焉釋至此所述始為定著今本按第二節述尚書也史通卷首六家冠以尚書春秋為史家之祖故兹叙列古今正史亦必從二經起元本節雖次第二實正史之初節也顛末依据節節詳明自此節始百篇之序書經傳說班固曰孔子纂書凡百篇而為之序言其作意孔疏此序知孔子作者以緯文而知也撿此百篇凡有六十三序明居咸有一德立政無逸不序所由同序而别篇者三十三篇通明居等四篇為三十七篇加六十三即百篇也孔惠壁藏漢藝文志注師古曰家語云孔騰字子襄畏秦法藏尚書於夫子舊堂中而漢記尹敏傳云孔鮒所藏二說不同按隋志又不同云孔子末孫惠藏之史通同隋志𨽻古字寫孔序作𨽻古定閻若璩按𨽻古定是一行科斗書一行真書孔穎達所謂就古文體從𨽻定之存古為可慕𨽻文為可識也按𨽻即今之真書伏生歐陽夏侯河內女漢儒林傳伏生濟南人也治尚書教濟南張生及歐陽生歐陽生授兒寬寬授歐陽生子世傳至曽孫髙高孫地餘由是有歐陽氏學夏侯勝其先夏侯都尉從濟南張生受尚書傳族子始昌始昌傳勝勝傳從兄子建建又事歐陽髙由是有大小夏侯之學注伏生名勝得隋經籍志河內女子泰誓一篇獻之馬遷屢訪漢儒林傳孔氏有古文尚書孔安國得之安國為諫大夫司馬遷從安國問義故遷載堯典禹貢洪範微子金縢諸篇多古文說王肅梅賾王見尚書家梅見鑒識篇書按此節所述內篇中多己散見合取漢藝文志儒林傳隋書經籍志并孔安國尚書序孔頴達舜典疏互證之則其文皆具矣劉炫字光伯除太學博士見核才篇又隋書本傳自為狀云禮詩尚書公羊左傳孔鄭王何等注雖義有精粗並堪講授著有尚書等經術議百餘卷當周室微弱諸侯力爭孔子應聘不遇自衛而歸乃與魯君子左丘明觀書於太史氏因魯史記而一誤作所作春秋上遵周公遺制下明將來之法自隱及哀一有盡字十二公行事釋已上言春秋之經已下言傳經成以授弟子弟子退而異言丘明恐失其真故論本事而為傳明夫子不以空言說經也春秋所貶當世君臣其事實皆形於傳故隱其書而不宣所以免時難也釋述傳先揭左氏及末世口說流行故有公羊穀梁鄒夾之傳鄒氏無師夾氏有録無書故不顯於世漢興董仲舒公孫𢎞並治公羊其傳習者有嚴顔二家之學宣帝即位聞衛太子私好穀梁乃召名儒蔡千秋蕭望之等大議殿中因置博士釋次及公穀及鄒夾而就四傳中抽存公穀二家平帝初立左氏逮於後漢儒者數廷毁之㑹博士李封卒遂不復補一作用逮一無逮字和帝元興十一年鄭興父子奏請重立於學官至魏晉其書漸行而二傳亦廢今所用左氏本即杜預所注者釋後卒專歸左氏按第三節述春秋也而必牽連傳家者春秋與尚書不同尚書義具經中春秋事詳傳內故原經者必原傳其說己著於六家也傳凡五家而舉一左氏冠四公穀鄒夾併四歸兩公穀抽三左公穀剩一左氏則專以左傳為主中主焉五傳顯晦不以優劣言但以乘除言考古之體則然尚書春秋傳在六家篇只辨家數在本篇必求原委一略一詳各適分際本節又為編年體立根腳丘明恐失真十二諸侯年表孔子西觀周室論史記舊聞興於魯而次春秋七十子之徒口受其傳指為有所刺譏褒諱挹損之文魯君子左丘明懼弟子人人異端各失其真因具論其語成左氏春秋公羊穀梁何休公羊序疏戴宏序云子夏傳公羊髙髙傳其子平平傳子地地傳子敢敢傳子夀至漢景帝時夀乃共弟子胡母子都著於竹帛隋經籍志子都授嬴公嬴公授孟卿孟卿授眭孟眭孟授嚴彭祖顔安樂故後漢公羊有嚴氏顔氏之學於范寧穀梁序疏榖梁子名淑字元始一曰赤受經子夏為經作傳傳孫卿孫卿傳申公申公傳蔡千秋漢宣帝好穀梁擢千秋為郎鄒夾漢藝文志鄒氏傳十一卷夾氏傳十一卷有録無書又春秋述鄒氏無師夾氏未有書董公孫治公羊董仲舒見二體篇公孫𢎞傳家貧牧豕海上年四十餘乃學春秋雜說漢儒林傳胡母生子都治公羊春秋為景帝博士與董仲舒同業年老歸教於齊公孫𢎞亦頗受焉又瑕􅉌江公受穀梁於魯申公上使與仲舒議不如仲舒而丞相公孫𢎞本為公羊學比輯其議卒用董生於是上尊公羊家詔太子受公羊春秋由是公羊大興穀梁蔡蕭議置按漢書儒林傳沛蔡千秋字少君蕭望之傳望之字長倩又儒林傳戾太子受公羊既通復私問穀梁而善之宣帝以問韋賢夏侯勝皆言宜興穀梁時千秋為郎擢為諫大夫郎中户將選郎十人從受積十餘嵗皆明習乃召五經名儒太子太傅蕭望之等大議殿中平同議三十餘事多從穀梁由是穀梁之學大盛李封後漢儒林傳建武中鄭興陳元傳春秋左氏學韓歆欲為左氏立博士未決陳元上書訟遂以魏郡李封為博士羣儒蔽固者數廷爭之及封卒光武重違衆議因不復補鄭興父子後漢書本傳鄭興字少贛少學公羊春秋晚善左氏傳積精深思將門人從劉歆講正大義歆使撰條例章句訓詁世言左氏者多祖於興而賈逵自傳其父業故有鄭賈之學子衆字仲師從父受左氏春秋精力於學作春秋難記條例建初六年代鄧彪為大司農受詔作春秋刪十九篇杜預注見鑒識篇又當春秋之世諸侯國自有史故孔子求衆家史記而得百二十國書如楚之書鄭之志魯之春秋魏之紀年此其可得言者釋雜述諸書為國語作引左丘明既配經立傳又撰諸異同號曰外一作小傳國語二十一篇斯蓋採書志等文非唯魯之史記而已釋述國語楚漢之際有好事者録自古帝王公侯卿大夫之世終乎秦末號曰世本十五篇春秋之後七雄並爭秦并諸侯則有戰國䇿三十三篇漢興太中大夫陸賈紀録時功一作政作楚漢春秋九篇釋此述春秋已後迄於漢初諸書舊本連下假按第四節介在二經之後史記之前作上下束峽蓋正史以二經為發原之祖以史記為别子之宗法應分别標舉舊本此節與下一連殊失斷制百二十國書見首篇左傳家百國春秋注左丘明至末多採班彪傳略論之文孝武之世太史公司馬談欲錯綜古今勒成一史其意未就而卒子遷乃述父遺志採左傳國語刪世本戰國䇿據楚漢列國舊本脫國字今照班彪略論補時事上自黃帝下訖麟止一誤作趾作十二本紀十表八書三十世家七十列傳凡百三十篇都謂之史記厥協一本二字倒置六經異傳整齊百家雜言藏諸名山副在京師以俟後聖君子釋己上正原史記至宣帝時遷外孫楊惲祖述其書遂宣布焉而十篇未成有録而已原注張晏漢書注云十篇遷殁後亡失此說非也按王本此注作大書元成之間一多㑹稽二字禇先生更補其缺作武帝紀三王世家龜䇿日者等傳古本脫等字今本於等傳下有其龜策日者五字辭多鄙陋非遷本意也釋此述書成已後事晉散騎常侍巴西譙周以遷書周秦已上或采家人諸子不專據正經於是作古史考二十五篇皆憑舊典以糾一作礱其繆今則與史記並行於代焉釋此述後人糾舉事按第五節述史記也考班史藝文志原本七略未立史部以太史公書附著春秋之後至隋經籍志繼經標史史記升居部元遂為定次故須如此列節也孝武之世至百三十篇皆班彪傳略論之文厥協五句太史公自序原文外孫楊惲漢書楊敞傳敞子惲字子幼以忠任為郎補常侍騎惲母司馬遷女也惲始讀外祖太史公記頗為春秋以材能稱十篇未成等句太史公自序裴注及漢書顔注所引張晏語並同晏語原無龜䇿日者復句張守節别引則有之譙周六句譙周見摸擬篇其六句之文見晉書司馬彪傳家人諸子彪傳作俗語百家而史通兩見其語皆作家人當是王臧輩舊本之文譙周原句如此也史記所書年止漢武太初己班彪傳作以後闕而不録其後劉向向子歆及諸好事者若馮商衛衡揚雄史岑梁審肆仁晉馮段肅班固集作段肅固本傳作殷肅金丹馮衍韋融蕭奮劉恂等相次撰續迄於哀平間猶名史記釋首原作漢書緣起至建武中司徒掾班彪以為其言鄙俗不足以踵前史又雄歆褒美僞新一作僞褒新室又一本新室作新莽誤後惑衆不當垂之後代者也於是採其舊事旁貫異聞作後傳六十五篇其子固以父所撰未盡一家乃起元髙皇終乎王莽十有二世二百三十年綜其行事上下通洽為漢書紀表志傳百篇其事未畢㑹有上書云固私改作史記者有詔京兆收繫悉録家書封上固弟超詣闕自陳明帝引見言固續父所作不敢改易舊書帝意乃解即出固徵詣挍書受詔卒業經二十餘載至章帝建初中乃成釋此正述作漢書固後坐竇氏事卒於洛陽獄書頗散亂莫能綜理其妹曹大家博學能屬文奉詔挍叙又選髙才郎馬融等十人從大家受舊作授讀其八表及天文志等猶未克成多是待詔東觀馬續所作而古今人表尤一無尤字不類本書釋此述續補事始自漢末迄乎陳世為其注解者凡二十五家至於專門受業遂一無遂字與五經相亞釋此兼及注家也漢已上皆言前紀傳體初漢獻帝以固書文煩難省乃詔侍中荀悅依左氏傳體一無體字刪為漢紀三十篇命祕書給紙筆經五六一無六字年乃就其言簡要亦與紀舊作本誤傳並行釋此另述荀氏編年紀按第六節述班氏漢書及荀悅漢紀也文雖煩簡不齊卻是二體並舉舊本但以說漢書三字作標段拈一放一既於節意不全且使史體偏缺矣內篇之首云四家久廢二體角立豈忘此提唱耶太初後闕二句用彪固本傳原文章懷注太初武帝年號劉向等十五人此十五人並在班史未作之前今按向歆揚雄自有傳馮商見藝文志史岑見本集人物篇晉馮段肅見後漢班固傳馮衍自有傳餘七人未詳其言鄙俗并前好事者等句亦採撮班傳之文雄歆美新文選劇秦美新揚子雲撰王莽傳少阿羲和劉歆與博士諸儒曰攝皇帝制禮作樂茂成天功發得周禮以明因監非聖哲之至孰能若兹楚元王傳王莽篡位歆為國師採其舊事至建初乃成參用漢書叙傳及范書彪固傳之文坐竇氏事固本傳永元初大將軍竇憲出征胸奴以固為中護軍與參議及憲敗固坐免初洛陽令种兢嘗行固奴干其車騎畏憲不敢發心銜之至是捕繫固死獄中曹大家後漢列女傳扶風曹世叔妻者同郡班彪之女也名昭字惠班一名姫博學髙才世叔早卒有節行兄固著漢書未竟和帝詔昭踵成之馬續所作後漢書馬援兄子嚴嚴七子唯續融知名續字季則博觀羣集九章算術王訓故順帝時漢書始出多未能通馬融從班昭受讀後詔融兄續繼昭成之注解二十五家師古漢書叙例諸家注釋雖見氏名至於爵里頗或難知傳無所存具列如左按爵里文煩今但以氏名列之荀悅服䖍應劭並後漢人伏儼劉德鄭氏李奇皆不著代鄧展文頴張揖蘇林如淳孟康並魏人張晏項昭皆不著代韋昭吳人晉灼劉寶郭璞蔡謨並晉人臣瓚崔浩後魏人以上師古所述止二十二人合師古亦止二十三人其二人不可詳矣又按臣瓚不著姓宋景文筆記以為于瓚而水經注嘗引及之乃薛瓚也見李衎筆記跋荀悅漢紀見左傳家又荀本序撮叙表志總為帝紀通比其事例繫年月大略粗舉凡為三十卷數十餘萬言省約易習無妨本書有便於用其㫖云爾在漢中興明帝始詔班固與睢陽令陳宗長陵令尹敏司𨽻從事孟異班固傳作異舊本作冀作世祖本紀并撰功臣及新市平林公孫述事作列傳載記二十八篇釋歷述後漢書篡輯層節是為第一層自是以來春秋考紀此句舊本作春秋世三字王本世字下空一字亦以煥炳而忠臣義士莫之撰勒於是又詔史官謁者僕射劉珍及諫議大夫李尤或訛作充雜作紀表名臣節士儒林外戚諸傳起自建武光武元訖乎永初安帝元事業垂竟而珍尤一作等繼卒復命侍中伏無忌與諫議大夫黃景作諸王王子功臣恩澤侯表南單于西羌傳地理志釋第二層至元嘉元年桓帝元復令太中大夫邊韶大軍營司馬崔實議郎朱穆曹夀雜作孝穆崇二皇孝穆五字傳寫訛脫當作獻穆孝崇二皇后及順烈皇后傳又增外戚傳入安思等后儒林傳入崔篆諸人實夀又與議郎延篤雜作百官表順帝功臣孫程郭願及鄭衆蔡倫等傳凡百十有四篇號曰漢記釋第三層熹舊訛嘉平中熹平是靈帝改元光祿大夫馬日磾議郎蔡雍楊彪盧植著作東觀接續紀傳之可成者而雍别作朝㑹車服二志後坐事徙朔方上書求還續成十志本傳作十意㑹董卓作亂大駕此二字一本脫西遷史臣廢棄舊文散佚及一無及字在許都楊彪頗存注記至於名賢君子自永一作本誤初已下闕續釋第四層魏黃初中文帝元唯著先賢表故漢一脫漢字記殘缺至晉無成釋自漢訖魏以無成二字作一勒泰始中晉武帝元祕書丞司馬彪始討論衆書一作說一作作今依彪傳綴其所聞起元傳作於光武終於孝獻録世十二編年二百通綜上下旁引傳作貫庶事為紀志傳凡八十依本傳舊作一十三篇號曰續漢書又散騎常侍華嶠刪定東觀記為漢後或作後漢誤書帝紀十二或訛作三皇后紀二典十一作十典又以三譜置十典上列傳七十譜三嶠本傳作三譜序傳目録總九十七或誤作二篇其十典竟不成而卒釋入晉以來彪嶠兩編為第五第六層自斯已往已往猶云已上總前而言也舊作後非作者相繼為編年者四族創紀傳者五家推其所長華氏居最而遭晉室東徙三惟一存所存惟三分之一也釋此八句總前又一勒按已上所述編年語少紀傳語多要是二體雙勒也節內四族五家二句勿滑過至宋宣城太守范曄乃廣集學徒窮覽舊籍刪煩補略作後漢書凡十紀十志八十列傳合為百篇㑹曄以罪被收其十志亦未成而死釋紀傳體結到范書止先是晉東陽太守袁宏抄撮漢氏後書依荀悅體著後漢紀三十或誤作十三篇釋編年體結到袁紀止世言漢中興史者唯范袁一作袁范二家而已釋二句專結二書為本節主層束勒按第七節述後漢諸史也亦紀傳編年二體並述自漢中興下暨劉宋時閲四朝作者尤夥故其叙述源流較他史倍煩始詔班固至二十八篇皆本後漢書班固傳之文春秋考紀漢書叙傳為春秋考紀表志傳凡百篇師古注春秋考紀謂帝紀也彪固本傳章懷注謂帝紀考核時事具四時以立言如春秋之經也按帝紀通有此稱史通用成語也舊本王本皆訛脫失考劉珍李尤劉珍見核才篇後漢文苑傳李尤字伯仁和帝時召詣東觀拜蘭臺令史安帝時為諫議大夫詔與謁者僕射劉珍等俱撰漢記按珍尤二人同傳同事郭本誤作李充充在獨行傳無預史職注乃引傳為徵不考之甚伏無忌黃景後漢伏湛傳湛封不其侯傳爵至𤣥孫無忌桓帝元嘉中詔無忌與黃景崔實等共撰漢記邊崔朱曹延後漢文苑傳邊韶字孝先桓帝時徵拜太中大夫著作東觀崔駰傳駰孫實字子真一名台字元始才美能髙召拜議郎與邊韶延篤著作東觀朱穆見核才篇曹夀舊注字世叔即娶班彪女昭者也邊延篤傳篤字叔堅桓帝以博士徵拜議郎與朱穆韶共著作東觀按五人著作互見惟曹夀無共職之文雜作后傳後漢皇后紀獻穆曹皇后諱節魏公曹操之中女也魏受禪遣使求璽綬后怒呼使者入親數讓之以璽抵軒下涕泣橫流曰天不祚爾孝崇匽皇后諱明蠡吾侯媵妾生桓帝和平元年就博陵尊為皇后順烈梁皇后諱妠大將軍商之女后以德進不敢有驕專之心安思閻皇后元初元年入掖庭二年立為皇后延平四年帝崩臨朝按後漢皇后稱紀始自華嶠而范曄因之其先本稱傳也儒林崔篆按今范書儒林傳不載崔篆順帝功臣及蔡倫傳按今范書孫程鄭衆蔡倫並在宦者傳唯郭願不收蔡倫即用樹膚麻頭始造為紙者馬蔡楊盧袁術傳注決録注曰馬日磾字翁叔融之族子與楊彪盧植蔡雍典挍中書歷位九卿遂登台輔蔡雍楊彪盧植並見核才篇諸人著作各互見彪傳注彪與日磾植雍著作東觀植傳植與日磾雍彪補續漢紀雍傳董卓被誅王允收雍日磾馳謂允曰伯喈曠世逸才多識漢事當續成後史為一代大典且忠孝素著所坐無名乎允不聽日磾退而告人曰王公其不長世乎善人國之紀也著作國之典也滅紀廢典其能久乎雍死獄中適作靈紀及十意又補諸列傳四十二篇因李㴶之亂湮沒多不存祕書丞司馬彪至續漢書並與晉書司馬彪傳同文按彪字紹統髙陽王穆之長子也泰始中為祕書郎轉丞散騎常侍至九十七篇與晉書華嶠傳所次篇目正同嶠見二體篇又按本傳嶠以皇后配天作合前史作外戚傳以繼末編非其義也故易為皇后紀以次帝紀又改志為典以有堯典故也而改名漢紀為漢後書奏之詔朝臣㑹議咸以嶠有實録之風藏之祕府范曄宋書本傳曄字蔚宗彭城王義康冠軍參軍遷尚書郎左遷宣城太守乃刪衆家後漢書為一家之作後以狂悖誅獄中與甥姪書自序曰吾狂釁覆滅豈復可言常恥作文士文患其事盡於形情急於藻義牽其㫖韻移其意常謂情志所託故當以意為主以文傳意此中曲有成理自謂頗識其數云云十志未成陳氏書録志三十卷司馬彪撰梁劉昭補注曄本書未嘗有志也乃借舊志注以補之其後紀傳孤行而志不顯至本朝乾興初判國子監孫奭始建議合之而不著其為彪書也今考章懷注所引稱續漢志者文與今志同信其為彪書不疑按唐時范史其補志本與紀傳合行見編次篇又范紀注載宋書謝儼傳云十志託儼搜撰曄敗悉蠟以覆車今闕容齊四筆亦及之異說備考後漢紀晉文苑傳袁宏字彥伯父朂臨汝令謝尚鎮牛渚引宏參其軍事語見㸃煩篇後出為東陽郡撰後漢紀三十卷隋唐志編年類先有張璠撰者前於左傳家見之宏即採托璠紀為之也宏紀自序史傳之興所以通古今而篤名教也􅉌明之作廣大悉備史遷剖判建立班固源流因籍荀悅經綸足為嘉史今因前代遺事略舉義教所歸末吏區區注疏而已魏史黃初太和中始命尚書衛覬繆襲草創紀傳纍載不成又命侍中韋誕應璩祕書監一無監字王沈大將軍從事中郎阮籍司徒右長史孫該司𨽻校尉傅𤣥等復共撰一作擇定其後王沈獨就其業勒成魏書四十四卷其書多為時諱殊非實録釋此一段原魏志起本皆魏世所撰者此下本應入蜀志起本而蜀無史局敕授之書故闕之吳大帝之季年始命太史令丁孚郎中項峻撰吳書孚峻一作峻孚俱非史才其文不足紀録至少帝時更敕韋曜周昭薛瑩梁廣華核訪求往事相與記述並作之中曜一作推瑩為首當歸命侯時昭廣一作廣昭先亡曜瑩徙黜史官久闕書遂無聞核表請召一無召字曜瑩續成前史其後曜獨終其書定為五十五卷釋此段原吳志起本亦吳有國時所撰至晉受命海內大同著作陳夀乃集三國史前但述二國此云三國者據陳所撰書為言也撰為國志凡六十五篇夏侯湛時亦著魏書見夀所作便壞已草而罷及夀卒梁州大中正范頵表言國志明乎得失辭多勸誡有益風化願垂採録於是詔下河南尹就家寫其書釋此段述陳夀撰志并其書出顯之事先是魏時京兆魚豢私撰魏略事止明帝其後孫盛撰魏氏春秋王隱撰蜀記張勃撰吳録異聞錯出其流最一作甚多宋文帝以國志載事一作紀傷於簡略乃命中書郎裴松之兼採衆書補注其闕由是世一無世字言三國志者以裴注為本焉釋末段述裴注相輔而行按第八節述承祚三國志也馬班而後史家之作髙簡無如此書然簡失則略非得西鄉注輔之徵事考言減趣不少故後段特詳裴作前於補注篇以煩蕪刺之而於此必以注本全之論取嚴文取備也曲筆史官二篇深斥蜀無史職之言謂陳夀厚誣其君相然觀此節蜀志之先獨無撰著又似夀言未必盡誣意或官局雖存而敕修不預與抑子元尊崇史體回護武鄉姑為斡全之說歟衛覬繆襲魏志衛覬傳覬字伯儒拜侍中與王粲並典制度受詔典著作又為魏官儀劉劭傳劭同時東海繆襲亦有才學多所述叙注文章志曰襲字熙伯辟御史大夫誕璩沈籍該𤣥劉劭傳附光祿大夫京兆韋誕注文章叙録曰誕字仲將善屬辭章王粲傳附應璩官至侍中注文章叙録曰璩字休璉善書記齊王即位典著作王沈見叙事篇晉書本傳云與荀顗阮籍共撰魏書孫阮籍見史官建置篇字劉劭傳附陳郡太守任城該注文章叙録曰該公達年二十為郎中著魏書入晉書傅𤣥傳魏除郎中與東海繆施俱以時譽選著作撰集魏書又見書事篇按繆施或即魏志之繆襲否俟考吳大帝至召瑩續史大段皆華核疏文見吳志薛瑩傳其中韋曜薛華三人並見史官篇其丁孚項峻周昭梁廣四人並見核疏吳志皆無傳曜終其書按曜終其書史無明文據裴松之注有稱韋曜吳書者可知終之者曜矣著作陳至寫其書與陳夀傳同文陳夀見漢書家夏侯湛晉書本傳湛字孝若與潘嶽友善每行止同輿接席市都謂之連璧除散騎常侍著論三十餘篇别為一家之言異聞錯出按裴松之注所引漢晉間羣書凡百有餘種其録魏事者則有魚豢魏略孫盛魏氏春秋王沈魏書隂淡魏紀荀朂文章叙録曹瞞傳魏武故事褒賞令漢魏春秋典論魏末傳魏名臣奏魏世譜等其録蜀事者則有王隱蜀記譙周蜀本紀陳夀益都耆舊傳又雜記常璩華陽國志郭沖五事張儼默記諸葛集等其録吳事者則有張勃吳録吳沖吳厯韋曜吳書虞溥江表傳環氏吳記㑹稽典録等其統録者則有司馬彪續漢書九州春秋謝承後漢書張璠袁宏後漢紀華嶠漢後書孔衍漢魏尚書習鑿齒漢晉春秋獻帝春秋獻帝紀獻帝起居注山陽公載記漢末名士録先賢行狀英雄記干寶晉紀虞預晉書王隱晉書陸機晉惠起居注晉陽秋晉諸公贊陳留耆舊傳徐衆異同評髙士傳文士傳列士傳神仙傳列異傳文章志等又有諸名臣列傳名族世譜名人集等多不可悉數也所述皆異辭故言異聞錯出裴松之補注見補注篇晉史洛京時著作郎陸機始撰三祖紀佐著作郎一脫郎字束晳又撰十志㑹中朝喪亂其書不存先是歷陽令陳郡一作留王銓一誤作鈐下同有著述才每私録晉事舊誤作晉書及功臣行狀未就而卒子隱博學多聞郭作文受父遺業西都事跡多所詳究過江為著作郎受詔撰晉史為其同僚虞預所訴舊作斥誤坐事免官家貧無資書未遂就乃依征西將軍庾亮於武昌鎮亮給其紙筆由是獲成凡為晉書八十九卷咸康六年始詣闕奏上隱雖好述作而辭拙才鈍其書編次有序者皆銓所修章句混漫者必隱所作時尚書郎領國史干寶亦撰晉紀自宣迄愍七帝五十三年凡二十二卷其書簡略直而能婉甚為當時所稱釋自首節至此所述盡西晉而止晉江左史一有官字自鄧粲孫盛檀道鸞王韶之王韶之舊在檀道鸞上已下相次繼作逺則偏記兩帝近則唯叙八舊作六誤朝至宋湘東太守何法盛始撰晉中興書勒成一家首尾該備釋此層述東晉書齊隱士東莞臧榮緒又集東西二史合成一書釋此三句述兩書始合皇家貞觀中有詔以前後晉一脫晉字史十有八家制作雖多未能盡善乃敕史官更加纂録採正典與雜或作舊說數十餘部兼引僞史十六國書為紀一訛記十志二十列傳七十載記三十并叙例目録合為百三十二卷自是言晉史者皆棄其舊本內有編年體并棄之矣競從新撰者焉釋歸到唐初重修晉書遂為行本自此本定而晉缺編年矣故一體單行按第九節述唐修晉書也叙舊本詳叙新本簡與後漢史相類上起三國下終五季棄編年而行紀傳史體偏缺者五百餘年至宋司馬氏光始有通鑑之作而後史家二體到今兩行墜緒復續厥功偉哉晉之後宋齊正史外尚有裴吳二編年卒亦失傳陸機束晳陸機撰晉紀見隋唐志其書己見本紀篇彼注有存疑之說宜參㑹束晳見史官篇撰帝紀十志王銓并子隱及虞預並見二體及曲筆篇私録晉事見二體篇王虞注干寶晉紀見左傳家按干書是編年體自新晉書行而其書遂廢也鄧孫檀王鄧粲見序例篇著元明紀十篇孫盛見論贊篇著晉陽秋檀道鸞見序例篇撰續晉陽秋王韶之見雜述篇宋書本傳韶之父偉之有志尚泰元隆安時事小大悉録韶之因此私撰晉安帝陽秋既成時人謂宜居史職即除著作佐郎使續後事訖義熙九年逺兩帝近八朝按東晉凡十一帝起元明盡安恭鄧粲止撰元明紀是逺兩帝也其後王韶之續至安帝之義熙而恭帝不入紀是近八朝也何法盛宋書無傳隋經籍志晉中興書七十八卷起東晉宋湘東太守何法盛撰按法盛書有掠取郗紹之說附見雜說中篇臧榮緒齊書髙逸傳臧榮緒東莞莒人純篤好學括東西晉為一書紀録志傳百一十卷隱居京口教授南徐州太祖為揚州徵為主簿不到貞觀纂録舊書房𤣥齡傳貞觀十八年𤣥齡與禇遂良受詔重撰晉書於是奏請許敬宗來濟陸元仕劉子翼令狐德棻李義府薛元超上官儀等八人分功撰録以臧榮緒晉書為主參考詳洽然史官多文詠之士好採碎事競為綺艷李淳風修天文律厯五行三志最可觀太宗自著宣武二帝陸機王羲之四論於是總題曰御撰凡一百三十卷通志略古者修書成於一家至唐始用衆手晉隋二書是也晉史十八家按隋唐二志正史部凡八家其撰人則王隱虞預朱鳯何法盛謝靈運臧榮緒蕭子雲蕭子顯也編年部凡十一家其撰人則陸機干寶曹嘉之習鑿齒鄧粲張盛劉謙之王韶之徐廣檀道鸞郭季産也據志蓋十九家豈緣習氏書獨主漢斥魏以為異議遂廢不用歟又按雜說篇有曹干孫檀皆不之取之語是就既修後言此云十八家則兼舉之是就敕修之始羅致羣書言十六國書詳後第十三節宋史元嘉中文帝元著作郎何承天草創紀傳自此以外悉委奉朝請山謙之補承天殘缺後又命裴松之續成國史松之尋卒史佐孫沖之表求别自創立為一家之一無之字言孝建初孝武元又敕南臺侍御史蘇寶生或訛山下同續造諸傳元嘉名臣皆其所撰寶生被誅大明孝武改元六年又命著作郎徐爰踵成前作爰因何孫山蘇所述勒為一作成一書其臧質魯爽王僧達諸傳又皆孝武自造而序事多虛難以取信自永光廢帝元已後至禪讓十餘年中闕而不載釋已上原宋世所撰至齊著作郎沈約更補綴所遺製成新舊訛作雜史始一脫始字自義熙肇號晉安帝改元終乎升明三年順帝末為紀十志三十列傳六十合百卷名曰宋書釋此述沈氏宋書已上言紀傳體永明末其書既行河東裴子野更刪為宋略二十卷沈約見而歎曰吾所不逮也釋此述裴略係編年體由是世之言宋史者以裴略為上沈書次之按第十節述劉宋二史也紀傳編年兼舉江淹有言修史之難無出於志而世頗疑三國及南北之梁陳齊周四朝皆無志以為缺事不知實無缺也斷限篇云宋史上括魏朝隋書仰苞梁代己見其端矣惜此節不另詳宋史之所該不若後十八節補述隋志之為明備耳及晚明太倉朱明鎬著史糾嘗言蜀魏吳之志入於宋書梁陳齊周之志入於隋書在史法宜改其言可補此節之遺改不改姑勿論而使觀史者恍然悟志體之皆全洵讀古破迷一快語也明鎬字昭芑老布衣見梅村集蔡焯云何山裴孫蘇何承天宋書本傳五嵗失父母徐博學幼漸義訓儒史該覽除著作佐郎撰國史山謙之見徐爰傳裴松之見補注篇又本傳領國子博士續何承天國史未及撰述孫沖之見臧質傳晉祕書監盛曾孫也又見鄧琬傳以附逆敗誅不及撰史事蘇寶生亦見徐爰傳又見王僧達傳云蘇寶者名寶生本寒門有文義之美官至南臺沙侍御史江寧令坐知髙闍反不啓聞誅按高闍者與門釋曇相誑為亂者也徐爰宋書恩幸傳爰本名瑗字長玉歷治吏勞遷左丞先是元嘉中使著作郎何承天草創國史世祖初又使奉朝請山謙之南臺御史蘇寶生踵成之六年又以爰領著作使終其業爰雖因前作而專為一家之書爰便辟善事人長於傅㑹故委寄尤重前見二體篇臧魯王諸傳在宋書列傳第三十四三十五諸人皆稱兵為亂者沈裴沈約見二體篇裴子野見左傳家齊史江淹始受詔著述以為史之所難無出於志故先著十一作其非志以見其才沈約復著齊紀二十篇釋已上原齊世所撰此下當有文云梁天監中太尉録事蕭子顯啓撰齊史書成表奏之詔付祕閣起升明宋順帝元之年盡永元東昏元之代此八句諸本脫簡今據本傳補入寧冒妄綴之譏不敢疏率了事也為此亦補字紀八志十一列傳四十合成五十九篇釋此述子顯齊書已上述紀傳體時奉朝請吳均亦表請撰齊史乞給起居注并羣臣行狀有詔齊氏故事布在流俗聞見既多可自搜訪也均遂撰齊春秋三十篇其書稱梁帝為齊明佐命帝惡其實詔燔之然其私本竟能與蕭氏所撰並傳於後釋此述吳均書係編年體按第十一節述南齊二史也亦紀傳編年兼舉已上二節考隋唐志裴吳二書並入編年部而史通內篇之首亦以附左傳家不與沈蕭本同門以此知宋齊兩代亦二體兼舉惜此二書後竟廢亡愚是以歎五百年史體偏缺也江淹十志梁書本傳淹字文通起家南齊州從事建元初為建安王記室參掌詔冊并典國史鄭樵通志序江淹有言修史之難無出於志誠以志者憲章之所繫非老於典故不能為也按隋志江淹齊紀十三卷亡南史本傳云與司徒左長史檀超共為條例為王儉所駮所撰十三篇竟無次序即指此也其傳末云齊史十志行於世沈約齊紀見二體篇又本傳所著齊紀二十卷蕭子顯啓撰齊史啓撰諸句見梁書本傳按沈紀蕭書各自為史舊本脫去蕭子顯啓撰等句遂與沈約混為一書而本文二十篇之下綴有紀八志十一列傳四十合成五十九篇凡十六字如何著解且其後又有與蕭氏所撰並傳之語根從何處來耶蕭傳有明文齊書非逸史其為脫簡灼然無疑故敢斗膽補入吳均齊春秋見左傳家梁史武帝時沈約與給事中周興嗣步兵挍尉鮑行卿祕書監謝昊相承撰録已有百篇值承聖元帝元淪沒並從焚蕩廬江何之元沛國劉璠以所聞見究其始末合撰梁典三十篇而紀傳之書未有其作陳祠部郎中姚察有志撰勒施功未周謂加功於前人所未完者但既當朝務兼知一作修非國史至於陳亡其書不就釋此段述梁史之作其功未就舊本此處與下假分節未是陳史初有吳郡顧野王北地傅縡各為撰史學士其武文二帝紀即顧傅所修太建初宣帝元中書郎陸瓊續撰諸篇事傷煩雜姚察就加刪改粗有條貫及江東不守持以入關隋文帝嘗索梁陳事跡察具一訛作且以所成每篇續奏而依違荏苒竟未絶筆釋此段述陳史之作前功亦未就帝兩史皆姚察未竟之業也自隋文五句已梁陳合舉矣皇家貞觀初其子思亷為著作郎奉詔撰成二史於是憑其舊藁加以新録彌歷九載方始畢功定王本作述為梁書五十卷陳書三十六卷今並行世焉釋此合述兩史之成成於姚氏父子繼述之功也二代亦缺編年書北叙二代史事至此猶未了越至齊周隋三史後另節了之按第十二節述梁陳二代之史也二史皆前代未成成於本朝又皆父業未就就於子述故用變例合述之體看節末一段自明編者不察率意割裂其非元始分支益信沈周鮑謝撰録沈約屢見又梁書本傳著髙祖紀十四卷周興嗣梁文學傳字思纂為員外散騎郎佐撰國史選給事中撰史如故唐藝文志周興嗣梁皇帝實録五卷鮑行卿梁書無傳唐志鮑行卿乘輿飛龍記二卷節謝昊梁書無傳見前卷第五何劉合撰梁典按陳書何之元周書劉璠二傳各言撰梁典三十卷隋唐二志亦皆分載二典而史通以為二人合撰則梁典祗是一書耳足正二志之岐出陳史顧傅所修顧野王見前卷第五節𫝊縡陳書本傳字宜事北地人梁太清末㩦母南奔俄丁母憂在兵亂之中居喪禮哀毁骨立世祖召為撰史學士唐志顧野王陳書三卷傅縡陳書三卷陸瓊續撰陳書本傳瓊字伯玊有至性從祖襄歎曰此兒必荷門基所謂一不為少頜大著作隋志陳書四十二卷訖宣帝陳史部尚書陸瓊撰姚察并子思亷姚察見題目篇唐書思亷傳思亷本名簡以字行陳吏部尚書察之子授秦王府文學王即位改著作郎𢎞文館學士詔與魏徵共撰梁陳書思亷采謝炅顧野王等諸家言推究綜括為梁陳二家史以卒父業按謝炅隋志作謝昊十六國史前趙劉聰時領左國史公師彧撰髙祖劉淵本紀及功臣傳二十人甚得良史之體凌修譖其訕謗先帝聰怒而誅之劉曜時平輿子封號和苞撰漢一脫漢字趙記十篇事止當年不終曜滅釋前趙胸奴劉氏史第一揭過公師彧書以和苞所撰作勒後趙石勒命其臣徐光宗歷傅暢鄭愔等撰上黨國記起居注趙書其後又令王蘭陳宴程陰徐機等相次撰述至石虎並令刋削使勒功業不傳其後燕太傅長史田融宋尚書庫部郎郭仲産北中郎參軍王度追撰二舊無二字石事集為舊無為字鄴都記趙記一作紀等書釋後趙羯種石氏史第二揭過徐王等書以田融王度等所撰作勒前燕慕容廆皓雋暐有起居注杜輔全疑詮字脫旁録以為燕紀後燕垂寶盛熙建興元年董統受詔草創後書著本紀并佐命功臣王公列傳合三十卷慕容垂稱其叙事富贍足成一家之言但褒述過美有慙董史之直其後申秀范亨各取前後二燕合成一史釋前後燕鮮卑慕容氏史第三第四揭過杜董等書以范亨等所撰作勒南燕有趙郡王景暉嘗事德超南燕二主名撰二主起居注超亡仕於馮氏官至中書令仍撰南燕録六卷釋南燕亦慕容氏史第五揭過起居注以南燕録作勒蜀初號曰成後改稱漢李勢散騎常侍常璩撰漢書十卷後入晉祕閣改為蜀李一脫李字書璩又撰華陽國志具載李氏興滅釋蜀成賨人李氏史第六以常璩所撰二書作勒前涼張駿十五年命其西曹邊瀏集內外事以付秀才索綏作涼國春秋五十卷又張重華護軍參軍劉慶在東菀苑通專修國史二十餘年著涼記十二卷建康太守索暉一作琿從事中郎劉昞又各著涼書釋前涼安定張氏史第七所述撰人凡四唯此無專勒前秦苻堅史官初有趙淵車敬梁熙韋談相繼著述苻堅嘗取而觀之見茍太后幸李威事怒而焚滅其本後著作郎董誼追録舊語十不一存及宋武帝入關曽訪秦國事又命梁州刺史吉翰問諸仇池並無所獲先是秦祕書郎趙整參撰國史值秦滅隱於商一作南洛山著書不輟有馮翊車頻助其經費一作始整卒翰乃啓頻纂成其書以元嘉九年起至二十八年方罷定為三卷而年月失次首尾不倫河東裴景仁又正其訛僻刪為秦紀十一篇釋前秦氐人苻氏史第八揭過趙淵等六七人書以裴景仁所撰作勒後秦姚弋仲扶風馬僧䖍河東衛隆景並著秦史及姚氏之滅殘缺者多泓從弟和都仕魏為左民尚書又追撰秦紀十卷釋後秦羌種姚氏史第九揭過馬衛等書以姚和都所撰作勒夏赫連勃勃天水趙思羣北地張淵於真興勃勃元承光昌元之一無之字世並受命著其國書及統萬夏城之亡多見焚燒一脫燒字釋夏國胸奴部赫連氏第十其史無存西涼李皓與西秦乞伏國仁二此下誤衍北燕字其史或當代所書或他邦所録此下當補纍經遷轉今並失傳八字釋西涼狄道李氏第十一西秦鮮卑乞伏第十二存二國史亦無段龜龍記吕氏後涼宗欽記沮渠氏北涼失名記舊本宗欽記誤粘秃髮脫去沮渠一家今照史補此六字秃髮氏南涼韓顯宗記舊衍吕字馮氏北燕唯有舊訛此三者本有四種其一失名故云三者可知自餘不詳誰作釋後涼氐酋呂光第十三北涼盧水胡沮渠䝉遜第十四南涼托跋秃髮烏孤第十五北燕信都馮跋第十六四國皆有史而一失名并作一勒從上所述皆為崔氏春秋起本也魏世黃門侍郎崔鴻乃考核衆家辨其同異除煩補闕錯綜綱紀易其國書曰録主一訛正紀曰傳都謂之十六國春秋鴻始以景明之初魏世宗宣武元求諸國逸史逮正一訛至始元年亦宣武元鳩集稽備而一本有以字一本而作已屬上句猶闕蜀事不果成書推求十有五年始於江東購獲乃增其篇目勒為一百二此三字舊訛作十卷鴻殁後永安中魏莊帝元其子繕寫奏上請藏諸祕閣由是僞史宣布大行於時釋歸到崔書都為一集始成通行定本按第十三節述十六國春秋也雖不得並於正史而巖疆分据地亘川遼戎馬交馳事關江介其書顧可廢哉顧崔氏書自宋史藝文志馬貴與通考皆已闕載至明乃有屠喬孫之本賀燦然序之曰晉記流行崔書放散遷之博考旁稽綴遺搜逸爰訂斯編吁何其不學也屠果博聞欲起斯廢毋假初名毋襲原數謹循纂體顯號補亡各於正史載記之餘人見書其人事見書其事而條疏其下曰某人見某書某事見某書豈不卓爾大雅功髙津逮哉乃計不出此而匿所自來掩非己有舉一切真書胥變而為贋書愚因是歎書之禍焚棄者猶小竄亂者甚焉冒出者又甚焉明穆神之際是巳時則有若豐坊之魯詩世學矯語傳經王某之天祿閣外史佹稱蓄古紛紛仿效僞種朋興若屠氏者其為冒出猶在陰陽形影間視彼諸家差當末減耳或云杭本漢魏叢書所收十六短録故是彥鸞之舊是說也余猶疑之十六國史史通所記諸零雜短卷當時已多刋落無從蔓引然細尋節中諸所勾勒恰與隋唐二志歷歷相符按隋志前趙則漢記十卷唐志作十四卷和苞撰後趙則趙書十卷唐志作二十卷僞燕太傅長史田融撰又二石傳二卷二石僞事二卷唐志作六卷晉北中郎參軍王度撰前燕則燕書二十卷記慕容雋事僞燕尚書范亨撰南燕則南燕録六卷記慕容德事僞燕中書郎王景暉撰蜀成則唐志有漢之書十卷蜀李書九卷華陽國志十三卷並常璩撰前涼則隋志有涼書十卷燉煌實録十卷唐志作二十卷並劉景撰唐諱昞劉景即劉昞也前秦則秦記十一卷宋殿中將軍裴景仁撰杜惠明注後秦則秦記十卷記姚萇事魏左民尚書姚和都撰夏則隋唐二志皆無書西涼西秦二志亦無書後涼則二志皆有涼記十卷記呂光事僞涼著作佐郎段龜龍撰北涼則二志皆有涼書十卷注云沮渠國史不著撰人據本文及史當即是宗欽南涼則二志皆有托跋涼録十卷撰人缺今作失名北燕則二志皆有燕志十卷記馮跋事並云魏侍中高閭撰而魏書韓顯宗傳有撰馮志十卷之文與本文合恐即與高閭合作已上十六國史史通人書俱缺者惟夏與西涼西秦也而二志亦此三國無書其餘雖有失名互證皆合於此頗得讀書細意之樂崔鴻十六國春秋見探賾篇又魏書本傳子子元永安中奏其父書曰臣亡考鴻任屬記言刋著趙燕秦夏涼蜀等遺載為之贊序先朝之日草構悉了唯有李雄蜀書搜索未獲闕兹一國遲留未成去正光三年購訪始得討論適訖而先臣棄世凡十六國名為春秋一百二卷今繕寫一本敢以仰呈儻或淺陋不回睿賞乞藏祕閣以廣異家背附記前秦之姓晉書載記曰蒲洪以其孫堅初生有革付臣又土之文改姓苻而世說識鑒篇注引車頻秦書曰蒲洪詐稱䜟文改姓符言已當王應符命也堅生背赤色隱起若篆文其說與晉書異愚按車頻言徵符命背篆不言何文而頻即前秦時人則姓當為符冝可信晉書後出草付五字自别有本亦安知非竹付之訛耶世徒以國史為正然頻書幸留片羽孝標亦在唐前詎不足當互證之資耶附記之亦足廣異家也又古本他書說符堅往往從竹雖草頭竹頭古人通寫然義固不相奸也附録按屠氏不著採録書名難據以為正證要其語決非無本史通此節所列人氏與於史事者四十二人不與史事者一人今就屠書有者之附見之又有别見諸史及本集他篇者亦拈出前趙公師或善相人劉淵深相崇敬後官太中大夫為劉聰所誅和苞劉曜時諫營夀陵封平輿子二人史官篇亦見後趙徐光字季武頓􅉌人石勒記室參軍遷中書令領祕書監傅暢字世道北地人為大將軍右司馬愔識朝儀勒器之作晉諸公叙讃二十卷公卿故事九卷南燕王景暉苻秦太史令髙魯之甥也魯遣暉隨獻玉璽於慕容德留仕德著南燕録六卷蜀成常璩亦作據屠録與補注等篇所記略同前涼索綏字士艾燉煌人幼舉孝亷又舉秀才為儒林祭酒張駿命集閣內外事付綏著涼春秋五十卷劉昞屠録與㸃煩篇略同前秦李威字伯龍茍太后之姑子也威有辟陽之寵史官載之後苻堅見其事將罪著作郎車敬等已死乃止趙整字文業一名正年十八為堅著作郎情度敏達信佛法遁跡商洛山專精經律後秦姚和都仕至左兵尚書撰秦紀十卷記姚萇時事赫連夏趙逸字思羣天水人仕姚興為勃勃所虜拜著作郎張淵不知何處人自云嘗仕苻堅堅敗仕姚興父子泓滅入夏為太史令北涼宗欽字景若金城人博綜群言仕沮渠䝉遜為中書郎撰涼記十卷已上名見屠本者凡十五人又别見者范亨見魏書崔浩傳下節注及之吉翰宋書有傳馮翊池陽人裴景仁見南史及世說注韓顯宗見魏書韓麒麟子也字茂親又散見本集者董統見直書篇劉慶見史官篇餘闕考者俟續見補元魏史道武時始令鄧淵著國記唯一脫唯字為十卷而條例未成暨乎明元廢而不述神䴥二年太武元又詔集諸文士崔浩浩弟覽髙讜舊作閭誤鄧潁朝繼一訛維范亨黃輔等撰國書為三舊脫三字十卷又特命浩總監史任務從實録復以中書郎髙允散騎侍郎張偉並參著作續成前史史字疑衍書叙述國事無隱所一無所字惡而刋石寫之以示行路浩坐此夷三族同作死者百二十八人自是遂廢史官釋此述魏史初時事至文成帝和平元年始復其職而以髙允典著作修國記允年已九十手目俱衰時有挍書郎一有中字劉模長於緝綴乃令執筆而口占授之如是者五六嵗所成篇卷模有力焉釋此述續修事初國記自鄧崔以下皆相承作編年體至孝文太和十一年詔祕書丞李彪著作郎崔光始分為紀傳異科宣武時命邢巒追撰孝文起居注既而崔光王舊脫王字遵業補續下訖孝明之世溫子升復修孝莊一訛武紀濟陰王暉業撰辨宗室録魏史官私官私謂官本私本所撰盡於斯矣釋此述分體撰次等事已上皆在魏世齊天保二年顯祖元敕祕書監魏收博採舊聞勒成一史又命一作令刁柔辛元植房延祐睦一訛陸仲讓裴昂之高孝幹等助其編次收所取史官懼相凌忽故刁辛諸子並乏史才唯以髣佛學流憑附得進於是大徵百家譜狀斟酌以成魏書上自道武下終孝靖紀傳與志凡百三十卷釋此正述魏收撰魏書收諂齊氏於魏室多不平既黨北朝又厚誣江左性憎勝已喜念舊惡甲門盛德與之有怨者莫不被以醜言沒其善事遷怒所至毁及髙曽書成始奏詔收於尚書省與諸家論討前後列訴者百有餘人時尚書令楊遵彥一代貴臣勢傾朝野收撰其家傳甚美是以深被黨援諸訟史者皆獲重罰或有一無有字斃於獄中羣怨謗聲不息孝昭世敕收更加研審然後宣布於外武成武成孝武弟世祖諡也王本改作書成非嘗訪諸羣臣猶云不實又令治改其所變易甚多由是世薄其書號為穢史釋此段加一層評論至隋開皇敕著作郎魏淡與顔之推辛德源更撰魏書矯正收失淡以西魏為真東魏為僞故文恭列紀孝靖稱傳合紀傳論例總九十二篇煬帝以淡書猶未能善又敕左僕射楊素别撰學士潘徽禇亮歐陽詢等佐之㑹素薨而止今世稱魏史者猶以收本為主焉釋此帶述魏淡書而以世尚收書勒住按第十四節述後魏書也其初但作編年體其後專行紀傳書公最不滿收書故加多一段評泊然亦以托起敕改耳本處勿黏看鄧淵國記魏書本傳淵字彥海太祖定中原擢為著作郎詔淵撰國記淵造十餘卷惟次年月起居行事而己未有體例崔浩等撰國書事見直書篇又崔浩傳初太祖詔尚書郎鄧淵著國記未成逮於太宗廢而不述神䴥二年詔集諸文人撰録浩及弟覽高讜鄧潁朝繼范亨黃輔等共參著作叙成國書三十卷按鄧潁即鄧淵子中書郎髙允至模有力焉事詳魏書髙允傳及儒林張偉傳劉模即附允傳中本文皆撮取傳語也再按允傳浩之被收也允直中書省時恭宗為太子召允留宿翌日命允驂乘至宫門謂曰入當見至尊吾自導卿脫有問但依吾說既入見恭宗曰髙允自在臣宫雖與浩同事制由於浩世祖召允曰國書皆崔浩作否允對曰臣與浩同作臣多於浩世祖大怒恭宗曰天威嚴重允迷亂失次耳臣向備問皆云浩作允曰臣謬參著作今已分死不敢虛妄殿下哀臣乞命耳實不問臣臣無此言世祖曰直哉臨死不移貞臣也宜宥之按允字伯恭年九十八李崔始為紀傳李彪傳彪字道固參著作事自成帝以來浩允編年序録為春秋之體彪始奏從遷固之體創為紀傳表志之目焉轉崔光傳光本名孝伯字長仁高祖賜名拜中書博士著作郎與祕書丞李彪參撰國書按光即鴻父也宣武時至號為穢史通十五六行以北齊魏收傳對證之事語咸具矣其間所稱引諸人邢巒字洪賓中書侍郎尚書王遵業著作佐郎溫子升見叙事篇暉業魏濟陰王新成曽孫四人魏書有傅刁柔國子博士辛元植司空司馬房延祐通直常侍睦仲讓不著官秩裴昂之國子博士髙孝幹尚書郎六人皆無傳楊遵彥楊愔字北齊本傳尚太原長公主尚書右僕射封開封王辨宗室録魏書宗室傳濟陰王暉業涉子史有志節齊文襄嘗問之對曰數尋伊霍之傳不讀曹馬之書暉業以時運漸謝不復圖全在晉陽也無所交通撰魏藩王家世號為辨宗室録四十卷魏淡顔辛更撰魏淡見本紀篇又隋書本傳太祖以魏收書褒貶失實平繪中興書事不倫序詔淡别成魏史淡自道武下及恭帝為十二紀七十八傳别為史論及例一卷并目録合九十二卷書甚簡要大矯收繪之失上覽而善之顔之推北齊本傳字介隋開皇中太子召為學士甚見禮重按顔介共撰魏書之文本傳不載辛德源隋書本傳字孝基髙祖受禪隱於林慮山祕書監牛𢎞以德源才學奏與著作郎王劭同修國史楊素别撰隋書本傳素字處道髙祖受禪加上柱國封越國公大業元年改封楚公有集十卷别撰事見下潘禇歐陽隋文學傳潘徽字伯彥吳人煬帝嗣位詔徽與太常博士禇亮歐陽詢等助越公楊素撰魏書㑹素薨而止禇亮字希明歐陽詢字信本傳入唐書髙齊史天統初後主緯元太常少卿祖孝徵述獻武起居名曰黃初傳天録或謬改為祿時中書侍郎陸元規常從文宣征討著皇帝實録唯記行師不載他事自武平後亦後主元史官陽休之杜臺卿祖崇儒崔子發等相繼注記釋述齊世撰述逮一作迄於齊滅隋祕書監王劭內史令李德林並少仕鄴中多識故事王乃憑述起居注廣以異聞造編年書號曰齊志十有六卷原注其序云二十卷今世間傳者唯十六卷焉李在齊預修國史創紀傳書二十七卷至開皇初一有又字奉詔續撰增多齊史三十八篇以舊作已上送官藏之祕府釋述隋時續撰王志編年已成李書紀傳未竟皇家貞觀初敕其子中書舍人百藥仍其舊録雜採他書演為五十卷釋至唐初紀傳乃成今之言齊史者唯王李二家云釋髙齊史二體並東此節與後周隋二節事皆未了按第十五節述北齊史也當時兼有二體逮後王志廢矣祖孝徵祖珽字也其人淫穢喪恥北齊書本傳後主拜珽尚書左僕射監修國史加特進入文林館總監撰書按黃初傳天録是珽所創起居實録書名以比魏文受禪媚獻武也或誤從傳字截句讀作去聲遂改録為祿疑是年號時實無此元也陸元規名見祖珽傳陽杜祖崔陽休之北齊書本傳字子烈齊受禪除散騎常侍修起居注天統初為光祿卿監國史杜臺卿名見隋書李德林傳舊注字少山齊中書侍郎祖崇儒舊注珽族弟也武平末通直常侍十崔子發隋經籍志齊紀三卷紀後齊事崔子發撰王劭李德林王劭齊志即左傳家所引之書按十六卷唐藝文志作十七卷李德林見探賾篇百藥見本紀篇李安平注宇文周史大統年有祕書丞栁虬兼領著作直辭正色事有可稱釋周世初著至隋開皇中祕書監牛𢎞追撰周紀十有八篇略叙紀綱仍皆扺忤王本作扺捂釋隋時續撰皇家貞觀初敕祕書丞令狐德棻祕書郎岑文本共加修緝定為周書五十卷釋至唐初乃成宇文史但有紀傳無編年按第十六節述後周書栁虬見前卷第八節又周書本傳大統十四年除祕書丞領著作牛𢎞見世家篇德棻文本令狐德棻見前卷十節又詳後舊唐書岑文本字景仁擢拜中書舍人時中書侍郎顔師古免溫彥溥奏請復用太宗曰我自舉一人公勿憂也於是以文本為中書侍郎專典機密又先與令狐德棻撰周史其史論多出於文本至十年史成隋史當開皇仁夀時王劭為書八十卷以類相從定其篇目至於編年紀傳並闕其體煬帝世唯有王胄等所修大業起居注及江都之禍仍多散逸釋隋之正史本無撰藁皇家貞觀初敕中書侍郎顔師古給事中孔潁達共撰成隋書五十五卷與新撰周書並行於時釋至唐方經始撰定唐業由周隋而起故牽連周史東之舊本此處連下非按第十七節述隋書也宇文周史本無編年隋雖有王劭書止録詔敕等為記言體亦非編年類也故二代皆一書歸束王劭書王劭隋書即尚書家所引之書與齊志體例殊科閲者辨之王胄隋文學傳王胄字承基大業初為著作佐郎唐藝文志有開皇起居無大業起居散逸故也師古穎達舊唐書顔籕傳籕字師古齊黃門郎之推孫也少傳家業武德初為秦王府記室遷中書舍人令狐傳髙祖詔中書舍人顔師古修隋史孔穎達傳穎達字仲逵尤明左氏傳鄭氏尚書王氏易毛詩禮記兼善算厯解屬文太宗即位除國子司業遷太子右庶子仍兼司業與魏徵撰成隋史初太宗以梁陳及齊周隋氏並未有書乃命學士分修事具於上上謂梁陳及齊周隋四節所云仍使祕書監魏徵總知其務凡有讃論徵多預焉始以貞觀三年創造至十八年方就原注唯姚思亷貞觀二年起功多於諸史一嵗合為一脫為字五代紀傳并目録凡二百五十二卷書成下於史閣釋已上統括五代紀傳卷目唯有十志斷為三十卷尋擬續奏未有其文又詔左僕射于志寧太史令李淳風著作郎韋安仁符璽郎李延夀同撰其先撰史人唯令狐德棻重預其事太宗崩後刋勒始成其篇第雖編入隋書其實别行俗呼為五代史志釋此層另述五代志明隋書之志非專志隋也按第十八節乃總括五代諸書之詞此五書事垂往代史定熙朝志入一家典稽五族故另詳之初閲舊書職官志貞觀年修五代史五代二字殊鶻突晉後唐前唯有南北各四朝無五代之名也及閲是篇翻檢令狐德棻等傳乃始爽然蓋其時八史唯南之梁陳北之齊周隋是唐修故也禪語有云上元即是正月半因自笑平生經眼不經心處不知凡幾只坐翻書溜滑耳五代紀傳舊書令狐德棻傳德棻言於髙祖曰近代都無正史梁陳及齊猶有文籍周隋遭大業離亂多有遺闕當今耳目猶接更十數年後恐堙沒如臣愚見並請修之髙祖然其奏詔曰自有魏南徙乘機撫運周隋禪代梁氏稱邦齊遷龜鼎陳建皇宗立言著績無乏於時而簡牘未編炎涼已積朕握圖馭宇方立典謨有懷撰次實資良直云云詔下數年竟不能就貞觀三年太宗敕德棻與岑文本修周史李百藥修齊史姚思亷修梁陳史魏徵修隋史與房𤣥齡總監德棻義奏引崔仁師佐修周史德棻仍總知類㑹魏徵傳徵字𤣥成初令狐德棻等撰諸史徵受詔總加撰定隋書序論皆徵所作按隋書本顔孔合撰與十七節并下條注㑹看乃全又按宋齊北魏三書前代已成故唐修止於五五代史志史通列同修四人新舊書可證合者李淳風傳則云除太史丞預撰五代史其天文律歷五行志皆淳風作李延夀傳則云補崇賢館學士受詔同敬播修五代史志而于志寧傳但云預修禮修史等功賞賜不言所修何史至韋安仁則無傳當用史通語證補之陳氏解題隋志髙宗時始成上總梁陳齊周之事俗號五代志按陳氏即本史通立解也夾漈志略亦然惟大唐之受命也義寧隋恭帝元武德唐髙祖元間工部尚書溫大雅首撰創業起居注三篇自是司空房𤣥齡給事中許敬宗著作佐郎敬播相次立一作相與自立編年體號為實録迄乎三帝世有其書釋述本朝國史二體並陳已上為編年起本貞觀初姚思亷始撰紀傳粗成三十卷至顯慶高宗改元元年太尉長孫無忌與于志寧令狐德棻著作郎劉𦙍之楊仁卿起居郎顧𦙍等因其舊作一作書綴以後事復為五十卷雖云繁雜時有可觀釋已上為紀傳起本龍朔亦髙宗元中敬宗又以太子少師一作卿誤總統史任更增前作混成百卷如髙宗本紀及永徽高宗初元名臣四夷等傳多是其所造又起草十志未半而終敬宗所作紀傳或曲希時旨或猥飾一作釋私憾凡有毁譽多非實録必方諸魏伯起亦猶張衡之蔡雍焉其後左史李仁實續撰于志寧許敬宗李義府等傳載言記事見推直筆惜其短嵗一作世功業未終至長夀中武后九年春官侍郎牛鳯及又斷自武德終於𢎞道髙宗末元撰為唐書百有十卷鳯及以喑聾不才而輒議一代大典凡所撰録皆素責私家行狀而世人叙事謂家狀罕能自逺謂逺於俗一作達非或言皆比興全類詠歌或語多鄙朴實同文案四語皆謂家狀所叙而總入編次了無釐革其有出自胸臆申其機杼發言則嗤鄙怪誕叙事則參差倒錯故閲其篇第豈謂可觀披其章句不識所以既而悉收姚許諸本繳去之也欲使其書獨行由是皇家舊事殘缺殆盡釋此一長段中具三層許飾而誣李直而年促牛冗俗而亂總以推出重撰緣由也長安中武后十八年余與正諫大夫朱敬則司封郎中徐堅左拾遺吳兢奉詔更撰唐書勒成八十卷釋此正叙重撰事八十卷是紀傳體神龍中宗元元年又與堅一無堅字兢等重修則天實録編為三或作二十卷釋此三十卷是編年體夫舊史之壞其亂如繩錯綜艱難朞月方畢雖言無可擇事多遺恨庶將來削藁猶有憑焉釋二體並攝舊本連下節非按第十九節述本朝國史而以當職手撰者終之須知所云八十卷三十卷者正如王隱之晉書干寶之晉紀山謙之裴松之之宋史草創起本為後來史局之藁底耳非完書也修本既行其書遂佚往代皆然說者乃謂知幾善譏訶鮮撰著不亦寃乎叙古今正史畢創業起居注舊書溫大雅傳大雅字彥和武德元年歷黃門侍郎撰創業起居注三卷讀書志紀高祖起義至受隋禪用師符䜟受命典冊事房許敬等立編年舊書房𤣥齡傳房喬字𤣥齡在秦府中常典管記貞觀三年代長孫無忌為尚書左僕射監修國史許敬宗敬播並見上卷第九節又播傳與許敬宗撰髙祖太宗實録自創業至貞觀十四年為二十卷後又撰太宗實録從貞觀十五年至二十三年為二十卷姚長孫等撰紀傳姚思亷新舊本傳闕書撰國史長孫無忌于志寧令狐德棻三人傳並渾書監修國史文苑劉𦙍之傳永徽中纍轉著作郎與令狐德棻著作楊仁卿等撰成國史封陽城縣男其從孫即知幾也楊仁卿無傳顧𦙍傳以撰武德貞觀兩朝國史八十卷成加朝散大夫按唐二書凡書國史或統言或專以紀傳言或竟闕書史通此等處可當史補亦可當史注猶張衡之蔡雍商藝小說張衡死日蔡雍毋始孕二人才貌相類人云雍是張衡後身按史通是語蓋反辭以况也後漢靈帝嘗問侍中楊奇曰朕何如桓帝奇對曰陛下之於桓帝亦猶虞舜比德唐堯語意正相似李仁實見上卷第九節牛鳯及無傳與前卷第九節參看朱敬則徐堅吳兢三人並見自叙篇此云撰唐書八十卷則天實録三十卷可作知幾本傳參補按崇文總目吳兢撰唐史自創業迄開元凡一百一十卷韋述因其本更加筆削云云此正與八十三十之數相合但總目統云一百十卷不分紀傳編年又專屬之吳兢皆可與此處本文參證大扺自古史臣撰録其梗槩如此蓋屬詞比事以月繫年為史氏之根本作生人之耳目者略盡於斯矣自餘偏一訛作編記小說則不暇具而論之釋得此二句繳得正史二字碧清按第二十節乃通篇總結讀此篇須將二體篇處處印合史通一書皆議論體獨史官正史二篇屬叙事體觀其所述自史漢而下悉援序傳原文至梁陳以還咸舉見聞所接全書談史安可不辨史曹全史就評安可不綜史部議論叙事相須為用是二篇者雖外篇之壓卷實內篇之括囊史通正本已盡於是史通通釋卷十二
