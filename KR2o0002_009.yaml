body:
  text: 史通通釋卷九無錫浦起龍撰內篇核才第三十一夫史才之難其難甚矣晉令云國史之任委之著作每著作郎初至必撰名臣傳一人斯蓋察其所由茍非其才則不可叨居史任釋起言史材實難揀核宜慎歷觀古之作者若蔡雍劉峻一本峻獨不書名而書字非徐陵劉炫之徒各自謂長於著書達於史體然觀一無觀字侏儒一節而他事可知釋首舉四人皆有心掌故而未及成史者此下分評案伯喈於朔方舊誤作方朔或誤作方翔上書謂宜廣班氏天文志夫天文之於漢史實附贅之尤甚者也必欲申以掎托但當鋤而去之安可仍其過失而益其蕪纍亦奚異觀河傾之患而不遏以隄防方欲疏而導之用速懷襄之害述史如此將非練達者歟釋一層評蔡雍與書志篇論天文同㫖孝標持論談一作析理誠為絶倫而自叙一篇過為煩碎山栖一志直論一作是文章句恐有訛字諒難以偶迹遷固比肩陳范者也釋一層評劉峻孝穆在齊有志一有於字梁史及還江左一有而字書竟不成嗟乎以徐公文體而施諸史傳亦猶灞上兒戲異乎真將軍幸而量力不為可謂自卜者審矣釋一層評徐陵光伯以洪儒碩學而迍邅不遇觀一無觀字其鋭情自叙欲以垂示將來而言皆淺俗理無要害豈所謂誦詩三百雖多亦奚以為者乎釋一層評劉炫上分核四人見如此名才留心撰述猶難輕許則史才豈易言哉昔尼父有言文勝質則史蓋史者當時之文也然朴散淳銷時移世異文之與史較一作皎然異轍故以張衡之文而不間於史以陳夀之史而不習於文其有賦述兩都詩裁八詠而能編次漢冊勒成宋典若斯人者其流幾何釋至此提出本篇論㫖文與史本非二途但唐初文尚儷體以入史局則非其倫矣劉之前以詞賦才而成正史者唯班沈二人故列出之是以略觀近代有齒跡文章而兼修史傳其為式也羅含謝客宛為歌頌之文蕭繹江淹直一作究成銘贊之序序字似當作筆溫子升尤工一作喜復語盧思道雅好麗作儷字用詞江總猖獗以沈迷庾信輕薄而流宕此其大較也然向之數子所撰者蓋不過偏記雜說小卷短書而已猶且乖濫踳駮一至於斯而况責之以刋勒一家彌綸一代使其始末圓備表裏無咎蓋亦難矣釋此段所舉諸人正證上文麗詞史筆之不相入也但自世重文藻詞宗麗淫於是沮誦失路靈均當軸每當有值字西省虛職東觀佇才凡所拜授必推文士遂使握管懷鉛多無銓綜之識舊訛作職連章纍牘罕逢微婉之言而舉俗共以為能一作共為能事當時莫之敢侮假令其一無其字間有術同彪嶠才若班荀懷獨見之明負不刋之業而皆取窘於流俗見嗤於朋黨遂乃哺糟啜醨俯同妄作被褐懷玉無由自陳此管仲所謂用君子而以小人參之害霸之道者也一無也字釋此節趁作之者之所趨搭到任之者之所取風尚同歸將志古者反不見收矣昔傅𤣥或作毅非有云一脫云字觀孟堅漢書實命代奇作及與陳宗尹敏杜撫馬嚴撰中興紀傳其文曽不足觀豈拘於時乎不然何不類之甚者也是後劉珍朱穆盧植楊彪之徒又繼而成之豈亦各拘於時而不得自盡乎何其益陋也以上並傅𤣥語嗟乎拘時之患其來尚矣斯則自古一有之字所歎豈獨當今者哉一無當字者字釋末以古語證之眼在拘於時句歎時情所尚積而難反也按載文之言曰文之將史其流一也叙事之言曰其為文也編字不隻捶句皆雙兹又曰文之與史較然異轍蓋三史以上文史一揆駢體既興文筆難乎為史筆其理然也麗於色者必靡於質工為偶者必拙為疏當公之時值唐初運連軫六朝所謂史局皆文詠之士故對時局再三言之或疑諸史叙事究與六朝碑版不同何纍以俳體瞋之噫讀書亦不審矣盍姑取晉宋諸書觀其叙言乎其中章奏大篇無論他如立談口語決難猝辦四六而時流吐屬鮮非駢儷乃至徒河羯氐之流竊時裔種耳應答言句文必叠雙其為矜粉飾逐風氣顯自筆頭出矣非俳而何疑者退而撿之皆是史通極詆儷詞卒亦自為俳體正所謂拘於時者乎然其言已為退之習之輩前導也晉令隋經籍志晉令四十卷晉職官志著作郎始到職必撰名臣傳一人侏儒一節吳志潘濬傳注武陵部從事樊胄叛外白差萬人往討濬曰五千兵足可擒胄胄實無才昔嘗為州人設饌比至日中食不可得而十餘自起此亦侏儒觀一節之驗也按成語似别有夲俟考朔方上書後漢蔡雍傳雍字伯喈拜郎中校書東觀對災咎譏刺寵臣下獄減死徙朔方上書自陳奏其所著十意注自陳曰臣自在布衣常以為漢書十志下盡王莽光武以來唯記紀傳無續志者故太傅胡廣略以所有舊事與臣臣欲刪定者一所當接續者四前志所無臣欲著者五分别首目并書章左唯陛下留神自叙山栖劉峻見補注篇又本傳因遊東陽紫巖山築室居焉為山栖志其文甚美又嘗為自序曰余自比馮敬通而有同之者三異之者四後詳自叙篇孝穆在齊陳書徐陵傳陵字孝穆太清二年兼通直散騎常侍使魏㑹齊受禪陵纍求復命終拘留不遣及齊送貞陽侯為梁嗣乃遣陵隨還陳天嘉年領大著作按在齊有志梁史之語本傳本集皆不見光伯自叙隋儒林傳劉炫字光伯納言楊達舉炫博學射䇿高第除太學博士嵗餘歸河間于時盜賊蜂起教授不行乃自為贊曰通人自叙風徽余敢仰均先達徒以日迫桑榆門徒雨散殆及餘喘薄言胸臆云云兩都兩都賦班固撰見載文篇八詠八詠沈約撰隱侯本集一登臺望秋月二㑹圃臨春風三嵗暮愍衰草四霜來悲落桐五夕行聞夜鶴六晨征聽曉鴻七解珮去朝市八被褐守山東坡詩䖍州八景八詠聊同沈隱侯王注沈約為束陽太守作八詠寫于樓上按東陽今金華府陸魯望二遺詩序云東陽多名山金華為最守山東指此也羅含晉文苑傳羅含字君章嘗夢一鳥文彩異常飛入口自此藻思出新太守謝尚稱曰湘中琳琅於城西小洲上立茅屋布衣蔬食晏如也徵正員郎轉廷尉致仕門施行馬謝客即謝靈運見論贊篇南史庾肩吾傳謝客吐言天授時有不拘是其糟粕謝𢎞毅傳客兒靈運小字異苑靈運生於㑹稽其家以子孫難得送於錢塘杜明師養之十五方還故曰客兒蕭繹蕭繹即梁元帝參本紀初封湘東王頗有髙名與裴子野劉顯蕭子雲為布衣之交著作多行於世江淹梁書江淹傳淹字文通少以文章顯晚節才思微退時人謂之才盡所著述百餘篇并齊史十志溫子升見叙事篇盧思道北史盧𤣥傳𤣥之孫思道才學兼著齊天保中魏史成思道多所非毁周平齊追赴長安終散騎侍郎參內史事集三十卷麗詞文心雕龍有麗詞篇論駢儷體其文曰造化賦形支體必雙神理為用事不孤立心生文辭高下相須臯陶贊云罪疑惟輕功疑惟重益陳謨云滿招損謙受益豈營麗詞率然成對江總陳書總字總持家傳賜書晝夜尋讀文傷於浮艷後主之世總當權宰日與宴遊後庭共陳暄孔範等十餘人謂之狎客庾信北史文苑傳庾信字子山父肩吾為梁中庶子徐摛為右衛率摛子陵及信並為抄撰學士父子東宫出入恩莫與比隆文並綺艷世號徐庾體焉元帝即位聘於西魏屬大軍南伐遂留長安纍遷開府儀同三司踳駮莊子末篇惠施多方其道踳駮魏都賦謀踳駮於王義按乖舛也本訓色雜或作䮞駮義亦可借後世書有作蹐駮者蹐訓小步失其義矣沮誦失路升菴外集倉頡沮誦共造文字今世知有倉頡不知有沮誦按沮誦失路借言古筆不行也又詳外篇正史篇靈均當軸按史記屈賈傳但言屈原者名平不言别有名字所謂正則靈均蓋離騷自寓即內美修能之寫象耳離騷見下篇此言靈均當軸借言以詞人當史局也傅𤣥有言傅𤣥見書事篇其言即所撰論三史故事評斷得失中語也作傅毅者非是陳尹後漢班固傳顯宗召固詣挍書部除蘭臺令史與前睢陽令陳宗長陵令尹敏共成世祖夲紀困學紀聞論衡云陳平仲紀光武漢家功德可觀見未詳平仲何人閻徵君若璩據班固傳推知是陳宗字袁宏後漢紀南陽人尹敏字幼季才學深通上言䜟書多近語俗辭上非之官止長陵令與班彪善杜馬馬援傳援兄子嚴字威卿明德皇后既立嚴慮致譏嫌徙北地皇后敕使移居洛陽顯宗召見嚴進對閎雅詔留仁夀闥與校書郎杜撫班固等雜定建武注記劉朱盧楊後漢文苑傳劉珍字秋孫永初中鄧太后與詔珍與劉騊駼馬融校定東觀百家又詔騊駼作建武以來名臣傳篇又朱暉傳暉子穆字公叔拜尚書所著論奏二十及卒蔡雍與門人共述其體行諡為文忠先生韓又盧植傳植字子幹拜議郎與馬日磾蔡雍楊彪說等補續漢紀又楊震傳震曽孫彪字文先熹平中公車徵拜議郎注華嶠書曰與日磾植雍等著作東觀按四人傳中朱穆不及續史事序傳第三十二蓋作者自叙其流出于中古乎一無乎字案屈原離騷經其首章上陳氏族下列祖考先述厥生次顯名字自叙發跡實基於此釋此以賦體自述而遂開叙體者降及司馬相如始以自叙為傳然其所叙者但記自少及長立身行事而已逮於祖先所出則蔑爾無聞釋此則叙體所始而不述其先者至馬遷又徵三閭之故事放讀倣文園之近作模楷二家勒成一卷於是揚雄遵其舊轍班固酌其餘波自叙之篇實煩於代雖屬辭有異而兹體無易釋至太史公則歷述先世而叙體備遂為後代所宗原已上是始尋馬遷史記上自軒轅下窮漢武疆宇修闊道路綿長故其自叙始於氏出重黎終於身為太史雖上下馳騁終不越史記之年釋自此乃頂接史公開出議論班固漢書止叙西京二百年事耳其自叙也則逺徵令尹起楚文王之世近録賓戲當漢明帝之朝苞括所及一作聞踰於本書逺矣而後來叙傳非止一家競學孟堅從風而靡施於家諜一作譜猶或可通列於國史多一作每見其失者矣釋此為初段議論言遷史本無斷限故逺溯源流班書止述本朝而亦追叙逺代此習一起攀仰成風然自叙之為義也茍能隱已之短稱其所長斯言不謬即為實録而相如自序乃舊訛及記其客遊臨卭竊妻卓氏以春秋所諱持為美談雖事或非虛而理無可取載之於傳不其愧乎又王充論衡之自紀也述其父祖不肖為州閭所鄙而已答以瞽頑舜神鯀惡禹聖夫自叙而言家世固當以揚名顯親為主茍無其人闕之可也至若盛矜於已而厚辱其先此何異證父攘羊學子名母必責以名教實三千之罪人也釋此兩層與論㫖反離言自叙之過過在鋪張而相如不嫌自汙者王充醜詆所生是出情理之外夫自媒自衒士女之醜行然則人莫我知君子不舊作所誤恥案孔氏論語有云十室之邑必有忠信不如某之好學也又曰吾每自一依經作日三省吾身為人謀而不忠乎與朋友交而不信乎又曰文王既沒文不在兹乎又曰吾之先一依經作昔者吾友嘗從事於斯矣則聖達之舊無之字立言也時亦揚露已才或託諷以見其情或選與巽通辭以顯其跡終不盱衡自伐攘袂公言且命諸門人各言一作見爾志由也不讓見嗤無禮歷觀揚雄已降其自叙也始以誇尚為宗至魏文帝傅𤣥陶梅恐誤或當作梅陶葛洪之徒則又踰於此者矣何則身兼片善行有微能皆剖晰具言一二必載豈所謂憲章前聖謙以自牧者歟釋此節乃本篇正諷為自叙誇尚者進規又近古人倫喜稱閥閲其蓽門寒族百代無聞而騂角挺生一朝暴貴無不追述本系妄承先哲至若儀父振鐸並為曹氏之初淳維當作始均李陵俱稱拓拔之始河內舊訛作南馬祖遷彪之說不同吳興沈先約炯先約炯一作約先後非之言一作序有異斯皆不因真律無假寧楹直據經史自成矛盾則知揚姓之寓西蜀班門之雄朔野或胄纂伯僑或家傳熊繹恐自我作故舊作古失之彌逺者矣蓋諂祭非鬼神所不歆致敬他親人斯悖德凡為叙傳冝詳此理不知則闕亦何傷乎釋末節極之於冒承非鬼而誇情莫遁矣按篇何以作為史家以自序殿全史而作也史記而下有自序者漢之班宋之沈南北史之李與史遷而四耳而旁及於相如揚雄者史傳即其自傳也又及於王充魏文傳𤣥陶葛諸人序見本集者觸類而長藉以起諷也以龍門為初式以蘭臺為踵事以浼身證祖為失體以誇尚妄承為進規核而辨逮後官局分編序傳之例遂廢篇當次前序例題目之間恐是錯簡唐栁仲敷論氏族曰天子建德因生賜姓以國則齊魯秦吳以諡則文武成宣以官則司徒司馬以爵則王孫公孫以字則孟孫叔孫以居則東門北郭以地則三烏五鹿以事則巫乙卜陶秦既滅學公侯子孫失其本系漢始尚官七相五公所由興也魏立九品置中正尊世胄卑貧士晉宋因之賈氏弼王氏𢎞譜學興焉自有譜局史職皆具過江則為僑姓山東關中號郡姓代北則虜姓凡三世有三官者曰膏粱有令僕者為華腴尚書領護而上者甲姓九卿若方伯者乙姓散騎太中者丙姓吏部正員郎為丁姓謂之四姓又唐書髙儉傳曰太宗以人尚閥閲嫁娶取資謂之賣昏詔儉與韋挺等責天下譜諜參考史傳檢正真僞進忠賢退悖惡先宗室後外戚退新門進舊望右膏粱左寒畯合二百九十三姓千六百五十一家為九等號氏族志後李義甫恥其家無名更令孔志約楊仁卿等裁廣義例各以品位高下次之縉紳恥焉目為勳格至鄭漁仲作通志謂五季以來諸志録皆散佚云譜胄源流興廢可考見者如此史言賣昏求財汨喪亷恥至風教又薄譜録都廢而公靡常産之拘士亡舊德之傳矣然水心葉氏又言叔向以欒郤胥原狐續慶伯降在皂𨽻憂公室之卑矣若夫志不必憂國行不必及民但為門户世有顯寵如晉宋王謝北方崔盧此叔孫豹所謂世祿非不朽也因閲此文附記其說離騷陳氏族篇首帝高陽之苖裔兮朕皇考曰伯庸攝提貞於孟陬兮惟庚寅吾以降皇覽揆余於初度兮肇錫余以嘉名名余曰正則兮字余曰靈均按庾信哀江南賦自陳氏族較詳相如自叙為傳按漢書本傳無自叙明文證之後史知其言固有本隋書劉炫傳自為贊曰通儒司馬相如揚子雲馬李卿鄭康成等皆自叙風徽傳芳來葉云云蓋子元之前古人已言之矣不越史記之年太史公自序云卒述陶唐以來至於麟止自黃帝始按此總紀史記全書也而本序之始終亦括此三言逺徵近録按漢書叙傳其首曰班之先令尹子文之後其末以答賓戲終之時則明帝永平年也馬序推史官之由來班則止於述姓故史通有異辭竊妻相如傳相如游梁歸臨卭令王吉為具召之時卓王孫女文君新寡相如以琴心挑之文君夜亡奔相如遂與馳歸成都論衡自紀自紀篇王充者㑹稽上虞人也字仲任其先本魏郡從軍有功封㑹稽陽亭國因家焉以農桑為業世祖勇任氣怨讎衆多祖父泛擔載就安錢唐縣生子二䝉誦誦即充父與豪家丁伯等結怨徙處上虞按瞽頑鯀惡皆自紀中語學子名母戰國魏䇿宋人有學者三年反而名其母母曰名我何也其子曰堯舜名天地名母賢不過堯舜大不過天地是以名母也母曰子於學盡行之乎將有所不行也願子之且以名母為後也三千之罪孝經五刑篇子曰五刑之屬三千而罪莫大於不孝揚雄自叙本傳顔注晉灼曰晉大夫無揚侯師古曰雄之自叙譜牒稱揚侯蓋疏謬也據此可見雄傳皆自敘之文其說必有所受也前相如自叙注已見之魏文帝典論自序歷述平董卓脫張繡及論射擊劒彈碁之事皆著於篇傅𤣥𤣥字休奕見書事篇作傅子三篇其自叙未見陶梅其人無考世說方正注梅頤弟陶字叔真王敦咨議參軍晉書祖逖兄納問梅陶曰君鄉里立月旦評何如曰善褒惡貶佳法也王隱在坐曰尚書三載考績何得月行褒貶陶曰此官法也月旦私法也按陶生許劭之鄉好議論自叙之作或是其人葛洪抱朴子自叙余抄掇衆書撮其精要或曰玊屑盈車不如全璧答曰泳員流者採珠而捐蚌登荆山者拾玉而棄石余猶摘孔萃之藻羽脫犀象之角牙矣其自序世系晉書本傳略採之儀父振鐸大戴帝繫篇顓頊元孫陸終娶鬼方氏産六子其五曰安是為曹姓曹姓者邾氏也通志氏族略武王封安之苖裔邾挾為附庸下至儀父始見於經按邾儀父乃曹之後非曹之先也劉言稍借史記曹叔振鐸者周武王弟也武王既克殷紂封叔振鐸於曹始均李陵魏書序紀黃帝以土德王北俗謂土為托謂后為跋故以為氏其裔始均入仕堯世命為田祖爰歷三代始均之裔不交南夏積六十七世至成皇帝諱毛立威振北方宋書索虜傳索頭虜姓托跋其先李陵後也按舊本始均作淳維淳維是胸奴逺祖與拓跋無涉拓通作托託河內馬祖按太史公自序及晉書帝紀同以漢初河內司馬卭為祖史通謂彪說不同是司馬彪九州春秋叙姓别有所祖也俟考吳興沈先沈約宋書自序沈子國今汝南平輿沈亭是也後以國為氏漢有曰戎字威卿者光武封為海昏侯辭不受避地徙居㑹稽烏程縣之餘不鄉遂世家焉順帝分㑹稽為吳郡靈帝分烏程為永安吳孫皓分吳郡為吳興郡晉平吳改永安為武康史臣七世祖延始居縣東博陸里餘烏村按南史沈炯傳亦云吳興武康人史通云炯言有異未詳所本真律寧楹未詳胄纂伯僑揚雄傳其先出自有周伯僑者以支庶初食采於晉之揚因氏焉家傳熊繹漢書叙傳班之先與楚同姓令尹子文之後也子文初生虎乳之楚人謂虎班因氏焉按熊繹楚先君也敬他孝經聖治不愛其親而愛他人者謂之悖德不敬其親而敬他人者謂之悖禮煩省第三十三昔荀卿有云逺略近詳舊作録逺略近誤則知史之詳略不均其為辨舊作患誤者久矣釋荀子語可作本篇題目二句承接竟似破承舊本傳訛遂與通篇抵牾及干令升史議歷詆諸家而獨歸美左傳云丘明能以三十卷之約囊括二百四十年之事靡有孑遺斯蓋立言之髙標著作之良模也並史議原文又張世偉著班馬優劣論云遷叙三千年事五十萬言固叙二百四十年事八十萬言是班不如馬也並優劣論原文然則自古論史之煩省者咸以左氏為得史公為次孟堅為甚甚舊作非恐誤自魏晉已還年祚轉促而為其國史亦不減班書此則後來逾煩其失彌甚者矣釋首提後史益煩為論案乃先舉干張兩議以啓辨端余以為近史蕪纍誠則有諸亦猶古由通古今不同勢使之然也釋揭勢字是篇的輒求其本意略而論之釋此下對兩議分辨何者當春秋之時諸侯力爭各閉境相拒關梁不通其有一訛言吉凶大事見知於他國者或因假道而方聞或以通一作同盟而始赴茍異於是則無得而稱魯史所書實用此道至如秦燕之據有西北楚越之大啓東南地僻界一作逺非於諸戎人罕通於上國故載其行事多有闕如且其書自宣成以前三紀而成一卷至昭襄已下數年而一作各占一篇是知國阻隔者記載一作事不詳年淺近者撰録多備原注杜預釋例云文公已上六公書日者二百四十九宣公已下亦六公書日者四百三十二計年數略同而日數加倍此亦久逺遺落不與近同也是則傳者注書已先覺之矣按先後書日之文見杜氏集解序疏一本書日皆作書國又傳者作儒者並誤此一作左丘明隨聞見而成傳何有故為簡約者哉釋此節兩層言左之約左之勢也况左亦有不能約之時干之言豈定論乎及漢氏一作時之有天下也普天率土無思不服㑹計之吏嵗奏於闕廷輶軒之使月一作日馳於郡國作者居府於京兆府字舊訛在京兆下徵事於四方用使夷夏必聞逺近無隔故漢氏之史所以倍增於春秋也釋此節言班有不得不煩之勢張乃以為不如馬亦豈得為定論乎降及東京作者彌衆至如名邦大都地富才良髙門甲族代一作世多髦俊邑老鄉賢競為别録家牒宗譜各成私傳於是筆削所採聞見益多此中興之史即後漢書也所以又廣於前漢也釋由班而推後漢之煩又其勢有必然者但今范史短於班史此蓋舉華謝諸本而言篇尾云華謝所編煩於班馬是也夫英賢所出何國而無書之則與日月長懸不書則與煙塵永滅是以謝承尤一作周悉江左京洛事缺於三吳陳夀偏委悉也一作安非蜀中巴梁語詳於二或作一非國蜀志最短何以云然恐兼夀所撰益都耆舊傳而言如宋齊受命梁陳握紀或地比禹貢一州或年方秦氏二世夫地之偏小年之窘迫適使作者採訪易洽巨細無遺耆舊可詢隱諱咸露此小國之史所以不減於大邦也釋更由漢而推之偏近之史其煩又各因其勢也循已上皆序推出夫論史之煩省者一無者字但當要一作求其事有妄載苦於榛蕪言有闕書傷於簡略斯則可矣必量世事之厚薄限篇第以多少理則不然釋數語一篇筋骨論當否不論多少洵篤論也且必謂丘明為省也若介葛辨犧於牛鳴叔孫志夢於天壓楚人教晉以拔斾城者謳華以棄甲此而畢書豈得謂之省耶且必謂漢書為煩也若武帝乞漿於柏父陳平獻計於天山長沙戲舞以請地楊僕怙寵而移關此而不録豈得謂之煩耶由斯而言則史之煩省不中衷也不衷於一也從可知矣釋此節更就干張所論之二書搜討其義言彼所謂煩省之說並亦未確也又古今有殊澆淳不等帝堯則天稱大書惟一篇周武觀兵孟津言成三誓伏羲止畫八卦文王加以繫辭俱為大聖行事若一其豐儉不類懸隔如斯必以古方今持彼喻此如蚩尤黃帝交戰阪泉施於春秋則城濮鄢陵之事也有窮篡夏少康中興施於兩漢則王莽光武之事也夫差既滅句踐霸世施於東晉則桓𤣥宋祖之事也張儀馬錯為秦開蜀施於三國則鄧艾鍾㑹之事也而往之所載其簡如彼後一作今非之所書其審如此若使同後來於往世同後來舊作後來同誤限一槩以成書將恐學者必詬其疏遺尤其率略者矣而議者茍嗤沈蕭之所記宋書南齊書事倍於孫習皆有晉史華謝之所編皆後漢書語煩於班馬此四句舊本雜亂不成語録見篇後不亦謬乎故曰論史之煩省者但當求其事有妄載言有闕書斯則可矣必量世事之厚薄限篇第以多少理則不然其斯之謂也釋後節更從煩一邊指證出與簡並勝之義能令勢字身分愈髙而文情亦興㑹翔舞按篇意都從荀卿子悟來荀言久則論略近則論詳略則舉大詳則舉小持此四語括此一篇大致了了不須復贅疏義也其曰但論妄載闕書不論厚薄多少說理尤為圓足史通著論不難其綜核難其寬和如此篇醇乎醇者也此篇用意與叙事三章大相徑庭非前後違反也彼以用筆言此以載事言㑹向此中參悟乃可與言事增文簡之法又內篇至此將竟特以斡旋前論偏枯更可識著書補救之法讀武帝乞漿一段識史筆之謹嚴見讀書之精密遇此等不放過便能處處得師逺略近詳荀子非相篇傳者久則論略近則論詳略則舉大詳則舉小愚者聞其略而不知其詳聞其詳而不知其大也按文之誤從劉協文心來文心云荀况稱録逺略近蓋文疑則闕貴信史也意亦自背令升世偉令升干寶字也其說見二體篇世偉張輔字也注見鑒識篇介葛見言語篇天壓昭四年初穆子去叔孫氏及庚宗遇婦人私而宿焉適齊夢天壓已弗勝顧而見人黑而上僂號之曰牛助余乃勝之既立所宿庚宗之婦人獻以雉曰吾子長矣見之則所夢也號之曰牛曰唯遂使為豎有寵卒亂其室拔斾宣十二邲之戰晉師奔或以廣隊不能進楚人惎之脫扄少進馬還又惎之拔斾投衡乃出顧曰吾不如大國之數奔也棄甲見言語篇乞漿柏父郭注上微行嘗夜至柏谷舍於逆旅因從乞漿主人翁曰無漿正有溺耳且疑上為姦盜欲攻之主人嫗覩上狀貌而異之止其翁翁不聽嫗飲翁酒縛之乃殺雞為食以謝客明日上歸召嫗賜金千斤按郭不言所出後閲漢武故事得之獻計天山漢書髙帝紀至平城為胸奴所圍七日用陳平計得出注應劭曰陳平使畫工圖美女間遺閼氏云欲獻之閼氏畏其奪已寵因謂單于曰漢天子亦有神靈得其地非能有也於是開一角得出鄭氏曰計鄙陋故祕長沙戲舞漢書景十三王傳長沙定王發微故王卑濕貧國注應劭曰景帝後二年諸王來朝有詔更前稱夀歌舞定王但張褎小舉手左右笑其拙上怪問之對曰臣國小地狹不足回旋帝乃以武陵零陵桂陽益焉楊僕移關漢書孝武紀元鼎三年冬徙函谷關於新安以故關為𢎞農縣注應劭曰時樓船將軍楊僕數有大功恥為關外民上書乞徙東關以家財給其用度武帝意亦好廣闊於是徙關三百里按已上四條皆所謂班氏不録者也今詳考漢書果皆别見而郭本率以班書正文串録為注反似其言皆出史文者豈不與本㫖刺謬乎至楊僕一條但鈔酷吏本傳尤與移關事無涉矣只此校訂頗費日力後詳王本大半得之是其勝郭本處城濮鄢陵城濮事在僖二十八鄢陵事在成十六所謂春秋晉楚三大戰之二也有窮少康有窮后羿見人物篇又左哀元昔有過澆滅夏后相后綿方娠逃歸有仍生少康焉澆求之奔有虞虞思妻之二姚而邑諸綸能布其德以收夏衆使女艾諜澆復禹之績祀夏配天王莽光武二漢終始傳紀載之凡數卷桓𤣥宋祖晉書之叛臣及諸葛長民何無忌等傅宋書之武帝紀及劉道規等傳並載其事亦數卷為秦開蜀戰國秦䇿司馬錯與張儀爭論於秦惠王前起兵伐蜀遂定蜀史記略同鄧艾鍾㑹魏志鄧艾字士載鍾㑹字士季太傅繇小子也司馬文王以蜀將姜維屢擾邊陲大舉圖蜀景元四年秋下詔使鄧艾統諸軍三萬餘人趨甘松沓中綴維㑹統十萬衆分從斜谷駱口入移檄蜀將吏士民云云按魏志蜀志及晉書文帝紀其事専載夾載不一冊沈蕭四句初注此書案頭有二本文異而誤同正凝想間張生玉穀至共勘之揀所兩有汰所兩羡而四句出遂刋定之後見别本一字不爽也二本大小書雜亂謬誤録後一本議者茍嗤沈約休文梁人著宋書衍字子顯著齊書蕭之所記事倍於孫孫盛字安國晉人也當晉書鑿齒字彥威亦著晉書習華謝之所編語煩於班馬又一本議者茍嗤沈約休文梁人著宋書蕭衍字子顯著齊書蕭所記事倍於孫孫盛字安國晉人著晉書習鑿齒字彥威亦著晉書之所編語煩於班馬按二本皆正文夾注之互混也其文不可以句而衍字當字等之誤更不待言邢子才言日思誤書更是一適余讀此悶極始悟不禁為之解頤史通通釋卷九
