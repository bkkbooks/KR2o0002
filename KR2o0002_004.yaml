body:
  text: 史通通釋卷四無錫浦起龍撰內篇論贊第九論謂篇末論辭贊謂論後韻語春秋左氏傳每有發論假君子以稱之二傳云公羊子穀梁子史記云太史公既而班固曰贊舊作讃荀悅曰論東觀曰序謝承曰詮陳夀曰評王隱曰議何法盛曰述揚雄曰撰句未的詳注中劉昞曰奏袁宏裴子野自顯姓名皇甫謐葛洪列其所號𤣥晏先生抱朴子史官所撰通稱史臣其名萬殊其義一揆必取便於時者則總歸論贊舊訛作著焉一脫贊字一無焉字釋首撮史傳之論贊異名為發議總案夫論者一失此三字釋此下先言史論所以辨疑惑釋凝滯若愚智共了固無俟商𣙜􅉌明君子曰者其義實在於斯謂非每傳皆有司馬遷始或訛作殆限以篇終各書一論必理有非要則強生其文史論之煩實萌於此篇必有論自史記始夫擬春秋成史持論尤當從猶義冝濶略其有本無疑事輒設論以裁之此皆私狥筆端茍衒文彩嘉辭美句寄諸簡冊豈知史書之大體載削之指歸者哉釋此推史論成例始自史記非理所必需也必尋其得失考其異同子長淡泊一作薄無味承祚偄一作懦緩不切賢才間出隔世同科孟堅辭惟溫雅理多愜當其尤美者有典誥之風翩翩奕奕良可詠也仲豫荀悅字義理雖長失在繁富自兹以降流宕忘返大抵皆華多於實理少於文鼓其雄辭誇其儷事必擇其善者則干寶范曄裴子野是其最也沈約臧榮緒蕭子顯抑其次也就繁儷中所取如此非以為準的也孫安國都無足採習鑿齒時有可觀若袁彥伯宏字之務飾𤣥言謝靈運之虛張髙論玊巵無當曾何足云王卲志在簡直言兼鄙野茍得其理遂忘其文觀過知仁一作人斯之謂矣大唐修晉書作者皆當代詞人逺棄史班近宗徐庾夫以飾彼輕薄之句而編為史籍之文無異加粉黛於壯夫服綺紈於髙士者矣釋此節就諸論品其髙下大意謂宜尚典實無取浮靡史之有論也蓋欲事無重出謂補傳所無文省舊作省文下同可知謂單詞已足如太史公曰觀張良貌如美婦人舊有耳字項羽重瞳豈舜苗裔此則别加他語以補書中所謂事無重出者也又如班固贊曰石建之浣衣此句舊作萬石君之為父浣衣非君子非之楊王孫祼葬賢於秦始皇逺矣此則片言如約而諸義甚備所謂文省可知者舊脫者字釋事無重出文省可知是為史論上乘準的在此及後來贊語之作多録紀傳之言其有所異唯加文飾而已至於甚者則天子操行具諸紀末繼以論曰接武前修紀論不殊徒為再列釋此翻轉言失之復與支者後史大率然也上言論下言贊此處分截馬遷自一無自字序傳後歷寫諸篇各叙其意在自序之後文仍散體既而班固變為詩體號之曰述在叙傳之後文皆四言范曄改彼述名呼之以贊尋述贊為例篇有一章分綴自此始事多者則約之一有以字下同使少理寡一作小者則張之令大名實多爽詳略不同且欲觀人之善惡史之褒貶蓋無假於此也一無也字釋此節遞到史贊亦是發議之案然固之總述合在一篇使其條貫有序歷然可閲蔚宗後書實同班氏乃各附本事書於卷末篇目相離斷絶失次而後生作者不悟其非如蕭子顯李百藥南北齊舊脫齊字史大唐新修晉史皆依范書誤本篇終有贊夫每卷立論其煩已多而嗣論以贊為黷彌甚亦猶文士製碑序終而續以銘曰釋氏演法義盡而宣以偈言茍撰史若斯難以議夫簡要者矣釋此節摘諸史之加贊者言之論而又贊尤非史家貴潔之體也至若與奪乖宜是非失中如班固之深排賈誼范曄之虛美隗囂陳夀謂諸葛不逮管蕭魏收稱爾米可方伊霍或言傷其實或擬非其倫必備加擊難則五車難盡故略陳梗槩一言以蔽之釋更以議論乖違者作收局按是篇不分編年紀傳仍是紀傳為多論贊二字截講其於論也辭嚴而不擯於論後之贊則辭决而加絶自是唐後諸史有論無贊皆隂奉其誡可知劉說之當理也子長淡泊無味蓋對限篇書論非要强文為言觀事無重出文省可知八字三昧仍首馬次班也又因此知紀傳跋尾當名史論不當云贊贊銘類也韻體也人以扶風史論皆作贊曰遂因之必也正名宜與讀此元史紀傳不綴論贊其凡例述敕㫖云據事具文善惡自見也謝承吳志妃嬪傳吳主權謝夫人弟也隋經籍志後漢書一百三十卷無帝紀吳武陵太守謝承撰揚雄法言其目云撰學行撰吾子撰修身撰問道撰問神撰問明撰寡見撰五百撰先知撰重黎撰淵騫撰君子撰孝至按撰自第一至第十三其上皆有四言序然非論贊體也華陽國志則以撰曰為論贊揚雄當作常璩劉昞北史劉延明燉煌人凉武昭王徴為儒林祭酒著三史略記八十四卷燉煌實録二十卷按延明昞字也北史諱唐嫌名以字行袁宏撰後漢紀詳見外篇正史篇列其所號晉書皇甫謐傳謐字士安安定人沈靜寡欲自號𤣥晏先生撰帝王世紀年歷髙士逸士列女等傳𤣥晏春秋並重於世摯虞其門人也葛洪傳洪字稚川句容人從祖𤣥得仙號葛仙公洪悉得其法干寶薦洪領著作洪固辭求為句漏令曰非欲為榮以有丹耳自號抱朴子因以名書所著神仙良吏集異等傳金匱肘後方篇章富於班馬臧榮緒撰晉書詳見外篇正史篇孫安國晉書孫盛傳盛字安國太原人十歲避難渡江及長善言名理補長沙太守遷祕書監著魏氏春秋晉陽秋按宋書州郡志晉簡文鄭太后諱春改春曰陽是知凡曰陽秋本皆春秋也習鑿齒晉書鑿齒字彥威為滎陽太守在郡著漢晉春秋起漢光武終晉愍帝其言謂三國時蜀以宗室為正魏雖受漢禪晉尚為篡逆至文帝平蜀乃為漢亡而晉始興焉引世祖諱炎興為禪受以明天心不可以勢力强也按炎興謂繼漢而興禪受者禪為蜀後主諱謂受漢禪也謝靈運宋書靈運性奢華世稱謝康樂太祖登祚徵為祕書使撰晉氏一代書粗立條流書競不就玉巵無當韓非外儲右千金之玉巵通而無當不可以盛水有瓦器而不漏可以盛酒唐修晉書皆詞人舊唐房𤣥齡傳史官多文詠之士好採碎事競為綺豓詳正史篇晉史節浣衣祼葬漢書萬石傳建老白首謁親入子舍竊問侍者取親中裙厠牏身自浣灑贊曰至石建之浣衣周仁為垢汙君子譏之楊王孫傳病且終先令其子曰吾欲裸葬以反吾真必無易吾意贊曰昔仲尼稱不得中行則思狂狷觀楊王孫之志賢於秦始皇逺矣班排賈誼漢書本傳贊欲改定制度以漢為土德色上黃數用五及欲試屬國施五餌三表以繫單于其術固以疏矣按表餌之術實疏班論非過范美隗囂後漢書本傳論若囂命㑹符運敵非天力雖坐論西伯豈多嗤乎贊公孫習吏隗王得士夀謂諸葛蜀志本傳贊評曰諸葛亮之為相國也可謂識治之良才管蕭之亞匹矣然連年動衆未能成功蓋應變將略非其所長與收稱爾朱魏書爾朱榮傳史臣曰茍非榮之尅夷大難不知幾人稱帝幾人稱王功烈亦已茂乎向使榮無堅忍之失修德義之風則韓彭伊霍夫何足數北史魏收傳收以髙氏出自爾朱且納榮子金故減其惡而增其善序例第十孔安國有云序者所以叙一作序作者之意也竊以書列典謨詩含比興若不先叙其意難以曲得其情故每篇有序敷暢厥義即書序詩小序降逮史漢以記事為宗至於表志雜傳亦時復立序文兼史體狀若子書然可與誥誓相參風雅齊列矣釋首言序之為道主於序明篇指馬班有作猶存經序之遺逮華嶠後漢多同班氏如劉平江革等傳其序先言孝道次述一作入毛義養親此則前漢王貢傳體其篇以四皓為始也嶠言辭簡質叙致溫雅味其宗旨亦孟堅之亞歟釋班後節取一篇以示學班之準爰洎范曄始革其流遺棄史才矜衒文彩後來所作他皆若斯於是遷固之道忽諸微婉之風替矣釋此言繁縟是尚自范而開若乃后妃列女文苑儒林凡此之流范氏莫不列序夫前史所有而我書獨無世之作者以為恥愧故上自晉宋下及陳隋每書必序課成其數蓋為史之道以古傳今古既有之今何為者濫觴肇迹容或可觀纍屋重架無乃太甚譬夫一作如方朔始為客難續以賔戲班固作解嘲揚雄作枚乘首唱七發加以七章七辨音辭雖異㫖趣皆同此乃讀者所厭聞老生之恆說也釋此言後史宗范為課相習成套數見無竒矣已上止就篇序言夫史之有例猶國之有法國一有之字下同無法則上下靡定史無例則是非莫準釋此下言史例昔夫子修經始發凡例左氏立傳顯其區域科條一辨彪炳可觀降及戰國迄乎有晉年踰五百史不乏才雖其體屢變而斯文終絶釋此言例之為體左後中絶唯令升干寶字先覺逺述丘明重立凡例勒成晉紀鄧粲孫盛已下遂一作遽躡其蹤史例中興於斯為盛若沈宋沈約宋書之志序蕭齊子顯齊書之序録雖皆以序為名其實例也釋此言例之為體晉後復興必定其臧否徴其善惡干寶范曄理切而多功鄧粲道鸞詞煩而寡要子顯雖文傷蹇躓而義甚優長斯一二家皆序例之美者釋數語括一時各見之短長要皆自出條理者夫事不師古匪說攸聞苟模楷曩賢理非可諱而魏收作例全取蔚宗貪天之功以為己力異夫范依叔一作政非駿華嶠字班習子長攘袂公行不豈不也陷穿窬之罪也釋至魏收竟以剽掠為能風斯下矣蓋凡例既立當與紀傳相符釋此下乃按例繩文案皇舊作唐非朝晉書例云凡天子廟號唯書於卷末依檢孝武崩後竟不言廟曰烈宗釋文不準例者一又案百藥齊書例云人有本字行者今並書其名依檢如髙慎斛律光之徒多所仍舊謂之仲密明月釋文不準例又一此並非言之難行之難也釋二句束上又一作及晉齊史例皆云坤道卑柔中宮不可為紀今一作令編同列傳以戒牝雞之晨竊惟録皇后者既為傳體自不可加以紀名二史之以后為傳雖云允愜而解釋非理成其偶中所謂畫蛇而加足反失杯中之酒也釋此又指出例合而序誤者謂后從帝年故不稱紀序乃取義卑柔失命名之意矣至於題目失據褒貶多違斯並散在諸篇此可得而略矣按此所謂序皆篇序非總序其所謂例則兼序中附出之例及總立發凡之例大指謂序貴簡質例貴嚴明也中間雖帶引左氏其實皆言紀傳家後幅皇后一條當從前卷本紀列傳兩篇入解不爾不明劉江王貢注見列傳篇其處止舉傳首劉王不及江貢後漢書江革字次翁臨淄人客下邳祼跣行傭以供母鄉里稱之曰江巨孝建初中拜諫議大夫前漢書貢禹字少翁琅琊人以明經潔行著聞徵為博士後為御史大夫數言得失按劉江傳篇叙注云以上並華嶠之詞濫觴家語三恕江始出於岷山其源可以濫觴王肅注觴可以盛酒言其微也按濫觴謂始出之微後人多誤用七文選七發注猶楚辭七諫之流按文心雕龍自七發而下有傅毅七激崔駰七依張衡七辨崔瑗七厲陳思七啓仲宣七釋桓麟七說左思七諷枝附影從十有餘家又文苑英華有七契七勵七召又舊注廣列七謨七證七華七繹七引以及興疑蠲舉諸名而獨無七章俟考又按崔瑗傳名七蘇非七厲夫子修經凡例左傳成十四春秋之稱微而顯志而晦婉而成章盡而不汚懲惡而勸善非聖人誰能修之杜氏序為例之情有五是也鄧粲晉書本傳鄧粲長沙人以髙潔著名著元明紀十篇按元明謂晉中興初中宗元帝肅宗明帝道鸞南史文學檀超傳超叔父道鸞字萬安國子博士永嘉太守撰續晉陽秋不言烈宗晉書孝武紀太元二十年時張貴人有寵年幾三十帝戲之曰汝以年當廢矣貴人潛怒向夕帝醉遂暴崩按紀末缺書廟號通鑑題烈宗孝武皇帝仲密明月仲密髙慎字明月斛律光字按百藥齊書髙慎附見兄髙乾傳中斛律光在其父斛律金傳後二人皆無以字行之文傳內亦不書字其書字處間於他傳有之無甚不準例之病史通似誤畫蛇戰國䇿楚有祠者賜其舍人巵酒舍人相謂曰請畫地為蛇先成者飲酒一人蛇先成乃左手持巵右手畫蛇曰足未成一人奪其巵曰蛇固無足遂飲其酒題目第十一題目有二義一謂全書統名一謂篇帙諸名上古之書有三墳五典八索九丘其次有春秋尚書檮杌志如志曰喪祭從先祖之志乘釋前半就統名立說首言古自成其古名自漢已下其流漸繁大抵史名多以書記紀略為主後生祖述各從所好沿革相因循環遞習蓋區域有限莫踰於此焉釋言書記紀略四者是為後史正名至孫盛有魏氏春秋孔衍有漢魏一脫魏字一誤作隋尚書陳夀王劭曰志何之元劉璠曰典此又好竒厭俗習舊捐新雖得稽古之冝未達從時之義釋擬古求異皆可不必已上羅列名目得失並舉榷而論之其編年月一多日字者謂之紀荀袁漢紀之類列紀或作記非傳者謂之書前後漢書之類取順於時斯為最也夫名以定體為實之賔茍失其途有乖至理案吕陸二氏呂不韋陸賈各著一書唯次篇章不繫時月此乃子書雜記而皆號曰春秋魚豢姚察著魏梁二史巨細畢載蕪纍甚多而俱榜之以略考名責實奚其爽一作喪歟釋此總上言二體唯荀班所名為正餘皆强名而失其實者自五代而後紀傳總名為史編年則本名長編錫名通鑑就中又創綱目矣論統名止此若乃史傳雜篇區分類聚隨事立號諒無恆規釋此下析言篇帙諸名如馬遷撰皇后傳而以外戚命章案外戚憑皇后以得名猶宗室因天子而顯稱若編皇后而曰外戚傳則書天子而曰宗室紀可乎釋史遷篇題之失有然班固撰人表以古今為目尋其所載也皆自秦而往非漢之事古誠有之今則安在釋班史篇題之失有然子長史記别創八書孟堅既以漢為書不可更標書號改書為志義在互文而何氏中興晉中興書易志為記此則貴於革舊未見其能取新釋何法盛改易帙名亦屬無謂夫戰爭方殷雄雌未决則有不奉正朔自相君長必國史為傳宜别立科條至如陳項諸雄寄編一作篇漢籍董袁羣賊附列魏志既同臣子之例孰辨彼此之殊唯東觀以平林下江諸人列為載記顧一作賴非後來作者莫之遵效逮新晉晉書唐初新定故曰新晉始以十六國主持一作特載記表名可謂擇善而行巧於師古者矣釋此言非國朝臣當從新晉書用東觀載記之例觀夫舊史列傳題卷靡恆文少者則具出姓名若司馬相如東方朔是也字煩者唯書姓氏若毋將蓋陳衛諸葛傳是也必人多而姓同者則結定其數若二袁四張二公孫傳是也如此標格足為詳審釋此言列傳人少人多題可隨之詳略引起下文至范曄舉例始全録姓名歷短行於卷中叢細字於標外其子孫附出者注於祖先之下乃類俗之文案孔目藥草經方煩碎之至孰過於此竊一作切以周易六爻義存象內春秋萬國事具傳中讀者研尋篇終自曉何必開帙解帶便令昭然滿目也釋范史則務盡其詳矣自兹已降多師蔚宗魏收因之則又甚矣其有魏世鄰編於魏史者於其人姓名之上又列之以邦域申之以職官至如江東帝主舊訛王則云僣晉司馬睿島夷劉裕河西酋長則云私署一訛置凉州牧張實私署凉王李皓並見魏書目録此皆篇中所具又於卷首具列必如收意使其撰兩漢書三國志題諸盜賊傳亦當云僣西楚霸王一脫此二字項羽僞寧朔王隗囂自餘陳涉張步劉璋袁術其位號皆一一别作一二具言無所不盡者一無者字也釋魏收更誇已斥鄰多綴名目尤可嗤也蓋法令滋章古人所慎若范魏之裁篇目可謂滋章之甚者乎茍忘彼大體好兹小數難與議夫婉而成章一字以為褒貶者矣釋自觀夫舊史列傳至此通為一大節以此數語總結之按此亦截講格前論統名兼二體言後論篇帙題名專主紀傳體言就中列傳名類煩多分條抽論尤所加意假號不臣都歸載記史通殊有理據但陳項輩流於勝國為冦於興代則非擬諸劉石未便同科况載記例載卷終而羣雄先事發難為我驅除列之傳首於分非越故李密王世充韓林兒徐夀輝等唐書明史並襲蘭臺不宗東觀也讀者於此宜審從違又桞州有言每讀古人一傳數紙已後再三申卷復觀姓氏旋又廢失鈍器正多患此題目加詳宜勿深責也自餘皆定判矣此上八篇大抵多就紀傳體抽論可以都為一帙後有序傳篇在第九卷方以類聚亦應移置於此何之元劉璠何之元撰梁典見左傳家周書劉璠字寶義世宗初掌綸誥著梁典三十卷魚豢外篇正史篇魏時京兆魚豢私撰魏略事止明帝唐志雜史類魚豢魏略五十卷按三國魏志無傳姚察陳書察字伯審有至性領著作撰梁陳史未畢功隋開皇時遣內史舍人虞世基索本且進上有所闕者臨亡之時以體例誡約子思亷博訪續撰按史無梁略之名而劉氏云爾定是察藁初名外戚命章按史記之立外戚世家其中所載實皆后妃氏諱及其事蹟至如魏其武安之屬反别立傳不以外戚名篇最為非體班史因之易名外戚列傳置在臣傳之後尤為失之文亦應加并糾班失之語平林下江後漢劉𤣥傳王莽末新市人王匡王鳳為渠帥諸亡命馬武王常成丹等從之藏於緑林中地皇三年大疫分散常丹西入南郡號下江兵匡鳳武及其支黨朱鮪張卬北入南陽號新市兵平林人陳牧廖湛復聚衆號平林兵以應之斷限第十二夫書之立約其來尚矣如尼父之定虞書也以舜為始而云粵若稽古帝堯丘明之傳魯史也以隱為先而云惠公元妃孟子此皆正其疆里開其首端因有沿革遂相交㸦事勢當然非為濫軼也釋篇首標義言代有定限但交關處須相涉耳過此已往可謂狂簡不知所裁者焉釋二句轉局夫一作又子曰不在其位不謀其政若漢書之立表志班傳除沿襲史記二三篇外皆無越限故單言表志其殆侵官離局或作扄者乎釋提出漢書斷限不清來斷代自班始故首及之考其濫觴所出起於司馬氏案馬記以史制名班書持漢標目史記者載數千年之事無所不容漢書者紀十二帝之時有限斯極固既分遷之記判其去取紀傳所存唯留漢日或作目非表志所録乃盡犧年舉一反三豈宜或作不誤若是膠柱調瑟不亦謬歟釋束班書引後史但固之踳駮既往不諫而後之作者咸習其迷一作途宋史則上括魏朝曹魏隋書則仰苞梁代求其所書之事得十一於千百一成其例莫之敢移永言其理可為歎息釋此言宋隋二志越限之非雖所侵無幾而例已不清矣當與正史篇互參此議彼叙此論限彼原史也而彼篇舉隋不舉宋合此可知史志無缺當魏武乘時撥亂電掃羣雄鋒鏑之一無之字下同所交網羅之所及者蓋唯二袁劉劉表吕而已若一作至舊訛作各進鴆行弒燃臍就戮總關王室謂漢不涉霸圖謂曹而陳夀國志引居傳首夫漢之一有有字下同董卓猶秦之趙髙昔車令中車府令之誅既不列於漢史何太師卓自為太師之斃遂獨刋於魏書乎兼復臧洪陶謙劉虞孫公孫瓉生於季末自相吞噬其於曹氏也非唯理異犬牙固亦事同風馬漢典所具而魏冊仍編豈非流宕忘歸迷而不悟者也釋此下就紀傳言董臧諸人魏志皆闌入傳首是更不明斷限者也亦有一代之史上下相交若已見它記則無宜重述故子嬰降沛其詳取驗於秦紀伯符孫䇿字死漢其事斷入於吳書沈録金行上羈劉主魏刋水運下列髙王唯蜀與齊各有國史越次而載孰曰攸冝釋此指沈約魏收二書言晉連蜀漢魏逮髙齊猶漢之前嬰後䇿耳約書無考如收之推隆獻武似作齊紀者然雖不别立篇目可以越限律之矣自五胡稱制四海殊宅江左既承正朔斥彼魏胡一作朝非胡兼五胡言也故氐羌有録索虜成傳魏本出於邊裔竊亦自號真君魏太武元太平真君其史黨附本朝思欲凌駕一作架前作遂乃南籠典午傳收東晉北吞諸僞胸奴羯徒河氐羌等比於羣盜盡入傳中但當有晉元明二帝之時中原秦氐符羌姚趙胸劉羯石之代並在魏前元氏膜拜稽首自同臣妾其時尚微而反列之於傳何厚顔之甚邪又張實李雄諸姓據有凉蜀其於魏也挍年則前後不接論地則參商有殊何預魏氏而橫加編載釋此痛斥魏書越載東晉及十六國也晚出稱尊跨壓往代徒增可醜夫尚書者七經之冠冕百氏之襟袖凡學者必先精此書次覽羣籍譬夫行不由徑作路字訓非所聞焉修國史者若旁采異聞用成博物斯則可矣如班書地里志首舊有遂字全寫禹貢一篇降為後書持續前史蓋以水濟水床上施床徒有其煩竟無其用豈非惑乎昔春秋諸國賦詩見意左氏所載唯録舊有其字章名如地理為書論自古風俗至於夏世宜云禹貢已詳何必重述古文益其辭費也釋復駮漢志地理全寫禹貢此更溢出斷限外矣故推類列後若夷狄本系四字截句舊作係非種落所興北貊起自淳維南蠻出於槃亦作盤瓠髙句麗以鱉橋獲濟吐谷渾因馬鬭徙居諸如此說一多者字求之歷代何書不有而作之一無之字者曾不知前撰已著一多而字後修宜輟遂乃百世相傳一字無改蓋駢指在手不加力於千鈞附贅居身非廣形於七尺為史之體有若於斯茍濫引它事豐其部帙以此稱博異乎吾黨一有之字所聞釋此更推到外域種系久載前史者後史不知裁限全録舊文尤為駢贅也陸士衡有云雖有愛而必捐語見文賦善㦲斯言可謂達作者之致矣夫能明彼斷限定其折中歷選自古唯蕭子顯近諸然必謂都無其纍則吾未之一無之字許也按國史紀傳為正紀傳斷代為正劉子頻頻提闡是其截斷衆流句故首於史記外别立漢書家此於條目後亟綴斷限篇也向者極表班書今者首糾越限向以標法式今為辨封畛有相濟無相背也評者云髙紀不書子嬰魏書不序髙歡未見其可此誤解也班書髙紀顯帶子嬰劉非不見劉但謂不復為嬰立紀耳魏收銓叙獻武崇飾其詞非所施於臣子劉氏以為幾同齊紀無復限制耳豈謂上下交涉處不須及之耶又有以董卓臧陶皆非與操無因而譏劉說為過者亦是誤解與前評正同盧循傳不入宋黃巢傳不入梁詎曰踈脫傳首董卓按魏志本傳居臣傳之首所叙事實無一語與魏武相及直至傕汜暹承附傳之末始有太祖乃迎天子都許之文是卓傳於魏未有處也宜史通訾之臧陶劉孫魏志臧洪傳洪字子源廣陵人太守張超請洪為功曹董卓圖危社稷洪說超糾合義兵辭氣慷慨洪為東郡太守太祖圍張超於雍丘洪徒跣從袁紹請兵救超紹不聼超滅洪怨紹紹興兵圍之生執洪殺之劉謙傳謙字恭祖丹陽人為徐州刺史刑政失和太祖征謙以糧少引軍還謙病死公孫瓚傳瓚字伯圭遼西人除遼東屬國長史遷涿令遼西烏丸丘力居等叛瓚不能禦朝議以宗正劉虞為幽州牧丘力居等遣譯自歸瓚害虞有功稍相恨望天子遣段訓增虞邑督六州瓚誣虞欲稱尊號脅訓斬虞虞從事鮮于輔等欲報瓚袁紹又遣兵與輔合擊瓚瓚軍數敗乃為塹十重築京為樓其上紹悉軍圍之瓚自殺按此諸人范史自應有傳魏志但於事有關涉處帶及數語足矣安用傳為沈録金行梁沈約傳著晉書百一十卷隋志晉史草注梁有鄭忠晉書七卷沈約晉書一百一十一卷庾銑東晉新書七卷並亡晉五行志白者金行馬者國族文選陸士衡宣猷堂詩云黃暉既渝素靈承祜善注魏土德曰黃晉金行曰素程猗說石圖曰金者晉之行也魏刋水運魏謂魏收魏書律歷志以皇魏運水德所上九家共成一歷元起壬子律起黃鍾壬子北方水之正位實符魏德典午蜀志譙周傳典午忽兮月酉沒兮典午謂司馬也膜拜穆天子傳膜拜而受注長跪拜也又注胡人禮佛交手稱南謨者即此挍年論地甲子㑹紀晉惠帝之十一年流人李特據廣漢進攻成都十三年羅尚破李特斬之子雄僣號稱成是後兄子班班弟期雄弟夀夀子勢桓溫入蜀勢降李氏亡實穆帝之三年又愍帝之二年張軌為凉州牧卒時在州已十三年矣子實嗣是為前凉嗣是實弟茂實子駿駿子重華華子耀靈靈伯父祚靈弟𤣥靚至靚叔天錫降於秦前凉亡實孝武之四年按張李興滅並在魏道武未稱帝之前而魏都平城又極東北所謂挍年不接論地有殊也行不由徑用列子語注見雜說上篇淳維史記胸奴傳胸奴其先夏后氏之苗裔也曰淳維漢書胸奴傳全録其文槃瓠後漢南蠻傳昔髙辛氏有犬戎之冦募能得犬戎之將吳將軍頭者妻以少女時有畜狗名曰槃瓠下令之後槃瓠遂銜人頭造闕下乃吳將軍首也帝不得已以女配槃瓠槃瓠負而走入南山止石室中生子六男六女因自相夫妻其後滋蔓號曰蠻夷今長沙武陵蠻是也南史蠻傳亦云槃瓠種落路史發揮伯益經云黃帝曾孫卞明生白犬是為蠻祖白犬乃其子之名而應劭干寶范曄枝葉其說鱉橋魏書髙句麗傳先祖朱蒙母河伯女夫餘王閉於室中為日所照孕生一卵母置暖處一男破殼而出及長字之曰朱蒙朱蒙者善射也夫餘之臣謀殺之朱蒙東南走道遇大水魚鱉並浮成橋得渡至紇升骨城居焉號曰髙句麗因以為氏隋書髙麗傳文略同馬鬭魏書吐谷渾傳遼東鮮卑涉歸一名奕洛韓有二子庶長曰吐谷渾少曰若洛廆若洛廆别為慕容氏渾與廆二部馬鬬相傷廆怒渾曰馬畜也鬬在馬而怒及人邪乖别甚易今當去汝萬里之外按其文亦見宋書至唐編晉書復採用之斷限晉賈充傳朝廷議立晉書限斷荀朂謂宜以魏正始起年王瓚欲引嘉平以下朝臣盡入晉史賈謐請從泰初為斷事下三府議按限斷即斷限也二字見史傳始此編次第十三昔尚書記言春秋記事以日月為逺近年世為前後用使閲之者雁行魚貫皎然可尋釋首借編年託起紀傳言其體本無越次可置勿論也至馬遷始錯綜成篇區分類聚班固踵武仍加祖述於其間則有統體不一名目相違朱紫以之混淆冠履於焉顛倒蓋可得而言者矣釋紀傳則體例條分編次冝求整確矣此是總挈尋子長之列傳也其所編者唯人而已矣至於龜策異物不類肖形而輒與黔首同科俱謂之傳不其怪乎且龜䇲所記全為志體向若與八書齊列而定以書名庶幾物得其朋同聲相應者矣釋一條言史記龜䇲是志體宜歸書例不宜入傳例孟堅每一姓有傳多附出一作出附餘親一訛作觀其事跡尤異者則分入它部故博陸去病昆弟非復一篇外戚元后婦姑分為二録至如元王髙祖從弟交受封於楚至孫戊而亡案其行事所載甚寡而能獨載疑當作成一卷者實由向歆之助耳但交封漢始地唘列藩向居劉末職才卿士昭穆既踈家國又别適使分楚王子孫於髙惠之世與荆髙祖從父兄代當作趙髙祖子並編析劉向父子於元成之間與王王吉京京房共列方於諸傳不亦類乎釋一條言班史附向歆於楚元王傳代不相接封不相襲冝以類離立又自古王室雖微天命未改故臺名逃責古通債尚曰一作書周王君未繫頸且云秦國况神璽在握火德猶存而居攝王莽年建年不編平紀之末孺子主祭咸書莽傳之中遂令漢餘數歲湮沒無睹求之正朔不亦厚誣釋一條言莽元冝革而班史莽傳竟紀莽年其失甚矣當漢氏之中興也更始升壇改元寒暑三易世祖稱臣北靣誠節不虧既而兵敗長安祚歸髙邑兄亡亡謂失位弟及歷數相承作者乃抑聖公於傳內登文叔於紀首事等躋僖位先不窋夫東觀秉筆容或諂於當時後來所修理當刋革者也釋一條言後漢中興更始先建位號冝紀不宜傳范史因仍不改蓋逐兔爭捷瞻烏靡定羣雄僣盜為我驅除是以史傳所分真僞有别陳勝項籍見編於髙祖之後隗囂孫公孫述不列於光武之前而陳夀蜀書首標二牧謂益州牧即焉璋也次列先主以繼焉璋豈以蜀是僞朝遂乃不遵恆例但鵬鷃一也何大小之異哉釋乃條言蜀志冝首紀先主而陳夀先以二牧比髙光為違例矣春秋嗣子諒暗未踰年而廢者既不成君故不别加篇目是以魯公十二惡視不預其流及秦之子嬰漢之昌邑咸亦因胡亥而得紀附孝昭而獲聞而吳均齊春秋乃以鬱林為紀事不師古何滋章之甚歟釋一條言嗣代之不君者不紀吳均紀鬱林可議觀梁唐二朝撰齊隋兩史東昏齊廢帝猶在而遽列和年煬帝未終而已編恭紀原其意㫖豈不以和為梁主所立恭乃唐氏所承所以黜永元東昏元而尊中興和帝元顯義寧恭帝元而隱大業煬帝元茍欲取恱當代遂乃輕侮前朝行之一時庶叶權道播之千載寧一作未為格言釋一條言齊隋二史阿狥興朝於前代末造私擁非立而沒舊君紀不以實也此下或分章另起尋夫本紀所書資傳乃顯一作列傳仍顯表志異體不必一誤作必不相涉舊史以表志之帙介於紀傳之間降及蔚宗肇加釐革沈魏繼作相與因循今止魏書志編傳後范沈二書後人易置矣既而子顯齊書頴達隋史不依范例重遵班法蓋擇善而行何有逺近聞義不徙是吾憂也釋一條言紀傳相接翻閲為便表志不妨次後史多不然已上分糾失冝凡八條若乃先黃老而後六經史記後外戚而先夷狄漢書老子與韓非並列史記賈詡將荀彧同編魏志孫𢎞公孫𢎞傳讃冝居武宣舊作宣武不合紀末宗廟迭毁枉入𤣥成傳終一作中並漢書如斯舛謬不可勝紀今略其尤甚者耳故不復一一而詳之釋末復撮舉以概未盡者按錯舉紀傳表志中離合收除諸義例比而論之茍非大段創通那能有此即事分撥鬱林固昌邑之續蕭鸞非博陸之倫而改元易歲亦與不盈月者有别斥之紀外論似未安若更始之於光武其直鈞入關先王上軼重瞳建號書年下殊二牧升傳作紀非瞽說也其說漢已有之張平子曰更始居位光武為其部將然後即真冝以更始之號建於光武之初也陳氏書録解題謂范曄後漢書志借舊志注補之其後紀傳孤行至本朝孫奭始議合之今觀蔚宗釐革之語知唐時舊本尚自合行但附置紀傳後耳不知何時析去再觀外篇正史篇云曄十志未成而死則此云蔚宗釐革者祗就現行范本指其位置如此勿泥作范自手定也陳氏說詳正史篇注篇尾公孫𤣥成傳議太板逃責帝王世紀赧王雖天子為諸侯所役逼負責於民無以得歸乃上臺避之故周人名曰逃責臺祚歸髙邑光武帝紀光武北擊尤耒大槍五幡於元氏進至安次諸將議上尊號行至鄗彊華自關中奉赤伏符曰劉秀發兵捕不道四夷雲集龍鬬野四七之際火為主羣臣因復奏受命之符光武於是設壇場於鄗南即皇帝位建元為建武改鄗為髙邑躋僖左文二年秋大事於太廟躋僖公逆祀也君子以為失禮子雖齊聖不先父食故禹不先鯀湯不先契文武不先不窋惡視左文十八文公二妃敬嬴生宣公敬嬴嬖而私事襄仲襄仲欲立之叔仲不可仲殺惡及視而立宣公書曰子卒諱之也夫人姜氏歸於齊大歸也將行哭而過市曰天乎仲為不道殺嫡立庶杜注惡太子視其母弟夫人姜氏惡視之母出姜也鬱林為紀南齊書紀鬱林王世祖武帝皇太孫也即位改元隆昌朞月之間恣意淫亂鎮軍蕭鸞定謀使蕭諶等領兵入宮輿接出西弄殺之鸞即明帝頴達隋史通志略唐貞觀中詔諸臣分修五代史顔師古孔頴達撰次隋事孫𢎞傳讚按公孫𢎞傳讚是時漢興六十餘載海內艾安羣士嚮慕漢之得人於兹為盛因歷舉公孫董兒等二十七人又云孝宣承統纂修洪業亦講論六藝招選茂異下復歷舉蕭梁􅉌夏侯等二十四人一讚之中盛稱二世人才故曰宜居武宣紀末𤣥成傳終韋賢傳本始三年代蔡義為丞相子𤣥成字少翁永光中代于定國為丞相封侯故國榮當世焉按本傳既畢歷述諸郡國所立太祖太宗世宗等廟罷毁詔議其文皆列侯中二千石博士等共議例當收載禮志中故曰枉入𤣥成傳終又按新唐書韋縚傳羅列一時朝士祭器喪服等議正仿𤣥成傳法也稱謂第十四孔子曰唯名不可以假人又曰名不正則言不順一衍云云二字必也正名乎是知名之折中君子所急况復列之篇籍傳之不朽者邪昔夫子修春秋吳楚稱王而仍舊曰子此則褒貶之大體為前修之楷式也釋首引聖經為慎重名稱之證馬遷撰史記項羽僭盜而紀之曰王此則真僞莫分為後來所惑者也自兹已降訛謬相因名諱所施輕重莫等至如更始中興漢室光武所臣雖事業不成而歷數終在班范二史皆以劉𤣥為目不其慢乎釋類舉二事皆旋起旋滅者其文從略古者二國爭盟晉楚並稱侯伯七雄力戰齊秦俱曰帝王其間雖勝負有殊大小不類未聞勢窮者即為匹庶力屈者乃成冦賊也一脫也字至於近古則不然當漢氏云亡天下鼎峙論王道則曹逆而劉順語國祚則魏促而吳長但以地處函夏人傳正朔度長潔短魏實居多二方之於上國或作若方之於七國非亦猶秦繆楚莊與文襄比魏於晉宋而並霸原注蜀昭烈主可比秦繆公吳大帝可比楚莊王按以中原西東所據之地為比逮作者之書事也乃沒吳蜀號諡呼權備姓名原注謂魚豢孫盛等方於魏邦懸隔頓爾懲惡勸善其義安歸釋此論三國舊史之稱謂憑地勢而蔑統祚最為顛倒續以金行版蕩戎羯稱制統言五胡各有國家實同王者晉世臣子黨附君親嫉彼亂華比諸羣盜此皆茍狥私忿忘夫至公自非坦懷愛憎無以定其得失至蕭方等始存諸國名諡僭帝者皆稱之以王此則趙猶人君武靈王加以主一作王非號把用夷禮貶同子爵變通其理事在合宜小道可觀見於蕭氏者矣釋此論晉淪中夏諸戎迭興作史者凖胡服用夷之趙杞存其國諡可也而竟等萑苻亦非得實古者天子廟號祖有功而宗有德始自三代迄於兩漢名實相允今古共傳降及曹氏祖名多濫必無慙德猶言必欲加之其唯武王謂廟號止可及操故陳夀國志獨呼武曰祖至於文明但稱帝而已自晉已還竊號者非一如成舊作康非穆兩帝劉蕭二明或作朝誤梁簡文兄弟原注兼言孝元帝也齊北齊武成昆季原注兼文宣孝昭也斯或承家之僻王或亡國之庸主不諡靈繆為幸已多猶曰祖宗孰云其可而史臣載削曽無辨明每有所書必存廟號何以申勸沮之義杜渝一作偷濫之源者乎釋此論祖宗二字最為隆號相仍嗣世古不虛尊魏晉而下渝濫已極持論不磨又位乃人臣跡參王者如周之亶父季歷晉之仲達師昭追尊建名比諸天子可也必若當塗曹魏所出宦官攜養帝號徒加人望不愜故國志所録無異匹夫應書其人直云皇之祖考而已至如元氏元魏起於邉一作沙朔其君乃一部之酋長耳道武追崇所及凡二十八君自開闢已來未之有也而魏書序紀首卷篇名襲其虛號生則一少則字下同謂之帝死則謂之崩何異沐猴而冠腐鼠稱璞者矣釋此論開國追尊號諡丗數有紀世類必稽無若二魏之妄而過制者法在必斥前節以廟號言此節以諡號言勿混夫歷觀自古稱謂不同緣情而作本無定準至若諸侯無諡者戰國已上謂之今王天子見黜者漢魏已後謂之少帝周衰有共和之相楚弒舊作煞有郟敖之主趙他而曰尉他英布而曰黥布豪傑則平林新市冦賊則黃巾巨鹿張角赤眉琅邪樊崇等園綺友朋共云四皓奮建父子都稱萬石凡此諸名今本失此四字皆出舊多於字當代史臣編録無復張弛蓋取叶隨時不藉稽古及後來作者一作所作頗慕一作纂斯流亦時採新名列一作務成篇題原注音第若王晉王隱晉書之十士寒俊沈宋沈約宋書之二凶索虜即其事也唯魏收逺不師古近非因俗自我作故無所憲章其撰魏一脫魏字書也乃以平陽王為出帝魏孝武西入關依宇文故司馬氏為僭晉桓劉已下通曰島夷夫以諂齊則輕抑關右宇文黨魏則深誣江外即晉宋愛憎出於方寸與奪由其筆端語必不經名惟駭物昔漢世原涉大修墳墓乃開道立表署曰南陽阡欲以繼跡京兆齊聲曹尹一誤作伊而人莫之肯從但云原氏阡而已故知事非允當難以遵行如收之茍立詭名不依故實雖一訛作難復刋諸竹帛終罕一作靡傳於諷誦也釋此論前史雜出名稱皆本當時口語筆之史乘正復多姿若北魏之指斥矯誣真成惡札矣抑又聞之帝王受命歷數相承雖舊君已沒而致敬無改豈可等之凡庶便書之以名者乎近代文章實同兒戲有天子而稱諱者若姬滿劉莊漢明帝之類是也有匹夫而不名者若步兵彭澤之類是也史論立言理當雅正如班述班史名贊為述之叙聖卿董賢也而曰董公惟亮范贊之言季孟隗囂也至一訛止一脫去曰隗王得士習談漢主則謂昭烈為𤣥德原注習氏漢晉春秋以蜀為正統其編目叙事皆謂蜀先主為昭烈皇帝至於論中語則呼為𤣥德裴引魏室則目文帝為曹丕夫以淫董賢亂隗囂之臣忽一作總隱其諱正朔之后反一作乃呼其名意好竒而輒為文逐韻而便作原注班固哀紀述曰宛孌董公惟亮天功隗囂公孫述傳贊曰公孫習吏隗王得士按公功吏士皆逐韻也用捨之道其例無恆但近代為史通多此失上才猶且一作其若是而况中庸者乎今略舉一隅以存標格云爾釋末言諱名書名尊卑分定作文作史寬嚴法殊因約舉混稱用垂標準此條附及按篇內所詳凡五項一斥魚孫三國名備名權也一辨志十六國直書為盜也一議晉後嗣世概加廟號也一譏二魏開國追尊可笑也一鄙收書題目創名駴見也其前後二條乃帶及之承祚志蜀實用紀體二主皆不書名志吳則堅策以後仍書名斟酌權宜愈於魚豢輩逺矣傳曰至敬無文至文尚質禮祖有功而宗有德古之制也漢不虛尊晉加彌廣由唐而來廟冠諡前遂為世典禮時為上母亦質文之流於既溢者歟稱祖稱宗一節可作廟諡議懸之冊府蕭方等隋唐二志蕭方三十國春秋三十卷按二志誤削等字辨詳雜說中篇趙君主號甲子㑹紀周顯王之季韓燕皆稱王趙武靈獨不肯令人謂己曰君赧王時趙武靈胡服招騎射尋廢其太子章而傳位少子自號主父把夷子爵事在左傳僖二十七年注見惑經篇成穆兩帝晉成帝紀成皇帝諱衍明帝長子也廟號顯宗史臣曰成帝政出渭陽聲乖威服凶徒既縱神器阽危穆帝紀穆皇帝諱聃康帝子也廟號孝宗史臣曰孝宗因襁抱之姿用母氏之化中外無事十有餘年按康帝史無廟號故舊本作康穆者非劉蕭二明南史宋明帝紀太祖明皇帝諱彧文帝第十一子也末年好鬼神多忌諱殿內埋錢以為私藏天下騷然宋氏之業自此衰矣齊明帝紀髙宗明皇帝諱鸞始安王道生之子也性猜忌亟行誅戮簡於出入將南則詭言北皆不以實竟不南郊當塗史記建元以來矦者年表當塗魏不害以捕淮陽反者侯後漢袁術傳䜟書言代漢者當塗髙又獻帝時李雲言許昌氣見於當塗髙象魏者兩闕也當塗而髙者魏魏當代漢宦官攜飬袁紹討曹檄司空曹操祖父騰故中常侍與左悺徐璜並作妖孽父嵩乞丐攜養輸貨權門竊盜鼎司傾覆重器操姦閹遺醜本無令德僄狡鋒俠好亂樂禍腐鼠稱璞戰國秦䇿應侯曰鄭人謂未理者璞周人謂鼠未臘者朴周人懷朴過鄭賈曰欲買朴乎鄭賈曰欲之出其朴乃鼠也共和史記周本紀厲王出奔於彘周公召公二相行政號曰共和注正義共音巨用反漢書人表共伯和師古注共國名也伯爵也和共伯之名也共音恭按是說本之汲冡紀年郟敖左昭元年楚公子圍將聘於鄭未出竟聞王有疾而還入問王疾縊而殺之葬王於郟謂之郟敖杜注郟敖楚子麇按麇史記楚世家作貟音雲十士寒俊按文與二凶索虜對舉亦列傳中之篇名也王隱晉書已亡無可考證平陽王魏書帝紀出帝諱修封平陽王齊獻武奉王即帝位三年帝為斛斯椿等諂佞間阻二於齊託討蕭衍盛暑徴發天下怪惡之七月遂出於長安十二月為宇文黑獺所害周文帝紀魏孝武帝將圖齊神武詔太祖為大都督深仗太祖七月丁未遂從洛陽率輕騎入關太祖奉迎謁見東陽驛按以孝武為出帝魏收目之云爾原氏阡漢逰俠傳原涉字巨先涉父哀帝時為南陽太守父死行喪冡廬初京兆尹曹氏葬茂陵民謂其道為京兆阡涉慕之乃買地開道立表署曰南陽阡人不肯從謂之原氏阡按阡通阡史通通釋卷四
