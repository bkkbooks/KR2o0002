body:
  text: 史通通釋卷十四無錫浦起龍撰外篇申左第四郭本序與文作兩片最合諸本橫分皆非古之人言春秋三傳者多矣戰國之世其事罕聞當前漢當有之初二字專用公羊宣皇己降穀梁又立於學至武帝世劉歆始重左氏而竟一作書不列學官釋首原三傳行世獨左氏最後大扺自古重兩傳而輕左氏者固非一家美左氏而譏一作議兩傳者亦非一族互相攻擊各用一作自朋黨哤聒舊作籠䀨或作聒籠並訛紛競是非莫分然則儒者之學茍以專精為主止舊作至誤於治章句通訓釋斯則可矣一作也至一脫至字於論大體舉宏綱則言罕兼統理無要害故使今古疑一作凝滯莫得而申者焉釋次述論者之低昻以引下文必揚榷而論之言傳者固當以左氏為首釋此句揭出本指但自古學左氏者一無者字談之又不得其情如賈逵撰左氏長義稱在秦者為劉氏乃漢室所宜推先但取悅當時殊無足採又案桓談新論曰左氏傳於經猶衣之表裏而東觀漢記陳元奏云光武興立左氏而桓談衛宏並共詆一作毁訾故中道而廢班固藝文志云丘明與孔子觀魯史記而作春秋有所貶損事形於傳懼罹時難故隱其書一有為字末世口説流行遂有公羊穀梁鄒氏夾氏諸傳而於固集復有難左氏九條三評等科釋自但自古至此證舉諸家評論紛競如此夫以一家之言一人之説而參差相背前後不同斯又或訛文不足觀也釋繳過評左諸説夫解難者以理為本如理有所闕欲令有識心伏不亦難乎今聊次其所一無所字疑列之於後釋結到申左本旨按此是總序哤聒蜀都賦喧譁鼎沸則哤聒宇宙善注管子曰雜處則其言哤説文曰聒歡言也左氏長義隋經籍志春秋左氏長義二十卷後漢侍中賈逵章句又本傳肅宗特好左氏傳詔逵出左氏大義長於二傳者逵摘出三十事又云五經皆無證圖讖明劉氏為堯後者而左氏獨有明文在秦為劉氏按左文十三士會自秦歸於晉秦人歸其帑其處者為劉氏漢書髙紀贊晉史蔡墨言陶唐氏既衰其後有劉纍學擾龍事孔甲范氏其後也范氏為晉士師奔秦歸晉其處者為劉氏戰國時獲于魏秦滅魏遷大梁都于豐由是推之漢承堯運德祚己盛陳元後漢本傳元字長孫父欽習左氏春秋元少傳父業為之訓詁建武初議欲立左氏傳元詣闕上疏曰建立左氏解釋積結天下幸甚下其議諸儒歡譁左氏復廢蓋左氏之義有三長而二傳之義有五短釋二句提案春秋昭一有公字二年韓宣子來聘觀書於太史氏見魯春秋曰周禮盡在魯矣吾乃今知周公之德與周之所以王也然當有則字春秋之作始自姬旦成於仲尼丘明之傳所有筆削及發凡例皆得周典原注杜預釋例云公羊穀梁之論春秋皆因事以起問因問以辨義義之者曲以通無他凡例也左丘明則周禮以為本諸稱凡以發例者皆周公之舊制者也按此條缺三字諸本皆隨文連下或妄填别字今並作方空格後倣此傳孔子教故能成不刋之書著將來之法其長一也釋一長據韓宣聘語原本周禮立説又案哀三年魯司鐸火南宫敬叔命周人出御書句下并收子服景伯命宰人出禮書十字文義方足今脫其時於魯文籍最備丘明既躬為太史博總羣書至如檮杌紀年之流鄭書晉志之類凡此諸籍莫不畢覩其傳廣包他國每事皆詳其長二也釋二長據魯備文籍史官廣見立説論語子曰左丘明恥之某亦恥之夫以同聖之才而膺授經之託加以達者七十弟子三千逺自四方同在一國於是上詢夫子下訪其徒凡所採托實廣聞見其長三也釋三長據聖人稱許親從膺授立説如穀梁公羊者生於異國長自後來語地則與魯産舊誤作史相違論時則與宣尼不接安得以傳聞之説與親見者爭先者一無者字乎譬猶近世漢之太史晉之著作撰成國典時號正書舊誤作言既而先賢耆舊原注謂楚國先賢傳汝南先賢行狀益部耆舊傳襄陽耆舊傳等書語林世説競造異端強書他事夫以傳自委巷而將册府恐當用此二字舊作班馬無涉抗衡訪諸古老而與同時此二字舊作子孫更謬此皆版本糢糊後人妄填之過並列斯則難矣彼二傳之方左氏亦奚異於此哉其短一也釋一短以髙赤之生時地不如左氏為言按本節正與三長櫽括相對左氏述臧哀伯諌桓納鼎周內史美其讜言王子朝告于諸侯閔馬父嘉其此二字疑是加之二字之訛辨説凡如此類其數實多斯蓋當時發言形於翰墨立名不朽播於他邦而丘明仍其本語就加編次亦猶近代史記載樂毅李斯之文漢書録一脫録字朝錯賈生之筆尋其實也豈是子長藁一作筆削孟堅雌黃所構者哉觀二傳所載有異於此其録人言也語乃齟齬一作齷齪文皆璅碎夫如是者何哉蓋彼得史官之簡書此傳流俗之口説故使隆促各異豐儉不同其短二也釋二短以二傳載語得之傳聞不如左氏所載有內史馬父贊評為可徵信尋左氏載諸大夫詞令行人應答其文典而美其語博而奧原注如僖伯諌君觀魚富辰諌王納狄王孫勞楚而論九鼎季札觀樂而談國風其所援引皆據禮經之類是也述遠古則委曲如存原注如郯子聘魯言少昊以鳥名官季孫行父稱舜舉八元八凱魏絳答晉悼公引虞人之針子革諷楚靈王誦祈招之詩其事明白非是厚誣之類是也徵近代則循環可覆原注如吕相絶秦述兩國世隙聲子班荆稱楚材晉用晉士渥濁諌殺荀林父説文公敗楚於城獛有憂色子服景伯謂吳云楚圍宋易子而食析骸而㸑猶無城下之盟祝他稱踐土盟晉重耳魯申蔡甲午之類是也必料其功用厚薄指意一作措思深淺諒非經營草創出自一時琢磨潤色獨成一手斯蓋當時國史已有成文丘明但編而次之配經稱傳而行舊作已也如二傳者記言載事失彼菁華尋源討本取諸胸臆夫自我作故無所準繩故理甚迂僻言多鄙野比諸左氏不可同年其短三也釋三短以二傳載文出自胸臆不如左氏有源有委已上二節用意略同厯厯相衡比前已闢出議論矣猶未徵事舉義也案二傳雖以釋經為主其缺漏不可殫論如經云楚子麇卒此四字舊止一宇又誤作薨而左傳云公子圍所殺昭元及公穀舊止作公羊非作傳重一作不非述經文無所發明依違而已其短四也釋四短拈出事實以確稽局見為衡見二傳考事之踈略漢書載成方遂詐稱戾太子至於闕下雋不疑曰昔衛蒯瞶得罪於先君將入國太子輒拒而不納與漢書句稍異春秋是之遂命執以屬吏霍光由是始重儒學案雋生所引乃公羊正文如論語冉有曰夫子為衛君乎子貢曰夫子不為也何則父子爭國梟獍為曹禮法不容名教同嫉而公羊釋義反以衛輒為賢是違夫子之教失聖人之旨奬進惡徒疑誤後學其短五也釋五短拈出義例以後人用公羊決事為説見二傳研義之不精若以彼三長校兹五短勝負之理此下有闕文當補曰斷然可知釋此四句是繳上語蓋周禮之故事魯國之遺文夫子因而修之而以實録付之丘明用使善惡畢一作必彰真偽盡露向使孔經獨用左傳不作則當代行事安得而詳者哉蓋語曰仲尼修春秋逆臣賊子懼又曰春秋之義也欲蓋而彰求名而亡善人勸焉淫人懼焉尋原本此下有春秋所書實乖此義而九字肆筆拂經且自害志削之乃無語病左傳所録無愧斯言此則傳之與經其猶一體廢一不可相須而成如謂不然則何者稱為勸戒者哉原注杜預釋例曰凡諸侯無加民之惡而稱人以貶皆時之赴告欲重其罪以加民為辭國史承口以書於䇿而簡牘之記具存夫子因示虛實故左傳隨實而著本狀以明其得失也案杜氏此釋實得經傳之情者也儒者茍譏左氏作傳多敘經外别事如楚鄭與齊三國之賊弒一脫弒字隱桓昭哀通經後之傳為言然哀字終屬假借或誤作襄益非四君之篡逐其外則承告如彼其內則隱諱如此若無左氏立傳其事無由獲知然設使世人習春秋而唯取兩傳也則當其時二百四十年行事茫然闕如俾後來學者兀一作代成聾瞽者矣釋自尋斯義至此申透三傳之中専當用左之故也局至此截且當秦漢之世左氏未行遂使五經雜史百家諸子其言河漢無所遵憑釋此又是提筆更托他書合二傳博勘以相證明總見功髙於彼下分記事記時二證故其記事也當晉景行霸公室方強而云屠岸舊誤作韓氏攻趙有程嬰杵臼之事原注出史記趙世家魯侯禦宋得俊乘丘而云莊公敗績有馬驚流矢之禍按出檀弓原注失今補楚晉相遇唯在邲役而云二國交戰置師於兩棠一訛堂原注出賈誼新書子罕相國宋睦於晉而云晉將伐宋覘舊衍其字哭於陽門舊衍介夫乃止四字原注出禮記魯師滅項晉止僖公而云項實舊衍齊字桓舊衍所字滅春秋為賢者諱原注出公羊傳襄年再盟君臣和叶而云諸侯失政傳作正大夫皆執國權原注出穀梁傳釋已上六項徴記事其記時也蓋秦繆居春秋之始而云其女為荆平舊作昭誤夫人原注出列女傳韓魏處戰國之時而云其君陪楚莊舊衍王字葬馬原注出史記滑稽傳列子書論尼父而云生在鄭穆公之一無之字下同年原注出劉向七略按舊作七録非扁鵲醫療虢公而云時當趙簡子之日原注出史記扁鵲傳欒書仕於周子而云以晉文如獵犯顔直言原注出劉向新序荀息死於奚齊而云觀晉靈作臺纍碁申誡原注出劉向説苑釋已上六項徴記時通記事記時二扇扇各六條皆兩兩屬對其中衍字法在必除非任意裁削也順文讀去自知論章法此處當先著四語櫽括記事之淆訛與下四句今缺或以先為後或以後為先日月顛倒上下翻覆此四句只櫽括記時之淆訛可悟上片之缺古來君子曾無所疑及左傳既行而其失自顯語其𢎞益不亦多乎而世之學者猶未之悟所謂忘我大德日用而不知者焉釋推左氏為功之博至此繳如二傳之簡約焉能逮此乎以下總對二傳作束然自丘明之後迄于一作及魏滅年將千祀其書寢廢至晉太康年中汲冡獲書全同左氏原注汲冡所得書尋亦亡逸今惟紀年瑣語師春在焉案紀年瑣語載春秋時事多與左氏同師春多載春秋時筮者繇辭將左氏相挍遂無一字差舛故束晳云若使此書出於漢世劉歆不作五原太守矣於是摯虞束晳引其義以相明王接荀顗疑當作朂取其文以相證杜預申以注釋原注注謂注解釋謂釋例干寶藉為師範一訛作晉紀原注事具干寶晉紀敘例中由是世稱實録不復言非其書漸行物無異議釋然自丘明至此原左傳久晦而得顯故孔子曰吾志在春秋行在孝經於是授春秋於丘明授孝經於曾子史記云孔子西觀周室論史記舊聞次春秋七十子之徒口授其傳旨有或作所刺譏褒諱之文不可以書見也魯君子左丘明懼弟子人各異端失其真意故因孔氏史記具論其語成左氏春秋史記文在十二諸侯年表但與集中史公不見左傳之説不相照顧夫學者茍能徴此二説以考三傳亦足以定是非明真偽者矣何必觀汲冡而後信者乎從一作以此而言則三傳之優劣見矣釋末引孔語遷文仍歸到聖人傳授作結按局內兩層前專後廣所徴年事詳明大致皆與二傳對勘故申左者申左於髙赤非申左於聖經也莫誤會倫莫大於君臣父子禍莫大於子弒臣奪史通此處最喫緊故三國賊君而以疾赴則詰之再三衛輒拒父而以國據則衷之論語是持世大間是書訛句脫文羡字外篇較多如此篇其尤也評家訓家居然點句罔出疑情幾於沒文理懵字數者可異哉司鐸火哀三年司鐸火火踰公宫桓僖災救火者皆曰顧府南宫敬叔至命周人出御書俟于宫子服景伯至命宰人出禮書以待命授經之託後漢陳元傳議立左氏疏曰丘明至賢親受孔子公羊穀梁傳聞於後世周內史桓二年取郜大鼎於宋納于太廟非禮也臧哀伯諌云云周內史聞之曰臧孫達其有後於魯乎君違不忘諫之以德閔馬父昭二十二王子朝作亂二十六王子朝奔楚使告於諸侯云云閔馬父聞子朝之文辭曰文辭以行禮也無禮文辭何為自我作故外傳魯語哀薑至公使大夫宗婦覿用幣宗人夏父展曰非故也公曰君作故韋注言君所作則為故事按此故字所本集中此語屢見有作古者傳訛之於最後句補注之公榖依違左昭元經楚子麋卒傳楚公子圍聞王有疾入問疾縊而弒之葬王於郟謂之郟敖公榖經楚子卷卒俱無傳不見弒殺之文故曰依違也二傳注卷音權左傳作麇成方遂漢雋不疑傳不疑字曼倩始元五年有一男子乘黃犢車建黃旐衣黃襜䄖著黃冒詣北闕自謂衛太子詔雜識視京兆尹不疑叱收縛曰昔蒯聵云云廷尉驗治竟得姦詐本姓成名方遂居湖以卜筮為事有故太子舍人嘗從卜謂曰子狀似衛太子方遂心利其言即詐自稱坐要斬雋引公羊公羊哀二輒者曷為者也蒯聵之子也輒之義可以立乎曰可不以父命辭王父命以王父命辭父命是父之行乎子也不以家事辭王事以王事辭家事是上之行乎下也按其義與夫子不為必也正名相違反其言河漢莊子逍遙逰吾聞言於接輿吾驚怖其言猶河漢而無極也晉霸屠岸此言國未失霸不應有權臣擅攻事也宣十二晉荀林父帥師及楚戰於邲敗績歸請死士貞子曰林父社稷之衛也其敗何損晉侯使復其位杜注言晉景所以不失霸按是歲晉景公三年也擅史記趙丗家晉景公之三年大夫屠岸賈不請而攻趙氏於下宫殺趙朔滅其族朔妻成公娣走公宫生男賈聞之索於宫中不得程嬰公孫杵臼謀匿趙孤魯俊馬驚此言戰方獲俊不應有馬驚敗績事也莊十齊師宋師次于郎公子偃曰宋師不整蒙臯比而先犯之公從之大敗宋師於乘立齊師乃還又十二傳凡師得俊曰克檀弓魯莊公及宋人戰于乘丘縣賁父御馬驚敗繢遂死之圉人浴馬有流矢在白肉遇邲兩棠此就邲戰一事而言見書地多訛也邲遇邲即前宣十二年晉楚戰事杜注鄭地按今開封府鄭州東有地名邲城是宋新書先醒篇昔楚莊王即位自靜三年以講得失鄭無道莊王圍宋伐鄭鄭伯肉袒牽羊奉簮而獻國莊王曰非利之也弗受乃南與晉人戰於兩棠大克晉人按地或有兩名者但晉鄭在北乃反云南失之遠矣睦晉覘哭此據弭兵修睦之文見覘伐非情也於襄二十七宋向戌善於趙文子又善令尹子文欲弭諸侯之兵以為名如晉告趙孟韓宣子曰兵民之殘也將或弭之必許之按是時宋子罕方為司城人禮檀弓陽門之介夫死司城子罕入而哭之哀晉之覘宋者反報於晉侯曰民悅殆不可伐也滅項為諱此則魯滅齊滅之異其文有僖十六會於淮十七滅項淮之會公諸侯之事未歸而取項齊人以為討而止公諱公羊傳孰滅之齊滅之曷為不言齊滅之為桓公也春秋為賢者諱此滅人之國何賢爾君子之惡惡也疾始善善也樂終桓公嘗有繼絶存亡之功故君子為之諱也再盟失政此則繼霸失政之岐其説盟襄三夏盟于長樗又單頃公及諸侯于雞澤陳成公使袁僑如會諸侯之大夫及陳袁僑盟陳請服也按時則晉悼方繼霸為盟主榖梁傳諸侯盟又大夫相與私盟是大夫張也故雞澤之會諸侯始失正矣大夫執國權秦穆荆平此言一前一後年不相及伯僖十三晉乞糴於秦十五晉侯與秦戰於韓原文三秦伯伐晉遂霸西戎用孟明也按秦穆見春秋魯僖文之交列女傳伯嬴者秦穆公之女楚平王之夫人昭王之母也昭王時吳入郢王亡吳盡妻其后宫伯嬴持刀曰諸侯外淫者絶卿大夫放士庶人宫割妾以死守欲為樂而妾死何益吳王慙遂退舍按秦女即楚平為太子建取而自取者事去秦穆時逾百年矣韓魏楚莊此言一後一前事不相及貪按左傳盡魯悼之四年其文云知伯而愎韓魏反而喪之是先事究言之文死滑稽傳優孟者故楚之樂人也楚莊王有所愛馬欲以大夫禮葬之優孟曰薄請以人君禮葬之齊趙陪位於前韓魏翼衛其後裴駰注楚莊時未有韓魏趙三國列子鄭穆此言列生於尼父後稱鄭穆年非也公哀十六夏四月己丑孔某卒注魯襄二十二年至今七十三也列子天瑞篇孔子見榮啓期行乎郕之野鹿裘帶索鼓琴而歌又有仲尼名篇蓋其書舉孔子者非一者劉向諸子略所挍列子定著八篇皆殺青書列子鄭人也與鄭繆公同時蓋有道者也按左傳穆公有疾刈蘭而卒在宣三年又五十五年始有孔子豈書稱孔子者人反在前乎虢公簡子此言虢亡於趙簡前活太子事妄也月僖五晉侯復假道於虞以伐虢十二丙子朔晉滅虢春秋諸國興廢説虞虢紀不録俱早亡扁鵲傳趙簡子疾五日不知人召扁鵲扁鵲入視病出曰血脈治也居二日半簡子寤其後過虢虢太子死扁鵲曰臣能生之虢君聞之出曰幸而舉之扁鵲厲針砥石以取外三陽五會太子蘇按簡子趙鞅也春秋定哀間人于時虢亡久矣欒書晉文此言本國後世之臣誤移前世也侵成四晉欒書將中軍六年欒書救鄭蔡楚救蔡趙同趙括欲戰請於武子注武子欒書按在晉景年新序雜事晉文公逐麋而失之問於農夫老古老古曰一不意人君如此也君放不歸人將君之文公恐歸遇欒武子武子曰獵得獸乎曰得善言曰取人之善而棄其身盜也文公還載老古與俱歸按文公景公之祖荀息晉靈此言本國前代之臣誤移後代也里僖九晉獻公使荀息傅奚齊及公卒克殺奚齊于次又殺公子卓于朝荀息死之上文選西征賦注説苑云晉靈公造九層之臺孫息書求見曰臣能纍十二博碁加九雞子其上公曰危哉息曰復有危於此者公即壞九層之臺按孫息即荀息避宣帝諱改孫也又按今本説苑無此條史云知幾子貺著續説苑廣向所遺而刋落怪妄今豈其刋本邪又曽鞏序更有不全之説見雜説下注晉世家靈公獻公曽孫汲冡書見春秋家又晉束晳傳太康二年汲郡人不準盜發魏襄王墓或言安釐王冡得竹書數十車其紀年十三篇記夏以來至周幽王為犬戎所滅以事接之三家分仍述魏事至安釐王之二十年蓋魏國之史書大略與春秋皆多相應其中經傳大異則云夏年多殷益千啔位啔殺之太甲殺伊尹文丁殺季歷自周受命至穆王百年非穆王夀百年也幽王既亡有共伯和者攝行天子事非二相共和也其易經二篇與周易上下經同易繇隂陽卦二篇與周易略同繇辭則異卦下易經一篇似説卦而異公孫假二篇公孫假與邵涉論易國語三篇言楚晉事名三篇似禮記又似爾雅論語師春一篇書左傳諸卜筮師春似是造書者姓名也瑣語十一篇諸國卜夢妖怪相書也梁丘藏一篇先敘魏之世數次言丘藏金玉事繳書二篇論弋射法生封一篇帝王所封大歷二篇鄒子談天類也穆天子傳五篇言周穆遊行四海見帝臺西王母圖詩一篇晝贊之屬也又雜書十九篇周食田法周書論楚事周穆王美人盛姫死大凡七十五篇七篇簡書折壞不識名題冡中又得銅劍一枚長二尺五寸漆書科斗字初發冡者燒䇿照取寶物及官收之多燼簡斷札文既殘缺不復詮次武帝取其書付祕書校綴次第尋考指歸而以今文寫之晳在著作得觀竹書隨疑分釋皆有義證劉歆作五原守楚元王傳歆以為左丘明親見夫子而公羊榖梁在七十子後傳聞之與親見詳略不同欲建立左氏春秋哀帝令與五經博士講論博士不肯置對歆移書讓之諸儒皆怨訕歆懼誅求出補吏乃守五原王接荀顗晉王接傳接字祖遊時祕書丞衛恆考正汲冡書未訖束晳述而成之陳留王庭堅難之散騎潘滔謂接曰卿足解二子之紛接遂詳其得失摯虞謝衡皆博物多聞咸以為允當又荀朂傳朂字公曽漢司空爽孫也時得汲冡中古文竹書詔朂撰次之以為中經按荀顗傳中無汲冡書語志在春秋四句公羊何序昔者孔子有云吾志在春秋行在孝經疏案孝經鈎命決云孔子在庶德無所施功無所就志在云云又疏孝經説云孔子曰春秋屬商孝經屬參困學紀聞中庸鄭注云大經春秋也大本孝經也泥於緯書其説疏矣史通通釋卷十四
