body:
  text: 史通通釋卷二十無錫浦起龍撰外篇暗惑第十一十四條前後有序䟦夫人識有不燭神有不明則真偽莫分邪正靡别昔人一無人字有以髪繞炙誤其國君者有置毒於胙誣其太子者一有矣字夫髪經炎一作炙炭必致焚灼毒味經時無復殺害而行之者偽成其事受之者信以為然故使見咎一時取怨千載夫史傳叙事亦多如此其有道理難憑欺誣可見如古來學者莫覺其非葢往往有焉今聊舉一二加以駮難列之如左按全書糾繆率皆顯跡兹又摘諸習相傳而習不加察者糾之故以暗惑名篇篇序指明其義大致頗似風俗通過譽等篇髪繞炙王訓故韓非子文公之時宰臣上炙而髪繞之文公召宰夫而譙之宰夫頓首再拜曰奉熾鑪炭火盡赤紅炙熟而髪不焦臣之罪也堂下得㣲有嫉臣者乎公乃召堂下而譙之果然毒胙左禧四晉太子申生祭于曲沃歸胙于公公田置之宫六日公至毒而獻之公祭之地地墳與犬犬斃與小臣小臣亦斃姬泣曰賊由太子杜注毒酒經宿輙敗而經六日明公之惑史記本紀曰瞽叟使舜穿井為匿空旁出瞽叟與象共下土實井瞽叟象喜以舜為已死象乃止舜宫難曰夫杳冥不測變化無恒兵革所不能傷網羅所不能制若左慈易質為羊劉根竄形入壁是也時無可移禍有一作所必至雖大聖所不能免若姬伯拘於羑里孔父阨於陳蔡是也然俗之愚者皆謂彼幻化是為聖人豈知聖人智周萬物才兼百行若斯而已與夫方内之士有何異哉如史記云重華入於井中匿空出去此則其意以舜是左慈劉根之類非姬伯孔父之徒茍識事如斯難以語夫聖道矣且案太史公云舊脱云字黄帝堯舜軼事時時見於他説余擇其言尤雅者著為本紀書首若如向之所述豈可謂之一無之字雅邪按此事由孟子不置深辨唯借其憂喜之端指與親愛之本史家採取雜説據謂其事實然得史通刋正可補孟義匿空旁出本紀注正義曰言舜潛匿穿空旁從他井而出也括地志云舜井在媯州懐戎縣西外城其西又有一井耆舊傳云並舜井也舜自中出按此等皆出傅㑹左慈易質見採撰篇劉根竄形後漢方術傳劉根隠嵩山諸好事者就根學道太守史祈以根為妖妄收執詣郡根曰實無它異頗能令人見鬼祈曰促召之根於是左顧而嘯有頃祈之亡父祖近親皆返縳向根叩頭曰小兒無狀祈驚懼悲哀頓首流血根嘿而不應忽然俱去不知在所又舊本自此以下節首並有又字一本皆無今從舊本史記滑稽傳孫叔敖為楚相楚王以霸病死居數年其子窮困負薪優孟即為孫叔敖衣冠抵掌談語嵗餘象孫叔敖楚王及左右不能别也莊王置酒優孟為夀王大驚以為孫叔敖復生欲以為相難曰葢語有之人心不同有如其面故窊舊作窳隆異等修短殊姿皆禀之自然得諸造化非由倣效俾有遷革著想滯如優孟之象孫叔敖也衣冠談説容或亂真眉目口鼻如何取類而楚王與其左右曾無疑惑者邪一作也昔陳焦既亡累年吴志亦作六日而活秦諜從縊六日而蘇顧或譌須一改遂使竹帛顯書古今或作今古稱怪况叔敖之歿時日已久楚王必謂其復生也先當詰其枯骸再肉所由闔棺重開所以又是滯語豈有片言不接一見無疑遽欲加以寵榮復其禄位此乃類夢中行事豈人倫所為者哉按此滑稽耳駮語黏埴可以失笑然謂子元䥘卻不錯覆思叙優孟事落第二手决不一直當真况國史更非遊戯事也優孟本傳優孟者故楚之樂人也多辯常以談笑諷諌楚相孫叔敖知其賢人也善待之病且死云云按節首二句小異其文陳焦三國吳志孫休永安四年安吳民陳焦死埋之六日更生穿土中出秦諜左宣八白狄及晉平夏㑹晉伐秦晉人獲秦諜殺之綘市六日而蘇又史記田敬仲世家曰田常成子以大斗出貸以小斗收齊人歌之曰嫗乎采芑歸乎田成子難曰夫人既從物故然後加以易名田常見存而遽呼以謚此之不實明一作昭然可知又案左氏傳石碏曰陳桓公方有寵於王論語陳司敗問孔子昭公知禮乎同史記文史記家令説太上皇曰髙祖雖子人主也諸如此説其例皆同然而事由過誤易為筆削若田氏世家之論成子也乃結以韻語纂成歌詞欲加刋正無可釐革故獨舉其失以為標冠云按民謡或預兆謚成耶郭評云陳司敗問昭公時當在定哀之世記者舉謚非誤也子元摘之非是餘所摘皆是此類秦前漢初多有李本寜乃謂公子遂生而賜氏烏知此謚非此類咦弄巧成拙奚自首眼不見史記為一笑田常成子田齊世家陳敬仲之如齊以陳字為田氏五世孫田釐子乞事齊景公其收賦稅於民以小斗受之予民以大斗由是田氏得齊衆心宗族益彊乞卒子常代立是為田成子齊簡公立田常修釐子之政齊人歌之云云常卒謚為成子按史綴後句尤露破綻陳桓髙祖陳桓公句見左傳隠四年髙祖雖子見史記髙紀又史記仲尼弟子列傳曰孔子既歿有若狀似孔子弟子相與共立為師師一作事之如夫子他日弟子進問曰昔夫子當舊作嘗行使弟子持雨具已而果雨商瞿年一脱年字長無子母為此二字一作欲更取室孔子曰瞿年四十後當有五丈夫子已而果然敢問夫子何以知此舊作之有若嘿然無史有以字應弟子起曰有子一作若避史有之字斷句此非子之坐也難曰孔門弟子七十二人柴愚參魯宰言游學俗作宰我言語誤師商可方回賜非俗誤作之類此並聖人品藻優劣已詳門徒商㩁臧否又定如有若者名不𨽻於四科譽無偕於十喆同哲逮尼父既歿方取為師以不荅所問始令避坐同稱達者何見事之晚乎且退老西河取疑夫子猶使䘮明致罰投杖謝愆何肯公然自欺詐相䇿一作承奉此乃童兒相戯非復長老所為觀孟軻著書首陳此説馬遷裁史仍習其言得自委巷曾無先覺悲夫按援舉四科品隲有子劉非講學家故應襲此盲語不須與辯也乃其嗤是史文儕諸童戲龍門有口此判不移有若似聖㡬如孔融之坐飲虎賁學者遇此等語雖孟子亦不可執西河取疑檀弓子夏䘮其子而䘮其明曾子弔之曰吾與女事夫子於洙泗之間退而老於西河之上使西河之民疑女於夫子爾何無罪與子夏投其杖而拜曰吾過矣吾過矣鄭注言有師而不稱師也疏使西河疑與夫子相似皇氏言疑子夏是夫子之身非也又史記漢書皆曰上自史記作在漢書作居雒陽南宫從複道望見諸將往往相與坐沙中語漢書作往往數人偶語上曰此何語留侯曰陛下所封皆故人親愛所誅皆平生讐一作仇忌史漢作怨此屬畏誅故相聚謀反爾上乃憂曰為之奈何留侯曰上平生所憎誰最甚者上曰雍齒留侯曰今先封雍齒以示羣臣羣臣見雍齒封則人人自堅矣於是上置酒封雍齒為侯難曰夫公家之事知無不為見無禮於君如鷹鸇之逐鳥雀案子房之一無之字少也傾家結客為韓報讎一作仇此則忠義素彰名節甚著其事漢也何為屬羣小聚一脫聚字謀將犯其君遂嘿然杜口俟問方對倘若髙祖不問竟欲無言者邪且將而必誅罪在不測如諸將屯聚圖為禍亂宻言臺上猶懼覺知羣議沙中何無避忌為國當作圖之道必不如斯然則張良慮反側不安雍齒以嫌疑受爵葢當時實有其事也如複道之望坐沙而語是説者敷演妄溢其端耳按一路説來兩面搏擊理事俱到皆屬蹴下之文節尾數言是正指真曉事人語玉連環謹以解矣涑水氏論此事亦有帝見方對之疑因為之説曰良以帝數任愛憎為誅賞諸將有自危之心故因事納忠以移帝意使上下無猜忌也此又一解以謀反一語為詭辭譎諫又一妙㑹雍齒留侯世家雍齒與我故數嘗辱我我欲殺之為其功多故不忍又封為什方侯注括地志云益州什邡縣知無不為左僖九晉茍息曰公家之事知無不為忠也鷹鸇之逐左文十八季文子出莒僕之語將而必誅公羊莊三十二公子牙今將爾辭曷為與親弑者同君親無將將而誅焉又東觀漢記曰赤眉降後積甲與熊耳山齊云云所難之指文中已足云云字疑衍難曰案盆子既亡棄甲誠衆必與山比峻則未之有也昔太誓云前徒倒戈血流漂杵孔安國曰葢言之甚也如積甲與熊耳山齊者抑亦血流漂杵之徒歟按此條文簡獨無駮句如古書義疏於諸條中最為雅飾赤眉盆子後漢書劉盆子者太山式人城陽景王章之後琅邪人樊崇起兵於莒王莽遣亷丹王匡擊之崇恐其衆與莽兵亂乃皆朱其眉相識别由是號曰赤眉赤眉將兵西求劉氏共尊立之遂立盆子為帝自號建始元年入長安城更始來降赤眉貪財物出大掠時三輔飢引而東歸光武要其還路赤眉驚震乞降曰盆子將百萬衆降陛下何以待之帝曰待女以不死耳樊崇乃將盆子肉袒降積兵甲宜陽城西與熊耳山齊又東觀漢記曰郭伋為并州牧行部到西河美稷有童兒數百各騎竹馬於道次迎拜伋問一有曰字兒曹何自逺來對曰聞使君始到喜故奉迎伋辭謝之事訖諸兒送至一作出郭外問使君何日當還伋使别駕計日吿之既還先期一日伋為違信止於野亭須期乃入難曰葢此事不可信者三焉案漢時方伯儀比諸侯其行也前驅竟一作蔽野後乗塞路鼓吹沸喧旌􅙶填咽彼草萊稚子齠齔童兒非唯羞赧不見亦自驚惶失據安能犯騶駕凌䄡帷首觸威嚴自陳襟抱其不可信一也又方伯案部舉州振肅至於墨紱長吏黄綬羣官率彼吏人顒然佇候兼復掃除逆旅行李有程嚴備供具憩息有所如棄而不就居止無恒一作常必公私闕擬客主俱窘凡為良二千石固當知人所苦安得輕赴數童之期坐失百城之望其不可信二也夫以晉陽無竹古今共知假有傳檄它方葢亦事同大夏訪知一作諸商賈不可多得况在童孺彌復難求羣戯而乗如何克辦其不可信三也凡説此事總有三科三科屬漢記言推而論之了無一實異哉補注傳檄恐當作轉致按三科揭辯殊欠老成傔從可省也供頓可斷也竹材可轉也然必如史事亦豈事理之常其上文既言所到縣邑老幼相逢迎矣獨美稷曾無父老盡童稚耶其有導之使然屏視隠處者耶毋乃縣令丞喻指里陌工為媚者耶將二千石上計史館作新語相矜耀稍增飾之也千載美談一經撲破頓起人㡬許疑端矣郭伋後漢書本傳伋字細侯髙祖父解武帝時以任俠聞伋少有志行世祖建武九年徵拜潁川太守帝勞之曰去帝城不逺河潤九里冀京師并䝉福也十一年省朔方刺史屬并州調伋為并州牧前在并州素結恩徳及入界所到縣邑老幼相携逢迎道路其行部到西河以下與柬觀記同文晉陽無竹困學紀聞史通云晉陽無竹事不可信閻若璩案唐晉陽童子寺有竹日報平安而美稷乃在今汾州府也按為竹報平安則囏植可知晉陽汾州地氣亦未必大異然愚意此事疑辯總不在此大夏不多得史記大宛傳張騫曰臣在大夏時見卭竹杖蜀布問曰安得此大夏國人曰吾賈人往市之身毒身毒在大夏東南可數千里以騫度之此其去蜀不逺矣又魏志注語林曰匈奴遣使人一無人字來朝太祖令崔琰在座而已握刀侍立既而使人問匈奴使者曰曹公何如對曰曹公美則美矣而侍立者非人臣之相太祖乃追殺使者云云二字亦贅一本止一云字亦衍難曰昔孟陽卧一作坐床詐稱齊后紀信乗纛矯號漢王或主遘屯䝉或朝罹兵革故權以取濟事非獲已如崔琰本無此急何得以臣代君者哉且凡稱人君皆慎其舉措况魏武經綸霸業南面受朝而使臣居君座君處臣位將何以使萬國具瞻百寮僉矚也又漢代之於匈奴其為綏撫勤矣雖復賂以金帛結以親姻猶恐一脫恐字虺毒不悛狼心易擾如輙殺其使者不顯罪名復何以懐四夷於外蕃建五利於中國且曹公必以所為過失懼招物議故誅彼行人將以杜兹謗口而言同綸綍聲遍寰區欲葢而彰止益其辱雖愚暗之主猶所不為况英略之君豈其若是夫芻蕘鄙説閭巷讕舊作讇或作濶並非言凡一作諸如此書通無擊難而裴引語林斯事編入魏史注中持彼虚詞亂兹實録葢曹公多詐好立詭謀流俗相欺遂為此説葢曹公十七字一本失去一本綴注節末細按之定是正文應置於此故特申掎摭辯其疑誤者焉按裴注固饒博趣史通雅惡譎辭故往往排之而此條通節責裴至末結罪老瞞正名詐詭可云廷尉當是也第嫌具瞻綸綍等句施非其分又檢魏志注不見此叚殊不可曉崔琰魏志本傳琰宇季珪清河人為東西曹掾屬遷中尉琰聲姿髙暢眉目疏朗鬚長四尺甚有威重朝士瞻望而太祖亦敬憚焉按語林事亦見世説容止篇魏武將見匈奴使自以形陋使崔季珪代帝自捉刀立牀頭云云匈奴使曰牀頭捉刀人乃英雄也孟陽卧牀左荘八齊侯田于貝邱墜車反徒人費遇賊於門先入伏公而出關死于門中遂人殺孟陽于牀曰非君也不類紀信乗纛項羽本紀漢王食乏夜出女子滎陽東門楚兵四面擊之紀信乗黄屋車傅左纛曰漢王降楚皆呼萬嵗漢王與數十騎從西門出項王見紀信問漢王安在信曰已出矣項王燒殺紀信又魏世諸小書一譌作事皆云文鴦侍講殿瓦皆飛云云二字贅此事列晉陽秋之前亦指曹魏時難曰案漢書云項王叱咜慴伏千人然則呼聲之極大者不過使人披靡而已尋文鴦武勇逺慙項籍况侍君側固當屏氣徐言安能一多使字檐瓦皆飛有踰舊作喻武安鳴鼓且瓦既飄隕則人必震驚而魏帝與其羣臣焉得巋然無害也按形容語與積甲山齊同類而侍講瓦飛語尤過當故彼為解詞此為詰詞文鴦按文鴦有二一在魏髙貴鄉公時即文欽子一在西晉末遼西鮮卑段務勿塵子匹磾弟也文乃指魏時者通鑑髙貴正元二年鴦夜襲司馬師營廿露三年降於司馬昭晉書景紀鴦勇冠三軍景帝目有瘤割之鴦來攻驚而目出即其人也小書侍講事無考武安鳴鼓史記亷簡傳秦伐韓軍於閼與王令趙奢將救之兵去邯鄲三十里秦軍軍武安西鼔噪勒兵武安瓦屋盡振又晉陽秋曰胡質為荆州刺史子威自京都一作師省之見父史有停廐中三字文當摘一停字乃成句十餘日告歸質賜絹一疋為路糧威曰大人清髙不審於何得此絹質曰是吾俸禄之餘難曰古人謂方牧為二千石者以其禄有二千石故也名以定體貴實甚焉設使亷如伯夷介若黔敖恐當作婁茍居此職終不患於貧餒或作餧者如胡威之别其父也一縑之財猶且發問則千石之俸其費安施料以牙籌推以食一作之借箸察其厚薄知不然矣或曰觀諸史所載兹流非一原注如張堪為蜀郡乗折轅車吳隠之為廣川貨犬待客並其類也張堪舊作張湛貨犬或作貸米並誤必以多為證則足可無疑然人自有身安弊古通敝緼口甘麄糲而多藏鏹帛無所散用者故公孫𢎞位至三公而卧布被食脫粟飯汲黯所謂齊人多詐者是也安知胡威之徒其儉亦皆如此而史臣不詳厥理直謂清白當然一脫當然二字繆矣哉按流傳清節刻用深文過矣然不怪其父而疵其子人情王道推隠入微楚直證羊齊㢘咽李聖賢不與正見氣象光明仲長統論損益曰君子居位為士民之長固宜重肉累帛朱輪駟馬今反謂薄屋者為髙藿食者為清既失天地之心又開虚偽之門又張敞飭長吏奏曰假令京師先行讓畔異路道不拾遺其實無益亷貪貞淫之行而以偽先天下固未可也即諸侯先行之而偽聲軼於京師非細事也其言與此段相發故引申録之胡質并子威晉良吏傳胡威字伯武父質以忠清著稱仕魏至征東將軍荆州刺史威早厲志尚質之為荆州也云云與晉陽秋略同威歴徐州刺史入朝武帝語平生曰卿孰與父清對曰臣父清恐人知臣清恐人不知是臣不及逺也介若黔敖檀弓齊大飢黔敖為食於路有餓者貿貿然來黔敖曰嗟來食曰予惟不食嗟來之食以至於斯也按介當屬餓者文似誤恐當作黔婁法言重黎篇或問賢曰顔淵黔婁皇甫髙士傳黔婁死妻以康為謚曽子曰先生食不充膚衣不葢形何樂而為康妻曰昔君嘗賜粟三千鍾先生辭不受甘天下之淡味求仁而得仁謚為康不亦宜乎亦見列女傳史載非一原注引張吳二事按後漢張堪傳堪在蜀公孫述破珍寳足富十世而堪去職之日乗折轅車布被囊而已晉書良吏傳吳隠之將嫁女謝石知其貧素令助厨帳使至方見婢牽犬賣之此外蕭然無辦布被脫粟漢公孫𢎞傳汲黔曰𢎞位三公奉禄甚多然為布被此詐也乂𢎞身食一肉脫粟飯西京雜記𢎞故人髙賀告人曰公孫内服貂蟬外衣麻枲内厨五鼎外膳一肴云何示天下於是朝廷疑其矯焉𢎞聞之歎曰寜逢惡賔勿逢故人又新晉書阮籍傳曰籍至孝母終正與人圍碁亦作棋對者求止籍留與决史有賭字既而飲酒二斗舉聲一號吐血數升及史有將字葬食一蒸㹠飲二斗酒一本酒字在二斗上然後臨穴史作訣直言窮矣舉聲一號因復吐血數斗史亦作升毁瘠骨立殆致滅性難曰夫人才雖下愚識雖不肖始亡天屬必致其哀但有舊誤作以苴絰未幾悲荒遽輟如謂本無戚容則未之有也况嗣宗當聖善將歿閔凶所鍾合門惶恐舉族悲咤居里巷者猶停舂相一作杵之音在鄰伍者尚申匍匐之救而為其子者方對局求决舉杯酣暢但當此際曾無感惻則心同木石志如梟獍者安有既臨泉穴始知摧慟者乎求諸人情事必不爾又孝子之䘮親也朝夕孺慕鹽酪不嘗斯可至於癯瘠矣如甘㫖在念則觔肉内寛醉飽自得一作支則飢膚外博况乎溺情㹠酒不改平素雖復時一嘔慟豈能柴毁骨立乎已上兩駮理解皆得苦其煩絮葢彼阮生者不脩名教居䘮過失而説者遂言其無禮如彼又舊譌作人以其志操本一作尤異才識甚髙而談者遂言其至性如此惟毁及譽皆無取焉按無禮如彼至性如此猖狂生態正復躍見楮墨間愚意劉生此段宜為訓俗摭言不須作箴史博議阮籍見史官建置篇又本傳殆致滅性之下云裴楷往弔之籍散髮箕踞醉而直視楷弔唁畢便去或問曰籍既不哭君何為禮楷曰阮籍方外之士我俗中之人時人歎為兩得愚謂此一段語乖誕尤甚舂相檀弓鄰有喪舂不相史記商君傳趙良曰五羖大夫死秦國男女流涕童子不歌謡舂者不相杵又新晉書王祥傳曰祥漢末遭亂扶母携弟覽避地廬一作盧誤江隠居三十餘年不應州郡之命母終徐州刺史吕䖍檄為别駕年垂耳順覽勸之乃應召于時冦賊充斥祥率勵兵士頻討破之時人歌曰海沂之康實頼王祥年八十五太始五年薨補按魏志吕䖍傳注祥始仕年過五十以泰始四年年八十九薨其文較核難曰祥為徐州别駕冦盗充斥固是漢建安中獻帝第三改元徐州未清時事耳子元黏看在此疑端從此生有魏受命凡四十一作三十誤五年自丕至陳留王全魏之數也陳留即常道鄉公後謚元帝上去徐州冦賊充斥下至晉太始武帝初元五年當六十年已上矣祥於建安中年垂耳順更加六十一多六字載至晉太始五年薨則當年一百二十嵗矣而史云年八十五薨者何也如必以終時實年八十五則為徐州别駕止可年年字一在五六下二十五六矣又云其未從官已前隠居三十餘載者但其初被檄時止年二十五六自此而往安得復有三十餘年乎必謂祥為别駕在建安後則徐州清晏易代頻仍么麽竊發固亦時有史不悉載耳胡可臆泥何得云于時冦賊充斥祥率勵兵士頻討破之乎求其前後無一符㑹也按祥應徐州檄時年垂耳順以太始五年年八十五計之則與建安兵事無預矣傳有從討母丘儉之文正是淮徐用兵之事而事在累官光禄勲後則其先所謂别駕勵兵者又非欽儉等也本條疑根只在徐州㓂盗四字愚謂此四字活看為得篇多顓固之言然所發覆非無理即不情功在懲戲遏偽而貌取之失子羽矣王祥晉書本傳祥字休徵琅邪臨沂人繼母朱氏不慈每使掃除牛下祥愈恭敬母嘗欲生魚氷凍忽解雙鯉躍出母又思黄雀炙黄雀數十入其幙鄉里稱為孝感焉漢末遭亂云云沂徐冦賊建安初年則有吕布袁術之亂是在魏之初起至髙貴鄉公時則有母丘儉文欽諸葛誕等據淮陽檄討司馬氏事是在魏之末造按祥傳為徐州别駕在吕袁等事後從討母丘儉是為司𨽻校尉時非為别駕時補按虔傳守徐在魏文明間任别駕祥有討定利城賊事徐冦當謂此凡所駮難具列如右葢精五經者討羣儒之别義練三史者徴諸子之異聞加以探賾索隠然後辨其紕繆如向之諸史所載則不然何者其叙事也唯記一途直論一理而矛盾自顯表裏相乖非復牴牾直成狂惑者爾尋兹失所起良由作者情多忽略識惟愚滯或採彼流言不加銓一作詮擇或傳諸繆説即從編次用使真偽混淆是非參錯葢語曰君子可欺不可罔至如邪説害正虚詞損實小人以為信爾君子知其不然又一無又字語曰信書不如無書葢為此也夫書彼竹帛事非容易凡為國史可不慎諸按此為篇尾即是全書結尾書中每以狂惑愚滯邪説小人等字輕易加人子元罪過採彼流言數句乃史通全部通指凡所為糾前失者皆以嚴後式也吹求病或過正而銓次犂然就班合條成章合章成卷通部一貫豈茍作者惟史與經相為對待談經之書日益充棟衡史之部邈焉孤行其為結體嚴重寧詎説家等夷涪翁老眼乃與雕龍並稱所由沒其實者葢已久矣忤時第十二孝和皇帝時中宗初謚孝和韋武弄權母媪一作娼預政士有附麗之者起家而綰朱紫予以無所傅㑹取擯當時原注一為中允四載不遷㑹天子還京師朝廷願從者衆予求畨次在大駕後發日此二句後字錯置當云子求番次在後大駕發日因古本有因字逗留不去守司東都杜門却掃凡經三載釋上述忤時縁起或有譖予躬為史臣不書國事而取樂丘園私自著述者由是驛召至京令專執史筆于時小人道長綱紀日壊仕於其間忽忽不樂遂與監修國史蕭至忠等諸官書求退曰釋滿肚不合時宜具在簡蕭一牘本篇之作只欲録存此牘編入部尾耳已上當作小序觀僕幼聞詩禮長渉藝文至於史傳之言尤所耽恱尋夫左史右史是曰春秋尚書素王素臣斯稱微婉志晦兩京三國班謝陳習闡其謩中朝江左王陸干孫紀其厯劉石僭號方䇿委於和苞張未詳宋齊應籙惇史歸於蕭沈亦有汲冡古篆禹穴殘編孟堅所亡葛洪刋其雜記休文所缺荀當作謝綽裁其拾遺凡此諸家其流葢廣莫不賾一作頤彼泉諱淵作泉藪尋其枝葉原始要終備知之矣釋牘首自述性耽史學搜覽靡遺若乃劉峻作傳自述長於論才范曄為書盛言矜其贊體斯又當仁不讓庶㡬前哲者焉釋次明素志本以著述自許然自䇿名仕伍待罪朝列三為史臣再入東觀竟不能勒成國典此句當與正史篇撰唐書八十卷重修則天實錄三十卷參互活㸔貽彼後一脱後字來者何哉釋轉到遜避不為起下靜言思之其不可有五故也釋提五不可是全篇柱棒何者古之國史皆出自一家如魯漢之丘明子長晉齊之董狐南史咸能立言不朽藏諸名山未聞藉以衆功方云絶筆唯後漢東觀大集羣儒著述無主條章靡立由是伯度譏其不實公理以為可焚張衡蔡邕二子糾之於當代傅元范曄兩家嗤之於後葉今者史司取士有倍東京人自以為荀袁家自稱為政駿謂劉向歆每欲記一事載一言皆閣筆相視含毫不斷故頭或作首白可期而汗青無日其不可一也釋第一不可謂古史成於一手近世例取多員遂致觀望相延曠廢時日前漢郡國計書先上太史副上丞相後漢公卿所撰始集公府乃上蘭臺由是史官所修載事為博爰自近古此道不行史官編録唯自詢採而左右二史闕注起居衣冠百家罕通行狀求風俗於州郡視聽不該討沿革於臺閣簿籍難見雖使尼父再出猶且成於管窺况僕限以中才安能遂其博物其不可二也釋第二不可謂史館聚書漢懸公令近須史臣自採能無闕略稽時昔董狐之書法也以示於朝南史之書弑也執簡以往而近代史局皆通籍禁門深居九重欲人不見尋其義者葢由杜彼顔面防諸請謁故也然今館中作者多士如林皆願長喙無聞䶦同齚舌儻有五始初成一字加貶言未絶口而朝野具知筆未栖毫而搢紳咸誦夫孫盛實録一作紀實取嫉權門王劭一作王韶直書見讎貴族人之情也能無畏乎其不可三也釋第三不可謂古時良史秉直公朝近制禁防轉滋多口人皆畏縮遲回矣古者刋定一史纂成一家體統各殊指歸咸别夫尚書之教也以疏通知逺為主春秋之義也以懲惡勸善為先史記則退處士而進姦雄漢書則抑忠臣而飾主闕斯並曩時得失之列良史是非之準作者言之詳矣頃史官注記多取禀監脩楊令公則云必須直詞宗尚書則云宜多隠惡十羊九牧其令難行一國三公適從何在其不可四也釋第四不可謂古人作史是非進退得自主張近則例設監修禀承牽制無從下筆竊一作切以史置監修雖古無式尋其名號可得而言夫言監者葢總領之義耳如創紀編年一作創立紀年一脫編字則年有斷限草傳叙事則事有豐約或可略而不略或應書而不書此刋削之務也屬詞比事勞逸宜均揮鉛奮墨勤惰須等某袠一譌表某篇付之此職某傳某志一作某紀某傳歸之彼官此銓配之理也斯並宜明立科條審定區域儻人思自勉則書可立成今監之者既不指授修之者又無遵奉用使爭學茍且務相推避坐變炎凉徒延歳月其不可五也釋第五不可從上條來既設監局宜定科指訖無配派誰獨承當廢職奚咎凡此不可其流實多一言以蔽三隅自反而時談物議安得笑僕編次無聞者哉釋略一束勒比者伏見明公每汲汲於勸誘勤勤於課責或云墳籍事重努力用心或云嵗序已淹何時輟手切一作竊以綱維不舉而督課徒勤雖威以刺骨之刑朂以懸金之賞終不可得也語曰陳力就列不能者止所以比者布懐知已厯抵舊作詆羣公屢辭載筆之官願罷記言之職一作責者正為此爾釋針對課督之詞再一束勒忤時正㫖已盡於此抑又有所未諭古通喻聊復一二言之比奉髙命令𨽻名修史而其職非一如張尚書崔岑二吏部鄭太常等既廹以吏道不可拘之史任以僕曹務多閒勒令專知下筆夫以惟寂惟寞乃使記事記言茍如其例則栁常侍劉祕監徐禮部等並一脫並字一作幷門可張羅府無堆案何事置之度外而使各無羈束乎釋自此以下將言專寄責成宜隆異數先以陪員挑起必謂諸賢載削非其所長以僕鎗鎗鉸鉸故推為首最就如斯理亦有其説釋轉入自身何者僕少小從仕早躡通班當皇上初臨萬邦未親庶務而以守兹介直不附姧回遂使官若土牛棄同芻狗逮鑾輿西幸百寮畢從自惟官曹務簡求以留後居臺常謂朝廷不知國家於我已矣釋就本身作甘投閒散一跌即指畨次在後守司東都時豈謂一旦忽承恩㫖州司臨門使者結轍既而驅駟馬入函闗排千門謁天子引賈生於宣室雖歎其才召季布於河東反増其媿釋即前所云驛召至京忽忽不樂意正是目前光景明公既位居端揆本音上聲望重台衡飛沈屬其顧盼一作眄榮辱由其俛仰曽不上祈宸極申之以寵光僉議搢紳縻我以好爵其相見也直云史筆闕書為日已乆石渠掃第思子為勞今之仰追唯此而已釋此節剖明責有專歸禮無加異之故抑眀公足下獨不聞劉炫蜀王之説乎昔劉炫仕隋為蜀王侍讀尚書牛宏嘗問之曰君王遇子其禮如何曰相期髙於周孔見待下於奴僕宏不悟其言請聞其義炫曰吾王每有所疑必先見訪是相期髙於周孔酒食左右皆饜而我餘􅅹不霑是見待下於奴僕也僕亦竊不自揆輕一作輙敢方於鄙宗劉炫同姓故云何者求史才則千里降追語宦途則十年不進意者得非相期髙於班馬見待下於兵卒乎釋援古為况申足上意又人之品藻貴識其性明公視僕於名利何如哉當其坐嘯洛城非隠非吏惟以守愚自得寧以充詘攖心但今者僶勉從事攣拘就役朝廷厚用其才竟不薄加其禮求諸隗始其義安施儻使士有澹雅若嚴君平清亷如段干木與僕易地而處亦將彈鋏告勞積薪為恨况僕未能免俗能不蔕讀如蠆芥於心者乎釋此節又拓開上説自占身分當今朝號得人國稱多士蓬山之下良直差肩芸閣之中英竒接武僕既功虧刻鵠筆未獲麟詳此二句非不草撰者但未卒業耳徒殫大官之膳虚索長安之米乞已本職還其舊居多謝簡書請避賢路唯明公足下哀而許之釋牘尾結歸辭退至忠得書大慙無以酬答又惜其才不許解史任而宗楚客崔湜鄭愔等皆惡聞其短共讎嫉之俄而蕭宗等相次伏誅然後獲免於難釋此是書後體其文則配應篇頭小人道長至此歸杜也按篇名忤時其實只是與蕭至忠等一通簡劄也其前作小序用其後作附䟦用不必連屬全劄所主只在五不可五層遞下其本指更在後二不可葢𦂳對監領非人多作鄙夷負氣語故號其篇曰忤時也忤時與自叙相表裏自叙主衡史忤時主職史衡史本於識定識定故論定史通作而識寓焉職史期於道行道行故直行史通成而道存焉是二篇者函古砥今屹然分峙為内外篇之殿器鑒風稜不規不隨天子還京武后紀光宅元年廢嗣聖皇帝為廬陵王遷于房州改東都為神州拜洛受圖聖厯元年召廬陵王于房州長安五年皇帝復于位按其時臨朝復辟並在東都也中宗紀神龍二年十月至自東都賜行從官勛一轉按是為中宗還京師也蕭至忠唐書本傳至忠同中書門下平章事以韋后黨出太平公主用事附納丐還復為中書令主謀逆至忠遁入南山捕誅之至忠外方直而内無守因武三思得中丞附安樂主為宰相舊書代韋巨源為侍中仍依舊修史按巨源傳云至忠仍舊監修國史則此云修史即謂監修也素王素臣家語齊太史子餘歎美孔子曰天其素王之乎又見莊子及董子對䇿賈鄭序論又杜氏左傳序説者謂仲尼自衛反魯修春秋立素王丘明為素臣荅曰異乎余所聞子路欲使門人為臣孔子以為欺天而云仲尼素王丘明素臣非通論也葛洪雜記晉書本傳洪著述不輟抄五經史漢百家之言力挍雜事三百一十卷荀綽拾遺按隋經籍志宋拾遺十卷梁少府謝綽撰書事篇亦云謝拾沈遺此處作荀綽誤東觀羣儒詳漢書家及正史篇伯度譏其不實淵鍳古文本注杜伯度漢末人名操按即杜度也庾肩吾書品杜度濫觴于草書取竒于漢帝品在上之中然頗疑與譏漢紀無渉及考常璩華陽士女志李法字伯度桓帝時為侍中數表宦官太盛椒房太重史官記事無實錄之才虚相褒述必為後笑乃知此處伯度是李非杜也注書不可率意如此公理以為可焚後漢仲長統傳統字公理博渉書記每論説古今及時俗行事恒發憤歎息著論名昌言凡三十四篇又作詩見志曰百家雜碎請用從火史局通籍禁門見辨職篇王劭見讎困學紀聞文粹云王韶直書見讐貴族宋王韶之為晉史叙王珣貨殖王廞作亂珣子𢎞廞子華皆貴韶之懼為所陷深附結徐傅等當從文粹按舊唐書亦作王韶然觀史通於叙事曲筆等篇及雜説中北齊隋史等節累累言王劭直書犯時忌從本文作劭亦合集内評家厯詆王劭正縁不悟此㫖耳楊令公唐書楊再思傳再思為人佞而智張昌宗坐事武后問昌宗於國有功乎再思言昌宗為陛下治丹餌而愈此為有功戴令言賦兩脚狐譏之中宗立拜中書令監修國史宗尚書唐書宗楚客傳楚客字叔敖武后從姊子同鳯閣鸞臺平章事韋后安樂公主親信之與紀處訥為黨世號宗紀韋氏敗誅楚客冐於權利嘗諷陳延禧陳符命以媚帝曰陛下承母禪周唐一統知㡬本傳楚客亦領監修張尚書唐書張文瓘傳弟子錫久視初為宰相請還廬陵王不為張易之所右流循州龍朔中累遷工部尚書兼修國史崔岑二吏部唐書崔仁師傳其孫湜字澄瀾少以文詞稱附託昭容上官氏數與宣淫於外俄撿校吏部侍郎後賜死湜猜毒詭險進趣不已至於敗乂岑文本傳其孫羲字伯華中宗時遷祕書少監進吏部時崔湜鄭愔等分掌選皆以賄聞獨羲勁亷為時議嘉仰但不能抑退坐豫太平公主謀誅鄭太常疑即後所云鄭愔新舊書皆無傳其名附見岑羲等傳惟寂惟寞揚雄解嘲惟寂惟漠守徳之宅栁常侍劉祕監徐禮部栁常侍北平補注以栁芳當之而劉徐無注按芳官非常侍生亦少後同時有栁澤者疏諌斜封官拜監察御史進殿中侍御史然亦未知是否愚謂此三人官不甚著本文亦未舉其名不必彊求其人以實之鎗鎗鉸鉸恐即鐵中錚錚庸中佼佼之義未詳别見引賈生漢書賈誼傳誼為長沙王太傅後歳餘文帝思誼徴之至入見上方受釐坐宣室因問鬼神之本誼道所㠯然夜半文帝前席曰吾久不見賈生自㠯為過之今不及也召季布史記本傳季布為河東守人有言其賢者孝文召欲以為御史大夫復有言其勇使酒難近者見罷布因進曰陛下無故召臣人必有以臣欺陛下者今罷去人必有以毁臣者陛下以一人譽而召臣一人毁而去臣臣恐有識聞之有以闚陛下也上黙慙彈鋏積薪彈鋏見戰國齊䇿史史記汲黯傳黯列為九卿故黯時丞相皆與黯同列或尊用迴之黯褊心不能無少望見上前言曰陛下用羣臣如積薪耳後來者居上刻鵠本見馬援傳然此處語意乃以積功未究為言王禹偁詩收螢秋不倦刻鵠夜忘疲亦此用法也史通通釋卷二十
