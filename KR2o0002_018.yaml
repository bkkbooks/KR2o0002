body:
  text: 史通通釋卷十八無錫浦起龍撰外篇雜説下第八二十五條諸史六條前二篇皆循代分條此六條錯舉立説故統曰諸史夫盛服飾者以珠翠為先工繢事者以丹青為主至若錯綜乖所分布失宜則綵絢雖多巧妙不足者矣釋數語總為公孫靈運兩傳贊論作挈王本此處截條非觀班氏公孫𢎞傳贊直言漢之得人盛於武宣二代至於平津善惡寂蔑滅通無覩持論如是其義靡聞必矜其美辭愛而不棄則宜微有改易列於百官公卿表後庶尋文究理頗相附㑹以茲編録不猶愈乎釋此言公孫傳贊闌及得人也王本此處又截條非又沈侯謝靈運傳論全説文體備言音律此正可為翰林之補亡流别之總説耳原注李充撰翰林論摯虞撰文章流别集如次諸史傳實為乖越釋此言靈運傳論泛談文體也陸士衡有云離之則雙美合之則兩傷信矣哉釋此所引言總束兩贊論之逾分此下舊皆連後條非按類舉兩傳贊論皆屬史家變體正見作手化裁用此為譏太煞印板矣然設移班贊為公卿表跋取沈論作流别弁言固自位置得所道可兩行者多此類此條當與編次篇尾論彚商公孫𢎞傳贊見編次篇按彼言冝居武宣紀末此言冝列公卿表後兩論皆通可見印板之中亦具化裁之用謝靈運傳論其略曰六義所因四始攸繫屈宋導於前賈馬振於後王劉揚班崔蔡之徒異軌同奔建安曹氏緯文被質自漢至魏文體三變原其飈流所始莫不同祖風騷降及元康潘陸特秀自建武暨於義熙仲文革孫許之風叔源變太元之氣爰逮宋代靈運興㑹標舉延年體裁明密夫五色相宣八音協暢若前有浮聲則後須切響妙逹此㫖始可言文其有事可書而不書者不應書而書者至如班固叙事㣲小必書至髙祖破項垓下斬首八萬曾不涉言李齊李百藥北齊書於後主紀則書幸於侍中穆提婆第於孝昭紀則不言親戎以伐奚於邊疆小寇無不畢紀如司馬消難擁數州之地以叛曾不挂言略大舉一作存小其流非一此下舊連後段非按此條專論可書不應書者舉小大相反為言但其中有摘論未允處詳具注内垓下斬首八萬史記髙紀叙項羽敗垓下時云使騎將灌嬰追殺項羽東城斬首八萬遂略定楚地漢書髙紀但云灌嬰追斬羽東城楚地悉定按漢書削去斬首八萬句於本朝開創殺戮不盡其辭非大失也所惜者是時淮隂侯先却後乘出竒决勝乃其最後一畨兵陣妙用史公不置於本傳而補見於此班乃并沒去之為闕事耳幸提婆第北齊恩倖傳穆提婆本姓駱母陸令萱入掖庭後提婆改姓穆氏按後主紀但書以領軍穆提婆為尚書左僕射而無幸其第之文并穆后及提婆傳亦不及幸第事史通所云未詳何據親戎伐奚按孝昭紀皇建元年帝親戎北討庫莫奚出長城虜奔遯分兵致討大獲牛馬據此則事已入紀矣而史通以為不言亦未詳何意司馬消難司馬子如傳子消難尚髙祖女為北豫州刺史鎭武牢與公主情好不睦公主訴之懼罪遂招延鄰敵走關西按消難於齊事盡此周書本傳消難入朝授大將軍從東伐隋文輔政消難以所管九州八鎭質於陳尋歸陳陳以為都督九州八鎭車騎將軍後又還關中按消難固反覆子而所云擁數州地乃入周後事非在齊事也其人應列周史而名挂齊史者縁父及之也史通以為百藥病亦非昔劉勰有云自卿淵舊誤作雲已前多役才而不課學向雄文心作雄向已後頗引書以助文然近史所載亦多如是故雖有王平所識僅通十字霍光無學不知一經而述其言語必稱典誥良由才乏天然故事資虚飾者矣釋首層以引書助文領起大意一本此四行截附前條不連下段非案宋書稱武帝入關以鎭惡不伐逺方馮異於渭濱遊覽追思一作想太公夫以宋祖無學愚智所委一作悉安能援引古事以酬荅羣臣者乎斯不然矣此句一本有重句渭濱熟事何人不知以此判宋武亦失平釋此層亦引下之文其所主在周書也更一作又有甚於此者覩周齊二國俱出隂山必言類互鄉則宇文尤甚原注案王劭齊志宇文公呼髙祖曰漢兒夫以獻武音詞未變胡俗王宋所載其鄙甚多矣周帝仍稱之以華夏則知其言不逮於齊逺矣按獻武即齊神武也音詞舊誤作晉嗣稱之舊作因之亦誤釋四句周齊並提意側在周而牛𢎞作周史王劭作齊志並掌䇿書其載齊言也則淺俗如彼其載周言也則文雅若此夫如是何哉非兩邦有夷夏之殊由二史有虚實之異故也釋此層舉周齊二史相衡見周史偏多雅句必非本語矣夫以記宇文之言而動遵經典多依史漢原注周史述太祖論梁元帝曰蕭繹可謂天之所廢誰能興之者乎又宇文測為汾州或譖之太祖怒曰何為間我骨肉生此貝錦此並六經之言也又曰榮權吉士也寡人與之言無二此則三國志之辭也其餘言皆如此豈是宇文之語耶又案裴政梁太清實録稱元帝使王琛聘魏長孫儉謂宇文曰王琛眼睛全不轉公曰瞎奴使癡人來豈得怨我此言與王宋所載相類可謂真宇文之言無媿於實録矣此何異莊子述鮒魚之對而辯類蘇張賈生叙鵩鳥之辭而文同屈宋施於寓言則可求諸實録則否矣釋自此層以下專斥周史之多飾一本此處截分非世稱近史編語原注謂言語之語也唯周多美辭夫以博採古文而聚成今説是則俗之所傳有雞九錫酒孝經房中志醉鄉記或師範五經或規模三史雖文皆雅正而事悉虚無豈可便謂南董之才宜居班馬之軄也釋末就時論之稱周史者折之舊本此處連下條非按此亦言語等篇一派話頭即是前卷論周史一條注脚通節之㫖總貫在引書助文四字中唐史訾鄭餘慶奏議類用古語人誚其不適時意正類此鮒魚鵩鳥猶前云聽雀聞牛也頗涉惡道如栁州與韋中立書雪與日豈有過哉顧吠者犬耳此種揶揄鄙心不喜卿淵二句本文心才略篇文僅通十字蜀志王平傳平字子均生長戎旅手不能書其所識不過十字而口授作書皆有意理霍光無學霍光傳贊光不學亡術闇於大理鎮惡方馮異南史王鎮惡傳鎮惡猛之孫也宋武帝北伐以鎮惡領前鋒及陷長安於灞上迎武帝帝勞之謝曰此明公之威諸將之力鎮惡何功之有焉帝曰卿欲學馮異耶後漢馮異傳每所止舎諸將並坐論功異獨屏樹下軍中號曰大樹將軍渭濱思太公南史宋武帝紀帝至渭濱嘆曰此地寧復有吕望耶鄭鮮之曰明公以旰日待士豈患海内無人宋祖無學鄭鮮之傳帝少事軍旅不涉經學時或談論進難帝時有慙恧裴昭明傳昭明罷郡無宅帝曰我不讀書不知古人誰可比之鮒魚之對莊子外物篇莊周顧視車轍中有鮒魚焉曰我東海之波臣也君豈有升斗之水而活我哉周曰我且激西江之水以迎子可乎鮒魚忿然作色曰君乃言此曽不如索我於枯魚之肆鵩鳥之辭賈誼鵩鳥賦鵩鳥歎息舉首奮翼口不能言請對以臆雞九錫等王訓故袁淑俳諧記有雞九錫文皇甫松著酒孝經房中志王績著醉鄉記困學紀聞雞九錫封浚稽山子自梁室云季雕蟲道長原注謂太清已後平頭上尾尤忌於時對語儷辭盛行於俗始自江外被於洛中而史之載言亦同於此原注何之元梁典稱議納侯景髙祖曰文叔得尹遵之降而隗囂滅安世用羊祜之言而孫皓平夫漢晉之君事殊僣盜梁主必不捨其諡號呼以字名此由須對語儷辭故也又姚最梁後略稱髙祖曰得既在我失亦在予不及子孫知復何恨夫變我稱予互文成句求諸人語理必不然此由避平頭上尾故也又簫韶太清記曰温子昇永安故事言爾朱世隆之攻沒建業也怨痛之響上徹天閽酸苦之極下傷人理此皆語非簡要而徒積字成文並由趨聲對之為患也或聲從流靡或語須偶對此之為害其流甚多尹遵或作王郎或作王遵並非字名舊作姓名皆語舊作語皆趨聲對舊作避聲對今皆刋正假有辨如酈叟吃若周昌子羽修飾而言仲由率爾而對莫不拘以文禁一概而書必求實録多見其妄矣按此原平頭對語之習盛於梁代也然公自言之乃自襲之何耶豈謂施於文則可施於史不可耶我予互句對推之稱人季漢已肈其端臧洪書與陳琳曰足下徼利於境外吾子託身於盟主是也輙讀而病之平頭上尾南史陸厥傳厥好為文章沈約謝朓王融類相推轂汝南周顒善識聲韻皆用宫商將平上去入四聲制韻有平頭上尾􅑣腰鶴䣛五字之中音韻悉異兩句之内角徴不同世呼為永明體詩苑類格沈約云詩病有八平頭上尾蜂腰鶴䣛大韻小韻旁紐正紐唯上尾鶴䣛最忌辨如酈叟漢酈食其傳贊髙祖以征伐定天下而縉紳之徒騁其知辯並成大業酈生自匿監門待主然後出吃若周昌史記周昌傳髙帝欲廢太子昌為人吃又盛怒曰臣口不能言然臣期期知其不可陛下即欲易太子然臣期期不奉詔夫晉宋已前帝王傳授始自錫命終於登極其間牋䟽欵曲詔䇿頻煩雖事皆偽跡言並飾讓猶能備其威儀陳其文物俾禮容可識朝野具瞻逮於近古我則不暇至如梁武之居江陵齊宣之在晉陽或文出荆州假稱宣德之令原注江陵之去建業地濶數千餘里宣德皇后下令旬日必至以此而言其偽可見或書成并部虚云孝靖之勅原注北齊文宣帝將受魏禪宻撰錫讓勸進斷表文詔入奏請署一時頓盡則知無復前後節文等差降殺也此注舊編在後注之下誤凡此文誥本不施行必也載之起居編之國史豈所謂撮其機要翦截浮辭者哉但二蕭陳隋諸史通多此失原注晉魏及宋自創業後稱公王即帝位皆數十年間事也夫功德日盛稍進累遷足驗禮容不欺揖遜無失自齊梁已降稱公王及即帝位皆不出旬月之中耳夫以迫促如是則於禮儀何有者哉唯王劭所撰齊志獨無是焉舊本此處連下條非按此斥南北晚近諸朝自撰錫禪文詔月日以㡬史皆載之愈形其偽王志獨無髙出諸史也文出荆州南史梁武紀齊南康王即帝位於江陵遙廢東昏為涪陵王以帝加征東軍鎮石頭王珍國斬東昏二年正月進帝為梁公備九錫二月進爵為王三月丙辰齊帝下詔禪位四月辛酉宣德皇后令曰西詔至憲章前代敬禪神器於梁明可臨軒授璽紱書成并部通鑑渤海髙德政善圖䜟勸髙洋受禪洋還晉陽令左右陳山提齎事條并宻書與楊愔山提至鄴愔即召太常卿邢劭等撰儀注秘書監魏收草九錫禪讓勸進諸文洋至鄴孝靖禪位於齊夫以暴易暴舊作以暴易古一作以累易古古人以為嗤如彦淵之改魏收也以非易非彌見其失矣而撰隋舊衍文字史者稱澹大矯收失者何哉且以澹著書方於君懋豈唯其間可容數人而已史臣美澹而譏劭者原注隋史毎論皆云史臣曰今故因其成事呼為史臣豈所謂通鑒乎語曰蟬翼為重千鈞為輕其斯之謂矣按此所主在魏書而所刺在魏澹與上條文義不相䝉王劭特帶衡之耳故分擘冝穩詳諸史諸條皆有承轉語助本一片文字後人見頭緒紛出遂離立之取便循覽未為害事無如當連反斷當斷反連老杜詩云海圖坼波濤舊繡移曲折閲之令人目迷細意分張頗煩裁緝别傳九條所舉皆非國史故􅗵别傳劉向列女傳云夏姬再為夫人三為王后夫為夫人則難以驗也為王后則斷可知矣釋三為王后是駮案主句案其時諸國稱王唯楚而已如巫臣諌莊將納姬氏不言曾入楚宫則其為后當在周室葢周德雖衰猶稱秉禮豈可族稱姬氏而妻厥同姓者乎且魯娶於呉謂之孟子聚麀之誚起自昭公未聞其先已有斯事禮之所載何其闕如原注雜記曰夫人之不命於天子自魯昭公始也又以女子一身而作嬪三代求諸人事理必不然釋已上言春秋時無其事尋夫春秋之後國稱王者有七葢由向誤以夏姬之生當夫戰國之世稱三為王后者謂歴嬪七國諸王挍以年代殊為乖刺釋此言戰國時無其人至於他篇兹例甚衆故論楚也則昭王當云平王與秦穆同時言齊也則晏嬰居宋景之後原注列女傳曰齊傷槐女景公時人謂晏子曰昔宋景公時大旱三年夫謂宋景為昔即居其後矣今粗舉一二其流可知釋節尾推類言之觀劉向對成帝稱武宣行事世傳失實事具風俗通其言可謂明鑒者矣釋首借劉向自言挑起議論及自造洪範五行及新序説苑列女神仙諸傳而皆廣陳虚事多構偽辭非其識不周而才不足葢以世人多可欺故也嗚呼後生可畏何代無人而輙輕忽若斯者哉夫傳聞失真書事失實葢事有不獲已人所不能免也至於故為異説以惑後來則過之尤甚者矣釋已上掲一欺字為後文作冒舊本此處截條非是案蘓秦答燕易王稱有婦人將殺夫令妾進其藥酒妾佯僵而覆之又甘茂謂蘓代或譌作氏云貧人女與冨人女㑹績曰無以買燭而子之光有餘子可分我餘光無損子明此並戰國之時遊説之士寓言設理以相比興及向之著書也乃用一作因蘓氏之説為二婦人立傳定其邦國加其姓氏以彼烏有持為指實何其妄哉釋此段摘出二傳以實其欺又有甚於此者至如伯竒化鳥對吉甫以哀鳴宿瘤隱形干齊王而作后此則不附於物理者矣復有懐嬴失節目為貞女劉安覆族定以登仙立一作夫言如是豈顧丘明之有傳孟堅之有史哉釋末又類舉其失按已上二條並糾劉向也前條言年世舛譌後條言事理傅㑹夏姬左傳成二楚之討陳夏氏也莊王欲納夏姬申公巫臣曰不可君召諸侯以討罪也今納夏姬貪其色也君其圖之王乃止昭王秦穆同時即申左篇秦穆女為荆平夫人事兩引俱誤作昭王彼篇已刋正晏嬰居宋景後列女傳齊傷槐衍之女名婧景公有所愛槐令曰傷槐者刑於是衍醉而傷槐景公且加罪焉婧懼乃造晏嬰之門曰昔者宋景公時大旱卜以人祀景公曰必以人祀寡人請自當之今殺婧之父鄰國皆謂君愛樹而賊人其可乎郭評宋景公頭曼在齊景公杵臼後三十餘年世傳失實風俗通正失成帝問文帝治天下孰與孝宣皇帝劉向曰世之毁譽莫能得實審形者少随聲者多世間言文帝祭代東門期日再中集上書囊為帷粟一升一錢凡此皆俗人妄傳言過其實進藥酒戰國燕䇿有逺為吏者其妻私人其夫且歸私者憂之其妻曰勿憂也吾已為藥酒待之矣後二日夫至妻使妾奉巵酒進之妾知其為藥酒也進之則殺主父言之則逐主母乃陽僵棄酒列女傳周主忠妾者周大夫妻之媵妾也大夫仕於周其妻淫於鄰人其下文略與䇿同分餘光史記甘茂傳貧人女與冨人女㑹績曰子可分我餘尤云云列女傳齊女徐吾者東海貧婦人也與鄰婦李吾㑹燭夜績徐吾燭數不屬李吾曰請無與夜也徐吾曰云云伯竒化鳥陳思王令禽惡鳥論昔尹吉甫用後妻之䜛殺孝子伯竒吉甫後悟追傷伯竒出見鳥鳴聲噭然吉甫動心曰伯勞乎乃其音尤切吉甫曰伯勞乎是吾子棲吾輿非吾子飛勿居鳥尋聲而棲於葢按史通所糾乃謂劉向書也而今本説苑新序皆不見斯事曾鞏二書序云新序三十篇隋唐之世尚為全書今可見者十篇而已説苑二十篇崇文總目存者五篇又間得者十有三篇然則所糾皆在亡篇歟宿瘤隱形郭注宿瘤無隱形事列女傳宿瘤女者齊東郭採桑之女也項有大瘤故號宿瘤閔王出遊百姓盡觀宿瘤採桑如故王曰竒女也遂以為后黃本補注新序云齊有婦人極醜無雙號曰無鹽女自詣宣王曰竊甞喜隱王曰試一行之言未卒忽然不見宣王大驚是隱形乃無鹽事非宿瘤也按事亦見列女傳又謂女號鍾離春無鹽乃其邑名懐嬴郭注懐嬴秦穆公女也初事晉懐公圉後事晉文公重耳故曰失節按列女傳不及妻晉文事劉安按漢書淮南王安謀反被誅而以為仙去者葛洪神仙傳有之亦不見劉向書揚雄法言好論司馬遷而不及左丘明常稱左氏傳唯有品藻二言而已是其鑒物有所不明者也且雄哂子長愛竒多雜一作新非又曰不依仲尼之筆非書也自序又云不讀非聖之書然其撰甘泉賦當云羽獵賦則云鞭宓妃云云劉勰文心已譏一作議之矣然則作然而用文章小道無足致嗤觀其蜀王或作主本紀稱杜魄化而為䳌荆屍變而為鼈其言如是何其鄙哉所謂非言之難而行之難也按此條折揚子也即以其言還折之賦家誇威飾事宛虹入軒元𠖇困野何嫌荒誕著書則不可品藻二言法言重黎篇或問周官曰立事左氏曰品藻太史遷曰實録按二言者二字也愛竒多雜君子篇仲尼多愛愛義也子長多愛愛竒也問神篇或曰淮南太史公者其多知歟曷其雜也曰雜乎雜人病以多知為雜唯聖人為不雜鞭宓妃王訓故揚雄羽獵賦云鞭洛水之宓妃子餉屈原與彭胥劉勰文心夸飾篇云子雲挍獵鞭宓妃以餉屈原孌彼洛神既非冈兩而虚用濫形不其踈乎杜魄荆屍王訓故揚雄蜀王本紀云荆人鼈令死屍化隨江水上至成都是蜀王杜宇杜宇立以為相杜宇號望帝自以德不如鼈令以其國禪之又説文成都記云望帝死其魄化為鳥名曰杜䳌路史餘論鱉水名也亦作鄨縣在牂牁故知㡬以子雲之説為妄夫十室之邑必有忠信欲求不朽𢎞之在人何者交阯逺居南裔越裳之俗也士燮所産地敦煌僻處西域昆戎之鄉也劉昞所産地求諸人物自古闕載葢由地居下國路絶上京史官注記所不能及也既而士燮著録劉昞裁書則磊落英才粲然盈矚者矣向使兩賢不出二郡無記彼邊隅之君子何以取聞於後世乎是知一誤作非著述之功其力大矣豈與夫詩賦小技挍其優劣者哉按此條人文互表士燮劉昞皆生長偏陲而人因文顯見著述家功用宏長士燮吴志士燮傳燮字彦威蒼梧人官交阯太守中國士人徃依避難陳國袁徽與荀彧書曰交阯士府君學問優博逹於從政官事小闋玩習書傳春秋左氏傳尤有師説意思甚宻尚書兼通古今大義今欲條左氏尚書長義上之其見稱如此劉昞其人見㸃煩篇其所著書見論贊篇自戰國已下詞人屬文皆偽立客主假相詶答至於屈原離騷辭稱遇漁一譌漢父於江渚宋玉髙唐賦云夢神女於陽臺夫言並文章句結音韻以兹叙事足驗憑虚而司馬遷習鑿齒之徒皆採為逸事編諸史籍疑誤後學不其甚邪必如是則馬卿逰梁枚乗譖其好色曹植至洛宓妃覩於巖畔撰漢舊脱漢字黃本補魏史者亦冝編為實録矣按此闢屈原列傳之採録漁父辭漢晉春秋之援證神女事也别傳一科不涉史乗而此條夹入二史頗嫌為例不純亦縁此下連舉寓言假之起例耳漁父王逸注序漁父者屈原之所作也漁父避俗時遇屈原怪而問之遂相應答神女髙唐賦昔者先王甞逰髙唐夢一婦人去而辭曰朝為行雲暮為行雨朝朝暮暮陽臺之下楚襄王使玉賦髙唐之事又作神女賦馬卿好色相如美人賦相如逰梁梁王恱之鄒陽譖之曰相如服色妖麗遊王後宫王察之乎王問相如子好色乎相如曰臣不好色也臣氣服於内心正於懐信誓旦旦秉志不囬按枚鄒互異有誤曹植至洛曹植洛神賦余從京城言歸東藩容與乎陽林流盼乎洛川於是精移神駭忽焉思散覩一麗人於巖之畔宓妃黃補注漢書音義如淳曰宓妃宓羲氏之女也死洛水為洛神嵇康撰髙士傳取莊子楚辭二漁父事合成一篇夫以園吏之寓言騷人之假說而定為實録斯已謬矣况此二漁父者較年則前後别時論地則南北殊壤而輙併之為一豈非惑哉茍如是則蘇代所言雙擒蚌鷸伍胥所遇渡水蘆中斯並漁父善事亦可同歸一録何止揄袂緇帷之林濯纓滄浪之水若斯而已也蘓代至末四十七字舊本作細書其原文别有四十三字大意略同葢是兩本互異之文非注也今按本書體裁駢者為稱故轉用之仍録原文於左傳蘇代所言雙擒蚌鷸此亦漁父之一事何不同書於乎必惟取揄𬒮緇帷之林濯纓滄浪之水彌見其未學也此舊本此下連後條郭本處截莊周著書以寓言為主嵇康述髙士傳多引其虚辭至若神有混沌編諸首録茍以此為實則其流甚多至如鼃鼈競長蚿蛇相憐鷽莊子作學鳩笑而後言鮒魚忿以作色向使康撰幽明録齊諧記一衍怪字並可引為真事矣夫識理如此何為而薄周孔哉按已上二條並糾中散書也舊本聨為一通鬬橁未緻前論中壘亦分條矣援而例之可無合糅二漁父莊子漁父篇孔子逰於緇帷之林絃歌鼓琴奏曲未半有漁父者下船而來鬚眉交白被髪揄袂行原以上距陸而止左手據䣛右手持頤以聽曲終楚辭漁父篇漁父莞爾而笑鼔枻而去歌曰滄浪之水清兮可以濯吾纓滄浪之水濁兮可以濯吾足遂去不復與言擒鷸蚌戰國燕䇿趙且伐燕蘇代為燕謂趙王曰臣過易水蚌方出曝而鷸啄其肉蚌合而箝其喙鷸曰今日不兩明日不兩即有死蚌蚌亦曰今日不出明日不出即有死鷸不肻相舍漁者并擒之天禄識餘兩謂闢口或改兩作雨愚謂作雨者不惟失義且失韻渡蘆中吴越春秋伍員奔吴至江漁父渡之有饑色曰為子取餉子胥乃潛身深葦之中有頃父來而呼之曰蘆中人蘆中人豈非窮士乎子胥出應食畢曰請丈人姓字漁父曰今日凶凶兩賊相逢何用姓字為混沌莊子應帝王南海之帝為鯈北海之帝為忽中央之帝為混沌鯈與忽時相遇於混沌之地混沌待之甚善鯈與忽謀報混沌之德曰人皆有七竅以視聽食息此獨無有甞試鑿之日鑿一竅七日而混沌死按與言語篇各意其流甚多秋水篇埳井之鼃謂東海之鼈曰吾跳梁乎井幹之水入休乎缺甃之崖此亦至矣夫子奚不時來觀乎東海之鼈左足未入右䣛已縶於是鼃聞之規規然自失也又蚿憐蛇蛇憐風蚿謂蛇曰吾以衆足行而不及子之無足何也蛇曰夫天機之所動何可易邪吾安用足哉又鷽鳩見逍遙逰又鮒魚見前薄周孔嵇康絶交書自惟至熟有必不堪者七甚不可者二每非湯武而薄周孔在人間不止此事㑹顯世教所不容此甚不可一也杜元凱撰列女記博採經籍前史顯録古老明言而事有可疑猶闕而不載斯豈非理存雅正心嫉邪僻者乎君子哉若人也長者哉若人也一本下連李陵集非按此借元凱書指出著書正令曰顯録明言有疑猶闕卓哉當為輓近世掩襲作偽者一提其耳列女記預本傳撰女記讚當時論者謂文義質直隋經籍志女記十卷杜預撰在雜傳類李陵集有與蘇武書詞采壯麗音句流靡觀其文體不類西漢人一無人字殆後來一脫來字所為假稱陵作也遷史舊本此二字誤入以焉之下缺而不載良有以焉編於李集舊誤作傳中斯為謬矣一本無此二句按决陵此書為假作具眼在坡老之前可悟此老非不知文者海虞王侍御峻為余言子瞻疑此書出齊梁人手恐亦彊坐江文通上建平王書已用少卿搥心之語豈以時流語作典故哉當是漢季晉初人擬為之雜識十條識舊作說按雜說乃篇之總名豈以科别之名混之雜識猶言雜記也或讀作入聲遂以音譌轉作說字耳夫自古舊有之字學者談稱一作講多矣精於公羊者尤憎左氏習於太史者一多則字偏嫉孟堅夫能以彼所長而攻此所短持此之是而述彼之非兼善者鮮矣此言各是其所是一本此處截條又一無又字觀世之學者或躭翫一經或專精一史談春秋者則不知宗周既隕而人有六雄論史漢者則不悟劉氏云亡而地分三國亦猶武陵隱士滅一作遁迹桃源當此晉年猶謂暴秦之地也釋此言舉一而廢百假有學窮千載書總五車見良直而不覺其善逢牴牾而不知其失葛洪所謂藏書之箱箧五經之主人而夫子有云雖多亦安用為其斯之謂也釋此言徒多者漫無主見一本誤合下條按此條謂讀書顓泥一家局䕶偏遺自亦一病至若博涉羣書而胸迷蒼素又為徒讀矣葢首條泛舉之文桃源陶靖節集晉太元中武陵人捕魚為業縁溪行忽逢桃花林夹岸數百步林盡水源便得一山山有小口便捨舟從口入初極狭復行豁然開朗屋舍儼然阡陌交通其中男女衣著悉如外人見漁人乃大驚問所從來具荅之自云先世避秦時亂率妻子邑人來此絶境問今是何世乃不知有漢無論魏晉夫鄒好長纓齊珍紫服斯皆一時所尚非百王不易之道也至如漢代公羊擅名三傳晉年莊子髙視六經今並挂壁不行綴一作贅非旒無絶二句依郭本所定舊本挂誤作蛙旒誤作緝豈與夫春秋左氏古文尚書雖暫廢於一朝終獨髙於千載挍其優劣可同年而語哉按集内尚書春秋徃徃連舉此條持論莊慤可證向諸疑惑果非質言長纓紫服文選任彦升䇿秀才文云紫衣賤服猶化齊風長纓鄙好且變鄒俗善注韓子曰鄒君好長纓左右皆服長纓甚貴鄒君患之左右曰君好服之百姓亦多服是故貴鄒君因斷其纓而出國中皆不服又齊桓公好服紫一國盡服紫當時十素不得一紫公患之管仲曰君欲止之何不自誡勿衣也公曰諾於是境内莫衣紫也夫書名竹帛物情所競雖舊作維聖人無私而君子亦黨葢易之作也本非記事之流而孔子繫辭輙盛述顔子稱其殆庶雖言則無媿事非虚美亦由視予猶父門人日親故非所要言而曲垂編録者矣釋一層興起後文既而揚雄寂寞師心典誥至於童烏稚子蜀漢諸賢原注謂嚴李鄭司馬之徒按鄭舊作栁太𤣥二字帶筆𤣥主數不衡人法言恣加襃賞雖内舉不避而情有所偏者焉釋又一層興起後文夫以宣尼叡同睿哲子雲參聖在於著述不能忘私則自中庸以降抑可知矣如謝承漢書偏黨吴越魏收代史盛誇胡塞復焉足怪哉釋所嗤者在此按此本為謝魏偏怙而發多事牽扯烘託以自取譏集中授人口實處皆然童烏法言問神篇育而不苖者吾家之童烏乎九齡而與我𤣥文注童烏子雲之子也蜀漢諸賢問明篇蜀莊沈𠖇蜀莊之才之珍也不作茍見不治茍得吾珍莊也居難為也按莊即注之所謂嚴即嚴君平也淵騫篇或問子蜀人也請人曰有李仲元者人也不夷不惠可否之間也見其貌者肅如也聞其言者愀如也觀其行者穆如也問神篇谷口鄭子真不屈其志而耕乎巖石之下名震於京師按谷口漢中地與所云蜀漢恰合舊作栁不知何人雄書亦無定誤君子篇必也儒乎文麗用寡長卿也子雲參聖語本陸績述𤣥已具自叙篇注子曰女為君子儒無為小人儒儒誠有之史亦冝然葢左丘明司馬遷君子之史也吴均魏收小人之史也其薫蕕不類何相去之逺哉按史而以君子小人命之竒情確品此豈於文句間求之向來申左乙馬人或以過分疑之觀此可以融通前説矣禮云禮云玉帛云乎哉史云史云文飾云乎哉何則一有修字史者固當以好善為主嫉惡為次若司馬遷班叔皮史之好善者也晉董狐齊南史史之嫉惡者也必兼此二者而重之以文飾其唯左丘明乎自茲已降吾未之見也按好善嫉惡兩言分品亦確夫所謂直筆者不掩惡不虚美書之有益於襃貶不書無損於勸誡但舉其宏綱存其大體而已非謂絲毫必録𤨏細無遺者也如宋孝王王劭之徒其所記也喜論人帷簿箔通不修言貌鄙事訐以為直吾無取焉王本連下條按宋與王皆劉氏所盛稱者於此仍無恕辭可知胸中不設封府異夫黨枯䕶朽輩人夫故立異端喜造竒說漢有劉向晉有葛洪近者沈約又其甚一作比也後來君子幸為詳焉按向洪書雜家也休文書正史也故曰又甚昔魏史二字有疑稱朱異二字亦恐誤有口才摯虞有筆才故知喉舌翰墨其辭本異而近世作者撰彼口詞同諸筆文斯皆以元瑜孔璋之才而處丘明子長之任文之與史何相亂之甚乎按此亦史體尚質之㫖口才筆才吴志朱異字季文注文士傳曰異童少徃見朱據據曰為我賦一物乃坐異賦弩曰南嶽之幹鍾山之銅應機命中獲隼髙墉成而後坐王訓故王隱晉書云摯虞與太叔廣名位略同廣長口才虞長筆才廣談虞不能對退筆難廣廣不能荅按此見世說文學篇注而朱異賦物不言自口其本傳亦不稱其口才史通所稱或即二書之言而誤記耳元瑜孔璋魏世子丕與吴質書元瑜書記翩翩致足樂也孔璋表章殊健微為繁富按元瑜阮禹字孔璋陳琳字夫載筆立言名流今古如馬遷史記能成一家揚雄太𤣥可傳千載此則其事尤大記之於傳可也至於一作如近代則不然其有彫蟲末伎短才小說或為集不過數卷原注如陳書隂鏗傳云有集五卷其類是也或著書纔至一篇原注如梁書孝元紀云撰同姓名人録一卷其類是也莫不一一或作一二列名編諸傳末原注如梁書孝元紀云撰研神記陳書姚察傳云撰西征記辨茗酪記後魏書劉芳傳云撰周官音禮記音齊書祖鴻勛傳云撰晉祠記凡此書或一卷兩卷而已自餘人有文集或四卷或五卷者不可勝記故不具列之按此注於梁元複同姓名録去之事同七略巨細必書斯亦煩之甚者按書貴持擇有多而不足傳者有少而不可没者冝勿以卷帙為差次然如注内所列除周官禮記二音有關經學餘則𤨏雜居多其書即可留而傳固可不具載也研神辨茗酪撿今本梁陳紀傳原不録恐姚氏前别本有之子曰齊景公有馬千駟死之日人無德而稱焉伯夷叔齊餓於首陽之下民一諱一不諱筆誤到於今稱之若漢代青翟劉舍位登丞相而班史無録姜詩趙壹身止計吏而謝書謝承後漢有傳即其例也今之修史者則不然其有才德闕如而位宦通顯史臣載筆必為立傳其所一無所記也止具其生前歴官殁後贈謚若斯而已矣雖其間伸以状跡粗陳一二么麽恒一作常事曾何足觀始自伯起魏書迄乎皇家五史原注五史謂五代史通多此體流蕩忘歸史漢之風忽焉不祀一作嗣者一無者字矣按後來諸史恐亦不免奈何假如漢書列傳人不盈三百宋史年視西漢稍贏而列傳人至二千四百有竒又遼金北人不與焉何古才之難而晚秀之蔚若斯其逺耶青翟劉舍漢書申屠嘉傳自嘉死後開封侯陶青桃侯劉舍柏至侯許昌平棘侯薛澤武强侯荘青翟商陵侯趙周皆􅐅􅐅㢘謹為丞相備員而已無所能發明功名著於世者姜詩按後漢廣漢人姜詩事母至孝永平三年察孝亷拜中郎除江陽令其事范書具詩妻龎氏傳中史通不徴范而徵謝葢謝書則詩自有傳也趙壹范書亦有傳見載文篇史通通釋卷十八
